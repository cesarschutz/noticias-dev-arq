<!DOCTYPE html>
<html lang="pt-BR" data-theme="auto">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="CSR News — Arquitetura, plataformas e IA para quem constrói software sério">
<title>CSR News</title>
<link rel="icon" type="image/svg+xml" href="assets/csr-news-logo.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@1,300;1,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
<style>
/* ===== THEME TOKENS ===== */
:root {
  color-scheme: light;
  --bg: #f5f5f7;
  --bg-alt: #ffffff;
  --surface: #ffffff;
  --surface-el: #f5f5f7;
  --surface-card: #ffffff;
  --nav-bg: rgba(255,255,255,0.82);
  --text: #1d1d1f;
  --text-2: rgba(0,0,0,0.56);
  --text-3: rgba(0,0,0,0.36);
  --border: rgba(0,0,0,0.08);
  --accent: #0071e3;
  --accent-h: #0077ed;
  --link: #0066cc;
  --shadow: rgba(0,0,0,0.22) 3px 5px 30px 0px;
  --shadow-s: rgba(0,0,0,0.08) 0 2px 8px 0;
  --sw: 240px;
  --nh: 48px;
  --r: 8px;
  --rl: 12px;
  --rp: 980px;
  --tr: 0.18s ease;
  --ease-spring: cubic-bezier(0.32, 0.72, 0, 1);
  --ease-out: cubic-bezier(0.25, 0.46, 0.45, 0.94);
  --tr-fast: 0.12s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  --tr-base: 0.24s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  --tr-slow: 0.42s cubic-bezier(0.32, 0.72, 0, 1);
}
@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) {
    color-scheme: dark;
    --bg: #000000; --bg-alt: #000000;
    --surface: #1c1c1e; --surface-el: #2a2a2d; --surface-card: #272729;
    --nav-bg: rgba(0,0,0,0.72);
    --text: #f5f5f7; --text-2: rgba(255,255,255,0.56); --text-3: rgba(255,255,255,0.36);
    --border: rgba(255,255,255,0.08);
    --accent: #2997ff; --accent-h: #409cff; --link: #2997ff;
    --shadow: rgba(0,0,0,0.5) 3px 5px 30px 0px; --shadow-s: rgba(0,0,0,0.3) 0 2px 8px 0;
  }
  .nav{
    box-shadow:0 1px 0 rgba(255,255,255,0.06);
  }
}
[data-theme="dark"] {
  color-scheme: dark;
  --bg: #000000; --bg-alt: #000000;
  --surface: #1c1c1e; --surface-el: #2a2a2d; --surface-card: #272729;
  --nav-bg: rgba(0,0,0,0.72);
  --text: #f5f5f7; --text-2: rgba(255,255,255,0.56); --text-3: rgba(255,255,255,0.36);
  --border: rgba(255,255,255,0.08);
  --accent: #2997ff; --accent-h: #409cff; --link: #2997ff;
  --shadow: rgba(0,0,0,0.5) 3px 5px 30px 0px; --shadow-s: rgba(0,0,0,0.3) 0 2px 8px 0;
}
[data-theme="dark"] .nav{
  box-shadow:0 1px 0 rgba(255,255,255,0.06);
}
[data-theme="dark"] .qbar{
  background:var(--surface-el);
  border-color:rgba(255,255,255,0.12);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.08),
    0 2px 12px rgba(0,0,0,0.6),
    0 8px 28px rgba(0,0,0,0.5),
    0 0 0 1px rgba(255,255,255,0.06),
    0 10px 70px 10px rgba(255,255,255,0.18),
    0 2px 30px 4px rgba(255,255,255,0.12);
}
[data-theme="dark"] .qbar-chip{
  background:var(--surface-el);
  border-color:rgba(255,255,255,0.10);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.06),
    0 4px 14px rgba(0,0,0,0.55);
}
[data-theme="light"] {
  color-scheme: light;
  --bg: #f5f5f7; --bg-alt: #ffffff;
  --surface: #ffffff; --surface-el: #f5f5f7; --surface-card: #ffffff;
  --nav-bg: rgba(255,255,255,0.82);
  --text: #1d1d1f; --text-2: rgba(0,0,0,0.56); --text-3: rgba(0,0,0,0.36);
  --border: rgba(0,0,0,0.08);
  --accent: #0071e3; --accent-h: #0077ed; --link: #0066cc;
  --shadow: rgba(0,0,0,0.22) 3px 5px 30px 0px; --shadow-s: rgba(0,0,0,0.08) 0 2px 8px 0;
  /* ── Apple typography ── */
  --ff-display: -apple-system, "SF Pro Display", "Helvetica Neue", Helvetica, Arial, sans-serif;
  --ff-text: -apple-system, "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
  --ff-quote: 'Merriweather', Georgia, serif;
  /* Apple radii */
  --r-xs: 5px;
  --r-sm: 8px;
  --r-md: 11px;
  --r-lg: 12px;
  --r-pill: 980px;
}

/* ===== RESET ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body{font-family:-apple-system,"SF Pro Text","Helvetica Neue",Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.47;letter-spacing:-0.374px;font-size:17px;text-wrap:pretty;transition:background var(--tr-base),color var(--tr-base)}
h1,h2,h3,h4,h5,h6{text-wrap:balance}
a{color:var(--link);text-decoration:none}
a:hover{text-decoration:underline}
img{display:block;max-width:100%}
button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit}
ul,ol{list-style:none}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ===== NAV ===== */
.nav{
  position:fixed;top:0;left:0;right:0;z-index:200;
  height:var(--nh);
  background:var(--nav-bg);
  backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  border-bottom:1px solid var(--border);
  box-shadow:0 1px 0 rgba(0,0,0,0.04);
  display:flex;align-items:center;
}
.nav-inner{
  display:flex;align-items:center;gap:12px;
  width:100%;max-width:1440px;margin:0 auto;padding:0 20px;
}
.nav-logo{
  display:flex;align-items:center;gap:1px;cursor:pointer;flex-shrink:0;
  font-family:var(--ff-display);
  font-weight:800;letter-spacing:-0.04em;line-height:1;
}
.nav-logo .csr-mini{font-size:19px;color:#000}
[data-theme="dark"] .nav-logo .csr-mini{color:#fff}
.nav-logo .news-mini{
  background:var(--accent);color:#fff;
  font-size:13px;letter-spacing:0.06em;
  padding:3px 5px 4px;border-radius:6px;line-height:1;
  position:relative;overflow:hidden;isolation:isolate;
}
.nav-logo .news-mini::after{
  content:"";position:absolute;inset:0;
  background:linear-gradient(100deg,transparent 40%,rgba(255,255,255,.55) 50%,transparent 60%);
  background-repeat:no-repeat;background-size:250% 100%;background-position:150% 0;
  animation:news-shine 5s linear infinite;pointer-events:none;mix-blend-mode:overlay;
}
@keyframes news-shine{
  0%{background-position:150% 0}
  40%{background-position:-150% 0}
  100%{background-position:-150% 0}
}
.nav-links{display:flex;gap:2px;flex:1;justify-content:center}
.nav-link{
  font-size:12px;font-weight:400;letter-spacing:-0.12px;
  padding:5px 12px;border-radius:var(--rp);color:var(--text);
  transition:background var(--tr);cursor:pointer;
}
.nav-link:hover{background:var(--border)}
.nav-link.active{background:var(--surface-el);font-weight:600}
.nav-actions{display:flex;align-items:center;gap:6px;margin-left:auto;flex-shrink:0}

/* Search button in nav */
.nav-search-btn{
  display:inline-flex;align-items:center;gap:8px;
  height:32px;padding:0 10px 0 12px;
  background:var(--surface-el);border:1px solid var(--border);
  border-radius:980px;color:var(--text-2);
  font-size:12px;font-weight:500;cursor:pointer;
  transition:background .2s,border-color .2s,color .2s;
}
.nav-search-btn:hover{background:var(--border);color:var(--text);border-color:transparent}
.nav-search-lbl{letter-spacing:-0.01em}
@media(max-width:720px){.nav-search-lbl{display:none}}
.nav-search-kbd{
  font-family:'SF Mono','Menlo',ui-monospace,monospace;
  font-size:10px;font-weight:600;
  background:var(--surface);border:1px solid var(--border);
  border-radius:4px;padding:1px 5px;color:var(--text-3);line-height:1;
}
.nav-help-btn{
  width:30px;height:30px;border-radius:50%;
  background:transparent;color:var(--text-3);
  display:flex;align-items:center;justify-content:center;
  transition:background .2s,color .2s;
}
.nav-help-btn:hover{background:rgba(127,127,127,.12);color:var(--text)}

/* Search overlay */
.search-overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,0.45);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
  display:flex;align-items:flex-start;justify-content:center;
  padding-top:clamp(60px,12vh,140px);
  opacity:0;pointer-events:none;
  transition:opacity .18s var(--ease-out);
}
.search-overlay.open{opacity:1;pointer-events:auto}
.search-modal{
  width:min(640px,calc(100vw - 32px));
  background:var(--bg);border-radius:var(--r-lg);box-shadow:0 24px 80px rgba(0,0,0,0.4),0 0 0 1px var(--border);
  overflow:hidden;
  transform:translateY(-8px) scale(0.98);
  transition:transform .18s var(--ease-spring);
}
.search-overlay.open .search-modal{transform:none}
.search-input-wrap{
  display:flex;align-items:center;gap:10px;
  padding:14px 18px;border-bottom:1px solid var(--border);
}
.search-input-wrap svg{color:var(--text-3);flex-shrink:0}
.search-input{
  flex:1;background:transparent;border:none;outline:none;
  font-family:inherit;font-size:16px;color:var(--text);
  letter-spacing:-0.01em;
}
.search-input::placeholder{color:var(--text-3)}
.search-esc{
  font-family:'SF Mono','Menlo',ui-monospace,monospace;
  font-size:10px;font-weight:600;
  background:var(--surface-el);border:1px solid var(--border);
  border-radius:4px;padding:2px 6px;color:var(--text-3);line-height:1;
}
.search-results{max-height:50vh;overflow-y:auto;padding:6px}
.search-empty{padding:32px 18px;text-align:center;color:var(--text-3);font-size:13px}
.search-group{padding:8px 12px 4px;font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-3)}
.search-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:8px;cursor:pointer;
  font-size:14px;color:var(--text);
  transition:background .12s;
}
.search-item:hover,.search-item.selected{background:var(--surface-el)}
.search-item-icon{
  width:24px;height:24px;border-radius:6px;
  display:inline-flex;align-items:center;justify-content:center;
  background:var(--surface-el);font-size:13px;flex-shrink:0;
}
.search-item-icon img{width:16px;height:16px;object-fit:contain}
.search-item-meta{font-size:11px;color:var(--text-3);margin-left:auto;flex-shrink:0}

/* Shortcuts overlay */
.kbd-overlay{
  position:fixed;inset:0;z-index:201;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;padding:24px;
  opacity:0;pointer-events:none;transition:opacity .18s;
}
.kbd-overlay.open{opacity:1;pointer-events:auto}
.kbd-modal{
  width:min(440px,100%);background:var(--bg);border-radius:var(--r-lg);box-shadow:0 24px 80px rgba(0,0,0,0.4),0 0 0 1px var(--border);
  padding:22px;
}
.kbd-title{font-size:15px;font-weight:600;margin-bottom:14px;color:var(--text)}
.kbd-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;font-size:13px;color:var(--text-2)}
.kbd-keys{display:flex;gap:4px}
.kbd-key{
  font-family:'SF Mono','Menlo',ui-monospace,monospace;
  font-size:11px;font-weight:600;
  background:var(--surface-el);border:1px solid var(--border);
  border-radius:5px;padding:2px 7px;color:var(--text);min-width:22px;text-align:center;
}

/* Scroll progress bar */
.scroll-progress{
  position:fixed;top:0;left:0;height:2px;width:0;
  background:linear-gradient(90deg,var(--accent),#a855f7);
  z-index:300;transition:width .1s linear;
  box-shadow:0 0 8px rgba(0,113,227,0.5);
}
.btn-theme{
  width:34px;height:34px;border-radius:50%;
  background:transparent;
  color:var(--text);
  display:flex;align-items:center;justify-content:center;
  opacity:.88;
  transition:opacity .2s,background .2s,transform 0.1s var(--ease-out);
}
.btn-theme svg{width:17px;height:17px;}
.btn-theme:hover{opacity:1;background:rgba(127,127,127,.12);}
.btn-theme:active{transform:scale(0.88)}
.btn-theme.is-switching{animation:theme-flip 0.36s var(--ease-spring)}
@keyframes theme-flip{
  0%  {transform:scale(1)   rotate(0deg)}
  40% {transform:scale(0.7) rotate(180deg)}
  70% {transform:scale(1.1) rotate(360deg)}
  100%{transform:scale(1)   rotate(360deg)}
}
.hamburger{
  display:flex;width:34px;height:34px;flex-shrink:0;
  border-radius:var(--r);
  align-items:center;justify-content:center;
  color:var(--text);opacity:.6;
  transition:opacity .15s,background .15s,transform .1s var(--ease-out);
}
.hamburger:hover{opacity:1;background:rgba(127,127,127,.12);}
.hamburger:active{transform:scale(.88)}
.hamburger.sb-open{opacity:1;}
.hamburger svg{display:block;flex-shrink:0}
/* Mobile-only: drawer header with close button */
.sb-drawer-header{display:none}
@media(max-width:960px){
  .sb-drawer-header{
    display:flex;align-items:center;justify-content:space-between;
    padding:8px 10px 8px 16px;border-bottom:1px solid var(--border);flex-shrink:0;
  }
  .sb-drawer-title{font-size:11px;font-weight:600;color:var(--text-2);letter-spacing:0.06em;text-transform:uppercase}
  .sb-close-btn{
    display:flex;width:30px;height:30px;align-items:center;justify-content:center;
    border-radius:var(--r);color:var(--text-2);
    transition:background .15s,color .15s,transform .1s var(--ease-out);
  }
  .sb-close-btn:hover{background:rgba(127,127,127,.12);color:var(--text);}
  .sb-close-btn:active{transform:scale(.88)}
}

/* ===== APP LAYOUT ===== */
.app-body{padding-top:var(--nh);min-height:100vh;background:var(--bg)}
.app-layout{
  display:grid;
  grid-template-columns:var(--sw) 1fr;
  max-width:1440px;margin:0 auto;
  min-height:calc(100vh - var(--nh));
}

/* ===== SIDEBARS ===== */
.sidebar{
  position:sticky;top:var(--nh);
  height:calc(100vh - var(--nh));
  overflow:hidden;
}
.sidebar-left{
  border-right:1px solid var(--border);
  padding:0;
  background:var(--bg);
  display:flex;
  flex-direction:column;
}

/* ── Calendar (fixed top, never shrinks) ── */
.cal-mod{flex-shrink:0;}

/* ── Stack container (fills all remaining space) ── */
.sb-stack{
  flex:1;
  display:flex;
  flex-direction:column;
  min-height:0;
  overflow:hidden;
}

/* Sidebar sections */
.sb-section{
  display:flex;flex-direction:column;
  overflow:hidden;
  border-bottom:1px solid var(--border);
}
.sb-section:last-child{border-bottom:none}
/* Categorias e Ferramentas: dividem o espaço restante igualmente */
.sb-section.sb-grow{flex:1 1 0;min-height:0}
/* Linguagens: altura natural, não cresce nem rola */
.sb-section.sb-fixed{flex:0 0 auto}

/* Sidebar section headers */
.sb-section-hdr{
  display:flex;align-items:center;
  padding:8px 16px 6px;
  font-size:10px;font-weight:700;letter-spacing:0.6px;text-transform:uppercase;
  color:var(--accent);
  flex-shrink:0;
  background:var(--bg);
}
.sb-section-hdr-left{display:inline-flex;align-items:center;gap:6px}
.sb-section-hdr-left svg{flex-shrink:0;color:var(--accent)}
/* Área de itens — scroll apenas nas seções sb-grow */
.sb-grow .sb-items{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;padding:4px 0 8px;overscroll-behavior-y:contain;}
.sb-fixed .sb-items{padding:4px 0 8px;}
.sb-items::-webkit-scrollbar{width:3px}
.sb-items::-webkit-scrollbar-track{background:transparent}
.sb-items::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.sb-item{
  display:flex;align-items:center;gap:10px;
  padding:7px 14px 7px 12px;cursor:pointer;
  margin:1px 6px;border-radius:var(--r);
  transition:background var(--tr-base),border-left-color var(--tr-base);
  font-size:13px;letter-spacing:-0.2px;color:var(--text);
  border-left:3px solid transparent;
  position:relative;
}
.sb-item:hover{background:color-mix(in srgb,var(--ic,var(--accent)) 10%,var(--surface))}
.sb-item.active{
  border-left-color:var(--ic,var(--accent));
  border-left-width:2px;
  background:color-mix(in srgb,var(--ic,var(--accent)) 10%,var(--surface));
  font-weight:500;
}
.sb-icon{
  width:26px;height:26px;border-radius:7px;
  background:color-mix(in srgb,var(--ic,var(--accent)) 15%,transparent);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;font-size:13px;overflow:hidden;
}
.sb-icon img{width:16px;height:16px;object-fit:contain;display:block;outline:1px solid rgba(0,0,0,0.08);outline-offset:-1px}
[data-theme="dark"] .sb-icon img{outline-color:rgba(255,255,255,0.08)}
.sb-label{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-count{
  font-size:11px;letter-spacing:0;color:var(--text-3);
  background:var(--surface-el);border-radius:var(--rp);
  padding:1px 6px;min-width:18px;text-align:center;flex-shrink:0;
  font-variant-numeric:tabular-nums;
}

/* ===== SIDEBAR ICON TILES (tools & languages) ===== */
.sb-icon-section{padding:2px 8px 6px;}

.sb-subgroup{margin-bottom:9px;}
.sb-subgroup:last-child{margin-bottom:2px;}
.sb-subgroup-lbl{
  font-size:9px;font-weight:700;letter-spacing:0.55px;
  text-transform:uppercase;color:var(--text-3);
  padding:6px 0 3px;
  display:flex;align-items:center;justify-content:center;gap:4px;
  border-top:none;
  margin-bottom:4px;
  text-align:center;
}
.sb-subgroup-lbl svg{flex-shrink:0;color:var(--text-3);}
.sb-subgroup:first-child .sb-subgroup-lbl{border-top:none;padding-top:2px;}

.sb-tile-grid{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:5px;
  cursor:pointer;
}

.sb-tile{
  width:38px;height:38px;
  border-radius:9px;
  border:1px solid color-mix(in srgb,var(--tc,#888) 35%,rgba(0,0,0,.08));
  background:color-mix(in srgb,var(--tc,#888) 12%,var(--surface-el));
  box-shadow:none;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;overflow:hidden;position:relative;
  opacity:.88;
  transition:transform 0.45s cubic-bezier(0.34,1.56,0.64,1),
             box-shadow 0.35s ease,
             border-color 0.25s ease,
             opacity 0.25s ease,
             background 0.25s ease;
}
.sb-tile:hover{
  transform:scale(1.22);
  opacity:1;
  border-color:color-mix(in srgb,var(--tc,var(--accent)) 55%,transparent);
  background:color-mix(in srgb,var(--tc,var(--accent)) 15%,var(--surface-el));
  box-shadow:0 1px 3px rgba(0,0,0,.04),
             0 2px 10px rgba(0,0,0,.03),
             0 0 14px 4px color-mix(in srgb,var(--tc,#888) 45%,transparent);
  z-index:20;
}
[data-theme="dark"] .sb-tile{
  border-color:color-mix(in srgb,var(--tc,#888) 38%,#272729);
  box-shadow:none;
}
[data-theme="dark"] .sb-tile:hover{
  box-shadow:0 1px 4px rgba(0,0,0,.4),
             0 2px 10px rgba(0,0,0,.3),
             0 0 16px 5px color-mix(in srgb,var(--tc,#888) 62%,transparent);
}
.sb-tile.active{
  opacity:1;
  border-color:color-mix(in srgb,var(--tc,var(--accent)) 72%,transparent);
  background:color-mix(in srgb,var(--tc,var(--accent)) 18%,var(--surface));
  box-shadow:0 0 0 1.5px color-mix(in srgb,var(--tc,var(--accent)) 45%,transparent),
             0 0 12px 4px color-mix(in srgb,var(--tc,var(--accent)) 42%,transparent);
}
[data-theme="dark"] .sb-tile.active{
  border-color:color-mix(in srgb,var(--tc,var(--accent)) 75%,#272729);
  box-shadow:0 0 0 1.5px color-mix(in srgb,var(--tc,var(--accent)) 70%,transparent),
             0 0 16px 6px color-mix(in srgb,var(--tc,var(--accent)) 65%,transparent);
}
.sb-tile img{
  width:58%;height:58%;
  object-fit:contain;display:block;pointer-events:none;
}
.sb-tile-lang{width:46px;height:46px;border-radius:11px;}
.sb-tile-lang img{width:60%;height:60%;}
.sb-tile-emoji{font-size:14px;line-height:1;pointer-events:none;}
.sb-tile::after{
  content:"";position:absolute;inset:0;
  background:linear-gradient(110deg,transparent 35%,rgba(255,255,255,.55) 50%,transparent 65%);
  background-repeat:no-repeat;background-size:250% 100%;background-position:150% 0;
  pointer-events:none;
}
.sb-tile:hover::after{
  animation:sb-tile-shine 0.9s linear forwards;
}
@keyframes sb-tile-shine{
  0%  {background-position:150% 0}
  100%{background-position:-150% 0}
}

/* ===== SIDEBAR TOOLTIP ===== */
#sb-tip{
  position:fixed;
  background:var(--surface);
  border:1.5px solid var(--border);
  color:var(--text);
  font-size:11px;font-weight:600;
  padding:4px 9px;border-radius:7px;
  pointer-events:none;opacity:0;
  box-shadow:var(--shadow-s);
  transition:opacity 0.1s, border-color 0.1s;
  z-index:9999;
  letter-spacing:-0.1px;white-space:nowrap;
}

/* ===== CONTENT ===== */
.content-main{min-height:calc(100vh - var(--nh));background:var(--bg)}
.c-pad{padding:32px 40px 60px}
.c-pad-home{padding:0}

/* ===== BUTTONS ===== */
.btn-p{
  display:inline-flex;align-items:center;
  background:var(--accent);color:#fff;
  padding:10px 22px;border-radius:var(--r);font-size:17px;font-weight:400;
  letter-spacing:-0.374px;transition:background var(--tr),transform 0.1s;cursor:pointer;
}
.btn-p:hover{background:var(--accent-h);text-decoration:none;color:#fff}
.btn-p:active{transform:scale(0.98)}
.btn-o{
  display:inline-flex;align-items:center;
  border:1px solid rgba(0,0,0,0.2);color:var(--text);
  padding:10px 22px;border-radius:var(--rp);font-size:17px;font-weight:400;
  letter-spacing:-0.374px;transition:all var(--tr);cursor:pointer;
}
[data-theme="dark"] .btn-o{border-color:rgba(255,255,255,0.2)}
.btn-o:hover{border-color:var(--accent);color:var(--accent);text-decoration:none;background:color-mix(in srgb,var(--accent) 6%,transparent)}
.btn-o:active{transform:scale(0.98);transition:transform 0.1s var(--ease-out)}

/* ===== THEME TRANSITION ===== */
*,*::before,*::after{
  transition-property:background-color,color,border-color,box-shadow;
  transition-duration:0.28s;
  transition-timing-function:var(--ease-out);
}
.nav,.qbar,.overlay,.cal-expand,.cal-expand-inner,.cal-display-chev,
.qbar-host,.chip-ico,body.qbar-open #main,body:not(.qbar-open) #main{
  transition-property:unset;
}

/* ===== SKELETON ===== */
.sk{
  background:linear-gradient(90deg,
    color-mix(in srgb,var(--text-3) 14%,transparent) 0%,
    color-mix(in srgb,var(--text-3) 28%,transparent) 50%,
    color-mix(in srgb,var(--text-3) 14%,transparent) 100%);
  background-size:200% 100%;
  animation:sk-shimmer 1.5s linear infinite;
  border-radius:var(--r);
}
.sk-line{height:14px;margin:6px 0;border-radius:6px}
.sk-line.l{width:90%}.sk-line.m{width:65%}.sk-line.s{width:40%}
.sk-card{height:140px;border-radius:var(--rl)}
.sk-emblem{width:260px;height:260px;border-radius:50%;margin:0 auto}
@keyframes sk-shimmer{0%{background-position:100% 0}100%{background-position:-100% 0}}

/* ===== STAGGER ENTRANCE (jakub.kr) ===== */
.stagger-in{
  animation:stagger-in 0.65s var(--ease-out) both;
  animation-delay:calc(var(--i,0) * 55ms + var(--base-delay,0ms));
}
@keyframes stagger-in{
  from{opacity:0;filter:blur(5px);transform:translateY(8px)}
  to  {opacity:1;filter:blur(0);  transform:translateY(0)}
}

/* ===== ROUTE EXIT (subtle, jakub.kr) ===== */
#main.route-exit{
  opacity:0;filter:blur(2px);transform:translateY(-4px);
  transition:opacity 0.14s var(--ease-out),filter 0.14s var(--ease-out),transform 0.14s var(--ease-out)!important;
  pointer-events:none;
}

@media(prefers-reduced-motion:reduce){
  .stagger-in{animation:none!important;opacity:1!important;filter:none!important;transform:none!important}
  #main.route-exit{transition:none!important;opacity:1!important;filter:none!important;transform:none!important}
  .sk{animation:none!important}
}

/* ===== FALLING TILES (fundo home) ===== */
.home-fall-bg{
  position:fixed;
  top:var(--nh);right:0;bottom:0;left:var(--sw);
  z-index:0;
  pointer-events:none;
  overflow:hidden;
  display:none;
}
body[data-view="home"] .home-fall-bg{display:block}
body[data-view="home"] .content-main{background:transparent}
body[data-view="home"] .home-hero{background:transparent}
@media(max-width:960px){.home-fall-bg{left:0}}
.content-main{position:relative;z-index:1}
.fall-stage{
  position:absolute;inset:0;
  overflow:hidden;
  pointer-events:none;
  mask-image:linear-gradient(to bottom,transparent 0%,#000 12%,#000 100%);
  -webkit-mask-image:linear-gradient(to bottom,transparent 0%,#000 12%,#000 100%);
}
.fall-emerge{
  position:absolute;left:0;right:0;
  height:140px;bottom:0;
  background:linear-gradient(to bottom,transparent 0%,var(--bg) 100%);
  pointer-events:none;
  z-index:1;
}
.fall-tile{
  position:absolute;bottom:0;left:0;
  width:var(--size,44px);height:var(--size,44px);
  transform-origin:center;
  animation:fall-move var(--dur,14s) var(--delay,0s) linear 1 forwards;
  will-change:transform;
  pointer-events:auto;cursor:default;
  opacity:.2;
  transition:opacity .3s ease;
}
.fall-tile:hover{opacity:1}
.fall-tile .inner{
  width:100%;height:100%;
  border:1px solid var(--border);
  box-shadow:var(--shadow-s),0 0 14px 4px color-mix(in srgb,var(--c,var(--accent)) 45%,transparent);
  display:grid;place-items:center;
  transform-origin:center;
  animation:fall-wobble var(--wobble-dur,4s) var(--wobble-delay,0s) ease-in-out infinite alternate both;
  opacity:.88;overflow:hidden;position:relative;
  transition:scale .45s cubic-bezier(.34,1.56,.64,1),box-shadow .35s ease,opacity .25s ease,border-color .25s ease;
}
.fall-tile:hover .inner{
  scale:1.22;opacity:1;
  border-color:color-mix(in srgb,var(--c,var(--accent)) 55%,transparent);
  box-shadow:var(--shadow-s),0 0 0 1px color-mix(in srgb,var(--c,var(--accent)) 30%,transparent),0 0 32px 10px color-mix(in srgb,var(--c,var(--accent)) 65%,transparent),0 12px 40px rgba(0,0,0,.18);
}
[data-theme="dark"] .fall-tile:hover .inner,
[data-theme="dark"] .fall-tile:hover .inner{
  box-shadow:var(--shadow-s),0 0 0 1px color-mix(in srgb,var(--c,var(--accent)) 40%,transparent),0 0 36px 12px color-mix(in srgb,var(--c,var(--accent)) 80%,transparent),0 14px 48px rgba(0,0,0,.5);
}
@media(prefers-color-scheme:dark){
  :root:not([data-theme="light"]) .fall-tile:hover .inner{
    box-shadow:var(--shadow-s),0 0 0 1px color-mix(in srgb,var(--c,var(--accent)) 40%,transparent),0 0 36px 12px color-mix(in srgb,var(--c,var(--accent)) 80%,transparent),0 14px 48px rgba(0,0,0,.5);
  }
}
[data-theme="dark"] .fall-tile .inner{
  box-shadow:var(--shadow-s),0 0 16px 5px color-mix(in srgb,var(--c,var(--accent)) 62%,transparent);
}
@media(prefers-color-scheme:dark){
  :root:not([data-theme="light"]) .fall-tile .inner{
    box-shadow:var(--shadow-s),0 0 16px 5px color-mix(in srgb,var(--c,var(--accent)) 62%,transparent);
  }
}
.fall-tile .inner::after{
  content:"";position:absolute;inset:0;
  background:linear-gradient(110deg,transparent 35%,rgba(255,255,255,.55) 50%,transparent 65%);
  background-repeat:no-repeat;background-size:250% 100%;background-position:150% 0;
  pointer-events:none;
}
.fall-tile.is-shining .inner::after{animation:home-tile-shine .9s linear forwards}
@keyframes home-tile-shine{
  0%  {background-position:150% 0}
  100%{background-position:-150% 0}
}
.fall-tile.is-cat,.fall-tile.is-lang,.fall-tile.is-tool{
  display:flex;flex-direction:column;align-items:center;gap:5px;height:auto;
}
.fall-tile.is-cat .inner{
  width:var(--size,56px);height:var(--size,56px);flex-shrink:0;
  border-radius:14px;
  background:color-mix(in srgb,var(--c,var(--accent)) 15%,var(--surface));
  color:var(--c,var(--accent));
}
.fall-tile.is-cat .inner svg{
  width:78%;height:78%;stroke:currentColor;fill:none;
  stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;
}
.fall-tile.is-lang .inner{
  width:var(--size,90px);height:var(--size,90px);flex-shrink:0;
  border-radius:12px;background:var(--surface-el);
  border:1px solid color-mix(in srgb,var(--c) 35%,rgba(0,0,0,.08));
}
.fall-tile.is-tool .inner{
  width:var(--size,65px);height:var(--size,65px);flex-shrink:0;
  border-radius:10px;background:var(--surface-el);
  border:1px solid color-mix(in srgb,var(--c) 35%,rgba(0,0,0,.08));
}
[data-theme="dark"] .fall-tile.is-lang .inner,
[data-theme="dark"] .fall-tile.is-tool .inner{
  border-color:color-mix(in srgb,var(--c) 38%,#272729);
}
@media(prefers-color-scheme:dark){
  :root:not([data-theme="light"]) .fall-tile.is-lang .inner,
  :root:not([data-theme="light"]) .fall-tile.is-tool .inner{
    border-color:color-mix(in srgb,var(--c) 38%,#272729);
  }
}
.fall-tile img{width:calc(var(--size,44px)*.78);height:calc(var(--size,44px)*.78);object-fit:contain}
.fall-label{
  font-size:9px;font-weight:600;color:var(--c,var(--accent));
  white-space:nowrap;letter-spacing:.01em;line-height:1;opacity:.9;
}
.fall-tile:hover .fall-label{opacity:1}
/* Logos brancas: inverte para preto no modo claro (visibilidade) */
img[src*="github/ffffff"],
img[src*="anthropic/ffffff"],
img[src*="apachekafka/ffffff"],
img[src*="cursor/ffffff"]{filter:invert(1)}
[data-theme="dark"] img[src*="github/ffffff"],
[data-theme="dark"] img[src*="anthropic/ffffff"],
[data-theme="dark"] img[src*="apachekafka/ffffff"],
[data-theme="dark"] img[src*="cursor/ffffff"]{filter:none}
@media(prefers-color-scheme:dark){
  :root:not([data-theme="light"]) img[src*="github/ffffff"],
  :root:not([data-theme="light"]) img[src*="anthropic/ffffff"],
  :root:not([data-theme="light"]) img[src*="apachekafka/ffffff"],
  :root:not([data-theme="light"]) img[src*="cursor/ffffff"]{filter:none}
}
/* Gradle: cor quase preta — override para dark mode */
[data-theme="dark"] .fall-tile[data-key="gradle"] .inner img{filter:brightness(3.5)}
[data-theme="dark"] .fall-tile[data-key="gradle"]{--c:#07A8CB!important}
@media(prefers-color-scheme:dark){
  :root:not([data-theme="light"]) .fall-tile[data-key="gradle"] .inner img{filter:brightness(3.5)}
  :root:not([data-theme="light"]) .fall-tile[data-key="gradle"]{--c:#07A8CB!important}
}
.home-hero,.home-section{position:relative;z-index:1}
@keyframes fall-move{
  0%  {transform:translate3d(var(--x,0),100%,0)}
  100%{transform:translate3d(var(--x,0),calc(-1 * var(--stage-h,100vh) - 100%),0)}
}
@keyframes fall-wobble{
  0%  {transform:rotate(-6deg)}
  100%{transform:rotate(6deg)}
}

/* ===== HOME ===== */
.home-hero{
  background:var(--bg);text-align:center;
  padding:clamp(10px,1.5vw,20px) 40px clamp(36px,5vw,56px);
  position:relative;overflow:hidden;
}
.hero-grid{
  display:grid;
  grid-template-columns:370px 1fr;
  gap:clamp(10px,1.5vw,20px);
  width:100%;
  align-items:start;
}
.hero-aside{display:flex;flex-direction:column;gap:clamp(12px,1.6vw,18px);min-width:0}
.hero-cube-cell{align-self:start;padding-top:28px}
.hero-aside{
  display:flex;flex-direction:column;gap:clamp(12px,1.6vw,18px);
  min-width:0;
}
/* ── Hero deck V2 ── */
.hero-deck{display:flex;flex-direction:column}
.hero-deck-cards{position:relative;flex:1}
.hero-card-v2{
  border-radius:var(--r-lg);overflow:hidden;
  padding:clamp(16px,1.8vw,26px);
  color:#fff;background:var(--hcv-bg,#0071e3);
  display:flex;flex-direction:column;gap:7px;
  outline:none;
}
.hero-card-v2.front{
  position:relative;z-index:2;
  min-height:clamp(200px,24vw,310px);
  cursor:pointer;
  box-shadow:0 8px 32px rgba(0,0,0,0.28);
  transition:transform .35s var(--ease-spring),box-shadow .35s var(--ease-spring);
}
.hero-card-v2.front:hover{transform:translateY(-3px);box-shadow:0 14px 40px rgba(0,0,0,0.36)}
.hero-card-v2.front:focus-visible{outline:2px solid rgba(255,255,255,0.7);outline-offset:2px}
.hero-card-v2.front:active{transform:scale(0.98)!important;transition:transform .08s var(--ease-out)!important}
.hero-card-v2.back{
  position:absolute;inset:0;z-index:1;
  transform:rotate(-3.5deg) translate(-22px,8px) scale(0.94);
  pointer-events:none;opacity:0.72;
  box-shadow:0 4px 16px rgba(0,0,0,0.18);
}
/* Watermark — hero cards têm fundo sempre escuro */
.hcv-watermark{
  position:absolute;top:10px;right:14px;
  user-select:none;pointer-events:none;
  font-family:var(--ff-display);font-weight:800;line-height:1;
  display:inline-flex;flex-direction:column;align-items:stretch;gap:4px;
}
.hcv-wm-csr{
  font-size:24px;letter-spacing:0.5px;text-align:center;
  color:rgba(255,255,255,0.09);
}
.hcv-wm-news{
  font-size:14px;font-weight:800;letter-spacing:2px;
  background:rgba(255,255,255,0.09);
  color:rgba(0,0,0,0.28);
  border-radius:6px;padding:5px 9px;
  text-align:center;box-sizing:border-box;
}
/* Eyebrow */
.hcv-eyebrow{
  font-family:var(--ff-text);
  font-size:11px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;
  color:rgba(255,255,255,0.85);flex-shrink:0;position:relative;z-index:1;
}
/* Badge urgente */
.hcv-badge-urgent{
  position:absolute;top:14px;right:14px;
  background:#FF453A;color:#fff;
  font-size:10px;font-weight:700;letter-spacing:0.6px;text-transform:uppercase;
  padding:3px 8px;border-radius:6px;
  animation:hcv-pulse 2s infinite;z-index:3;
}
@keyframes hcv-pulse{0%,100%{opacity:1}50%{opacity:0.65}}
/* Title */
.hcv-title{
  font-family:var(--ff-display);
  font-size:clamp(16px,2vw,24px);font-weight:700;
  line-height:1.2;letter-spacing:-0.4px;color:#fff;
  position:relative;z-index:1;
  display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:4;overflow:hidden;
}
/* Summary */
.hcv-summary{
  font-family:var(--ff-text);
  font-size:13px;line-height:1.5;color:rgba(255,255,255,0.82);
  position:relative;z-index:1;
  display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:2;overflow:hidden;
}
/* Mini highlights (edition card) */
.hcv-highlights{
  display:flex;flex-direction:column;gap:3px;
  background:rgba(0,0,0,0.18);border-radius:10px;
  padding:8px 10px;z-index:1;flex:1;min-height:0;
}
.hcv-hl-label{
  font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  color:rgba(255,255,255,0.5);margin-bottom:2px;
}
.hcv-hl-row{
  font-family:var(--ff-text);
  font-size:12px;font-weight:500;color:rgba(255,255,255,0.9);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
/* Tool chips */
.hcv-tools{display:flex;gap:5px;flex-wrap:wrap;position:relative;z-index:1}
.hcv-tool-chip{
  display:inline-flex;align-items:center;gap:4px;
  background:rgba(255,255,255,0.18);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  border-radius:20px;padding:3px 9px 3px 5px;
  font-size:11px;font-weight:500;color:rgba(255,255,255,0.95);
  transition:filter .15s;
}
.hcv-tool-chip:hover{filter:brightness(1.15)}
.hcv-tool-chip img{width:15px;height:15px;border-radius:3px;object-fit:contain;flex-shrink:0}
/* Footer */
.hcv-footer{
  display:flex;align-items:center;justify-content:space-between;gap:8px;
  margin-top:auto;position:relative;z-index:1;
}
.hcv-pill{
  display:inline-flex;align-items:center;gap:5px;
  background:rgba(255,255,255,0.18);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  border-radius:980px;padding:5px 14px;

  transition:transform .15s,box-shadow .15s;flex-shrink:0;
}
.hcv-pill:hover{transform:scale(1.04);box-shadow:0 0 0 1.5px rgba(255,255,255,0.4)}
.hcv-source{font-size:11px;font-weight:400;color:rgba(255,255,255,0.68);text-align:right;flex-shrink:0}
/* Deck dots */
.hero-deck-dots{display:flex;gap:6px;align-items:center;justify-content:center;padding-top:10px}
.hero-deck-dot{
  width:6px;height:6px;border-radius:50%;background:var(--border);
  cursor:pointer;border:none;padding:0;
  transition:transform .2s var(--ease-out),background .2s;flex-shrink:0;
}
.hero-deck-dot.active{background:var(--accent);transform:scale(1.4)}
.hero-deck-dot:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.hero-emblem-cell{
  display:flex;align-items:center;justify-content:center;
  min-height:clamp(170px,20vw,260px);
}
.hero-mascot-cell{
  display:flex;align-items:center;justify-content:center;
  min-height:clamp(170px,20vw,260px);
}
.home-mascot{
  width:clamp(110px,13vw,190px);
  filter:drop-shadow(0 16px 40px rgba(0,0,0,0.18));
  animation:home-mascot-float 6s ease-in-out infinite;

/* ── Stats card (substitui emblema) ── */
.hero-stats{background:var(--surface);border-radius:var(--r-lg);

.hs-headline{

.hs-stats-row{

.hs-stat{display:flex;flex-direction:column;gap:2px}
.hs-stat-num{

.hs-stat-lbl{

}
.hs-mascot-mini{
  position:absolute;bottom:-10px;right:-8px;
  width:88px;height:88px;
  background:url('data/img/mascote-clean.png') center/contain no-repeat;

  animation:home-mascot-float 6s ease-in-out infinite;

/* ── Hero CTA ── */
.hero-cta-row{
  display:flex;gap:10px;align-items:center;justify-content:flex-start;
  margin-top:14px;flex-wrap:wrap;
}
.hero-cta{display:inline-flex;align-items:center;gap:8px;background:var(--accent);color:#fff;padding:8px 18px;border-radius:var(--r-sm);
  font-size:14px;font-weight:600;letter-spacing:-0.01em;
  border:none;cursor:pointer;
  transition:transform .15s,box-shadow .15s;
  box-shadow:0 4px 14px rgba(0,113,227,0.32);
}
.hero-cta:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,113,227,0.42)}
.hero-cta:active{transform:scale(0.97)}
.hero-cta-arrow{transition:transform .2s}
.hero-cta:hover .hero-cta-arrow{transform:translateX(3px)}
.hero-kbd-hint{
  font-family:'SF Mono','Menlo',ui-monospace,monospace;
  font-size:11px;color:var(--text-3);
  display:inline-flex;align-items:center;gap:6px;
}
.hero-kbd{
  background:var(--surface-el);border:1px solid var(--border);
  border-radius:5px;padding:1px 6px;
  font-size:10px;font-weight:600;color:var(--text-2);
}
@keyframes home-mascot-float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-7px)}
}
@media(prefers-reduced-motion:reduce){
  .home-mascot{animation:none!important}
}
/* ── Emblem ── */
.home-emblem{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;line-height:1;
  width:260px;height:260px;
  flex-shrink:0;z-index:1;
}
.home-emblem .ring{
  position:absolute;left:50%;top:50%;
  width:210px;height:210px;
  margin-left:-105px;margin-top:-105px;
  border-radius:50%;
  border:1.5px solid rgba(41,151,255,.42);
  pointer-events:none;
  animation:emblem-spin 14s linear infinite;
}
.home-emblem .ring.two{
  width:238px;height:238px;
  margin-left:-119px;margin-top:-119px;
  border:1px dashed rgba(41,151,255,.22);
  animation:emblem-spin 24s linear infinite reverse;
}
@keyframes emblem-spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.home-emblem .emblem-dot{
  position:absolute;width:11px;height:11px;border-radius:50%;
  background:var(--accent);
  box-shadow:0 0 0 0 rgba(0,113,227,.6);
  animation:emblem-pulse 2.2s infinite;
  pointer-events:none;
  left:calc(50% + 91px);top:calc(50% + 38px);
  z-index:2;
}
@keyframes emblem-pulse{
  0%{box-shadow:0 0 0 0 rgba(0,113,227,.7)}
  70%{box-shadow:0 0 0 14px rgba(0,113,227,0)}
  100%{box-shadow:0 0 0 0 rgba(0,113,227,0)}
}
.home-emblem .csr-word{
  font-family:var(--ff-display);
  font-size:68px;
  font-weight:800;letter-spacing:-0.05em;line-height:0.95;
  color:var(--text);
  position:relative;z-index:1;
}
.home-emblem .csr-word .s-lean{
  display:inline-block;transform:skewX(-10deg);transform-origin:50% 55%;
}
.home-emblem .news-pill{
  margin-top:4px;
  background:var(--accent);color:#fff;
  font-family:var(--ff-display);
  font-weight:800;
  font-size:42px;
  letter-spacing:0.04em;
  padding:6px 14px 9px;border-radius:12px;line-height:1;
  box-shadow:0 6px 28px rgba(0,113,227,.42);
  animation:news-pulse 3.6s ease-in-out infinite;
  position:relative;overflow:hidden;isolation:isolate;z-index:1;
}
.home-emblem .news-pill::after{
  content:"";position:absolute;inset:0;
  background:linear-gradient(100deg,transparent 40%,rgba(255,255,255,.55) 50%,transparent 60%);
  background-repeat:no-repeat;background-size:250% 100%;background-position:150% 0;
  animation:news-shine 5s linear infinite;pointer-events:none;mix-blend-mode:overlay;
}
@keyframes news-pulse{
  0%,100%{box-shadow:0 6px 28px rgba(0,113,227,.42)}
  50%{box-shadow:0 8px 42px rgba(0,113,227,.68)}
}
.home-sub{
  font-family:var(--ff-display);
  font-size:clamp(17px,2.2vw,24px);font-weight:300;color:var(--text-2);
  letter-spacing:normal;line-height:1.4;max-width:540px;margin-bottom:36px;
}
.home-ctas{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-bottom:56px}
.home-section{width:100%;max-width:900px;margin:clamp(32px,5vw,56px) auto 0;padding:0 0 48px;text-align:left}
.home-sect-title{
  font-family:var(--ff-display);
  font-size:30px;font-weight:600;letter-spacing:-0.01em;line-height:1.14;
  margin-bottom:18px;color:var(--text);text-wrap:balance;
}
.home-sect-kicker{
  font-family:var(--ff-text);
  font-size:10px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;
  color:var(--accent);
  display:flex;align-items:center;gap:8px;margin-bottom:8px;
}
.home-sect-kicker::before{
  content:"";width:18px;height:2px;background:var(--accent);border-radius:2px;
}

/* ── Edition cards (home recent) ── */
.editions-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.ec-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;position:relative;z-index:1}
.ec-num{
  font-family:var(--ff-text);
  font-size:11px;font-weight:700;letter-spacing:0.06em;color:var(--accent);
}
.ec-date{
  font-family:var(--ff-text);
  font-size:10px;font-weight:600;letter-spacing:0.08em;color:var(--text-3);text-transform:uppercase;
}
.ec-title{
  font-family:var(--ff-display);
  font-size:17px;font-weight:700;line-height:1.3;letter-spacing:-0.02em;
  color:var(--text);margin-bottom:12px;
  display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:2;overflow:hidden;
  position:relative;z-index:1;
}
.ec-cats{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;position:relative;z-index:1}
.ed-cat-chip{
  font-size:10px;font-weight:600;letter-spacing:0.02em;
  padding:3px 8px;border-radius:6px;line-height:1.4;
  display:inline-flex;align-items:center;gap:5px;
}
.ed-cat-chip b{font-weight:700;opacity:0.7}
.ec-foot{
  display:flex;align-items:center;gap:8px;
  border-top:1px solid var(--border);padding-top:10px;margin-top:auto;
  position:relative;z-index:1;
}
.ec-stat-item{
  display:inline-flex;align-items:center;gap:4px;
  font-size:11px;font-weight:500;color:var(--text-3);
}
.ec-stat-item svg{opacity:.75;flex-shrink:0}
.ec-cta{
  margin-left:auto;
  display:inline-flex;align-items:center;gap:4px;
  font-size:11px;font-weight:600;color:var(--accent);
  transition:gap .2s var(--ease-spring);
}
.edition-card:hover .ec-cta{gap:7px}
/* Watermark numérico */


/* ── Cat bars ── */
.cat-bars{display:flex;flex-direction:column;gap:2px}
.cat-bar{
  background:transparent;border:none;
  display:flex;flex-direction:column;gap:8px;
  padding:11px 14px 11px 11px;border-radius:10px;cursor:pointer;
  border-left:3px solid transparent;
  transition:background .15s,border-color .15s;text-align:left;
}
.cat-bar:hover{background:var(--surface-el);border-left-color:var(--cb-color,var(--accent))}
.cb-row{display:flex;justify-content:space-between;align-items:center;gap:8px}
.cb-name{
  display:inline-flex;align-items:center;gap:8px;
  font-size:14px;font-weight:600;color:var(--text);
}
.cb-count{
  font-family:var(--ff-text);
  font-size:11px;font-weight:600;color:var(--text-2);
  font-variant-numeric:tabular-nums;white-space:nowrap;
}
.cb-track{
  height:9px;border-radius:5px;background:var(--surface-el);
  overflow:hidden;position:relative;
}
.cb-fill{
  height:100%;border-radius:5px;
  transition:width .6s var(--ease-spring);
}
.editions-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.edition-card{background:var(--surface);border-radius:18px;padding:18px 20px;cursor:pointer;display:flex;flex-direction:column;transition:transform .18s var(--ease-spring),background .18s;text-align:left;position:relative;overflow:hidden}
[data-theme="dark"] .edition-card{box-shadow:0 0 0 1px rgba(255,255,255,0.08),0 1px 2px -1px rgba(0,0,0,0.3),0 2px 4px 0 rgba(0,0,0,0.25)}
.edition-card:hover{box-shadow:0 0 0 1px rgba(0,0,0,0.09),0 2px 6px -1px rgba(0,0,0,0.1),0 4px 16px 0 rgba(0,0,0,0.08);transform:translateY(-2px)}
[data-theme="dark"] .edition-card:hover{box-shadow:0 0 0 1px rgba(255,255,255,0.12),0 2px 6px -1px rgba(0,0,0,0.4),0 4px 16px 0 rgba(0,0,0,0.4)}
.edition-card:active{transform:scale(0.98)!important;transition:transform 0.08s var(--ease-out)!important}
.edition-card-date{font-size:11px;color:var(--text-3);letter-spacing:0.3px;margin-bottom:8px;font-weight:700;text-transform:uppercase}
.edition-card-title{
  font-family:var(--ff-display);
  font-size:16px;font-weight:600;letter-spacing:-0.3px;line-height:1.35;
  margin-bottom:10px;color:var(--text);
}
.edition-card-meta{margin-top:12px;display:flex;gap:6px;flex-wrap:wrap}
.meta-chip{font-size:11px;padding:2px 8px;border-radius:var(--rp);background:var(--surface-el);color:var(--text-2)}

/* ===== SECTION TITLES ===== */
.sect-title{
  font-family:var(--ff-display);
  font-size:26px;font-weight:600;letter-spacing:-0.01em;line-height:1.2;
  margin-bottom:14px;margin-top:36px;color:var(--text);
  display:flex;align-items:center;gap:10px;text-wrap:balance;
}
.sect-count{
  font-family:'SF Mono','Menlo',ui-monospace,monospace;
  font-size:11px;font-weight:600;color:var(--text-3);
  background:var(--surface-el);padding:2px 7px;border-radius:6px;
  letter-spacing:0;
}
.sect-kicker{
  font-family:var(--ff-text);
  font-size:10px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;
  color:var(--accent);
  display:flex;align-items:center;gap:8px;margin-top:24px;margin-bottom:6px;
}
.sect-kicker::before{
  content:"";width:18px;height:2px;background:var(--accent);border-radius:2px;
}

/* ===== DAY VIEW ===== */
.day-header{
  max-width:900px;margin:0 auto 36px;
  padding:clamp(28px,5vw,52px) 24px 28px;
  border-bottom:1px solid var(--border);
}
.day-eyebrow{
  font-family:var(--ff-text);
  font-size:11px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;
  color:var(--text-3);margin-bottom:18px;
  display:flex;align-items:center;gap:8px;
}
.day-eyebrow-num{color:var(--accent);font-weight:700}
.day-eyebrow-sep{opacity:0.5}
.day-hero-title{
  font-family:var(--ff-display);
  font-size:clamp(32px,4vw,46px);font-weight:600;line-height:1.1;letter-spacing:-0.015em;
  margin-bottom:14px;color:var(--text);text-wrap:balance;
}
.day-hero-desc{
  font-size:17px;color:var(--text-2);letter-spacing:-0.005em;line-height:1.55;
  max-width:680px;margin-bottom:24px;text-wrap:pretty;
}
.day-stats{
  display:flex;gap:32px;flex-wrap:wrap;
  padding-top:20px;border-top:1px solid var(--border);
}
.day-stat{display:flex;flex-direction:column;gap:2px}
.day-stat-n{
  font-family:var(--ff-text);
  font-size:24px;font-weight:700;color:var(--text);font-variant-numeric:tabular-nums;
  letter-spacing:-0.02em;
}
.day-stat-l{
  font-size:11px;font-weight:500;color:var(--text-3);
  letter-spacing:0.04em;text-transform:uppercase;
}
.day-content{max-width:900px;margin:0 auto;padding:0 24px 60px}

/* ===== HIGHLIGHTS ===== */
.hl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px}
.hl-card{
  background:var(--surface);border-radius:var(--rl);
  padding:18px;cursor:pointer;
  box-shadow:0 0 0 1px rgba(0,0,0,0.06),0 1px 2px -1px rgba(0,0,0,0.06),0 2px 4px 0 rgba(0,0,0,0.04);
  transition:box-shadow var(--tr-base),transform var(--tr-fast);
  display:flex;flex-direction:column;gap:10px;
}
[data-theme="dark"] .hl-card{box-shadow:0 0 0 1px rgba(255,255,255,0.08),0 1px 2px -1px rgba(0,0,0,0.3),0 2px 4px 0 rgba(0,0,0,0.25)}
.hl-card:hover{box-shadow:0 0 0 1px rgba(0,0,0,0.09),0 2px 6px -1px rgba(0,0,0,0.1),0 4px 16px 0 rgba(0,0,0,0.08);transform:translateY(-2px)}
[data-theme="dark"] .hl-card:hover{box-shadow:0 0 0 1px rgba(255,255,255,0.12),0 2px 6px -1px rgba(0,0,0,0.4),0 4px 16px 0 rgba(0,0,0,0.4)}
.hl-card:active{transform:scale(0.98)!important;transition:transform 0.08s var(--ease-out)!important}
.hl-card-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.hl-favicon{
  width:28px;height:28px;border-radius:5px;object-fit:contain;background:var(--surface-el);flex-shrink:0;
  outline:1px solid rgba(0,0,0,0.1);outline-offset:-1px;
}
[data-theme="dark"] .hl-favicon{outline-color:rgba(255,255,255,0.1)}
.cat-chip{
  font-size:10px;font-weight:700;padding:3px 9px;border-radius:var(--rp);
  white-space:nowrap;color:#fff;background:var(--cc,var(--accent));
  letter-spacing:0.2px;
}
.hl-title{font-size:15px;font-weight:600;letter-spacing:-0.3px;line-height:1.35;color:var(--text)}
.hl-summary{font-size:13px;color:var(--text-2);letter-spacing:-0.2px;line-height:1.55}
.hl-footer{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-3)}

/* ===== CATEGORY GROUP ===== */
.cat-group{margin-bottom:36px}
.cat-group-hdr{
  display:flex;align-items:center;gap:12px;
  padding:10px 0;margin-bottom:14px;
  border-bottom:1px solid var(--border);
}
.cg-icon{
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;
  background:color-mix(in srgb,var(--cc,var(--accent)) 15%,transparent);
}
.cg-name{
  font-family:var(--ff-display);
  font-size:22px;font-weight:600;letter-spacing:0px;line-height:1.2;
  color:var(--text);cursor:pointer;
}
.cg-name:hover{color:var(--accent)}
.cg-count{font-size:12px;color:var(--text-3);margin-top:2px}

/* ===== NEWS CARD ===== */
.news-card{
  background:var(--surface);border-radius:var(--r);
  padding:18px 18px 14px;margin-bottom:10px;
  border-left:4px solid var(--lc,var(--border));
  box-shadow:0 0 0 1px rgba(0,0,0,0.06),0 1px 2px -1px rgba(0,0,0,0.04);
  transition:box-shadow var(--tr-base),transform var(--tr-fast);
}
[data-theme="dark"] .news-card{box-shadow:0 0 0 1px rgba(255,255,255,0.06),0 1px 2px -1px rgba(0,0,0,0.25)}
.news-card:hover{box-shadow:0 0 0 1px rgba(0,0,0,0.08),0 2px 8px 0 rgba(0,0,0,0.08)}
[data-theme="dark"] .news-card:hover{box-shadow:0 0 0 1px rgba(255,255,255,0.1),0 2px 8px 0 rgba(0,0,0,0.35)}
.news-card:active{transform:scale(0.99);transition:transform 0.08s var(--ease-out)!important}
.news-card.urgent{border-left-color:#FF453A}
.nc-hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:8px}
.nc-title{font-size:16px;font-weight:600;letter-spacing:-0.3px;line-height:1.35;color:var(--text)}
.nc-title a{color:var(--text)}
.nc-title a:hover{color:var(--link);text-decoration:none}
.badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:var(--rp);white-space:nowrap;flex-shrink:0}
.badge-u{background:#FF453A;color:#fff}
.badge-r{background:var(--accent);color:#fff}
.nc-summary{font-size:14px;color:var(--text-2);line-height:1.55;margin-bottom:8px}
.nc-why{
  font-size:13px;color:var(--text-2);
  padding:9px 12px;border-radius:6px;
  background:var(--surface-el);margin-bottom:8px;
  border-left:3px solid var(--accent);
}
.nc-why-lbl{font-size:10px;font-weight:700;letter-spacing:0.6px;text-transform:uppercase;color:var(--accent);margin-bottom:3px}
.nc-footer{display:flex;align-items:center;flex-wrap:wrap;gap:6px;font-size:12px;color:var(--text-3)}
.nc-source{font-weight:500;color:var(--text-2)}
.tags{display:flex;gap:4px;flex-wrap:wrap}
.tag{font-size:11px;padding:2px 7px;border-radius:var(--rp);background:var(--surface-el);color:var(--text-2)}

/* ===== TOOLS GRID ===== */
.tools-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:10px}
.tool-card{
  background:var(--surface);border-radius:var(--rl);
  padding:14px 16px;
  box-shadow:0 0 0 1px rgba(0,0,0,0.06),0 1px 2px -1px rgba(0,0,0,0.06),0 2px 4px 0 rgba(0,0,0,0.04);
  display:flex;gap:12px;align-items:flex-start;
  transition:box-shadow var(--tr-base),transform var(--tr-fast);cursor:pointer;
}
[data-theme="dark"] .tool-card{box-shadow:0 0 0 1px rgba(255,255,255,0.08),0 1px 2px -1px rgba(0,0,0,0.3),0 2px 4px 0 rgba(0,0,0,0.25)}
.tool-card:hover{box-shadow:0 0 0 1px rgba(0,0,0,0.09),0 2px 6px -1px rgba(0,0,0,0.1),0 4px 16px 0 rgba(0,0,0,0.08)}
[data-theme="dark"] .tool-card:hover{box-shadow:0 0 0 1px rgba(255,255,255,0.12),0 2px 6px -1px rgba(0,0,0,0.4),0 4px 16px 0 rgba(0,0,0,0.4)}
.tool-card:active{transform:scale(0.98)!important;transition:transform 0.08s var(--ease-out)!important}
.tc-icon{
  width:42px;height:42px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;overflow:hidden;
  background:color-mix(in srgb,var(--tc,var(--accent)) 15%,transparent);
}
.tc-icon img{width:24px;height:24px;object-fit:contain;display:block;outline:1px solid rgba(0,0,0,0.08);outline-offset:-1px}
[data-theme="dark"] .tc-icon img{outline-color:rgba(255,255,255,0.08)}
.tc-body{flex:1;min-width:0}
.tc-name{font-size:13px;font-weight:600;letter-spacing:-0.2px;color:var(--text)}
.tc-ver{font-size:11px;color:var(--accent);font-weight:600;margin-bottom:3px;font-variant-numeric:tabular-nums}
.tc-hl{font-size:12px;color:var(--text-2);line-height:1.45;letter-spacing:-0.1px}

/* ===== TIMELINE HERO ===== */
.tl-hero{
  padding:32px 40px 24px;
  display:flex;align-items:center;gap:20px;
  border-bottom:1px solid var(--border);
  margin-bottom:0;
  background:linear-gradient(to bottom,color-mix(in srgb,var(--tc,var(--accent)) 5%,var(--bg)) 0%,var(--bg) 100%);
}
.tl-icon{width:60px;height:60px;border-radius:var(--r-lg);
  display:flex;align-items:center;justify-content:center;
  font-size:28px;flex-shrink:0;overflow:hidden;
  background:color-mix(in srgb,var(--tc,var(--accent)) 18%,transparent);
}
.tl-icon img{width:36px;height:36px;object-fit:contain;display:block;outline:1px solid rgba(0,0,0,0.08);outline-offset:-1px}
[data-theme="dark"] .tl-icon img{outline-color:rgba(255,255,255,0.08)}
.tl-name{
  font-family:var(--ff-display);
  font-size:36px;font-weight:600;letter-spacing:-0.5px;line-height:1.1;color:var(--text);
}
.tl-kind{font-size:13px;color:var(--text-3);letter-spacing:-0.2px;margin-top:3px}

/* ===== ENTITY HERO (cat / lang / tool) ===== */
.ent-hero{
  position:relative;max-width:900px;margin:0 auto 36px;
  padding:clamp(28px,4vw,44px) 24px 28px;
  border-bottom:1px solid var(--border);
  overflow:hidden;
}
.ent-hero-bg{
  position:absolute;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 60% 100% at 0% 0%, color-mix(in srgb,var(--tc,var(--accent)) 18%, transparent) 0%, transparent 70%),
    radial-gradient(ellipse 40% 80% at 100% 0%, color-mix(in srgb,var(--tc,var(--accent)) 8%, transparent) 0%, transparent 70%);
  opacity:0.9;
}
.ent-hero-content{position:relative;z-index:1}
.ent-hero-eyebrow{
  font-family:var(--ff-text);
  font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;
  color:var(--text-3);margin-bottom:18px;
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
}
.ent-hero-pill{background:var(--tc,var(--accent));color:white;padding:3px 9px;border-radius:var(--r-xs);letter-spacing:0.06em;font-weight:600;
  box-shadow:0 1px 0 rgba(0,0,0,0.08);
}
.ent-hero-sep{opacity:0.4}
.ent-hero-row{display:flex;align-items:center;gap:16px;margin-bottom:14px;flex-wrap:wrap}
.ent-hero-icon{width:56px;height:56px;border-radius:var(--r-lg);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;overflow:hidden;
  background:color-mix(in srgb,var(--tc,var(--accent)) 16%,transparent);
  border:1px solid color-mix(in srgb,var(--tc,var(--accent)) 30%,transparent);
}
.ent-hero-icon.big{width:68px;height:68px;border-radius:var(--r-lg)}
.ent-hero-icon img{width:36px;height:36px;object-fit:contain}
.ent-hero-icon.big img{width:46px;height:46px}
.ent-hero-name-block{display:flex;flex-direction:column;gap:6px;min-width:0;flex:1}
.ent-hero-name{
  font-family:var(--ff-display);
  font-size:clamp(28px,3.6vw,42px);font-weight:600;letter-spacing:-0.018em;
  line-height:1.05;color:var(--text);text-wrap:balance;margin:0;
}
.ent-hero-version{
  font-family:var(--ff-text);
  font-size:12px;color:var(--text-3);letter-spacing:0.02em;
}
.ent-hero-version b{color:var(--tc,var(--accent));font-weight:700}
.ent-hero-desc{
  font-size:16px;color:var(--text-2);line-height:1.55;
  max-width:640px;margin:8px 0 20px;text-wrap:pretty;
}
.ent-hero-tools{
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  padding-top:18px;border-top:1px solid var(--border);
}
.ent-hero-tools-lbl{
  font-family:var(--ff-text);
  font-size:10px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;
  color:var(--text-3);margin-right:4px;
}
.ent-tool-chip{
  display:inline-flex;align-items:center;gap:6px;
  padding:5px 10px;border-radius:7px;cursor:pointer;
  background:color-mix(in srgb,var(--tc,var(--accent)) 12%,transparent);
  border:1px solid color-mix(in srgb,var(--tc,var(--accent)) 22%,transparent);
  color:var(--text);font-size:12px;font-weight:600;letter-spacing:-0.005em;
  transition:all .15s;
}
.ent-tool-chip:hover{background:color-mix(in srgb,var(--tc,var(--accent)) 22%,transparent);transform:translateY(-1px)}
.ent-tool-chip b{
  font-family:var(--ff-text);
  font-size:11px;font-weight:700;color:var(--tc,var(--accent));
  margin-left:2px;
}

/* ===== RELEASES SECTION ===== */
.rel-section{max-width:900px;margin:0 auto 36px;padding:0 24px}
.rel-section-title{
  font-family:var(--ff-display);
  font-size:24px;font-weight:600;letter-spacing:-0.01em;color:var(--text);
  margin-bottom:16px;
}
.rel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
.rel-card{padding:14px 16px;border-radius:var(--r-sm);background:var(--surface);border-left:3px solid var(--tc,var(--accent));
  transition:all .15s;
}
.rel-card:hover{border-color:var(--tc,var(--accent));transform:translateY(-2px)}
.rel-card-ver{
  font-family:var(--ff-text);
  font-size:13px;font-weight:700;color:var(--tc,var(--accent));
  letter-spacing:-0.01em;margin-bottom:2px;
}
.rel-card-date{
  font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;
  color:var(--text-3);margin-bottom:8px;
}
.rel-card-title{
  font-size:13px;font-weight:500;color:var(--text);line-height:1.35;
  display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:2;overflow:hidden;
}

/* ===== GROUPED TIMELINE ===== */
.tl-list-grouped{max-width:900px;margin:0 auto;padding:0 24px 60px}
.tl-date-hdr{margin:24px 0 8px;position:sticky;top:8px;z-index:2;background:var(--bg)}
.tl-date-hdr:first-child{margin-top:0}
.tl-date-link{
  display:flex;align-items:baseline;gap:12px;width:100%;
  background:transparent;border:none;cursor:pointer;
  padding:10px 12px;border-radius:8px;
  border-bottom:1px solid var(--border);text-align:left;
  transition:background .15s;
}
.tl-date-link:hover{background:var(--surface-el)}
.tl-dh-num{
  font-family:var(--ff-display);
  font-size:34px;font-weight:600;letter-spacing:-0.02em;line-height:1;
  color:var(--text);font-variant-numeric:tabular-nums;
}
.tl-dh-mon{
  font-family:var(--ff-text);
  font-size:13px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;
  color:var(--accent);
}
.tl-dh-meta{display:flex;flex-direction:column;gap:1px;margin-left:6px}
.tl-dh-wkd{
  font-family:var(--ff-text);
  font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;
  color:var(--text-3);
}
.tl-dh-count{font-size:12px;color:var(--text-2);font-weight:500}
.tl-dh-arr{margin-left:auto;color:var(--text-3);font-size:16px;transition:transform .2s,color .2s}
.tl-date-link:hover .tl-dh-arr{color:var(--accent);transform:translateX(3px)}

.tl-day-items{display:flex;flex-direction:column;gap:0;padding-left:8px;border-left:1px dashed var(--border);margin-left:12px}
.tl-item-s{
  padding:14px 0 14px 18px;
  border-bottom:1px solid var(--border);
  position:relative;
}
.tl-item-s::before{
  content:"";position:absolute;left:-5px;top:22px;
  width:9px;height:9px;border-radius:50%;
  background:var(--lc,var(--accent));
  box-shadow:0 0 0 3px var(--bg);
}
.tl-item-s:last-child{border-bottom:none}
.tl-item-s.urgent{border-left:3px solid #FF453A;padding-left:15px;margin-left:-3px}

/* ===== 404 SUGGESTIONS ===== */
.nf-sugg-lbl{
  font-family:var(--ff-text);
  font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;
  color:var(--text-3);margin:8px 0 8px;
}
.nf-sugg-grid{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:8px;max-width:480px}
.nf-sugg-chip{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 14px;border-radius:var(--r-sm);cursor:pointer;
  background:color-mix(in srgb,var(--tc,var(--accent)) 10%,transparent);
  border:1px solid color-mix(in srgb,var(--tc,var(--accent)) 24%,transparent);
  color:var(--text);font-size:13px;font-weight:600;
  transition:all .15s;
}
.nf-sugg-chip:hover{background:color-mix(in srgb,var(--tc,var(--accent)) 18%,transparent);transform:translateY(-1px)}

/* ===== TIMELINE LIST ===== */
.tl-list{padding:0 40px 60px}
.tl-item{
  display:flex;gap:20px;padding:18px 0;
  border-bottom:1px solid var(--border);
}
.tl-date{flex-shrink:0;width:44px;text-align:center;padding-top:2px}
.tl-day{font-size:22px;font-weight:600;letter-spacing:-0.5px;color:var(--text);line-height:1;font-variant-numeric:tabular-nums}
.tl-mon{font-size:10px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:0.5px;font-variant-numeric:tabular-nums}
.tl-content{flex:1;min-width:0}
.tl-title{font-size:16px;font-weight:600;letter-spacing:-0.3px;line-height:1.35;margin-bottom:6px;color:var(--text)}
.tl-title a{color:var(--text)}
.tl-title a:hover{color:var(--link);text-decoration:none}
.tl-summary{font-size:14px;color:var(--text-2);line-height:1.55;margin-bottom:6px}
.tl-why{
  font-size:13px;color:var(--text-2);
  padding:8px 12px;border-radius:6px;
  background:var(--surface-el);margin-bottom:6px;
  border-left:3px solid var(--accent);
}
.tl-why-lbl{font-size:10px;font-weight:700;letter-spacing:0.6px;text-transform:uppercase;color:var(--accent);margin-bottom:3px}
.tl-footer{font-size:12px;color:var(--text-3);display:flex;gap:6px;flex-wrap:wrap;align-items:center}

/* ===== CALENDAR ===== */
.cal-title-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.cal-month{font-size:11px;font-weight:600;letter-spacing:-0.1px;color:var(--text)}
.cal-nav{
  width:20px;height:20px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;color:var(--text-2);background:var(--surface-el);
  transition:background var(--tr);
}
.cal-nav:hover{background:var(--border)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px}
.cal-wd{font-size:8px;font-weight:700;text-align:center;color:var(--text-3);padding:2px 0;letter-spacing:0.2px;text-transform:uppercase}
.cal-d{
  aspect-ratio:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  font-size:10px;border-radius:4px;position:relative;
  color:var(--text-3);font-variant-numeric:tabular-nums;
}
.cal-d.has{color:var(--text);font-weight:600;cursor:pointer;font-variant-numeric:tabular-nums;transition:background var(--tr-fast),transform 0.08s var(--ease-out)}
.cal-d.has:hover{background:var(--surface-el)}
.cal-d.has:active{transform:scale(0.88)}
.cal-d.sel{background:var(--accent)!important;color:#fff!important}
.cal-d.today:not(.sel){outline:1.5px solid var(--accent);border-radius:5px}
.cal-dot{width:4px;height:4px;border-radius:50%;background:var(--accent);position:absolute;bottom:2px}

/* ===== CAL COMPACT BAR ===== */
.cal-mod{padding:8px 6px 8px;border-bottom:1px solid var(--border);margin-bottom:6px;}
.cal-bar{display:flex;align-items:center;gap:4px;padding:2px 0;}
.cal-arr{
  width:22px;height:22px;border-radius:var(--rp);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;line-height:1;color:var(--text-2);
  background:transparent;
  transition:background var(--tr),color var(--tr),transform 0.1s;
  flex-shrink:0;
}
.cal-arr:hover{background:var(--surface-el);color:var(--text);}
.cal-arr:active{transform:scale(0.92);}
.cal-arr:disabled{opacity:0.3;cursor:not-allowed;pointer-events:none;}
.cal-arr:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
.cal-display{
  flex:1;display:flex;align-items:center;justify-content:center;gap:4px;
  padding:4px 6px;border-radius:var(--r);
  background:transparent;color:var(--text);
  font-size:11px;font-weight:600;letter-spacing:-0.1px;
  transition:background var(--tr),color var(--tr);
  min-width:0;
}
.cal-display:hover{background:var(--surface-el);}
.cal-display:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
.cal-display-date{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cal-display-chev{
  font-size:9px;color:var(--accent);
  transition:transform 0.3s ease,opacity 0.2s;
  flex-shrink:0;
}
.cal-mod.expanded .cal-display-chev{transform:rotate(180deg);color:var(--accent);}
/* Estado dim — não está visualizando um dia específico */
.cal-mod.cal-dim .cal-display{opacity:0.45;transition:opacity var(--tr),background var(--tr),color var(--tr);}
.cal-mod.cal-dim .cal-display:hover{opacity:1;}
/* Quando dim, o chevron não aparece (clique vai direto, não expande) */
.cal-mod.cal-dim .cal-display-chev{opacity:0;}
.cal-expand{
  display:grid;
  grid-template-rows:0fr;
  transition:grid-template-rows 0.4s ease,margin-top 0.35s ease;
  margin-top:0;
}
.cal-mod.expanded .cal-expand{grid-template-rows:1fr;margin-top:4px;}
.cal-expand-inner{
  overflow:hidden;
  opacity:0;
  transform:translateY(-4px);
  transition:opacity 0.3s ease,transform 0.35s ease;
}
.cal-mod.expanded .cal-expand-inner{
  opacity:1;
  transform:translateY(0);
  transition:opacity 0.3s ease 0.05s,transform 0.35s ease 0.05s;
}
@media(prefers-reduced-motion:reduce){
  .cal-expand,.cal-expand-inner,.cal-display-chev{transition:none!important;}
}

/* ===== QUOTE BAR (fixa abaixo do header) ===== */
.qbar-host{
  position:fixed;top:var(--nh);
  left:calc(max(0px,(100vw - 1440px) / 2) + var(--sw));
  right:max(0px,(100vw - 1440px) / 2);
  z-index:180;
  display:block;pointer-events:none;
  padding:0 40px;
}
.qbar-host>*{pointer-events:auto;}
.qbar{
  display:grid;
  grid-template-columns:auto 1fr;
  align-items:center;
  gap:14px;
  position:relative;
  width:100%;
  padding:10px 14px 12px 18px;
  background:var(--nav-bg);
  backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  border:1px solid var(--border);
  border-top:none;
  border-radius:0 0 14px 14px;
  box-shadow:
    0 -6px 16px rgba(0,0,0,0.10),
    inset 0 2px 6px rgba(0,0,0,0.06),
    0 6px 18px rgba(0,0,0,0.10),
    0 14px 32px rgba(0,0,0,0.06);
  transition:
    transform 0.42s cubic-bezier(0.32,0.72,0,1),
    box-shadow 0.32s cubic-bezier(0.32,0.72,0,1),
    opacity 0.28s ease;
}
.qbar-mascot{
  width:56px;height:78px;flex-shrink:0;
  display:flex;align-items:flex-end;justify-content:center;
  align-self:flex-end;
  margin-bottom:-12px;
  margin-left:-10px;
  transform-origin:50% 90%;
}
.qbar-mascot img{
  width:100%;height:100%;object-fit:contain;
  filter:drop-shadow(0 4px 10px rgba(0,0,0,0.18));
  display:block;
}
.qbar-mascot.is-pondering{
  animation:qbar-mascot-ponder 0.5s ease-in-out forwards;
}
.qbar-body{min-width:0;}
.qbar-main{display:block;}
.qbar-text{
  display:inline;
  font-family:var(--ff-quote);
  font-size:15px;line-height:1.52;letter-spacing:0.2px;
  color:var(--text);font-style:italic;font-weight:700;
}
.qbar-text::before{content:'\201C';}
.qbar-text::after{content:'\201D';}
.qbar-author{
  display:inline;
  white-space:nowrap;
  margin-left:8px;
  font-family:var(--ff-quote);
  font-size:13px;font-weight:700;font-style:italic;letter-spacing:0.2px;
  color:var(--accent);
}
.qbar-ctx-row{
  display:inline-flex;align-items:center;max-width:calc(100% - 36px);margin-top:3px;
  text-decoration:none!important;color:inherit;overflow:hidden;
}
.qbar-ctx{
  font-size:12.5px;letter-spacing:0;color:var(--text-2);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  min-width:0;flex-shrink:1;
}
.qbar-ctx-row:hover .qbar-ctx{
  color:var(--accent);
  border-bottom:0.5px solid var(--accent);
}
.qbar-link-ico{flex-shrink:0;margin-left:5px;color:var(--accent);opacity:0.6;transition:opacity 0.15s;}
.qbar-ctx-row:hover .qbar-link-ico{opacity:1;}
.qbar-actions{
  position:absolute;bottom:10px;right:14px;
  display:flex;flex-direction:column;align-items:center;gap:2px;
}
.qbar-btn{
  display:flex;align-items:center;justify-content:center;
  font-size:14px;color:var(--accent);opacity:0.5;
  background:none;border:none;padding:0;
  transition:opacity 0.15s,transform 0.1s;
}
.qbar-btn:hover{opacity:1;}
.qbar-btn:active{transform:scale(0.88);}
.qbar-shuffle{transition:opacity 0.15s;}
.qbar-shuffle:hover{opacity:1;}
.qbar-btn:focus-visible{outline:none;}
.qbar-host.closed .qbar{
  transform:translateY(-100%);pointer-events:none;
  box-shadow:none;
}
.qbar-host.hidden{display:none;}
.qbar-chip{
  position:absolute;bottom:0;left:24px;
  transform:translateY(100%);
  display:flex;align-items:center;justify-content:center;
  height:20px;padding:0 12px;
  border-radius:0 0 10px 10px;
  overflow:hidden;
  background:var(--surface-card);
  border:1px solid var(--border);border-top:none;
  color:var(--accent);
  opacity:1;
  box-shadow:0 4px 10px rgba(0,0,0,0.08),0 8px 18px rgba(0,0,0,0.05);
  transition:background var(--tr);
  pointer-events:auto;
}
.qbar-host.closed .qbar-chip{pointer-events:auto;}
.qbar-chip:active{opacity:0.8;}
.qbar-chip:focus-visible{outline:none;}
body.qbar-open #main{
  padding-top:var(--qbar-h,72px);
  transition:padding-top 0.38s cubic-bezier(0.32,0.72,0,1);
}
body:not(.qbar-open) #main{
  padding-top:0;
  transition:padding-top 0.38s cubic-bezier(0.32,0.72,0,1);
}
@media(max-width:960px){
  .qbar-host{left:0;padding:0 20px;}
}
@media(max-width:720px){
  .qbar{padding:8px 10px 10px 14px;gap:10px;grid-template-columns:36px 1fr;}
  .qbar-mascot{width:46px;height:64px;margin-bottom:-8px;align-self:end;}
}
@media(max-width:480px){
  .qbar{grid-template-columns:28px 1fr;}
  .qbar-mascot{width:34px;height:48px;margin-bottom:-8px;margin-left:-6px;}
}
@media(prefers-reduced-motion:reduce){
  .qbar,.qbar-chip,body.qbar-open #main,body:not(.qbar-open) #main{transition:none!important;}
  .qbar-host.closed .qbar{transform:none;display:none;}
  .qbar-mascot.is-pondering{animation:none!important;}
}
@keyframes qbar-mascot-think{
  0%   {transform:rotate(-2deg) translateY(0px);}
  28%  {transform:rotate(2.5deg) translateY(-1px);}
  56%  {transform:rotate(-1deg) translateY(0.5px);}
  78%  {transform:rotate(1.8deg) translateY(-0.5px);}
  100% {transform:rotate(-2deg) translateY(0px);}
}
@keyframes qbar-mascot-ponder{
  0%   {transform:scale(1);opacity:1;}
  35%  {transform:scale(1.08);opacity:1;}
  100% {transform:scale(1);opacity:1;}
}
.qbar-body{transition:opacity .24s ease;}
.qbar-body.is-changing{opacity:0;}

/* ===== DAY NAV CARDS ===== */
.day-nav-cards{
  display:grid;grid-template-columns:1fr 1fr;gap:14px;
  margin-top:56px;padding-top:24px;border-top:1px solid var(--border);
}
.day-nav-card{background:var(--surface);border-radius:var(--r-sm);
  padding:18px 20px;cursor:pointer;
  display:flex;align-items:center;gap:14px;
  transition:all .18s var(--ease-spring);
  text-align:left;color:var(--text);
}
.day-nav-card:hover{border-color:var(--accent);background:var(--surface-el);transform:translateY(-2px)}
.day-nav-card.next{text-align:right;flex-direction:row}
.day-nav-card.next .dnc-body{text-align:right}
.dnc-arr{
  font-size:22px;font-weight:300;color:var(--text-3);
  transition:transform .2s,color .2s;
  flex-shrink:0;
}
.day-nav-card:hover .dnc-arr{color:var(--accent)}
.day-nav-card.prev:hover .dnc-arr{transform:translateX(-3px)}
.day-nav-card.next:hover .dnc-arr{transform:translateX(3px)}
.dnc-body{flex:1;min-width:0}
.dnc-meta{
  font-family:var(--ff-text);
  font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;
  color:var(--text-3);margin-bottom:4px;
}
.dnc-title{
  font-family:var(--ff-display);
  font-size:15px;font-weight:600;color:var(--text);
  line-height:1.3;letter-spacing:-0.005em;
  display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:2;overflow:hidden;
}
@media(max-width:640px){.day-nav-cards{grid-template-columns:1fr}}

.day-nav-btns{display:flex;justify-content:space-between;margin-top:48px;padding-top:20px;border-top:1px solid var(--border)}
.day-nav-btn{
  display:flex;align-items:center;gap:8px;
  padding:9px 18px;border-radius:var(--rp);
  border:1px solid var(--border);font-size:13px;color:var(--link);
  transition:border-color var(--tr-base),background var(--tr-base),transform var(--tr-fast);
}
.day-nav-btn:hover{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 8%,transparent)}
.day-nav-btn:active{transform:scale(0.98)}

/* ===== EMPTY STATE ===== */
.empty-state{padding:60px 40px;text-align:center}
.empty-mascot{width:100px;margin:0 auto 20px;opacity:0.6}
.empty-text{font-size:17px;color:var(--text-2)}

/* ===== DAY NOT FOUND ===== */
.day-nf{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:72px 40px;text-align:center;
}
.day-nf-mascot{
  width:112px;opacity:.72;margin-bottom:28px;
  animation:day-nf-float 4s ease-in-out infinite;
}
@keyframes day-nf-float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-8px)}
}
.day-nf-tag{
  font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  color:var(--text-dim);margin-bottom:12px;
}

let _theme = localStorage.getItem('csr-theme') || 'auto';

function applyTheme(t) {
  _theme = t;
  localStorage.setItem('csr-theme', t);
  const dark = t === 'dark' || (t === 'auto' && window.matchMedia('(prefers-color-scheme:dark)').matches);
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
}

const THEME_ICONS = {
  dark:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>',
  light: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>',
};
function _updateThemeBtn() {
  const btn = document.getElementById('btn-theme');
  if (!btn) return;
  const theme = document.documentElement.getAttribute('data-theme');
  btn.innerHTML = theme === 'dark' ? THEME_ICONS.dark : THEME_ICONS.light;
  btn.setAttribute('aria-label', theme === 'dark' ? 'Mudar para tema claro' : 'Mudar para tema escuro');
}
function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme');
  applyTheme(cur === 'dark' ? 'light' : 'dark');
  _updateThemeBtn();
  renderAll({ preserveScroll: true });
  const btn = document.getElementById('btn-theme');
  if (btn) {
    btn.classList.remove('is-switching');
    void btn.offsetWidth;
    btn.classList.add('is-switching');
    setTimeout(() => btn.classList.remove('is-switching'), 400);
  }
}

function isDark() {
  return document.documentElement.getAttribute('data-theme') === 'dark';
}

// Apply immediately to prevent flash
applyTheme(_theme);
document.addEventListener('DOMContentLoaded', _updateThemeBtn);

   ==================================================== */
async function loadIndex() {
  if (STATE.ready.editions) return STATE.editions;
  if (STATE.pending.editions) return STATE.pending.editions;
  STATE.pending.editions = fetch('data/editions.json')
    .then(r => r.json())
    .then(d => { STATE.editions = d; STATE.ready.editions = true; return d; });
  return STATE.pending.editions;
}

async function loadEdition(date) {
  if (STATE.days[date]) return STATE.days[date];
  if (STATE.notFound.has(date)) return null;
  if (STATE.pending.days[date]) return STATE.pending.days[date];
  // Se já temos o índice, checar se a data existe antes de fazer fetch
  if (STATE.ready.editions && !STATE.editions.editions.some(e => e.date === date)) {
    STATE.notFound.add(date);
    return null;
  }
  STATE.pending.days[date] = fetch('data/' + date + '.json')
    .then(r => r.ok ? r.json() : null)
    .then(d => { if (d) STATE.days[date] = d; else STATE.notFound.add(date); return d || null; })
    .catch(() => { STATE.notFound.add(date); return null; });
  return STATE.pending.days[date];
}

async function loadQuotes() {
  if (STATE.ready.quotes) return STATE.quotes;
  if (STATE.pending.quotes) return STATE.pending.quotes;
  STATE.pending.quotes = fetch('data/quotes.json')
    .then(r => r.json())
    .then(d => { STATE.quotes = d; STATE.ready.quotes = true; return d; });
  return STATE.pending.quotes;
}

async function loadDays(dates) {
  return Promise.all(dates.map(d => loadEdition(d)));
}

async function loadForCategory(slug) {
  if (!STATE.ready.editions) return;
  const need = STATE.editions.editions
    .filter(e => (e.counts_by_category?.[slug] ?? 0) > 0)
    .map(e => e.date);
  return loadDays(need);
}

async function loadForTool(slug) {
  if (!STATE.ready.editions) return;
  const need = STATE.editions.editions
    .filter(e => (e.counts_by_tool?.[slug] ?? 0) > 0)
    .map(e => e.date);
  return loadDays(need);
}

async function ensureDataForRoute({view, slug}) {
  if (!STATE.ready.editions) await loadIndex();
  if (view === 'day' && slug) await loadEdition(slug);
  else if (view === 'cat' && slug) await loadForCategory(slug);
  else if (view === 'tool' && slug) await loadForTool(slug);
  else if (view === 'lang' && slug) await loadForTool(slug);
}

(function() {

   DATA HELPERS
   ==================================================== */
function sortedDates() {
  if (!STATE.editions) return [];
  return STATE.editions.editions.map(e=>e.date).sort().reverse();
}

function getAllNews(filterFn) {
  const all = [];
  for (const [date, day] of Object.entries(STATE.days)) {
    for (const item of (day.news||[])) {
      all.push({...item, _date:date, _dateFmt:day.formatted_date});
    }
  }
  return all.filter(filterFn).sort((a,b) => new Date(b._date)-new Date(a._date));
}

function getAllToolItems(key) {
  const all = [];
  const seen = new Set();
  for (const [date, day] of Object.entries(STATE.days)) {
    // From tools array
    for (const t of (day.tools||[])) {
      if (t.tool_key === key && !seen.has(t.headline)) {
        seen.add(t.headline);
        all.push({...t, _date:date, _dateFmt:day.formatted_date});
      }
    }
    // From news where tags include key
    for (const n of (day.news||[])) {
      if ((n.tags||[]).includes(key) && !seen.has(n.headline)) {
        seen.add(n.headline);
        all.push({...n, _date:date, _dateFmt:day.formatted_date});
      }
    }
  }
  return all.sort((a,b) => new Date(b._date)-new Date(a._date));
}

function getToolName(key) {
  if (TOOL_NAMES[key]) return TOOL_NAMES[key];
  for (const [,day] of Object.entries(STATE.days)) {
    const t = (day.tools||[]).find(t=>t.tool_key===key);
    if (t) return t.name;
  }
  return key;
}

function getCatInfo(slug) {
  if (CAT_LABELS[slug]) return {label: CAT_LABELS[slug], icon:'📌'};
  for (const [,day] of Object.entries(STATE.days)) {
    for (const n of [...(day.news||[]),...(day.highlights||[])]) {
      if (n.category === slug) return {label: n.category_label||slug, icon: n.category_icon||'📌'};
    }
  }
  return {label:slug, icon:'📌'};
}

function quoteFor() {
  const q = STATE.quotes;
  if (!q || !q.length) return null;
  if (_quoteIdx < 0) _quoteIdx = Math.floor(Math.random() * q.length);
  return q[_quoteIdx];
}
