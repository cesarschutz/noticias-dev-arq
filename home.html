function toolIcon(key, size=22) {
  const color = TOOL_COLORS[key] || '#888';
  const emoji = TOOL_EMOJI[key]  || '🔧';
  const isDk  = isDark();
  const bg     = 'var(--surface-el)';
  const border = isDk
    ? `color-mix(in srgb,${color} 38%,#272729)`
    : `color-mix(in srgb,${color} 35%,rgba(0,0,0,.08))`;
  const wrap = size + 14;
  const br   = Math.round(wrap * 0.26);

  let imgUrl = TOOL_LOGOS[key] || null;
  if (!imgUrl && SI_FIXED[key])  imgUrl = `https://cdn.simpleicons.org/${SI_FIXED[key]}`;
  if (!imgUrl && SI_ADAPT[key])  imgUrl = `https://cdn.simpleicons.org/${SI_ADAPT[key][isDk ? 1 : 0]}`;

  const sty = `width:${wrap}px;height:${wrap}px;border-radius:${br}px;background:${bg};border:1px solid ${border};display:inline-flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0`;
  if (imgUrl)
    return `<span style="${sty}"><img src="${imgUrl}" width="${size}" height="${size}" style="object-fit:contain;display:block" alt="${key}" onerror="this.style.display='none';this.parentNode.insertAdjacentText('beforeend','${emoji}')"></span>`;
  return `<span style="${sty};font-size:${size-2}px">${emoji}</span>`;
}

function toolImgUrl(key) {
  const isDk = isDark();
  if (TOOL_LOGOS[key])  return TOOL_LOGOS[key];
  if (SI_FIXED[key])    return `https://cdn.simpleicons.org/${SI_FIXED[key]}`;
  if (SI_ADAPT[key])    return `https://cdn.simpleicons.org/${SI_ADAPT[key][isDk ? 1 : 0]}`;
  return null;
}

function catIcon(cat, _emoji='📌', size=16, bare=false) {
  const color = CAT_COLORS[cat] || '#888';
  const paths = CAT_SVGS[cat];
  if (bare) {
    const s = size;
    return paths
      ? `<svg viewBox="0 0 24 24" width="${s}" height="${s}" fill="none" stroke="${color}" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0">${paths}</svg>`
      : `<span style="font-size:${s}px;flex-shrink:0">📌</span>`;
  }
  const bg   = `color-mix(in srgb,${color} 12%,transparent)`;
  const wrap = size + 14;
  const br   = Math.round(wrap * 0.26);
  if (paths) {
    const s = Math.round(size * 0.78);
    return `<span style="width:${wrap}px;height:${wrap}px;border-radius:${br}px;background:${bg};display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;color:${color}"><svg viewBox="0 0 24 24" width="${s}" height="${s}" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">${paths}</svg></span>`;
  }
  return `<span style="width:${wrap}px;height:${wrap}px;border-radius:${br}px;background:${bg};display:inline-flex;align-items:center;justify-content:center;font-size:${size}px;flex-shrink:0">📌</span>`;

/* ====================================================
   CALENDAR
   ==================================================== */
function renderCalendar() {
  const edDates = new Set(STATE.editions ? STATE.editions.editions.map(e=>e.date) : []);
  const selDate = _state.view==='day' ? _state.slug : null;
  const today = new Date();
  const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

  if (_calYear===undefined) { _calYear=today.getFullYear(); _calMonth=today.getMonth(); }

  const first = new Date(_calYear,_calMonth,1);
  const days = new Date(_calYear,_calMonth+1,0).getDate();
  const startDow = (first.getDay()+6)%7;
  const wds = ['S','T','Q','Q','S','S','D'];

  let h = `<div class="cal-title-row">
    <button class="cal-nav" onclick="calPrev()">‹</button>
    <span class="cal-month">${MONTHS_PT[_calMonth]} ${_calYear}</span>
    <button class="cal-nav" onclick="calNext()">›</button>
  </div><div class="cal-grid">`;

  wds.forEach(w => h += `<div class="cal-wd">${w}</div>`);
  for (let i=0;i<startDow;i++) h += `<div class="cal-d"></div>`;

  for (let d=1;d<=days;d++) {
    const mm = String(_calMonth+1).padStart(2,'0');
    const dd = String(d).padStart(2,'0');
    const ds = `${_calYear}-${mm}-${dd}`;
    const hasEd = edDates.has(ds);
    const isSel = ds===selDate;
    const isToday = ds===todayStr;
    let cls='cal-d';
    if(hasEd) cls+=' has';
    if(isSel) cls+=' sel';
    if(isToday&&!isSel) cls+=' today';
    const click = hasEd?`onclick="calPickDay('${ds}')"`:'';
    h += `<div class="${cls}" ${click}>${d}${hasEd&&!isSel?'<span class="cal-dot"></span>':''}</div>`;
  }
  h += `</div>`;
  document.getElementById('calendar').innerHTML = h;
}

function calPrev() {
  _calMonth--;
  if(_calMonth<0){_calMonth=11;_calYear--;}
  renderCalendar();
}
function calNext() {
  _calMonth++;
  if(_calMonth>11){_calMonth=0;_calYear++;}
  renderCalendar();
}

/* ====================================================
   CAL COMPACT BAR
   ==================================================== */
function getTodayStr() {
  const t = new Date();
  return `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
}

function currentCalDate() {
  if (_state.view === 'day' && _state.slug) return _state.slug;
  return getTodayStr();
}

function adjacentCalDates(ds) {
  const all = sortedDates(); // desc: [mais recente, ..., mais antiga]
  const i = all.indexOf(ds);
  if (i !== -1) return [all[i+1] || null, all[i-1] || null];
  // ds não está nas edições (ex: hoje sem edição) — encontra as mais próximas
  const prev = all.find(d => d < ds) || null;
  const nexts = all.filter(d => d > ds);
  const next = nexts.length ? nexts[nexts.length - 1] : null;
  return [prev, next];
}

function fmtCalDate(ds) {
  if (!ds) return '—';
  const [y,m,d] = ds.split('-').map(Number);
  const wd = WEEKDAYS_PT_SHORT[new Date(y, m-1, d).getDay()];
  const mn = MONTHS_PT[m-1].toLowerCase().slice(0,3);
  return `${wd}, ${d} ${mn}`;
}

function renderCalBar() {
  const cur = currentCalDate();
  const display = document.getElementById('cal-display-date');
  const prevBtn = document.getElementById('cal-arr-prev');
  const nextBtn = document.getElementById('cal-arr-next');
  const mod = document.getElementById('cal-mod');
  const btn = document.getElementById('cal-display');
  if (!display || !mod || !btn) return;
  display.textContent = fmtCalDate(cur);
  const [prev, next] = adjacentCalDates(cur);
  prevBtn.disabled = !prev;
  nextBtn.disabled = !next;
  const onDay = _state.view === 'day';
  mod.classList.toggle('expanded', _calExpanded);
  mod.classList.toggle('cal-dim', !onDay);
  btn.setAttribute('aria-expanded', String(_calExpanded));
  btn.title = 'Abrir calendário';
}

function calStepDay(dir) {
  const cur = currentCalDate();
  const [prev, next] = adjacentCalDates(cur);
  const target = dir < 0 ? prev : next;
  if (target) nav('/day/' + target);
}

function calToggleExpand() {
  _calExpanded = !_calExpanded;
  document.getElementById('cal-mod').classList.toggle('expanded', _calExpanded);
  document.getElementById('cal-display').setAttribute('aria-expanded', String(_calExpanded));
}

function calClose() {
  if (!_calExpanded) return;
  _calExpanded = false;
  document.getElementById('cal-mod').classList.remove('expanded');
  document.getElementById('cal-display').setAttribute('aria-expanded','false');
}

function calPickDay(ds) {
  calClose();
  nav('/day/' + ds);
}

function goToToday() {
  const todayStr = getTodayStr();
  if (_state.view === 'day' && _state.slug === todayStr) return;
  calPickDay(todayStr);
}

function renderNavToday() {}

/* ====================================================
   QUOTE BAR
   ==================================================== */
function renderQuote() {
  const host = document.getElementById('quote-bar-host');
  if (!host) return;
  const {view, slug} = _state;
  const showOnViews = new Set(['home','day','cat','lang','tool']);
  if (!showOnViews.has(view)) {
    host.classList.add('hidden');
    host.classList.remove('closed');
    document.body.classList.remove('qbar-open');
    host.setAttribute('aria-hidden','true');
    return;
  }
  const q = _curQuote || quoteFor();
  _curQuote = q;
  if (!q) {
    host.classList.add('hidden');
    document.body.classList.remove('qbar-open');
    return;
  }
  document.getElementById('qbar-text').textContent = q.text;
  document.getElementById('qbar-author').textContent = '— ' + q.author;
  document.getElementById('qbar-ctx').textContent = q.context || '';
  const lnk = document.getElementById('qbar-link');
  if (lnk) { lnk.href = q.url || '#'; lnk.style.display = q.url ? '' : 'none'; }
  const sig = view + ':' + (slug||'');
  const chip = document.getElementById('qbar-chip');
  // home, cat, lang, tool: começam colapsadas (deixa o conteúdo respirar)
  // day: aberta por default (muda a cada edição)
  const collapseByDefault = new Set(['home','cat','lang','tool']);
  if (collapseByDefault.has(view)) _qbarClosedFor = sig;
  if (_qbarClosedFor !== sig) {
    host.classList.remove('closed');
    _qbarClosedFor = null;
    document.body.classList.add('qbar-open');
    if (chip) chip.setAttribute('aria-label','Fechar citação');
  } else {
    host.classList.add('closed');
    document.body.classList.remove('qbar-open');
    if (chip) chip.setAttribute('aria-label','Mostrar citação');
  }
  host.classList.remove('hidden');
  host.setAttribute('aria-hidden','false');
  if (!_qbarMinHLocked) qbarLockMinHeight();
  if (_qbarClosedFor !== sig) _qbarStartAuto(); else _qbarStopAuto();
}

// Mantém --qbar-h sincronizado com a altura real do card
(function() {
  const qel = document.getElementById('qbar');
  if (!qel) return;
  const sync = () => document.documentElement.style.setProperty('--qbar-h', qel.offsetHeight + 'px');
  new ResizeObserver(sync).observe(qel);
  sync();
})();

// Fixa min-height do card com base na frase mais longa, evitando layout shift
let _qbarMinHLocked = false;
function qbarLockMinHeight() {
  const qel = document.getElementById('qbar');
  if (!qel || !STATE.quotes?.length) return;
  const w = qel.offsetWidth;
  if (w === 0) return; // card ainda não visível, tenta de novo depois
  const longest = STATE.quotes.reduce((a, b) => b.text.length > a.text.length ? b : a);

  const clone = qel.cloneNode(true);
  clone.style.cssText = 'position:fixed;top:-9999px;left:0;visibility:hidden;min-height:0;width:' + w + 'px';
  clone.querySelectorAll('[id]').forEach(el => el.removeAttribute('id'));
  clone.querySelector('.qbar-text').textContent = longest.text;
  clone.querySelector('.qbar-author').textContent = '— ' + longest.author;
  document.body.appendChild(clone);
  const h = clone.offsetHeight;
  document.body.removeChild(clone);

  if (h > 0) { qel.style.minHeight = h + 'px'; _qbarMinHLocked = true; }
}

let _mascotTimer = null;
let _quoteTextTimer = null;
let _quoteAutoInterval = null;

function _qbarStartAuto() {
  if (_quoteAutoInterval) return;
  _quoteAutoInterval = setInterval(nextQuote, 15000);
}
function _qbarStopAuto() {
  clearInterval(_quoteAutoInterval);
  _quoteAutoInterval = null;
}

function _updateQuoteText() {
  const q = _curQuote;
  if (!q) return;
  document.getElementById('qbar-text').textContent = q.text;
  document.getElementById('qbar-author').textContent = '— ' + q.author;
  document.getElementById('qbar-ctx').textContent = q.context || '';
  const lnk = document.getElementById('qbar-link');
  if (lnk) { lnk.href = q.url || '#'; lnk.style.display = q.url ? '' : 'none'; }
}

function nextQuote() {
  const q = STATE.quotes;
  if (q && q.length) _quoteIdx = (_quoteIdx + 1) % q.length;
  _curQuote = quoteFor();

  // tilt do mascote
  const m = document.querySelector('.qbar-mascot');
  if (m) {
    clearTimeout(_mascotTimer);
    m.classList.remove('is-pondering');
    void m.offsetWidth;
    m.classList.add('is-pondering');
    _mascotTimer = setTimeout(() => m.classList.remove('is-pondering'), 700);
  }

  // crossfade do texto
  const body = document.querySelector('.qbar-body');
  clearTimeout(_quoteTextTimer);
  if (body) {
    body.classList.add('is-changing');
    _quoteTextTimer = setTimeout(() => {
      _updateQuoteText();
      body.classList.remove('is-changing');
    }, 250);
  } else {
    _updateQuoteText();
  }

  if (_quoteAutoInterval) { _qbarStopAuto(); _qbarStartAuto(); }
}

function closeQuoteBar() {
  const host = document.getElementById('quote-bar-host');
  host.classList.add('closed');
  document.body.classList.remove('qbar-open');
  _qbarClosedFor = _state.view + ':' + (_state.slug||'');
  document.getElementById('qbar-chip').setAttribute('aria-label','Mostrar citação');
  _qbarStopAuto();
}

function openQuoteBar() {
  const host = document.getElementById('quote-bar-host');
  host.classList.remove('closed');
  document.body.classList.add('qbar-open');
  _qbarClosedFor = null;
  document.getElementById('qbar-chip').setAttribute('aria-label','Fechar citação');
  _qbarStartAuto();
}

function qbarChipClick() {
  const host = document.getElementById('quote-bar-host');
  if (host.classList.contains('closed')) openQuoteBar();
  else closeQuoteBar();
}

/* ====================================================
   HERO ROTATION  (V2 – deck 3D colorido)
   ==================================================== */
const HERO = { editions:[], edIdx:0, hlIdx:0, edTimer:null, hlTimer:null, paused:false };

/* ── Helpers de dados ── */
function _heroEdHighlights(edIdx) {
  const ed = HERO.editions[edIdx];
  if (!ed) return [];
  const day = STATE.days[ed.date];
  return day?.highlights || ed.highlights || [];
}

function _heroFmtWeekDayDate(d) {
  if (!d) return '';
  const [y,m,day] = d.split('-').map(Number);
  const dt = new Date(y, m-1, day);
  const wd = ['DOM','SEG','TER','QUA','QUI','SEX','SÁB'];
  const mo = ['JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'];
  return wd[dt.getDay()] + ' · ' + day + ' ' + mo[m-1];
}

function _heroFmtShortDate(s) {
  if (!s) return '';
  const d = new Date(s);
  if (isNaN(d)) return s;
  const mo = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  return d.getDate() + ' ' + mo[d.getMonth()];
}

function _heroEdGradient(ed) {
  const cats = Object.entries(ed.counts_by_category||{})
    .sort((a,b)=>b[1]-a[1]).slice(0,3).map(([k])=>CAT_COLORS[k]||'#0071e3');
  if (cats.length === 1) return cats[0];
  if (cats.length === 2) return `linear-gradient(135deg,${cats[0]} 0%,${cats[1]} 100%)`;
  return `linear-gradient(135deg,${cats[0]} 0%,${cats[1]} 52%,${cats[2]} 100%)`;
}

function _heroToolsFromTags(tags) {
  const known = new Set([...Object.keys(TOOL_LOGOS),...Object.keys(SI_FIXED),...Object.keys(SI_ADAPT)]);
  return (tags||[]).map(t=>t.toLowerCase()).filter(t=>known.has(t)).slice(0,3);
}

function _heroToolLogoHtml(t) {
  if (TOOL_LOGOS[t]) return `<img src="${TOOL_LOGOS[t]}" alt="${t}">`;
  if (SI_FIXED[t]) return `<img src="https://cdn.simpleicons.org/${SI_FIXED[t]}" alt="${t}">`;
  if (SI_ADAPT[t]) return `<img src="https://cdn.simpleicons.org/${SI_ADAPT[t][1]}" alt="${t}">`;
  return TOOL_EMOJI[t] ? `<span>${TOOL_EMOJI[t]}</span>` : '';
}

/* ── Paint: Edition card ── */
function _heroPaintEdition(idx, target) {
  const id = (target === 'back') ? 'hero-ed-back' : 'hero-ed-front';
  const el = document.getElementById(id);
  if (!el) return;
  const ed = HERO.editions[idx];
  if (!ed) return;

  const bg = _heroEdGradient(ed);
  el.style.background = bg;

  const wm    = String(idx+1).padStart(2,'0');
  const total = Object.values(ed.counts_by_category||{}).reduce((a,b)=>a+b,0);
  const catCt = Object.keys(ed.counts_by_category||{}).length;
  const toolCt= Object.keys(ed.counts_by_tool||{}).length;
  const eyebrow = _heroFmtWeekDayDate(ed.date) + ' · ' + total + ' NOTÍCIAS';
  const raw   = ed.summary || ed.date;
  const title = raw.length > 115 ? raw.slice(0,115)+'…' : raw;

  const hls = _heroEdHighlights(idx).slice(0,3);
  const hlRows = hls.map(h => {
    const icon = h.category_icon || '';
    const txt  = h.headline || h.title || '';
    return `<div class="hcv-hl-row">${icon ? icon+' ' : ''}${e(txt.length>57 ? txt.slice(0,57)+'…' : txt)}</div>`;
  }).join('');

  el.innerHTML = `
    <div class="hcv-watermark" aria-hidden="true"><span class="hcv-wm-csr">CSR</span><span class="hcv-wm-news">NEWS</span></div>
    <div class="hcv-eyebrow">● ${e(eyebrow)}</div>
    <div class="hcv-title">${e(title)}</div>
    ${hlRows ? `<div class="hcv-highlights"><div class="hcv-hl-label">Destaques</div>${hlRows}</div>` : '<div style="flex:1"></div>'}
    <div class="hcv-footer">
      <span class="hcv-pill">📰 Abrir edição →</span>
      <span class="hcv-source">${catCt} cats · ${toolCt} tools</span>
    </div>`;
}

/* ── Paint: Highlight card ── */
function _heroPaintHighlight(idx, target) {
  const id = (target === 'back') ? 'hero-hl-back' : 'hero-hl-front';
  const el = document.getElementById(id);
  if (!el) return;
  const hls = _heroEdHighlights(HERO.edIdx);
  const hl  = hls[idx];
  if (!hl) return;

  const cat   = hl.category || 'ai';
  const color = CAT_COLORS[cat] || '#0071e3';
  el.style.background = `linear-gradient(145deg, transparent 0%, rgba(0,0,0,0.2) 100%), ${color}`;

  const wm       = String(idx+1).padStart(2,'0');
  const catLabel = (CAT_LABELS[cat] || cat).toUpperCase();
  const tools    = _heroToolsFromTags(hl.tags);
  const toolTags = tools.map(t => (TOOL_NAMES[t]||t).split(/[\s&/]/)[0].toUpperCase()).join(' · ');
  const eyebrow  = [catLabel, toolTags].filter(Boolean).join(' · ');

  const toolChips = tools.map(t =>
    `<span class="hcv-tool-chip">${_heroToolLogoHtml(t)}${e((TOOL_NAMES[t]||t).split(/[\s&/]/)[0])}</span>`
  ).join('');

  const headline    = hl.headline || hl.title || '';
  const titleText   = headline.length > 98 ? headline.slice(0,98)+'…' : headline;
  const summaryRaw  = hl.summary || '';
  const summaryText = summaryRaw.length > 125 ? summaryRaw.slice(0,125)+'…' : summaryRaw;

  const dateStr  = hl.published_at ? _heroFmtShortDate(hl.published_at) : _heroFmtWeekDayDate(HERO.editions[HERO.edIdx]?.date||'');
  const readTime = hl.read_time ? ` · ${hl.read_time} min` : '';

  el.innerHTML = `
    <div class="hcv-watermark" aria-hidden="true"><span class="hcv-wm-csr">CSR</span><span class="hcv-wm-news">NEWS</span></div>
    ${hl.urgent ? '<div class="hcv-badge-urgent">URGENTE</div>' : ''}
    <div class="hcv-eyebrow">● ${e(eyebrow)}</div>
    <div class="hcv-title">${e(titleText)}</div>
    ${summaryText ? `<div class="hcv-summary">${e(summaryText)}</div>` : ''}
    ${toolChips ? `<div class="hcv-tools">${toolChips}</div>` : '<div style="flex:1"></div>'}
    <div class="hcv-footer">
      <span class="hcv-pill">📅 ${e(dateStr)}${e(readTime)}</span>
      <span class="hcv-source">${e(hl.source||'')}</span>
    </div>`;
}

/* ── Dots ── */
function _heroUpdateDots(dotsId, count, activeIdx, clickFn) {
  const el = document.getElementById(dotsId);
  if (!el) return;
  el.innerHTML = Array.from({length:count}, (_,i) =>
    `<button class="hero-deck-dot${i===activeIdx?' active':''}" aria-label="Item ${i+1}" onclick="${clickFn}(${i})"></button>`
  ).join('');
}

/* ── Swap animation ── */
function _heroSwap(frontId, mutate) {
  const el = document.getElementById(frontId);
  if (!el) { mutate(); return; }
  el.style.transition = 'opacity .2s, transform .2s';
  el.style.opacity = '0';
  el.style.transform = 'translateY(5px)';
  setTimeout(() => {
    mutate();
    el.style.opacity = '1';
    el.style.transform = '';
  }, 200);
}

/* ── Public navigation ── */
function heroGoEdition(idx) {
  HERO.edIdx = idx; HERO.hlIdx = 0;
  HERO.paused = true;
  clearTimeout(HERO._unpause);
  HERO._unpause = setTimeout(() => { HERO.paused = false; }, 5000);
  const nextEd = (idx+1) % HERO.editions.length;
  _heroSwap('hero-ed-front', () => {
    _heroPaintEdition(idx);
    _heroPaintEdition(nextEd, 'back');
    _heroUpdateDots('hero-ed-dots', HERO.editions.length, idx, 'heroGoEdition');
  });
  const hls = _heroEdHighlights(idx);
  _heroSwap('hero-hl-front', () => {
    _heroPaintHighlight(0);
    _heroPaintHighlight(1 % Math.max(1, hls.length), 'back');
    _heroUpdateDots('hero-hl-dots', hls.length, 0, 'heroGoHighlight');
  });
}

function heroGoHighlight(idx) {
  HERO.hlIdx = idx;
  HERO.paused = true;
  clearTimeout(HERO._unpause);
  HERO._unpause = setTimeout(() => { HERO.paused = false; }, 5000);
  const hls = _heroEdHighlights(HERO.edIdx);
  _heroSwap('hero-hl-front', () => {
    _heroPaintHighlight(idx);
    _heroPaintHighlight((idx+1) % Math.max(1, hls.length), 'back');
    _heroUpdateDots('hero-hl-dots', hls.length, idx, 'heroGoHighlight');
  });
}

function initHeroRotation() {
  if (HERO.edTimer) clearInterval(HERO.edTimer);
  if (HERO.hlTimer) clearInterval(HERO.hlTimer);
  HERO.paused = false; HERO.edIdx = 0; HERO.hlIdx = 0;
  if (!STATE.editions?.editions?.length) return;
  HERO.editions = STATE.editions.editions.slice(0, 5);
  if (!HERO.editions.length) return;

  const hls0 = _heroEdHighlights(0);
  _heroPaintEdition(0);
  _heroPaintEdition(1 % HERO.editions.length, 'back');
  _heroPaintHighlight(0);
  _heroPaintHighlight(1 % Math.max(1, hls0.length), 'back');
  _heroUpdateDots('hero-ed-dots', HERO.editions.length, 0, 'heroGoEdition');
  _heroUpdateDots('hero-hl-dots', hls0.length, 0, 'heroGoHighlight');

  if (window.matchMedia('(prefers-reduced-motion:reduce)').matches) return;

  HERO.edTimer = setInterval(() => {
    if (HERO.paused) return;
    HERO.edIdx = (HERO.edIdx+1) % HERO.editions.length;
    HERO.hlIdx = 0;
    const nextEd = (HERO.edIdx+1) % HERO.editions.length;
    const hlsCur = _heroEdHighlights(HERO.edIdx);
    _heroSwap('hero-ed-front', () => {
      _heroPaintEdition(HERO.edIdx);
      _heroPaintEdition(nextEd, 'back');
      _heroUpdateDots('hero-ed-dots', HERO.editions.length, HERO.edIdx, 'heroGoEdition');
    });
    _heroSwap('hero-hl-front', () => {
      _heroPaintHighlight(0);
      _heroPaintHighlight(1 % Math.max(1, hlsCur.length), 'back');
      _heroUpdateDots('hero-hl-dots', hlsCur.length, 0, 'heroGoHighlight');
    });
  }, 12000);

  HERO.hlTimer = setInterval(() => {
    if (HERO.paused) return;
    const hls = _heroEdHighlights(HERO.edIdx);
    if (hls.length < 2) return;
    HERO.hlIdx = (HERO.hlIdx+1) % hls.length;
    _heroSwap('hero-hl-front', () => {
      _heroPaintHighlight(HERO.hlIdx);
      _heroPaintHighlight((HERO.hlIdx+1) % hls.length, 'back');
      _heroUpdateDots('hero-hl-dots', hls.length, HERO.hlIdx, 'heroGoHighlight');
    });
  }, 4000);

  const edDeck = document.getElementById('hero-ed-deck');
  const hlDeck = document.getElementById('hero-hl-deck');
  [edDeck, hlDeck].forEach(d => {
    if (!d) return;
    d.addEventListener('mouseenter', () => HERO.paused = true);
    d.addEventListener('mouseleave', () => HERO.paused = false);
  });

  const edFront = document.getElementById('hero-ed-front');
  if (edFront) {
    edFront.addEventListener('click', ev => {
      if (ev.target.closest('.hero-deck-dot')) return;
      const ed = HERO.editions[HERO.edIdx];
      if (ed) nav('/day/' + ed.date);
    });
    edFront.addEventListener('keydown', ev => {
      if (ev.key==='ArrowRight'){ev.preventDefault();heroGoEdition((HERO.edIdx+1)%HERO.editions.length);}
      if (ev.key==='ArrowLeft') {ev.preventDefault();heroGoEdition((HERO.edIdx-1+HERO.editions.length)%HERO.editions.length);}
      if (ev.key==='Enter'||ev.key===' '){ev.preventDefault();nav('/day/'+HERO.editions[HERO.edIdx].date);}
    });
  }

  const hlFront = document.getElementById('hero-hl-front');
  if (hlFront) {
    hlFront.addEventListener('click', ev => {
      if (ev.target.closest('.hero-deck-dot')) return;
      const hl = _heroEdHighlights(HERO.edIdx)[HERO.hlIdx];
      if (hl?.url) window.open(hl.url, '_blank', 'noopener');
    });
    hlFront.addEventListener('keydown', ev => {
      const hls = _heroEdHighlights(HERO.edIdx);
      if (ev.key==='ArrowRight'){ev.preventDefault();heroGoHighlight((HERO.hlIdx+1)%hls.length);}
      if (ev.key==='ArrowLeft') {ev.preventDefault();heroGoHighlight((HERO.hlIdx-1+hls.length)%hls.length);}
      if (ev.key==='Enter'||ev.key===' '){ev.preventDefault();const hl=hls[HERO.hlIdx];if(hl?.url)window.open(hl.url,'_blank','noopener');}
    });
  }
}

/* ====================================================
   HOME CUBE SWIPER
   ==================================================== */
function initHomeCube() {
  const el = document.getElementById('home-cube');
  if (!el || typeof Swiper === 'undefined') return;

  // Mede o slide mais alto e equaliza — Swiper cube exige altura uniforme
  const slides = el.querySelectorAll('.swiper-slide');
  let maxH = 0;
  slides.forEach(s => { maxH = Math.max(maxH, s.scrollHeight); });
  if (maxH > 0) el.style.height = maxH + 'px';

  const sw = new Swiper(el, {
    effect: 'cube',
    grabCursor: true,
    loop: true,
    speed: 900,
    allowTouchMove: true,
    touchStartPreventDefault: false,
    simulateTouch: true,
    touchEventsTarget: 'container',
    cubeEffect: {
      shadow: false,
      slideShadows: true,
      shadowOffset: 10,
      shadowScale: 0.94,
    },
    autoplay: {
      delay: 5500,
      pauseOnMouseEnter: false,
      disableOnInteraction: false,
    },
    pagination: {
      el: el.querySelector('.swiper-pagination'),
      clickable: true,
    },
    on: {
      // Após qualquer interação (drag/touch/click), garante que o autoplay e o touch continuem ativos
      slideChangeTransitionEnd(s) {
        if (s.autoplay && !s.autoplay.running) s.autoplay.start();
        s.allowTouchMove = true;
      },
      touchEnd(s) {
        // Re-arma autoplay e touch após cada drag
        s.allowTouchMove = true;
        if (s.autoplay && !s.autoplay.running) s.autoplay.start();
      },
      transitionEnd(s) {
        s.allowTouchMove = true;
      },
    },
  });

  // Re-mede altura e atualiza Swiper ao redimensionar
  const _cubeResync = () => {
    el.style.height = '';
    let mh = 0;
    slides.forEach(s => { mh = Math.max(mh, s.scrollHeight); });
    if (mh > 0) el.style.height = mh + 'px';
    sw.update();
  };
  new ResizeObserver(_cubeResync).observe(el.parentElement || el);

  // Pausa só enquanto o mouse está dentro; resume ao sair (sem usar pauseOnMouseEnter, que tem bug com cube)
  el.addEventListener('mouseenter', () => sw.autoplay?.pause());
  el.addEventListener('mouseleave', () => sw.autoplay?.resume());

  el.addEventListener('click', e => {
    if (!sw.allowClick) return;
    const slide = e.target.closest('.swiper-slide[data-date]');
    if (slide) nav('/day/' + slide.dataset.date);
  });
}

/* ====================================================
   HERO HIGHLIGHTS ROTATOR
   ==================================================== */
function initHeroHighlights() {
  const el = document.getElementById('home-hl-swiper');
  if (!el || typeof Swiper === 'undefined') return;
  const slides = el.querySelectorAll('.swiper-slide');
  if (slides.length < 2) return;

  const measure = () => {
    el.style.height = '';
    let mh = 0;
    slides.forEach(s => { mh = Math.max(mh, s.scrollHeight); });
    if (mh > 0) el.style.height = mh + 'px';
  };
  measure();

  const sw = new Swiper(el, {
    effect: 'cube',
    direction: 'vertical',
    loop: true,
    speed: 900,
    allowTouchMove: false,
    cubeEffect: { shadow: false, slideShadows: false },
    autoplay: { delay: 7500, disableOnInteraction: false },
  });

  el.addEventListener('mouseenter', () => sw.autoplay?.pause());
  el.addEventListener('mouseleave', () => sw.autoplay?.resume());

  new ResizeObserver(() => { measure(); sw.update(); })
    .observe(el.parentElement || el);
}

          : '';
        const badgeIcon = paths
          ? `<svg viewBox="0 0 24 24" width="10" height="10" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;opacity:.7">${paths}</svg>`
          : '';
        const badge = `<span class="cube-hl-cat-text" style="color:${color}">${badgeIcon}${e(h.category_label || h.category)}</span>`;
        return `<div class="cube-hl-row" style="--cat-color:${color}">
          <div class="cube-hl-body">
            ${badge}
            <span class="cube-hl-text">${e(h.headline)}</span>
          </div>
          <div class="cube-hl-wrap">${fallbackSvg}<img class="cube-hl-img" src="${h.image || ''}" alt="" onerror="this.style.opacity=0"></div>
        </div>`;
      }).join('')
    }</div>` : '';
    return `<div class="swiper-slide${ed.date === todayStr ? ' is-today' : ''}" data-date="${ed.date}" role="button" tabindex="0" aria-label="Edição ${num}: ${e(headline)}">
      <span class="cube-num"><span class="cube-wm-csr">CSR</span><span class="cube-wm-news">NEWS</span></span>
      <span class="cube-kicker${ed.date === todayStr ? ' is-today' : ''}">${FULL_WKD[dt.getDay()]}, ${dt.getDate()} de ${FULL_MON[dt.getMonth()]} de ${dt.getFullYear()}</span>
      <h3 class="cube-headline">${e(headline)}</h3>
      <p class="cube-sum">${e(ed.summary || '')}</p>
      ${hlsHtml}
      <div class="cube-foot">
        <span class="cube-chip">${ICO_NEWS} ${totalNews}<span class="cube-chip-sep">·</span>${ICO_TOOL} ${totalTools}</span>
        <span class="cube-foot-cta"><span class="cube-foot-cta-text">Ver edição</span> →</span>
      </div>
    </div>`;
  }).join('');

  // Edição mais recente — card estático (mesmo visual do cubo)
  const allEds = STATE.editions?.editions || [];
  const latestEd = allEds[0];
  const latestDate = latestEd?.date || todayStr;
  const latestHeadline = latestEd ? (STATE.days[latestEd.date]?.hero_description || STATE.days[latestEd.date]?.hero_title || latestEd.summary || '') : '';
  const latestDt = new Date(latestDate + 'T00:00:00');
  const latestTotalNews = Object.values(latestEd?.counts_by_category||{}).reduce((a,b)=>a+b,0);
  const latestTotalTools = Object.keys(latestEd?.counts_by_tool||{}).length;
  const isToday = latestDate === todayStr;
  const latestKicker = `${FULL_WKD[latestDt.getDay()]}, ${latestDt.getDate()} de ${FULL_MON[latestDt.getMonth()]} de ${latestDt.getFullYear()}`;
  const latestNum = String(1).padStart(2,'0');
  const latestHls = (STATE.days[latestDate]?.highlights || []).slice(0,3);
  const latestHlsHtml = latestHls.length ? `<div class="cube-hl-rotator"><div class="swiper home-hl-swiper" id="home-hl-swiper"><div class="swiper-wrapper">${
    latestHls.map(h => {
      const paths = CAT_SVGS[h.category]||'';
      const color = CAT_COLORS[h.category]||'#888';
      const fbSvg = paths ? `<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="${color}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${paths}</svg>` : '';
      const bdgIco = paths ? `<svg viewBox="0 0 24 24" width="10" height="10" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;opacity:.7">${paths}</svg>` : '';
      const badge = `<span class="cube-hl-cat-text" style="color:${color}">${bdgIco}${e(h.category_label||h.category)}</span>`;
      return `<div class="swiper-slide" style="--cat-color:${color}"><div class="cube-hl-row">
        <div class="cube-hl-body">${badge}<span class="cube-hl-text">${e(h.headline)}</span><span class="cube-hl-summary">${e(h.summary||'')}</span></div>
        <div class="cube-hl-wrap">${fbSvg}<img class="cube-hl-img" src="${h.image||''}" alt="" onerror="this.style.opacity=0"></div>
      </div></div>`;
    }).join('')
  }</div></div></div>` : '';

  return `<div class="home-hero">
    <div class="hero-grid" data-stagger>
      <div class="hero-cube-cell" data-stagger>
        <div class="swiper home-cube-swiper" id="home-cube">
          <div class="swiper-wrapper">${cubeSlides}</div>
          <div class="swiper-pagination"></div>
        </div>
      </div>
      <div class="hero-aside" data-stagger>
        <div class="home-cube-swiper hero-cube-static">
          <div class="swiper-slide${isToday?' is-today':''}" onclick="nav('/day/${latestDate}')">
            <img class="cube-mascote-sentado" src="data/img/mascote-sentado.png" alt="" onerror="this.style.display='none'">
            <span class="cube-num"><span class="cube-wm-csr">CSR</span><span class="cube-wm-news">NEWS</span></span>
            <span class="cube-kicker${isToday?' is-today':''}">${latestKicker}</span>
            <h3 class="cube-headline">${e(latestEd?.summary||'')}</h3>
            <p class="cube-sum">${e(latestHeadline)}</p>
            ${latestHlsHtml}
            <div class="cube-foot">
              <span class="cube-chip">${ICO_NEWS} ${latestTotalNews}<span class="cube-chip-sep">·</span>${ICO_TOOL} ${latestTotalTools}</span>
              <span class="cube-foot-cta"><span class="cube-foot-cta-text">Ver edição</span> →</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  ${_homeSections()}`;
}

/* ── Helper: seções abaixo do hero ── */
function _homeSections() {
  const eds = STATE.editions?.editions || [];
  if (!eds.length) return '';

  // Edições recentes (a partir da 4ª, já que as 3 primeiras estão no cube)
  const moreEds = eds.slice(3, 11);
  let recentsHtml = '';
  if (moreEds.length) {
    recentsHtml = `
    <section class="home-section" data-stagger>
      <div class="home-sect-kicker">Arquivo</div>
      <h2 class="home-sect-title">Edições anteriores</h2>
      <div class="editions-grid">
        ${moreEds.map((ed, i) => {
          const dt = new Date(ed.date + 'T00:00:00');
          const dd = String(dt.getDate()).padStart(2,'0');
          const mm = String(dt.getMonth()+1).padStart(2,'0');
          const num = String(eds.length - eds.indexOf(ed)).padStart(2,'0');
          const wkd = ['DOM','SEG','TER','QUA','QUI','SEX','SÁB'][dt.getDay()];
          const totalN = Object.values(ed.counts_by_category||{}).reduce((a,b)=>a+b,0);
          const totalT = Object.keys(ed.counts_by_tool||{}).length;
          const headline = STATE.days[ed.date]?.hero_title || ed.summary || ed.date;
          // Top 3 cats por contagem
          const topCats = Object.entries(ed.counts_by_category||{})
            .sort((a,b)=>b[1]-a[1]).slice(0,3);
          const catChips = topCats.map(([c,n]) => {
            const color = CAT_COLORS[c]||'#888';
            return `<span class="ed-cat-chip" style="background:color-mix(in srgb,${color} 14%,transparent);color:${color}">${e(CAT_LABELS[c]||c)} <b>${n}</b></span>`;
          }).join('');
          return `<div class="edition-card" data-stagger onclick="nav('/day/${ed.date}')">
            <div class="ec-top">
              <span class="ec-num">Nº ${num}</span>
              <span class="ec-date">${wkd} · ${dd}.${mm}</span>
            </div>
            <div class="ec-title">${e(headline)}</div>
            ${catChips ? `<div class="ec-cats">${catChips}</div>` : ''}
            <div class="ec-foot">
              <span class="ec-stat-item">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                ${totalN}
              </span>
              <span class="ec-stat-item">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
                ${totalT}
              </span>
              <span class="ec-cta">Ver <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg></span>
            </div>
          </div>`;
        }).join('')}
      </div>
    </section>`;
  }

  // Top categorias (acumulado de todas as edições)
  const catTotals = {};
  eds.forEach(ed => {
    Object.entries(ed.counts_by_category||{}).forEach(([c,n]) => {
      catTotals[c] = (catTotals[c]||0) + n;
    });
  });
  const topCats = Object.entries(catTotals).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const maxCount = topCats[0]?.[1] || 1;

  let catsHtml = '';
  if (topCats.length) {
    catsHtml = `
    <section class="home-section" data-stagger>
      <div class="home-sect-kicker">Cobertura</div>
      <h2 class="home-sect-title">Categorias mais ativas</h2>
      <div class="cat-bars">
        ${topCats.map(([c,n]) => {
          const color = CAT_COLORS[c]||'#888';
          const pct = Math.round((n/maxCount)*100);
          const lbl = CAT_LABELS[c]||c;
          return `<button class="cat-bar" data-stagger onclick="nav('/cat/${c}')" style="--cb-color:${color}">
            <div class="cb-row">
              <span class="cb-name">${catIcon(c,'📌',14,true)} ${e(lbl)}</span>
              <span class="cb-count">${n} notícias</span>
            </div>
            <div class="cb-track"><div class="cb-fill" style="width:${pct}%;background:linear-gradient(90deg,${color},${color}99)"></div></div>
          </button>`;
        }).join('')}
      </div>
    </section>`;
  }

  return recentsHtml + catsHtml;
}

/* ====================================================
   DAY VIEW
   ==================================================== */
function renderDay(date) {
  const day = STATE.days[date];
  if (!day) return renderDayNotFound(date);

  const totalNews = (day.news||[]).length;
  const totalTools = (day.tools||[]).length;
  const totalCats = new Set((day.news||[]).map(n=>n.category)).size;
  const dates = sortedDates();
  const idx = dates.indexOf(date);
  const prev = dates[idx+1];
  const next = dates[idx-1];
  const eds = STATE.editions?.editions || [];
  const edNum = eds.length - eds.findIndex(e=>e.date===date);
  const dt = new Date(date+'T00:00:00');
  const wkd = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'][dt.getDay()];

  let h = `<div class="day-header" data-stagger>
    <div class="day-eyebrow">
      <span class="day-eyebrow-num">Nº ${String(edNum).padStart(2,'0')}</span>
      <span class="day-eyebrow-sep">·</span>
      <span class="day-eyebrow-date">${e(day.formatted_date)}</span>
    </div>
    <h1 class="day-hero-title">${e(day.hero_title||'Edição do dia')}</h1>
    ${day.hero_description ? `<p class="day-hero-desc">${e(day.hero_description)}</p>` : ''}
    <div class="day-stats">
      <div class="day-stat"><span class="day-stat-n">${totalNews}</span><span class="day-stat-l">notícias</span></div>
      <div class="day-stat"><span class="day-stat-n">${totalCats}</span><span class="day-stat-l">categorias</span></div>
      <div class="day-stat"><span class="day-stat-n">${totalTools}</span><span class="day-stat-l">tools/releases</span></div>
      ${day.highlights?.length?`<div class="day-stat"><span class="day-stat-n">${day.highlights.length}</span><span class="day-stat-l">destaques</span></div>`:''}
    </div>
  </div>
  <div class="day-content">`;

  // Highlights
  if (day.highlights?.length) {
    h += `<div class="sect-kicker">Em destaque hoje</div>
    <h2 class="sect-title">✨ Destaques <span class="sect-count">${day.highlights.length}</span></h2>
    <div class="hl-grid">`;
    for (const item of day.highlights) {
      const cc = CAT_COLORS[item.category]||'#888';
      h += `<div class="hl-card" data-stagger onclick="window.open('${item.url}','_blank')">
        <div class="hl-card-top">
          <img class="hl-favicon" src="${item.image}" onerror="this.style.display='none'" alt="">
          <span class="cat-chip" style="--cc:${cc}">${item.category_icon||''} ${e(item.category_label||item.category)}</span>
          ${item.urgent?'<span class="badge badge-u">Urgente</span>':''}
        </div>
        <div class="hl-title">${e(item.headline)}</div>
        <div class="hl-summary">${e(item.summary||'')}</div>
        <div class="hl-footer">
          <span>${e(item.source||'')}</span>
          ${item.read_time?`<span>· ${item.read_time} min</span>`:''}
        </div>
      </div>`;
    }
    h += `</div>`;
  }

  // News by category
  const bycat = {};
  for (const n of (day.news||[])) {
    (bycat[n.category]||(bycat[n.category]=[])).push(n);
  }
  const catOrder = Object.keys(CAT_COLORS);
  const sortedCats = Object.keys(bycat).sort((a,b)=>{
    const ia=catOrder.indexOf(a), ib=catOrder.indexOf(b);
    return (ia<0?99:ia)-(ib<0?99:ib);
  });

  h += `<div class="sect-kicker">Por categoria</div><h2 class="sect-title" style="margin-top:8px">📰 Tudo do dia</h2>`;

  for (const cat of sortedCats) {
    const items = bycat[cat].sort((a,b)=>(b.urgent?1:0)-(a.urgent?1:0)||new Date(b.published_at||b._date)-new Date(a.published_at||a._date));
    const color = CAT_COLORS[cat]||'#888';
    const fi = items[0];
    h += `<div class="cat-group" data-stagger style="--cc:${color}">
      <div class="cat-group-hdr">
        ${catIcon(cat,fi.category_icon||'📌',16)}
        <div>
          <div class="cg-name" onclick="nav('/cat/${cat}')">${e(fi.category_label||cat)}</div>
          <div class="cg-count">${items.length} ${items.length===1?'item':'itens'}</div>
        </div>
      </div>`;
    for (const item of items) h += newsCard(item, color);
    h += `</div>`;
  }

  // Tools
  if (day.tools?.length) {
    h += `<div class="sect-kicker" style="margin-top:40px">Releases & lançamentos</div>
    <h2 class="sect-title" style="margin-top:8px">🔧 Ferramentas & Linguagens <span class="sect-count">${day.tools.length}</span></h2>
    <div class="tools-grid">`;
    for (const t of day.tools) {
      const color = TOOL_COLORS[t.tool_key]||'#888';
      const isL = LANGS.includes(t.tool_key);
      const tgt = isL ? `/lang/${t.tool_key}` : `/tool/${t.tool_key}`;
      h += `<div class="tool-card" data-stagger style="--tc:${color}" onclick="nav('${tgt}')">
        <div class="tc-icon" style="--tc:${color}">${toolIcon(t.tool_key,22)}</div>
        <div class="tc-body">
          <div class="tc-name">${e(t.name)}</div>
          <div class="tc-ver">${t.version?e(t.version)+' · ':''}${t.kind==='release'?'🚀 Release':'📰 News'}</div>
          <div class="tc-hl">${e(t.headline||'')}</div>
        </div>
      </div>`;
    }
    h += `</div>`;
  }

  // Day nav (cards)
  const prevDay = prev ? STATE.days[prev] : null;
  const nextDay = next ? STATE.days[next] : null;
  const prevNum = prev ? eds.length - eds.findIndex(e=>e.date===prev) : 0;
  const nextNum = next ? eds.length - eds.findIndex(e=>e.date===next) : 0;
  const fmtShort = d => {
    if (!d) return '';
    const dd = new Date(d+'T00:00:00');
    return ['DOM','SEG','TER','QUA','QUI','SEX','SÁB'][dd.getDay()] + ' ' + String(dd.getDate()).padStart(2,'0') + '.' + String(dd.getMonth()+1).padStart(2,'0');
  };
  h += `<div class="day-nav-cards" data-stagger>
    ${prev?`<button class="day-nav-card prev" onclick="nav('/day/${prev}')">
      <span class="dnc-arr">←</span>
      <div class="dnc-body">
        <div class="dnc-meta">Nº ${String(prevNum).padStart(2,'0')} · ${fmtShort(prev)}</div>
        <div class="dnc-title">${e(prevDay?.hero_title||'Edição anterior')}</div>
      </div>
    </button>`:'<span></span>'}
    ${next?`<button class="day-nav-card next" onclick="nav('/day/${next}')">
      <div class="dnc-body">
        <div class="dnc-meta">Nº ${String(nextNum).padStart(2,'0')} · ${fmtShort(next)}</div>
        <div class="dnc-title">${e(nextDay?.hero_title||'Próxima edição')}</div>
      </div>
      <span class="dnc-arr">→</span>
    </button>`:'<span></span>'}
  </div>`;

  h += `</div>`; // .day-content
  return h;
}

/* ====================================================
   CATEGORY PAGE
   ==================================================== */
function renderCat(slug) {
  const isKnown = !!CAT_LABELS[slug];
  const info    = getCatInfo(slug);
  const color   = CAT_COLORS[slug] || '#888';
  const items   = getAllNews(n => n.category === slug);

  if (!items.length) {
    if (!isKnown) return _entityPage(
      _unknownIcon(),
      `"${e(slug)}" não encontrado`,
      'Esta categoria não existe no CSR News.',
      _suggestCats(slug)
    );
    return _entityPage(
      catIcon(slug, info.icon, 40),
      'Nenhum conteúdo ainda',
      `Ainda não há notícias em <strong>${e(info.label)}</strong> nas edições carregadas.`
    );
  }

  // Top tools nessa categoria
  const toolCount = {};
  items.forEach(it => (it.tags||[]).forEach(t => {
    const k = t.toLowerCase();
    if (TOOL_NAMES[k]) toolCount[k] = (toolCount[k]||0)+1;
  }));
  const topTools = Object.entries(toolCount).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const dateSet = new Set(items.map(i=>i._date));

  let h = `<div class="ent-hero" data-stagger style="--tc:${color}">
    <div class="ent-hero-bg"></div>
    <div class="ent-hero-content">
      <div class="ent-hero-eyebrow">
        <span class="ent-hero-pill">CATEGORIA</span>
        <span class="ent-hero-sep">·</span>
        <span>${items.length} ${items.length===1?'notícia':'notícias'}</span>
        <span class="ent-hero-sep">·</span>
        <span>${dateSet.size} ${dateSet.size===1?'edição':'edições'}</span>
      </div>
      <div class="ent-hero-row">
        <div class="ent-hero-icon">${catIcon(slug,info.icon,42)}</div>
        <h1 class="ent-hero-name">${e(info.label)}</h1>
      </div>
      ${info.description ? `<p class="ent-hero-desc">${e(info.description)}</p>` : ''}
      ${topTools.length ? `<div class="ent-hero-tools">
        <span class="ent-hero-tools-lbl">Ferramentas em destaque</span>
        ${topTools.map(([t,n])=>{
          const tc = TOOL_COLORS[t]||'#888';
          const isL = LANGS.includes(t);
          return `<button class="ent-tool-chip" style="--tc:${tc}" onclick="event.stopPropagation();nav('${isL?'/lang':'/tool'}/${t}')">
            ${toolIcon(t,14)} <span>${e(getToolName(t))}</span> <b>${n}</b>
          </button>`;
        }).join('')}
      </div>` : ''}
    </div>
  </div>`;

  return h + _groupedTimeline(items, color);
}

/* ====================================================
   LANGUAGE / TOOL PAGE
   ==================================================== */
function renderEntity(slug, kind) {
  const isKnown  = !!TOOL_NAMES[slug];
  const color    = TOOL_COLORS[slug] || '#888';
  const name     = getToolName(slug);
  const items    = getAllToolItems(slug);
  const kindLabel = kind === 'lang' ? 'LINGUAGEM' : 'FERRAMENTA';

  if (!items.length) {
    if (!isKnown) return _entityPage(
      _unknownIcon(),
      `"${e(slug)}" não encontrado`,
      `Esta ${kind==='lang'?'linguagem':'ferramenta'} não existe no CSR News.`,
      _suggestEntities(slug, kind)
    );
    return _entityPage(
      toolIcon(slug, 40),
      'Nenhum conteúdo ainda',
      `Ainda não há entradas sobre <strong>${e(name)}</strong> nas edições carregadas.`
    );
  }

  // Última versão (release)
  const releases = items.filter(i => i.kind === 'release' || i.version);
  const latestVersion = releases[0]?.version;
  // Categorias relacionadas
  const catCount = {};
  items.forEach(it => (it.categories||[it.category]).forEach(c => {
    if (c && CAT_LABELS[c]) catCount[c] = (catCount[c]||0)+1;
  }));
  const topCats = Object.entries(catCount).sort((a,b)=>b[1]-a[1]).slice(0,4);
  const dateSet = new Set(items.map(i=>i._date));

  let h = `<div class="ent-hero" data-stagger style="--tc:${color}">
    <div class="ent-hero-bg"></div>
    <div class="ent-hero-content">
      <div class="ent-hero-eyebrow">
        <span class="ent-hero-pill">${kindLabel}</span>
        <span class="ent-hero-sep">·</span>
        <span>${items.length} ${items.length===1?'entrada':'entradas'}</span>
        ${releases.length?`<span class="ent-hero-sep">·</span><span>${releases.length} release${releases.length===1?'':'s'}</span>`:''}
        <span class="ent-hero-sep">·</span>
        <span>${dateSet.size} ${dateSet.size===1?'edição':'edições'}</span>
      </div>
      <div class="ent-hero-row">
        <div class="ent-hero-icon big">${toolIcon(slug,52)}</div>
        <div class="ent-hero-name-block">
          <h1 class="ent-hero-name">${e(name)}</h1>
          ${latestVersion?`<span class="ent-hero-version">Última versão: <b>${e(latestVersion)}</b></span>`:''}
        </div>
      </div>
      ${topCats.length ? `<div class="ent-hero-tools">
        <span class="ent-hero-tools-lbl">Em categorias</span>
        ${topCats.map(([c,n])=>{
          const cc = CAT_COLORS[c]||'#888';
          return `<button class="ent-tool-chip" style="--tc:${cc}" onclick="event.stopPropagation();nav('/cat/${c}')">
            ${catIcon(c,'📌',14,true)} <span>${e(CAT_LABELS[c]||c)}</span> <b>${n}</b>
          </button>`;
        }).join('')}
      </div>` : ''}
    </div>
  </div>`;

  // Releases em destaque (apenas para tools com 2+ releases)
  if (kind === 'tool' && releases.length >= 2) {
    h += `<div class="rel-section" data-stagger>
      <div class="home-sect-kicker">Histórico</div>
      <h2 class="rel-section-title">Releases recentes</h2>
      <div class="rel-grid">
        ${releases.slice(0,6).map(r=>{
          const d = new Date((r.published_at||r._date+'T12:00:00').replace('Z',''));
          const dd = String(d.getDate()).padStart(2,'0');
          const mm = MONTHS_SHORT[d.getMonth()];
          return `<div class="rel-card" style="--tc:${color}">
            <div class="rel-card-ver">${e(r.version||'release')}</div>
            <div class="rel-card-date">${dd} ${mm}</div>
            <div class="rel-card-title">${e(r.headline)}</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  return h + _groupedTimeline(items, color);
}

/* ── Helper: timeline agrupada por data ── */
function _groupedTimeline(items, color) {
  // Group by _date desc (já vem ordenado de getAllNews/getAllToolItems)
  const groups = {};
  for (const it of items) {
    (groups[it._date]||(groups[it._date]=[])).push(it);
  }
  const dates = Object.keys(groups).sort((a,b)=>b.localeCompare(a));
  let h = `<div class="tl-list-grouped">`;
  for (const date of dates) {
    const d = new Date(date+'T00:00:00');
    const wkd = ['DOM','SEG','TER','QUA','QUI','SEX','SÁB'][d.getDay()];
    const dd = String(d.getDate()).padStart(2,'0');
    const mm = MONTHS_SHORT[d.getMonth()];
    const yy = d.getFullYear();
    h += `<div class="tl-date-hdr" data-stagger>
      <button class="tl-date-link" onclick="nav('/day/${date}')">
        <span class="tl-dh-num">${dd}</span>
        <span class="tl-dh-mon">${mm}</span>
        <span class="tl-dh-meta"><span class="tl-dh-wkd">${wkd} · ${yy}</span><span class="tl-dh-count">${groups[date].length} ${groups[date].length===1?'item':'itens'}</span></span>
        <span class="tl-dh-arr">→</span>
      </button>
    </div>
    <div class="tl-day-items">`;
    for (const item of groups[date]) h += tlItemSimple(item, color);
    h += `</div>`;
  }
  return h + `</div>`;
}

/* ── Helpers de sugestão para 404 ── */
function _suggestCats(slug) {
  const norm = slug.toLowerCase();
  let matches = Object.entries(CAT_LABELS)
    .filter(([k,v]) => k.includes(norm) || v.toLowerCase().includes(norm) || norm.includes(k))
    .slice(0,4);
  // Fallback: top-4 categorias mais ativas
  if (!matches.length) {
    const eds = STATE.editions?.editions || [];
    const totals = {};
    eds.forEach(ed => Object.entries(ed.counts_by_category||{}).forEach(([c,n])=>{
      if (CAT_LABELS[c]) totals[c]=(totals[c]||0)+n;
    }));
    matches = Object.entries(totals).sort((a,b)=>b[1]-a[1]).slice(0,4)
      .map(([k])=>[k, CAT_LABELS[k]]);
  }
  if (!matches.length) return `<button class="day-nf-btn primary" onclick="nav('/home')">Início</button>`;
  return `<div class="nf-sugg-lbl">Categorias disponíveis</div>
  <div class="nf-sugg-grid">
    ${matches.map(([k,v])=>{
      const c = CAT_COLORS[k]||'#888';
      return `<button class="nf-sugg-chip" style="--tc:${c}" onclick="nav('/cat/${k}')">${catIcon(k,'📌',14,true)} ${e(v)}</button>`;
    }).join('')}
  </div>
  <button class="day-nf-btn primary" onclick="nav('/home')" style="margin-top:8px">Início</button>`;
}

function _suggestEntities(slug, kind) {
  const norm = slug.toLowerCase();
  const pool = kind==='lang' ? LANGS : Object.keys(TOOL_NAMES).filter(k=>!LANGS.includes(k));
  let matches = pool
    .filter(k => k.includes(norm) || (TOOL_NAMES[k]||'').toLowerCase().includes(norm) || norm.includes(k))
    .slice(0,4);
  // Fallback: top-4 mais citadas
  if (!matches.length) {
    const eds = STATE.editions?.editions || [];
    const totals = {};
    eds.forEach(ed => Object.entries(ed.counts_by_tool||{}).forEach(([t,n])=>{
      if (pool.includes(t)) totals[t]=(totals[t]||0)+n;
    }));
    matches = Object.entries(totals).sort((a,b)=>b[1]-a[1]).slice(0,4).map(([k])=>k);
    if (!matches.length) matches = pool.slice(0,4);
  }
  if (!matches.length) return `<button class="day-nf-btn primary" onclick="nav('/home')">Início</button>`;
  const lbl = kind==='lang' ? 'Linguagens disponíveis' : 'Ferramentas disponíveis';
  return `<div class="nf-sugg-lbl">${lbl}</div>
  <div class="nf-sugg-grid">
    ${matches.map(k=>{
      const c = TOOL_COLORS[k]||'#888';
      return `<button class="nf-sugg-chip" style="--tc:${c}" onclick="nav('/${kind}/${k}')">${toolIcon(k,14)} ${e(getToolName(k))}</button>`;
    }).join('')}
  </div>
  <button class="day-nf-btn primary" onclick="nav('/home')" style="margin-top:8px">Início</button>`;
}

function renderDayNotFound(date) {
  let fmtDate = date;
  try {
    const [y, m, d] = date.split('-').map(Number);
    const wd = WEEKDAYS_PT_SHORT[new Date(y, m-1, d).getDay()];
    const mn = MONTHS_PT[m-1].toLowerCase();
    fmtDate = `${wd}, ${d} de ${mn} de ${y}`;
  } catch(_) {}
  const latest = sortedDates()[0];
  const isToday = date === getTodayStr();
  const title  = isToday ? 'Nenhuma edição hoje' : 'Nenhuma edição neste dia';
  const sub    = isToday
    ? 'Ainda não há edição do CSR News publicada para hoje.'
    : 'Não há edição do CSR News publicada nesta data.';

  // Card da última edição como sugestão
  let nearestCard = '';
  if (latest && latest !== date) {
    const ld = STATE.days[latest];
    const dt = new Date(latest+'T00:00:00');
    const wkd = ['DOM','SEG','TER','QUA','QUI','SEX','SÁB'][dt.getDay()];
    const dd = String(dt.getDate()).padStart(2,'0');
    const mm = String(dt.getMonth()+1).padStart(2,'0');
    const eds = STATE.editions?.editions || [];
    const num = String(eds.length - eds.findIndex(x=>x.date===latest)).padStart(2,'0');

      <div class="nf-sc-lbl">EDIÇÃO MAIS RECENTE</div>

      <div class="nf-sc-title">${e(ld?.hero_title||'Ver edição')}</div>

  }

  return `<div class="day-nf">
    <img class="day-nf-mascot" src="data/img/mascote-clean.png" alt="" onerror="this.style.display='none'">

}

function e(s) {

  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ====================================================
   MAIN RENDER
   ==================================================== */
function renderAll({ preserveScroll = false } = {}) {
  const {view, slug} = _state;
  document.body.dataset.view = view;

  // Quote context
  let newRel = null;
  if (view==='cat') newRel = `cat:${slug}`;
  else if (view==='lang'||view==='tool') newRel = `tool:${slug}`;
  _quoteRel = newRel;

  // Sync calendar selection
  if (view==='day' && slug) {
    const d = new Date(slug);
    _calYear = d.getFullYear();
    _calMonth = d.getMonth();
  }

  renderSidebar();
  renderCalBar();
  renderCalendar();
  renderQuote();
  renderNavToday();

  // Nav active
  document.querySelectorAll('.nav-link').forEach(el=>el.classList.remove('active'));
  if (view==='home') document.querySelector('[data-v="home"]')?.classList.add('active');

  // Build content
  let content;
  if (!STATE.ready.editions) {
    content = view === 'day' ? daySkeleton() : homeSkeleton();
  } else {
    switch(view) {
      case 'home': content = STATE.ready.currentDay ? renderHome() : homeSkeleton(); break;
      case 'day':  content = STATE.days[slug] ? renderDay(slug) : STATE.notFound.has(slug) ? renderDayNotFound(slug) : daySkeleton(); break;
      case 'cat':  content = renderCat(slug); break;
      case 'lang': content = renderEntity(slug,'lang'); break;
      case 'tool': content = renderEntity(slug,'tool'); break;
      default:     content = STATE.ready.currentDay ? renderHome() : homeSkeleton();
    }
  }

  const main = document.getElementById('main');
  const hadContent = main && main.innerHTML.trim().length > 0;

  const savedScroll = window.scrollY;
  const applyContent = () => {
    if (!main) return;
    main.classList.remove('route-exit');
    main.innerHTML = content;
    if (preserveScroll) window.scrollTo({top: savedScroll, behavior:'auto'});
    else window.scrollTo({top:0, behavior:'auto'});
    if (!preserveScroll) {
      let i = 0;
      main.querySelectorAll('[data-stagger]').forEach(el => {
        el.style.setProperty('--i', i++);
        el.classList.add('stagger-in');
      });
    }
    if (view === 'home' && STATE.ready.editions) initHeroRotation();
    if (view === 'home') { initHomeCube(); initHeroHighlights(); }
    if (view === 'home') requestAnimationFrame(() => requestAnimationFrame(initHomeFallBg));
  };

  if (hadContent && main && !preserveScroll) {
    // Exit animation só em navegação real, não em mudança de tema
    main.classList.add('route-exit');
    setTimeout(applyContent, 150);
  } else {
    applyContent();
  }
}

function _updateSidebarBtn(open) {

function toggleSidebar() {
  if (window.innerWidth <= 960) {
    const sl = document.getElementById('sidebar-left');
    const ov = document.getElementById('overlay');
    const opened = sl.classList.toggle('open');
    ov.classList.toggle('on', opened);
    document.body.classList.toggle('drawer-open', opened);
    _updateSidebarBtn(opened);
  } else {
    const collapsed = document.body.classList.toggle('sidebar-collapsed');
    _updateSidebarBtn(!collapsed);
  }
}

  document.getElementById('sidebar-left').classList.remove('open');
  document.getElementById('overlay').classList.remove('on');
  document.body.classList.remove('drawer-open');

}

/* ====================================================
   SIDEBAR TILE TOOLTIP
   ==================================================== */
(function() {
  const tip = document.getElementById('sb-tip');
  if (!tip) return;
  let activeEl = null;
  document.addEventListener('mouseover', e => {
    const el = e.target.closest('[data-tip]');
    if (!el) return;
    activeEl = el;
    tip.textContent = el.dataset.tip;
    const tc = el.dataset.tipColor;
    tip.style.borderColor = tc || 'var(--border)';
    tip.style.opacity = '1';
  });
  document.addEventListener('mousemove', e => {
    if (!activeEl || tip.style.opacity !== '1') return;
    const x = Math.min(e.clientX + 14, window.innerWidth - tip.offsetWidth - 8);
    const y = e.clientY - tip.offsetHeight - 10;
    tip.style.left = x + 'px';
    tip.style.top  = y + 'px';
  });
  document.addEventListener('mouseout', e => {
    if (e.target.closest('[data-tip]')) {
      tip.style.opacity = '0';
      tip.style.borderColor = 'var(--border)';
      activeEl = null;
    }
  });
})();

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
/* ====================================================
   SEARCH + SHORTCUTS + SCROLL PROGRESS
   ==================================================== */
let _searchSel = 0;
let _searchItems = [];

function openSearch() {
  const o = document.getElementById('search-overlay');
  o.classList.add('open');
  const input = document.getElementById('search-input');
  input.value = '';
  _searchSel = 0;
  renderSearchResults('');
  setTimeout(() => input.focus(), 50);
}
function closeSearch() {
  document.getElementById('search-overlay').classList.remove('open');
}
function openShortcuts() { document.getElementById('kbd-overlay').classList.add('open'); }
function closeShortcuts() { document.getElementById('kbd-overlay').classList.remove('open'); }

function _searchPool() {
  const items = [];
  // Edições
  (STATE.editions?.editions || []).forEach((ed, i) => {
    const num = String(i+1).padStart(2,'0');
    const headline = STATE.days[ed.date]?.hero_title || ed.summary || ed.date;
    items.push({
      type: 'Edição', label: `Nº ${num} — ${headline}`,
      meta: ed.date, icon: '📰', go: () => nav('/day/' + ed.date)
    });
  });
  // Ferramentas
  Object.keys(TOOL_NAMES || {}).forEach(k => {
    const url = (typeof toolImgUrl === 'function') ? toolImgUrl(k) : null;
    items.push({
      type: 'Ferramenta', label: TOOL_NAMES[k] || k,
      meta: k, iconUrl: url, icon: TOOL_EMOJI[k] || '🔧',
      go: () => nav('/tool/' + k)
    });
  });
  // Categorias
  Object.keys(CAT_COLORS || {}).forEach(c => {
    items.push({
      type: 'Categoria', label: CAT_LABELS[c] || c,
      meta: c, icon: '📁',
      go: () => nav('/cat/' + c)
    });
  });
  return items;
}

function renderSearchResults(q) {
  const all = _searchPool();
  const norm = (q||'').toLowerCase().trim();
  const filtered = norm
    ? all.filter(x => (x.label + ' ' + x.meta + ' ' + x.type).toLowerCase().includes(norm))
    : all.slice(0, 20);
  _searchItems = filtered;
  _searchSel = 0;
  const el = document.getElementById('search-results');
  if (!filtered.length) {
    el.innerHTML = `<div class="search-empty">Nada encontrado para "${q}"</div>`;
    return;
  }
  // Group by type
  const groups = {};
  filtered.forEach((x, i) => { (groups[x.type] = groups[x.type] || []).push({...x, _i: i}); });
  let h = '';
  for (const [type, arr] of Object.entries(groups)) {
    h += `<div class="search-group">${type}</div>`;
    arr.forEach(x => {
      const ico = x.iconUrl
        ? `<span class="search-item-icon"><img src="${x.iconUrl}" alt=""></span>`
        : `<span class="search-item-icon">${x.icon}</span>`;
      h += `<div class="search-item${x._i===0?' selected':''}" data-i="${x._i}" onclick="_searchPick(${x._i})">${ico}<span>${x.label}</span><span class="search-item-meta">${x.meta||''}</span></div>`;
    });
  }
  el.innerHTML = h;
}
function _searchPick(i) {
  const x = _searchItems[i];
  if (!x) return;
  closeSearch();
  setTimeout(() => x.go(), 50);
}
function _searchMove(dir) {
  if (!_searchItems.length) return;
  _searchSel = (_searchSel + dir + _searchItems.length) % _searchItems.length;
  document.querySelectorAll('.search-item').forEach(el => {
    el.classList.toggle('selected', Number(el.dataset.i) === _searchSel);
  });
  const sel = document.querySelector('.search-item.selected');
  if (sel) sel.scrollIntoView({block:'nearest'});
}

document.getElementById('search-input')?.addEventListener('input', e => renderSearchResults(e.target.value));
document.getElementById('search-input')?.addEventListener('keydown', e => {
  if (e.key === 'ArrowDown') { e.preventDefault(); _searchMove(1); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); _searchMove(-1); }
  else if (e.key === 'Enter') { e.preventDefault(); _searchPick(_searchSel); }
});

// Global keyboard shortcuts
document.addEventListener('keydown', e => {
  const tag = (e.target.tagName || '').toLowerCase();
  const inField = tag === 'input' || tag === 'textarea' || e.target.isContentEditable;

  if (e.key === 'Escape') {
    closeSearch(); closeShortcuts();
    return;
  }

  if ((e.ctrlKey || e.metaKey) && (e.key === 'b' || e.key === 'B')) {
    e.preventDefault();
    toggleSidebar();
    return;
  }

  if (inField) return;

  if (e.key === '/') { e.preventDefault(); openSearch(); }
  else if (e.key === '?') { e.preventDefault(); openShortcuts(); }
  else if (e.key === 't' || e.key === 'T') { e.preventDefault(); toggleTheme(); }
  else if (e.key === 'h' || e.key === 'H') { e.preventDefault(); goToToday(); }
  else if (e.key === 'j' || e.key === 'J') {
    e.preventDefault();
    if (_state.view === 'home' || _state.view === 'day') calStepDay(-1);
  }
  else if (e.key === 'k' || e.key === 'K') {
    e.preventDefault();
    if (_state.view === 'home' || _state.view === 'day') calStepDay(1);
  }
});

// Scroll progress
(function() {
  const bar = document.getElementById('scroll-progress');
  if (!bar) return;
  const update = () => {
    const h = document.documentElement;
    const max = h.scrollHeight - h.clientHeight;
    const pct = max > 0 ? (h.scrollTop / max) * 100 : 0;
    bar.style.width = pct + '%';
  };
  window.addEventListener('scroll', update, {passive:true});
  update();
})();

// Quote bar auto-collapse após 6s na home
(function() {
  let _autoCollapseDone = false;
  const orig = window.renderQuote;
  if (typeof orig === 'function') {
    window.renderQuote = function() {
      orig.apply(this, arguments);
      if (_state.view === 'home' && !_autoCollapseDone) {
        setTimeout(() => {
          if (_state.view === 'home' && typeof closeQuoteBar === 'function') {
            const host = document.getElementById('quote-bar-host');
            if (host && !host.classList.contains('closed') && !host.classList.contains('hidden')) {
              closeQuoteBar();
              _autoCollapseDone = true;
            }
          }
        }, 6000);
      }
    };
  }
})();

  let _fallShineIv = null;

  window.initHomeFallBg = function initHomeFallBg() {
    const stage = document.getElementById('fallStage');
    if (!stage) return;
    // Limpa ciclo anterior e tiles
    if (_fallShineIv) { clearInterval(_fallShineIv); _fallShineIv = null; }
    stage.innerHTML = '';
    spawnHomeFallTiles();
  };

  function spawnHomeFallTiles() {
    const stage   = document.getElementById('fallStage');
    const emerge  = document.getElementById('fallEmerge');
    if (!stage) return;
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

    // Monta lista e embaralha
    const subjects = [
      ...FT_LANGS.map(l => ({kind:'lang', src:l.logo, c:l.color, size:90, name:l.name})),
      ...FT_TOOLS.map(t => ({kind:'tool', src:t.logo, c:t.color, size:65, name:t.name, key:t.key})),
      ...FT_CATS.map(c  => ({kind:'cat',  svg:c.svg,  c:c.color, size:56, name:c.name})),
    ];
    for (let i = subjects.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [subjects[i], subjects[j]] = [subjects[j], subjects[i]];
    }

    const stageH = stage.clientHeight || (window.innerHeight - 48);
    const stageW = stage.clientWidth  || (window.innerWidth - 240);
    stage.style.setProperty('--stage-h', stageH + 'px');

    const rand = (a, b) => a + Math.random() * (b - a);
    const N       = 34;
    const COUNT   = Math.min(N, subjects.length);
    const BASE_DUR = 15;

    /* Posição do cubo girando em coordenadas relativas ao stage */
    function updateMask() {
      /* Fade no topo: tiles aparecem suavemente e somem no topo.
         O emerge overlay cuida do fade inferior. */
      const mask = 'linear-gradient(to bottom,transparent 0%,#000 10%,#000 100%)';
      stage.style.maskImage       = mask;
      stage.style.webkitMaskImage = mask;
    }

    function updateOverlay() {
      if (!emerge) return;
      /* Overlay no fundo: tiles emergem suavemente da base da tela. */
      emerge.style.bottom = '0';
      emerge.style.height = '160px';
    }

    /* ── Sistema de colunas (lanes) ── */
    const leftPct  = 5;
    const rightPct = 95;
    const availPx  = (rightPct - leftPct) / 100 * stageW;
    const LANE_TILE_MAX = 90;
    const LANE_GAP      = 18;
    const numLanes = Math.max(4, Math.floor(availPx / (LANE_TILE_MAX + LANE_GAP)));

    const laneDurations = Array.from({length: numLanes}, () => BASE_DUR * rand(0.9, 1.1));

    const laneOrder = [...Array(numLanes).keys()];
    for (let i = laneOrder.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [laneOrder[i], laneOrder[j]] = [laneOrder[j], laneOrder[i]];
    }

    const tileToLane = Array.from({length: COUNT}, (_, i) => laneOrder[i % numLanes]);
    const pts = Array.from({length: COUNT}, (_, i) => {
      const lane = tileToLane[i];
      const ny   = (i / COUNT + (Math.random() * 2 - 1) * 0.025 + 1) % 1;
      return [lane, ny];
    });

    function calcX(lane, size, sw) {
      const laneWidthPct = (rightPct - leftPct) / numLanes;
      const laneCenterPct = leftPct + (lane + 0.5) * laneWidthPct;
      const laneWidthPx   = availPx / numLanes;
      const maxJitterPx   = Math.max(0, laneWidthPx / 2 - size / 2 - 8);
      const maxJitterPct  = maxJitterPx / sw * 100;
      const jitter        = (Math.random() * 2 - 1) * maxJitterPct;
      const halfTilePct   = (size / 2) / sw * 100;
      const xPct = Math.max(leftPct + halfTilePct, Math.min(rightPct - halfTilePct, laneCenterPct + jitter));
      return xPct / 100 * sw - size / 2;
    }

    pts.forEach(([lane, ny], idx) => {
      const s    = subjects[idx % subjects.length];
      const { size } = s;
      const sw   = stage.clientWidth || stageW;
      const xPx  = calcX(lane, size, sw);
      const dur  = laneDurations[lane];
      const delay = -ny * dur;
      const wobbleDur   = rand(2.5, 4.5);
      const wobbleDelay = -rand(0, wobbleDur);

      const t = document.createElement('div');
      t.className = `fall-tile is-${s.kind}`;
      if (s.key) t.dataset.key  = s.key;
      t.dataset.lane = lane;
      t.dataset.size = size;
      t.style.cssText =
        `--size:${size}px;--c:${s.c};` +
        `--x:${xPx}px;` +
        `--dur:${dur}s;--delay:${delay}s;` +
        `--wobble-dur:${wobbleDur}s;--wobble-delay:${wobbleDelay}s`;

      const inner = s.kind === 'cat'
        ? `<svg viewBox="0 0 24 24">${s.svg}</svg>`
        : `<img src="${s.src}" alt="" onerror="this.style.display='none'">`;
      t.innerHTML = `<div class="inner">${inner}</div><span class="fall-label">${s.name}</span>`;

      /* Reinicia a animação ao fim do ciclo com novo jitter de posição */
      t.addEventListener('animationend', function(e) {
        if (e.animationName !== 'fall-move') return;
        const myLane = parseInt(this.dataset.lane ?? '0', 10);
        const sz     = parseInt(this.dataset.size ?? '56', 10);
        const swR    = stage.clientWidth || stageW;
        const newXPx  = calcX(myLane, sz, swR);
        const newDur  = laneDurations[myLane];
        this.style.setProperty('--x',     `${newXPx}px`);
        this.style.setProperty('--dur',   `${newDur}s`);
        this.style.setProperty('--delay', '0s');
        this.style.animationName = 'none';
        void this.offsetWidth;
        this.style.animationName = '';
      });

      stage.appendChild(t);
    });

    updateMask();
    updateOverlay();

    /* Atualiza máscara e overlay na rolagem/resize */
    let _rafPending = false;
    function scheduleUpdate() {
      if (_rafPending) return;
      _rafPending = true;
      requestAnimationFrame(() => {
        _rafPending = false;
        const sh = stage.clientHeight || (window.innerHeight - 48);
        stage.style.setProperty('--stage-h', sh + 'px');
        updateMask();
        updateOverlay();
      });
    }
    window.addEventListener('resize', scheduleUpdate, {passive: true});
    window.addEventListener('scroll', scheduleUpdate, {passive: true});

    /* Redistribui uniformemente ao voltar de outra aba */
    function reshuffleAll() {
      const tiles = [...stage.querySelectorAll('.fall-tile')];
      if (!tiles.length) return;
      const swR = stage.clientWidth || stageW;
      const newLaneOrder = [...Array(numLanes).keys()];
      for (let i = newLaneOrder.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newLaneOrder[i], newLaneOrder[j]] = [newLaneOrder[j], newLaneOrder[i]];
      }
      const newTileLanes = tiles.map((_, i) => newLaneOrder[i % numLanes]);
      tiles.forEach((el, i) => {
        const lane = newTileLanes[i];
        const sz   = parseInt(el.dataset.size ?? '56', 10);
        const xPx  = calcX(lane, sz, swR);
        const ny   = (i / tiles.length + (Math.random() * 2 - 1) * 0.025 + 1) % 1;
        const dur  = laneDurations[lane];
        el.dataset.lane = lane;
        el.style.setProperty('--x',     `${xPx}px`);
        el.style.setProperty('--dur',   `${dur}s`);
        el.style.setProperty('--delay', `${-ny * dur}s`);
        el.style.animationName = 'none';
        void el.offsetWidth;
        el.style.animationName = '';
      });
    }

    /* Brilho periódico: 5 tiles aleatórios a cada 3 s */
    _fallShineIv = setInterval(() => {
      const st = document.getElementById('fallStage');
      if (!st) return;
      const all = [...st.querySelectorAll('.fall-tile')];
      const visible = all.filter(t => {
        const r = t.getBoundingClientRect();
        return r.bottom > 0 && r.top < window.innerHeight;
      });
      for (let i = visible.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [visible[i], visible[j]] = [visible[j], visible[i]];
      }
      visible.slice(0, 5).forEach(t => {
        t.classList.remove('is-shining');
        void t.offsetWidth;
        t.classList.add('is-shining');
      });
    }, 3000);

    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible')
        requestAnimationFrame(() => requestAnimationFrame(reshuffleAll));
    });
    window.addEventListener('pageshow', e => {
      if (e.persisted || document.visibilityState === 'visible')
        requestAnimationFrame(() => requestAnimationFrame(reshuffleAll));
    });
  }
})();
