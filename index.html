<style>
/* ═══════════════════════════════════════════════════════
   DEVPULSE CONSOLE OPS — Terminal layout × Mission palette
   ═══════════════════════════════════════════════════════ */
:root, [data-theme="dark"] {
  --bg:         #060A10;
  --bg-deep:    #02050A;
  --surface:    #0D1420;
  --surface-hi: #14202F;
  --surface-3:  #1A2A3E;
  --ink:        #E6EEF8;
  --ink-soft:   #B7C3D2;
  --ink-dim:    #7F8DA2;
  --ink-faint:  #4A5669;
  --rule:       #1E2C42;
  --rule-soft:  #14202F;
  --amber:      #F59E0B;
  --green:      #22C55E;
  --red:        #EF4444;
  --cyan:       #38BDF8;
  --magenta:    #A78BFA;
  --violet:     #A78BFA;
  --blue:       #60A5FA;
  --pink:       #EC4899;
  --selection-bg: rgba(56,189,248,.28);
  --glow-g: 0 0 10px rgba(34,197,94,.5);
  --glow-a: 0 0 10px rgba(245,158,11,.55);
  --glow-r: 0 0 12px rgba(239,68,68,.6);
  --glow-c: 0 0 12px rgba(56,189,248,.55);
  --glow-v: 0 0 10px rgba(167,139,250,.5);
  --grid-line: rgba(56,189,248,.035);
  --grid-opacity: .35;
  --panel-bg: linear-gradient(180deg, rgba(13,20,32,.75), rgba(6,10,16,.85));
  --panel-bg-deep: linear-gradient(180deg, rgba(13,20,32,.9), rgba(13,20,32,.75));
  --panel-stat: rgba(2,5,10,.9);
  --dot-tex: radial-gradient(circle, rgba(148,185,220,.13) 1px, transparent 1px) 0 0 / 22px 22px;

  --cat-sec:      #EF4444;
  --cat-ai:       #A78BFA;
  --cat-aws:      #FF9900;
  --cat-devops:   #F59E0B;
  --cat-obs:      #9B7BFF;
  --cat-data:     #38BDF8;
  --cat-integ:    #2DD4BF;
  --cat-backend:  #22C55E;
  --cat-design:    #C084FC;
  --cat-enterprise:#FF9F45;
  --cat-distarch:  #818cf8;
  --cat-fintech:  #F0B429;
  /* legacy aliases — mantidas para edições antigas */
  --cat-arqsw:    var(--cat-design);
  --cat-arqsol:   var(--cat-enterprise);
  --cat-cloud:    #FF9900;
  --cat-frontend: #EC4899;
  --cat-db:       #38BDF8;
  --cat-lang:     #FACC15;

  --tool-ide:     #A78BFA;
  --tool-db:      #38BDF8;
  --tool-devops:  #F59E0B;
  --tool-api:     #22C55E;
  --tool-doc:     #EC4899;
  --tool-arch:    #2DD4BF;

  --sev-critical: #EF4444;
  --sev-high:     #F59E0B;
  --sev-medium:   #FACC15;
  --sev-low:      #22C55E;

  --focus:      #F59E0B;

  --bg-grad:    radial-gradient(ellipse at 20% 0%, rgba(56,189,248,.08), transparent 55%),
                radial-gradient(ellipse at 90% 100%, rgba(167,139,250,.06), transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(245,158,11,.03), transparent 70%),
                #060A10;
}
[data-theme="light"] {
  --bg:         #EDF1F7;
  --bg-deep:    #DFE5EE;
  --surface:    #FFFFFF;
  --surface-hi: #EEF3FA;
  --surface-3:  #DCE5F2;
  --ink:        #0A1420;
  --ink-soft:   #2E3B50;
  --ink-dim:    #5C6A80;
  --ink-faint:  #8693A8;
  --rule:       #C4D0E0;
  --rule-soft:  #DDE5EF;
  --amber:      #B0590C;
  --green:      #166534;
  --red:        #B91C3C;
  --cyan:       #0E7490;
  --magenta:    #6D28D9;
  --violet:     #6D28D9;
  --blue:       #1D4ED8;
  --pink:       #BE185D;
  --selection-bg: rgba(14,116,144,.2);
  --glow-g: 0 0 6px rgba(21,128,61,.25);
  --glow-a: 0 0 6px rgba(176,89,12,.3);
  --glow-r: 0 0 8px rgba(185,28,60,.3);
  --glow-c: 0 0 8px rgba(14,116,144,.3);
  --glow-v: 0 0 8px rgba(109,40,217,.3);
  --grid-line: rgba(14,116,144,.05);
  --grid-opacity: .5;
  --panel-bg: linear-gradient(180deg, rgba(255,255,255,.9), rgba(245,248,253,.95));
  --panel-bg-deep: linear-gradient(180deg, rgba(255,255,255,.95), rgba(255,255,255,.85));
  --panel-stat: rgba(255,255,255,.95);

  --cat-sec:      #B91C3C;
  --cat-ai:       #6D28D9;
  --cat-aws:      #C46B00;
  --cat-devops:   #B0590C;
  --cat-obs:      #5B21B6;
  --cat-data:     #0E7490;
  --cat-integ:    #0F766E;
  --cat-backend:  #166534;
  --cat-design:    #7C3AED;
  --cat-enterprise:#C2570A;
  --cat-distarch:  #4F46E5;
  --cat-fintech:  #B7791F;
  /* legacy aliases */
  --cat-arqsw:    var(--cat-design);
  --cat-arqsol:   var(--cat-enterprise);
  --cat-cloud:    #C46B00;
  --cat-frontend: #BE185D;
  --cat-db:       #0E7490;
  --cat-lang:     #854D0E;

  --tool-ide:     #6D28D9;
  --tool-db:      #0E7490;
  --tool-devops:  #B0590C;
  --tool-api:     #166534;
  --tool-doc:     #BE185D;
  --tool-arch:    #0F766E;

  --sev-critical: #B91C3C;
  --sev-high:     #B0590C;
  --sev-medium:   #854D0E;
  --sev-low:      #166534;

  --bg-grad:    radial-gradient(ellipse at 20% 0%, rgba(14,116,144,.07), transparent 55%),
                radial-gradient(ellipse at 90% 100%, rgba(109,74,191,.06), transparent 50%),
                #EDF1F7;
  --dot-tex: radial-gradient(circle, rgba(14,116,144,.11) 1px, transparent 1px) 0 0 / 22px 22px;
}

*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html,body { height: 100%; }
body {
  background: var(--dot-tex), var(--bg-grad);
  color: var(--ink);
  font-family: 'Inter Tight', sans-serif;
  font-size: 14.5px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
  position: relative;
}
/* ambient grid lines */
body::before {
  content: '';
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 1;
  opacity: var(--grid-opacity);
  background-image:
    linear-gradient(var(--grid-line) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
  background-size: 64px 64px;
}
/* star field + CRT scan lines (dark only) */
body::after {
  content: '';
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 1;
  opacity: .4;
  background-image:
    radial-gradient(1px 1px at 23% 14%, rgba(255,255,255,.55), transparent 100%),
    radial-gradient(1px 1px at 65% 32%, rgba(255,255,255,.45), transparent 100%),
    radial-gradient(1px 1px at 82% 70%, rgba(255,255,255,.55), transparent 100%),
    radial-gradient(1px 1px at 15% 82%, rgba(255,255,255,.45), transparent 100%),
    radial-gradient(1.5px 1.5px at 48% 48%, rgba(56,189,248,.5), transparent 100%),
    radial-gradient(1px 1px at 92% 10%, rgba(167,139,250,.5), transparent 100%),
    radial-gradient(1px 1px at 38% 68%, rgba(255,255,255,.4), transparent 100%);
}
[data-theme="light"] body::after { opacity: 0; }

/* CRT scan lines + vignette */
.crt-overlay {
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 3;
  background:
    /* scan lines horizontais */
    repeating-linear-gradient(
      to bottom,
      transparent 0,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 3px
    ),
    /* vignette */
    radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,.35) 100%);
  mix-blend-mode: multiply;
  opacity: .55;
}
[data-theme="light"] .crt-overlay {
  background:
    repeating-linear-gradient(
      to bottom,
      transparent 0,
      transparent 2px,
      rgba(14,116,144,0.04) 2px,
      rgba(14,116,144,0.04) 3px
    ),
    radial-gradient(ellipse at center, transparent 65%, rgba(14,116,144,.12) 100%);
  opacity: .7;
}
@media (prefers-reduced-motion: reduce) {
  .crt-overlay { display: none; }
}
::selection { background: var(--selection-bg); color: var(--ink); }
a { color: inherit; text-decoration: none; }
.mono { font-family: 'JetBrains Mono', monospace; }
button { font-family: inherit; color: inherit; }

/* Focus visível */
:focus-visible {
  outline: 2px solid var(--focus);
  outline-offset: 2px;
  border-radius: 3px;
}

/* Skip link */
.skip-link {
  position: absolute;
  top: -40px;
  left: 8px;
  background: var(--amber);
  color: var(--bg-deep);
  padding: 8px 12px;
  border-radius: 4px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 700;
  z-index: 10000;
  text-decoration: none;
}
.skip-link:focus { top: 8px; }

/* Reduce motion */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
    scroll-behavior: auto !important;
  }
  body::before, body::after { display: none; }
}

/* ═══ Boot overlay ═══ */
.boot {
  position: fixed; inset: 0;
  background: var(--bg-deep);
  z-index: 9999;
  display: flex; align-items: flex-start; justify-content: center;
  padding: 14vh 24px 0;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--green);
  transition: opacity .5s ease;
}
.boot.gone { opacity: 0; pointer-events: none; }
.boot-inner {
  width: min(560px, 92vw);
  display: flex; flex-direction: column; gap: 3px;
}
.boot-logo {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 18px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--rule);
}
.boot-logo img { width: 34px; height: 34px; }
.boot-logo .bt {
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: -.02em;
}
.boot-logo .bs {
  font-size: 10px;
  color: var(--ink-dim);
  letter-spacing: .15em;
  text-transform: uppercase;
  margin-top: 2px;
}
.boot-line {
  display: flex; gap: 8px;
  opacity: 0;
  transform: translateY(4px);
  animation: bootIn .25s ease forwards;
}
.boot-line .status {
  color: var(--green);
  text-shadow: var(--glow-g);
  flex-shrink: 0;
  width: 56px;
}
.boot-line .status.warn { color: var(--amber); text-shadow: var(--glow-a); }
.boot-line .msg { color: var(--ink-soft); }
.boot-line .val { color: var(--cyan); margin-left: auto; }
@keyframes bootIn { to { opacity: 1; transform: none; } }

/* ═══ Shell grid ═══ */
.shell {
  display: grid;
  grid-template-rows: 42px 1fr;
  grid-template-columns: 262px 1fr 286px;
  grid-template-areas:
    "top  top  top"
    "side main rail";
  height: calc(100vh - 44px);
  position: relative;
  z-index: 2;
}

/* quote nav */
.quote-nav {
  display: flex;
  justify-content: flex-end;
  gap: 2px;
  margin-bottom: 4px;
}
.quote-nav-btn {
  background: none;
  border: 1px solid var(--rule);
  color: var(--ink-faint);
  font-size: 13px;
  line-height: 1;
  width: 20px; height: 20px;
  border-radius: 4px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: color .12s, border-color .12s;
}
.quote-nav-btn:hover { color: var(--cyan); border-color: var(--cyan); }

/* verse nav */
.verse-nav-btn {
  background: none;
  border: none;
  color: var(--ink-faint);
  font-size: 14px;
  line-height: 1;
  padding: 0 4px;
  cursor: pointer;
  flex-shrink: 0;
  transition: color .12s;
}
.verse-nav-btn:hover { color: var(--cyan); }

/* verse footer */
.verse-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 36px;
  background: var(--bg-deep);
  border-top: 1px solid var(--rule);
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 10px;
  padding: 0 10px;
  z-index: 100;
  overflow: hidden;
}
.verse-symbol {
  flex-shrink: 0;
  width: 12px; height: 17px;
  color: var(--cyan);
  opacity: .8;
}
.verse-cross-link {
  display: flex; align-items: center;
  flex-shrink: 0;
  opacity: .8;
  transition: opacity .2s;
  color: var(--cyan);
}
.verse-cross-link:hover { opacity: 1; }
a.verse-text-wrap {
  text-decoration: none;
  color: inherit;
  cursor: pointer;
}
a.verse-text-wrap:hover .verse-text { color: var(--fg); }
a.verse-text-wrap:hover .verse-ref  { text-shadow: var(--glow-c), 0 0 12px var(--cyan); }
.verse-text-wrap {
  display: flex;
  align-items: baseline;
  gap: 10px;
  overflow: hidden;
  max-width: 85vw;
}
.verse-text {
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 12px;
  font-style: italic;
  color: var(--ink-soft);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.verse-ref {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px;
  color: var(--cyan);
  white-space: nowrap;
  flex-shrink: 0;
  letter-spacing: .06em;
  text-shadow: var(--glow-c);
}
@keyframes verseOut {
  from { transform: translateX(0);    opacity: 1; }
  to   { transform: translateX(70px); opacity: 0; }
}
@keyframes verseIn {
  from { transform: translateX(-70px); opacity: 0; }
  to   { transform: translateX(0);     opacity: 1; }
}
.verse-text-wrap.v-out { animation: verseOut .4s ease forwards; }
.verse-text-wrap.v-in  { animation: verseIn  .4s ease forwards; }

/* ═══ CVE View ═══ */
.cve-hero {
  background: color-mix(in srgb, var(--sev-critical, #ff4444) 8%, var(--surface));
  border: 1px solid color-mix(in srgb, var(--sev-critical, #ff4444) 30%, transparent);
  border-radius: 8px;
  padding: 20px 22px;
  margin: 18px 0 8px;
}
.cve-hero-top { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.cve-hero-icon { font-size:22px; line-height:1; }
.cve-hero-title { font-family:'JetBrains Mono',monospace; font-size:15px; font-weight:700; color:var(--fg); }
.cve-hero-subtitle { font-size:10px; color:var(--ink-soft); font-family:'JetBrains Mono',monospace; letter-spacing:.04em; }
.cve-lede { font-size:12.5px; color:var(--ink-soft); line-height:1.65; margin:0 0 14px; }
.cve-lede b { color:var(--fg); }
.cve-links { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:14px; }
.cve-links a {
  font-family:'JetBrains Mono',monospace; font-size:10.5px;
  color:var(--cyan); text-decoration:none; border:1px solid var(--cyan);
  border-radius:4px; padding:3px 9px;
  transition: background .15s, color .15s;
}
.cve-links a:hover { background:var(--cyan); color:#000; }
.cve-sev-bar { display:flex; gap:6px; flex-wrap:wrap; }
.cve-sev-btn {
  font-family:'JetBrains Mono',monospace; font-size:10px; font-weight:700;
  padding:3px 10px; border-radius:4px; border:1px solid var(--rule);
  background:transparent; color:var(--ink-soft); cursor:pointer;
  transition: all .15s;
}
.cve-sev-btn:hover { border-color:var(--fg); color:var(--fg); }
.cve-sev-btn.active { color:#000; }
.cve-sev-btn[data-sev=""]       { border-color:var(--ink-soft); }
.cve-sev-btn[data-sev=""].active{ background:var(--ink-soft); }
.cve-sev-btn[data-sev="critical"].active { background:#ff4444; border-color:#ff4444; }
.cve-sev-btn[data-sev="high"].active     { background:#ff8c42; border-color:#ff8c42; }
.cve-sev-btn[data-sev="medium"].active   { background:#f0c040; border-color:#f0c040; }
.cve-sev-btn[data-sev="low"].active      { background:#6ed6a0; border-color:#6ed6a0; color:#000; }

/* ═══ Version Panel (Java · Python · JavaScript) ═══ */
.vp-section {
  border-radius: 8px;
  padding: 18px 20px 20px;
  margin: 18px 0 8px;
  border: 1px solid transparent;
}
.vp-section-head { display:flex; align-items:baseline; gap:10px; margin-bottom:14px; }
.vp-section-title { font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:700; }
.vp-section-sub { font-size:11px; color:var(--ink-soft); }
.vp-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 8px;
}
.vp-card {
  background: var(--surface);
  border: 1px solid var(--rule);
  border-radius: 6px;
  padding: 12px 14px;
  cursor: pointer;
  transition: border-color .15s, transform .1s, box-shadow .15s;
  display: flex; flex-direction: column; gap: 4px;
  position: relative;
}
.vp-card:hover { transform: translateY(-1px); }
.vp-card.vp-active { box-shadow: 0 0 0 1px var(--vp-color,var(--cyan)); }
.vp-card.vp-active::after {
  content: '▾';
  position: absolute; bottom: 6px; right: 8px;
  font-size: 11px; color: var(--vp-color,var(--cyan)); opacity: .8;
}
.vp-card-top { display:flex; align-items:center; justify-content:space-between; }
.vp-version-num { font-family:'JetBrains Mono',monospace; font-size:19px; font-weight:700; color:var(--fg); line-height:1.1; }
.vp-badge { font-family:'JetBrains Mono',monospace; font-size:8px; font-weight:700; padding:2px 5px; border-radius:3px; letter-spacing:.05em; white-space:nowrap; }
.vp-badge-lts  { background:#1a3a1a; color:#6ed6a0; border:1px solid #6ed6a0; }
.vp-badge-sts  { background:var(--surface); color:var(--ink-soft); border:1px solid var(--rule); }
.vp-badge-act  { background:#1a2e1a; color:#6ed6a0; border:1px solid #6ed6a0; }
.vp-badge-sec  { background:#2e2a1a; color:#f0c040; border:1px solid #f0c040; }
.vp-badge-eol  { background:var(--surface); color:var(--ink-soft); border:1px solid var(--rule); }
.vp-badge-std  { background:var(--surface); color:var(--ink-soft); border:1px solid var(--rule); }
.vp-card-date  { font-size:10px; color:var(--ink-soft); }
.vp-card-count { font-family:'JetBrains Mono',monospace; font-size:10px; }
.vp-card-sub   { font-size:9px; color:var(--ink-soft); margin-top:2px; }
/* Inline expand panel */
.vp-detail {
  overflow: hidden;
  max-height: 0;
  opacity: 0;
  margin-top: 0;
  transition: max-height .45s cubic-bezier(0.4,0,0.2,1),
              opacity .3s ease,
              margin-top .3s ease;
}
.vp-detail.vp-open {
  max-height: 5000px;
  opacity: 1;
  margin-top: 14px;
}
.vp-detail-inner {
  border: 1px solid var(--rule);
  border-radius: 8px;
  padding: 18px 20px;
  background: var(--bg-deep);
  position: relative;
}
.vp-detail-inner::before {
  content: '';
  position: absolute; top: 0; left: 20px; right: 20px; height: 2px;
  background: var(--vp-color, var(--cyan));
  border-radius: 0 0 2px 2px;
  opacity: .7;
}
.vp-detail-header { display:flex; align-items:center; gap:12px; margin-bottom:8px; flex-wrap:wrap; }
.vp-detail-ver { font-family:'JetBrains Mono',monospace; font-size:24px; font-weight:700; }
.vp-detail-meta { font-size:11px; color:var(--ink-soft); margin-bottom:12px; display:flex; gap:14px; flex-wrap:wrap; }
.vp-detail-meta b { color:var(--fg); }
.vp-detail-summary { font-size:13px; color:var(--ink-soft); line-height:1.65; margin-bottom:14px; }
.vp-detail-links { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:18px; }
.vp-detail-links a {
  font-family:'JetBrains Mono',monospace; font-size:10px;
  text-decoration:none; border-radius:4px; padding:3px 9px;
  border: 1px solid var(--vp-color,var(--cyan));
  color: var(--vp-color,var(--cyan));
  transition: background .15s, color .15s;
}
.vp-detail-links a:hover { background: var(--vp-color,var(--cyan)); color:#000; }
.vp-feat-list { display:flex; flex-direction:column; gap:8px; }
.vp-feat { background:var(--surface); border:1px solid var(--rule); border-radius:6px; padding:10px 13px; }
.vp-feat-top { display:flex; align-items:center; gap:8px; margin-bottom:4px; flex-wrap:wrap; }
.vp-feat-num { font-family:'JetBrains Mono',monospace; font-size:10px; font-weight:700; min-width:52px; }
.vp-feat-status { font-family:'JetBrains Mono',monospace; font-size:9px; padding:1px 5px; border-radius:3px; background:var(--surface); border:1px solid var(--rule); color:var(--ink-soft); }
.vp-feat-status.std   { border-color:#6ed6a0; color:#6ed6a0; }
.vp-feat-status.prev  { border-color:#f0c040; color:#f0c040; }
.vp-feat-status.incub { border-color:var(--cyan); color:var(--cyan); }
.vp-feat-status.rem   { border-color:var(--red); color:var(--red); }
.vp-feat-title { font-size:12.5px; font-weight:600; color:var(--fg); }
.vp-feat-desc { font-size:11.5px; color:var(--ink-soft); line-height:1.6; }
.vp-feat-link { display:inline-block; margin-top:5px; font-family:'JetBrains Mono',monospace; font-size:9.5px; color:var(--cyan); text-decoration:none; }
.vp-feat-link:hover { text-decoration:underline; }
.vp-loading { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--ink-soft); padding:16px 0; text-align:center; }
.vp-close-row { display:flex; justify-content:flex-end; margin-bottom:14px; }
.vp-close-btn {
  font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--ink-soft);
  background:transparent; border:1px solid var(--rule); border-radius:4px;
  padding:3px 10px; cursor:pointer; transition: border-color .15s, color .15s;
}
.vp-close-btn:hover { border-color:var(--red); color:var(--red); }

/* ═══ Topbar ═══ */
.topbar {
  grid-area: top;
  background: var(--dot-tex), var(--panel-bg-deep);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border-bottom: 1px solid var(--rule);
  display: flex; align-items: center;
  padding: 0 14px;
  gap: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--ink-soft);
  overflow-x: auto;
  white-space: nowrap;
  position: relative;
}
.topbar::after {
  content: '';
  position: absolute; left: 0; right: 0; bottom: -1px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--cyan) 30%, var(--magenta) 70%, transparent);
  opacity: .65;
  pointer-events: none;
}
.topbar::-webkit-scrollbar { display: none; }
.logo-wrap {
  display: flex; align-items: center; gap: 8px;
  flex-shrink: 0; padding-right: 12px;
  border-right: 1px solid var(--rule);
}
.logo-wrap img {
  width: 22px; height: 22px;
  filter: drop-shadow(0 0 4px rgba(255,176,32,.3));
}
.logo-txt {
  display: flex; align-items: center; gap: 2px;
  font-weight: 700;
}
.logo-txt .scheme { color: var(--ink-dim); }
.logo-txt .host { color: var(--ink); }
.logo-txt .cursor-blink {
  background: var(--amber); color: var(--bg-deep);
  padding: 0 3px; animation: blink 1.1s step-end infinite;
}
@keyframes blink { 50% { opacity: 0; } }

.tb-chunk {
  padding: 0 10px;
  border-right: 1px solid var(--rule);
  display: inline-flex; gap: 6px; align-items: center;
  color: var(--ink-soft);
  flex-shrink: 0;
}
.tb-chunk b { color: var(--ink); font-weight: 700; }
.tb-chunk.dot::before {
  content: '●'; color: var(--green); margin-right: 3px;
  animation: pulse 2s ease-in-out infinite;
}
.tb-chunk.stale::before { color: var(--red); }
@keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: .4 } }
.tb-spacer { flex: 1; }

.tb-btn {
  padding: 5px 10px;
  background: var(--surface);
  border: 1px solid var(--rule);
  border-radius: 4px;
  font-size: 10.5px;
  letter-spacing: .04em;
  color: var(--ink-soft);
  cursor: pointer;
  display: inline-flex; gap: 6px; align-items: center;
  transition: all .12s;
  flex-shrink: 0;
  font-family: inherit;
}
.tb-btn:hover { border-color: var(--amber); color: var(--amber); }
.tb-btn:disabled { opacity: .4; cursor: not-allowed; }
.tb-btn:disabled:hover { border-color: var(--rule); color: var(--ink-soft); }
.tb-btn svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; }
.tb-btn.icon-only { padding: 5px 7px; }
.tb-btn.read-later { position: relative; }
.tb-btn.read-later .rl-badge {
  min-width: 16px;
  padding: 0 4px;
  border-radius: 8px;
  background: var(--amber);
  color: var(--bg-deep);
  font-weight: 700;
  font-size: 9px;
  text-align: center;
}
.tb-btn.read-later .rl-badge:empty { display: none; }
.tb-btn kbd {
  padding: 0 4px;
  border: 1px solid var(--rule);
  border-radius: 2px;
  font-size: 9px;
  color: var(--ink-dim);
  background: var(--bg-deep);
  margin-left: 2px;
}
.hamburger { display: none; }

/* ═══ Topbar status (direita) ═══ */
.tb-status {
  display: inline-flex; align-items: center; gap: 0;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--ink-dim);
  flex-shrink: 0;
}
.tb-status .tb-chunk {
  padding: 0 10px;
  border-right: 1px solid var(--rule);
  display: inline-flex; gap: 6px; align-items: center;
  color: var(--ink-soft);
  flex-shrink: 0;
}
.tb-status .tb-chunk:last-child { border-right: none; }
.tb-status .tb-chunk b { color: var(--green); text-shadow: var(--glow-g); font-weight: 700; }
.tb-status .tb-chunk b#sbx-updated { color: var(--cyan); text-shadow: var(--glow-c); }
.tb-status .tb-chunk.stale b { color: var(--red); text-shadow: var(--glow-r); }
.tb-status .live-dot {
  color: var(--green);
  text-shadow: var(--glow-g);
  animation: pulse 1.6s ease-in-out infinite;
  font-size: 10px;
}
.tb-status .tb-chunk.stale.live-dot { color: var(--red); text-shadow: var(--glow-r); }
.tb-gh {
  background: transparent;
  border: none;
  color: var(--ink-dim);
  cursor: pointer;
  padding: 0 10px;
  display: inline-flex; align-items: center;
  transition: color .15s;
}
.tb-gh:hover { color: var(--amber); }

/* ═══ Main prompt bar (contexto fixo/sticky no topo do main) ═══ */
.main-prompt {
  position: sticky;
  top: 0;
  z-index: 20;
  background: var(--bg-deep);
  border-bottom: 1px solid var(--rule);
  padding: 14px 34px;
  margin: 0 -34px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  color: var(--ink-soft);
  display: flex; align-items: center; gap: 8px;
  flex-wrap: wrap;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
.main-prompt::after {
  content: '';
  position: absolute; left: 0; right: 0; bottom: -1px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--mp-color, var(--amber)) 40%, var(--mp-color, var(--amber)) 60%, transparent);
  opacity: .7;
  pointer-events: none;
}
.main-prompt .leader {
  color: var(--green);
  font-weight: 700;
  text-shadow: var(--glow-g);
  margin-right: 2px;
  font-size: 16px;
}
.main-prompt .u { color: var(--green); font-weight: 700; text-shadow: var(--glow-g); }
.main-prompt .h { color: var(--cyan); text-shadow: var(--glow-c); }
.main-prompt .p { color: var(--mp-color, var(--amber)); text-shadow: 0 0 6px var(--mp-color, rgba(245,158,11,.45)); }
.main-prompt .d { color: var(--magenta); font-weight: 700; margin-right: 4px; text-shadow: var(--glow-v); }
.main-prompt .cmd { color: var(--ink); font-weight: 600; }
.main-prompt .cursor-i {
  display: inline-block; width: 10px; height: 17px;
  background: var(--mp-color, var(--amber));
  box-shadow: 0 0 8px var(--mp-color, rgba(245,158,11,.6));
  margin-left: 2px; vertical-align: middle;
  animation: blink 1s step-end infinite;
}
.main-prompt .mp-today {
  color: var(--green);
  font-weight: 700;
  font-size: 12px;
  letter-spacing: .14em;
  margin-left: 10px;
  text-shadow: var(--glow-g);
  animation: pulse 2s ease-in-out infinite;
}

/* ═══ Sidebar ═══ */
.sidebar {
  grid-area: side;
  background: var(--dot-tex), var(--panel-bg);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-right: 1px solid var(--rule);
  overflow-y: auto;
  padding: 0 0 0;
  font-family: 'JetBrains Mono', monospace;
  display: flex; flex-direction: column;
}
.sidebar::-webkit-scrollbar { width: 6px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 3px; }

/* sidebar controles (topo) */

/* rl-menu: "ler depois" como card discreto antes das categorias */
.rl-menu-item {
  display: flex; align-items: center; gap: 9px;
  padding: 9px 12px;
  margin: 6px 10px 10px;
  cursor: pointer;
  font-size: 11.5px;
  font-family: 'JetBrains Mono', monospace;
  color: var(--ink-soft);
  background: var(--surface);
  border: 1px solid var(--rule);
  border-left: 3px solid color-mix(in srgb, var(--amber) 35%, transparent);
  border-radius: 6px;
  transition: all .15s ease;
  user-select: none;
}
.rl-menu-item:hover,
.rl-menu-item.rl-active {
  color: var(--amber);
  border-left-color: var(--amber);
  background: color-mix(in srgb, var(--amber) 7%, var(--surface));
}
.rl-menu-item svg { flex-shrink: 0; color: color-mix(in srgb, var(--amber) 50%, var(--ink-dim)); }
.rl-menu-item:hover svg, .rl-menu-item.rl-active svg { color: var(--amber); }
.rl-menu-name { flex: 1; }

/* rl view no main */
.rl-view-bar {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 0 14px;
  border-bottom: 1px solid var(--rule-soft);
  margin-bottom: 4px;
}
.rl-view-bar select {
  background: var(--surface); border: 1px solid var(--rule);
  color: var(--ink-soft); border-radius: 4px;
  padding: 4px 8px; font-family: 'JetBrains Mono', monospace;
  font-size: 11px; cursor: pointer;
}
.rl-view-btn {
  padding: 4px 10px; background: var(--surface);
  border: 1px solid var(--rule); border-radius: 4px;
  color: var(--ink-soft); font-family: 'JetBrains Mono', monospace;
  font-size: 11px; cursor: pointer; transition: all .12s;
}
.rl-view-btn:hover { border-color: var(--amber); color: var(--amber); }
.rl-badge {
  min-width: 16px; padding: 0 4px;
  border-radius: 8px;
  background: var(--amber);
  color: var(--bg-deep);
  font-weight: 700;
  font-size: 9px;
  text-align: center;
}
.rl-badge:empty { display: none; }

.side-section { margin-top: 14px; flex-shrink: 0; padding-bottom: 6px; }

/* side-base removido — infos migraram para tb-status no topbar */

.side-label {
  padding: 0 14px;
  font-size: 9.5px;
  letter-spacing: .22em;
  color: var(--ink-dim);
  text-transform: uppercase;
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.side-label .count {
  background: var(--surface);
  color: var(--ink-soft);
  padding: 1px 6px; border-radius: 3px;
  font-size: 9px; letter-spacing: .08em;
  border: 1px solid var(--rule);
}
.ch-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 12px;
  margin: 2px 10px;
  cursor: pointer;
  font-size: 12px;
  color: var(--ink-soft);
  border-left: 3px solid color-mix(in srgb, var(--k, var(--ink-faint)) 30%, transparent);
  border-radius: 6px;
  transition: all .12s ease;
  user-select: none;
  position: relative;
}
.ch-item:hover {
  background: var(--surface);
  color: var(--ink);
  border-left-color: color-mix(in srgb, var(--k, var(--ink-faint)) 65%, transparent);
}
.ch-item.active {
  background: color-mix(in srgb, var(--k, var(--amber)) 10%, transparent);
  color: var(--ink);
  border-left-color: var(--k, var(--amber));
}
.ch-emoji {
  width: 14px; height: 14px;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.ch-emoji svg { stroke: var(--k, currentColor); opacity: 0.8; }
.ch-item.active .ch-emoji svg { opacity: 1; }
.ch-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--k, var(--ink-faint));
  flex-shrink: 0;
}
.ch-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
/* all (home) */
.ch-item.all-item {
  font-weight: 700;
  color: var(--ink);
}
.ch-item.all-item .ch-dot { background: var(--ink); }
.ch-item.all-item.active .ch-dot { background: var(--amber); }

/* calendário dimmed em view cat/tool */
.sidebar.ctx-agg .dp-panel {
  opacity: 0.28;
  cursor: pointer;
  transition: opacity .2s;
  pointer-events: auto;
}
.sidebar.ctx-agg .dp-panel:hover { opacity: 0.55; }

.tool-cat-header {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 9px 8px 4px;
  font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
  color: var(--k, var(--ink-dim));
  margin-top: 4px;
  pointer-events: none;
  user-select: none;
  grid-column: 1 / -1;
}
.tool-cat-header:first-child { margin-top: 0; }
.tool-cat-icon {
  width: 13px; height: 13px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.tool-cat-icon svg { stroke: var(--k, currentColor); opacity: 0.9; }
.ch-tool-logo {
  width: 14px; height: 14px;
  border-radius: 2px;
  flex-shrink: 0;
  object-fit: contain;
  opacity: 0.85;
}
.tool-cat-name { color: var(--k, var(--ink-dim)); }
#tools-side {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 4px;
  padding: 0 8px 6px;
}
.ch-item.ch-tool {
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  padding: 10px 6px 8px;
  margin: 0;
  min-height: 78px;
  border-left: none;
  border-radius: 10px;
  border: none;
  background: color-mix(in srgb, var(--k, var(--surface)) 12%, var(--surface));
  text-align: center;
}
.ch-item.ch-tool:hover {
  background: color-mix(in srgb, var(--k, var(--surface-hi)) 22%, var(--surface));
}
.ch-item.ch-tool.active {
  background: color-mix(in srgb, var(--k, var(--amber)) 20%, var(--surface));
  outline: 1px solid color-mix(in srgb, var(--k, var(--amber)) 60%, transparent);
}
.ch-item.ch-tool .ch-tool-logo {
  width: 38px; height: 38px;
  flex-shrink: 0; opacity: 0.95;
  object-fit: contain;
}
.ch-item.ch-tool .ch-name {
  display: block;
  font-size: 9px;
  line-height: 1.2;
  color: var(--ink-soft);
  word-break: break-word;
  white-space: normal;
  text-align: center;
  width: 100%;
}
.ch-item.ch-tool.active .ch-name { color: var(--ink); }

/* ═══ Main ═══ */
.main {
  grid-area: main;
  overflow-y: auto;
  background: transparent;
  scroll-behavior: smooth;
  position: relative;
}
.main::-webkit-scrollbar { width: 8px; }
.main::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 4px; }
.main-inner {
  padding: 0 34px 52px;
  max-width: 1200px;
  margin: 0 auto;
}

/* loader overlay */
.loader-bar {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--amber), transparent);
  background-size: 200% 100%;
  animation: loaderSlide 1.1s linear infinite;
  display: none;
  z-index: 5;
}
.loader-bar.on { display: block; }
@keyframes loaderSlide {
  0% { background-position: 100% 0; }
  100% { background-position: -100% 0; }
}

/* context hero (cat/tool only — home não tem hero) */
.ctx-hero {
  padding: 18px 22px 16px;
  border-left: 4px solid var(--ctx-color, var(--cyan));
  background: var(--surface);
  border-radius: 0 6px 6px 0;
  margin-bottom: 22px;
}
.ctx-hero-title {
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: clamp(22px, 2.6vw, 30px);
  font-weight: 700;
  letter-spacing: -0.02em;
  line-height: 1.15;
  margin-bottom: 8px;
  color: var(--ctx-color, var(--ink));
  display: flex; align-items: center; gap: 10px;
}
.ctx-hero-title .ctx-kind-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .18em;
  text-transform: uppercase;
  padding: 3px 8px;
  border: 1px solid var(--ctx-color, var(--cyan));
  color: var(--ctx-color, var(--cyan));
  border-radius: 3px;
  background: transparent;
}
.ctx-hero-lede {
  font-size: 14px;
  color: var(--ink-soft);
  line-height: 1.55;
  max-width: 68ch;
  margin-bottom: 10px;
}
.ctx-hero-meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  color: var(--ink-dim);
  display: flex; gap: 16px; flex-wrap: wrap;
}
.ctx-hero-meta .mk { color: var(--ink-dim); }
.ctx-hero-meta .mv { color: var(--ink); font-weight: 600; }

/* section header */
.section { margin-top: 30px; }
.sec-head {
  display: flex; align-items: baseline; justify-content: space-between;
  margin-bottom: 14px; padding-bottom: 8px;
  border-bottom: 1px solid var(--rule);
  gap: 14px;
}
.sec-head h2 {
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 16px;
  font-weight: 600;
  letter-spacing: -0.01em;
  display: flex; align-items: baseline; gap: 8px;
  color: var(--ink);
}
.sec-head h2 .tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px;
  padding: 2px 6px;
  background: var(--surface);
  color: var(--ink-dim);
  border-radius: 3px;
  text-transform: uppercase;
  letter-spacing: .08em;
  border: 1px solid var(--rule);
  font-weight: 500;
}
.sec-meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  color: var(--ink-dim);
}

/* pillars */
.pillars {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
}
.pillar-card {
  background: var(--surface);
  border: 1px solid var(--rule);
  border-radius: 6px;
  overflow: hidden;
  display: flex; flex-direction: column;
  cursor: pointer;
  transition: all .15s;
  position: relative;
  color: inherit;
  text-decoration: none;
}
.pillar-card:hover { border-color: var(--pillar-color, var(--amber)); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,.18); }
.pillar-card .strip { height: 4px; background: var(--pillar-color, var(--amber)); }
.pillar-card.urgent .strip {
  background: var(--red);
  animation: critPulse 2s ease-in-out infinite;
}
.pillar-label {
  display: inline-flex; align-items: center; gap: 5px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .10em;
  color: var(--pillar-color, var(--amber));
  padding: 2px 7px;
  border: 1px solid currentColor;
  border-radius: 3px;
  background: transparent;
}
/* top-card alias for backward compat (cat/tool views) */
.top-card {
  background: var(--surface);
  border: 1px solid var(--rule);
  border-radius: 6px;
  overflow: hidden;
  display: flex; flex-direction: column;
  cursor: pointer;
  transition: all .15s;
  position: relative;
  color: inherit;
  text-decoration: none;
}
.top-card:hover { border-color: var(--amber); transform: translateY(-1px); }
.top-card .strip { height: 3px; background: var(--cat, var(--amber)); }
.top-card.urgent .strip {
  background: var(--red);
  animation: critPulse 2s ease-in-out infinite;
}
@keyframes critPulse {
  0%,100% { box-shadow: 0 0 0 rgba(255,78,100,0); }
  50% { box-shadow: 0 0 10px rgba(255,78,100,.45); }
}
.top-thumb {
  width: 100%;
  aspect-ratio: 16/9;
  border-bottom: 1px solid var(--rule);
  position: relative;
  overflow: hidden;
  background: var(--bg-deep);
}
.top-thumb img {
  width: 100%; height: 100%;
  object-fit: contain; object-position: center;
  padding: 6px;
  box-sizing: border-box;
  display: block;
}
.top-thumb::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(180deg, transparent 40%, rgba(0,0,0,0.35));
  pointer-events: none;
}
[data-theme="light"] .top-thumb::after {
  background: linear-gradient(180deg, transparent 55%, rgba(0,0,0,0.08));
}
.top-body {
  padding: 14px 16px 12px;
  display: flex; flex-direction: column; gap: 8px;
  flex: 1;
}
.badges {
  display: flex; flex-wrap: wrap; gap: 5px; align-items: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .08em;
}
.rank { color: var(--ink-faint); letter-spacing: .04em; }
.badge {
  padding: 2px 6px;
  border-radius: 3px;
  background: var(--surface-hi);
  color: var(--ink-soft);
  border: 1px solid var(--rule);
}
.badge.cat { color: var(--cat, var(--ink-soft)); border-color: currentColor; background: transparent; }
.badge.u { background: var(--red); color: white; border-color: var(--red); }
.badge.brk { background: var(--magenta); color: var(--bg-deep); border-color: var(--magenta); }
.badge.sev-critical { background: var(--sev-critical); color: white; border-color: var(--sev-critical); }
.badge.sev-high { background: var(--sev-high); color: var(--bg-deep); border-color: var(--sev-high); }
.badge.sev-medium { background: var(--sev-medium); color: var(--bg-deep); border-color: var(--sev-medium); }
.badge.sev-low { background: var(--sev-low); color: var(--bg-deep); border-color: var(--sev-low); }

.top-head {
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 16px;
  font-weight: 600;
  line-height: 1.25;
  letter-spacing: -0.01em;
  color: var(--ink);
}
.top-sum {
  font-size: 12.5px;
  line-height: 1.5;
  color: var(--ink-soft);
  flex: 1;
}
.top-foot, .card-foot {
  display: flex;
  gap: 8px; align-items: center;
  padding-top: 10px;
  border-top: 1px solid var(--rule);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--ink-dim);
  text-transform: uppercase;
  letter-spacing: .04em;
}
.top-foot .src, .card-foot .src { color: var(--cyan); text-transform: none; letter-spacing: 0; }
.top-foot .time, .card-foot .time { color: var(--amber); }
.row-right { margin-left: auto; display: flex; gap: 4px; align-items: center; }
.mini-btn {
  background: transparent;
  border: 1px solid var(--rule);
  border-radius: 3px;
  padding: 3px 7px;
  color: var(--ink-dim);
  cursor: pointer;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  transition: all .12s;
  letter-spacing: .04em;
  display: inline-flex; align-items: center; gap: 4px;
}
.mini-btn:hover { color: var(--amber); border-color: var(--amber); }
.mini-btn.bm.active { color: var(--amber); border-color: var(--amber); background: rgba(255,176,32,.14); }
.mini-btn svg { width: 10px; height: 10px; stroke: currentColor; fill: none; stroke-width: 2; }
.mini-btn.bm.active svg { fill: currentColor; }

/* toolbar (mode group + filter pills) */
.toolbar {
  background: var(--bg-deep);
  border: 1px solid var(--rule);
  border-radius: 6px;
  padding: 10px 12px;
  margin-bottom: 14px;
  display: flex; flex-wrap: wrap; gap: 10px;
  align-items: center;
  justify-content: space-between;
}
.toolbar-left {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--ink-soft);
  display: flex; align-items: center; gap: 6px;
  flex-wrap: wrap;
}
.toolbar-left .prompt { color: var(--green); text-shadow: var(--glow-g); font-weight: 700; margin-right: 6px; }
.toolbar-left .filter-name { color: var(--amber); font-weight: 700; }
.toolbar-left .hint { color: var(--ink-dim); margin-left: 6px; }
.toolbar-right {
  display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
}
.filter-chips { display: inline-flex; gap: 4px; }
.filter-chip {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  padding: 4px 8px;
  border: 1px solid var(--rule);
  border-radius: 3px;
  background: var(--surface);
  color: var(--ink-dim);
  cursor: pointer;
  transition: all .12s;
  text-transform: uppercase;
  letter-spacing: .04em;
}
.filter-chip:hover { color: var(--amber); border-color: var(--amber); }
.filter-chip.active { background: var(--amber); color: var(--bg-deep); border-color: var(--amber); }
.filter-chip.urgent.active { background: var(--red); border-color: var(--red); color: white; }
.mode-group {
  display: inline-flex;
  border: 1px solid var(--rule);
  border-radius: 4px;
  overflow: hidden;
}
.mode-btn {
  background: var(--surface);
  border: none;
  padding: 6px 9px;
  cursor: pointer;
  color: var(--ink-dim);
  border-right: 1px solid var(--rule);
  transition: color .1s;
}
.mode-btn:last-child { border-right: none; }
.mode-btn.active { background: var(--amber); color: var(--bg-deep); }
.mode-btn:hover:not(.active) { color: var(--amber); }
.mode-btn svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; display: block; }

/* feed - cards mode: mínimo 3 colunas em telas normais */
.feed-cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 10px;
}
.card {
  background: var(--surface);
  border: 1px solid var(--rule);
  border-radius: 5px;
  padding: 12px 14px;
  cursor: pointer;
  display: flex; flex-direction: column; gap: 8px;
  transition: all .15s;
  border-left: 2px solid var(--cat, var(--ink-dim));
  position: relative;
  color: inherit;
  text-decoration: none;
  overflow: hidden;
}
.card:hover { background: var(--surface-hi); border-color: var(--amber); border-left-color: var(--cat, var(--amber)); }
.card-thumb {
  width: calc(100% + 28px);
  margin: -12px -14px 0;
  aspect-ratio: 16/9;
  border-bottom: 1px solid var(--rule);
  flex-shrink: 0;
  overflow: hidden;
  background: var(--bg-deep);
}
.card-thumb img {
  width: 100%; height: 100%;
  object-fit: contain; object-position: center;
  padding: 6px;
  box-sizing: border-box;
  display: block;
}
.feed-list .card { flex-direction: row; align-items: flex-start; gap: 12px; }
.feed-list .card-thumb {
  width: 72px; height: 50px;
  flex-shrink: 0;
  border-radius: 3px;
  overflow: hidden;
  background: var(--bg-deep);
  border: 1px solid var(--rule-soft);
  margin: 0;
  aspect-ratio: unset;
}
.feed-list .card-thumb img {
  padding: 0;
  object-fit: cover; object-position: center;
}
.feed-list .card-body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 6px; }
.card.urgent { border-left-color: var(--red); }
.card.urgent::before {
  content: 'CRIT';
  position: absolute; top: 8px; right: 10px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  font-weight: 700;
  padding: 1px 5px;
  background: var(--red);
  color: white;
  border-radius: 2px;
  letter-spacing: .08em;
}
.card-head {
  display: flex; flex-wrap: wrap; gap: 5px; align-items: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .06em;
}
.cat-tag {
  padding: 2px 6px;
  border-radius: 3px;
  background: transparent;
  color: var(--cat, var(--ink-soft));
  border: 1px solid var(--cat, var(--rule));
}
.date-tag {
  padding: 2px 6px;
  border-radius: 3px;
  background: var(--bg-deep);
  color: var(--ink-dim);
  border: 1px solid var(--rule);
}
.dot-brk { color: var(--magenta); font-weight: 700; }
/* unread-pill removido: sem tracking de lida/não-lida */
.card-title {
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 15px;
  font-weight: 600;
  line-height: 1.3;
  letter-spacing: -0.01em;
  color: var(--ink);
}
.card-sum {
  font-size: 13px;
  line-height: 1.55;
  color: var(--ink-soft);
  flex: 1;
}
/* .card.is-read removido: sem tracking de lida/não-lida */
.card-tags {
  display: flex; flex-wrap: wrap; gap: 3px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
}
.tag-pill {
  padding: 1px 5px;
  background: var(--bg-deep);
  color: var(--ink-dim);
  border: 1px solid var(--rule-soft);
  border-radius: 2px;
  letter-spacing: .02em;
}

/* feed - list mode (1 coluna larga, formato feed/newsletter) */
.feed-list {
  display: flex; flex-direction: column; gap: 8px;
  max-width: 860px;
  margin: 0 auto;
}
.feed-list .card {
  padding: 16px 20px;
  border-radius: 5px;
  gap: 10px;
}
.feed-list .card-title {
  font-size: 17px;
  line-height: 1.3;
}
.feed-list .card-sum {
  font-size: 14px;
  line-height: 1.6;
}

/* date group divider (in aggregate feed) */
.date-group {
  margin: 24px 0 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--amber);
  text-shadow: var(--glow-a);
  display: flex; align-items: center; gap: 10px;
}
.date-group::before { content: '──'; color: var(--ink-faint); text-shadow: none; }
.date-group::after { content: ''; flex: 1; border-bottom: 1px dashed var(--rule); margin-left: 4px; }
.date-group .dg-label {
  text-transform: uppercase;
  letter-spacing: .12em;
}
.date-group .dg-count { color: var(--ink-dim); font-size: 10px; }

/* tools */
.tools-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 8px;
}
.tool-card {
  background: var(--surface);
  border: 1px solid var(--rule);
  border-radius: 5px;
  padding: 12px 14px;
  display: grid;
  grid-template-columns: 32px 1fr auto;
  gap: 10px;
  align-items: start;
  cursor: pointer;
  transition: all .15s;
  text-decoration: none;
  color: inherit;
  border-left: 2px solid var(--tool-kind, var(--cyan));
}
.tool-card.has-thumb { grid-template-columns: 48px 1fr auto; }
.tool-card:hover { background: var(--surface-hi); border-color: var(--tool-kind, var(--cyan)); }
.tool-card.tk-release { border-left-color: var(--green); }
.tool-card.tk-news    { border-left-color: var(--cyan); }
.tool-card.tk-tip     { border-left-color: var(--amber); }
.tool-card.tk-tutorial { border-left-color: #9b7bff; }
.tool-card.tk-curiosity { border-left-color: #ff6aa0; }
.tool-icon {
  width: 32px; height: 32px;
  background: var(--bg-deep);
  border-radius: 4px;
  display: grid; place-items: center;
  font-size: 15px;
  border: 1px solid var(--rule);
}
.tool-card.has-thumb .tool-icon {
  width: 48px; height: 48px;
  background: var(--bg-deep) center/contain no-repeat;
  border: 1px solid var(--rule);
  border-radius: 4px;
  font-size: 0;
}
.tool-body { min-width: 0; }
.tool-head { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; margin-bottom: 2px; }
.tool-kind-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8px;
  letter-spacing: .08em;
  font-weight: 700;
  padding: 2px 5px;
  border-radius: 2px;
  color: var(--bg-deep);
  white-space: nowrap;
  flex-shrink: 0;
}
.tool-name {
  font-family: 'IBM Plex Sans', sans-serif;
  font-weight: 600;
  font-size: 13px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.tool-note {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px;
  color: var(--ink-dim);
  line-height: 1.4;
  margin-top: 2px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.tool-ver {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px;
  padding: 2px 6px;
  background: var(--green);
  color: var(--bg-deep);
  border-radius: 3px;
  font-weight: 700;
  white-space: nowrap;
  align-self: start;
}

/* empty states */
.empty-state, .no-items {
  padding: 56px 24px;
  text-align: center;
  color: var(--ink-dim);
  font-family: 'JetBrains Mono', monospace;
}
.empty-state h2 {
  font-size: 18px;
  color: var(--amber);
  margin-bottom: 10px;
}
.empty-state p { font-size: 12px; }
.empty-state a { color: var(--amber); text-decoration: underline; }
.no-items {
  padding: 40px 20px;
  font-size: 12px;
  border: 1px dashed var(--rule);
  border-radius: 5px;
  background: var(--surface);
  margin-top: 10px;
}

/* ═══ Telemetry rail ═══ */
.rail {
  grid-area: rail;
  background: var(--dot-tex), var(--panel-bg);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-left: 1px solid var(--rule);
  padding: 16px 16px 20px;
  overflow-y: auto;
}
.rail::-webkit-scrollbar { width: 6px; }
.rail::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 3px; }
.rail-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px;
  letter-spacing: .22em;
  color: var(--ink-dim);
  margin-bottom: 10px;
  text-transform: uppercase;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--rule);
  display: flex; justify-content: space-between; align-items: center;
}
.rail-title .pulse-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--green); box-shadow: var(--glow-g);
  animation: pulse 1.6s ease-in-out infinite;
}

/* quote do dia */
.quote-box {
  padding: 12px 14px 4px;
  background: linear-gradient(135deg, var(--surface) 0%, color-mix(in srgb, var(--cyan) 5%, var(--surface)) 100%);
  border: 1px solid var(--rule);
  border-left: 3px solid var(--cyan);
  border-radius: 6px;
  margin-bottom: 20px;
  overflow: hidden;
}
.quote-mark {
  font-size: 48px;
  line-height: 0.8;
  color: var(--cyan);
  opacity: .22;
  font-family: Georgia, serif;
  float: left;
  margin-right: 6px;
  margin-top: 2px;
  pointer-events: none;
  user-select: none;
}
.quote-text {
  font-size: 12.5px;
  font-style: italic;
  color: var(--ink);
  line-height: 1.6;
  overflow: hidden;
  margin-bottom: 10px;
}
.quote-author {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: .06em;
  color: var(--cyan);
  text-shadow: var(--glow-c);
  padding-left: 2px;
  margin-bottom: 10px;
}
.quote-meta {
  padding: 7px 8px 9px;
  border-top: 1px solid var(--rule);
  border-radius: 0 0 4px 4px;
  transition: background .15s;
  line-height: 1.2;
}
.quote-meta.is-link { cursor: pointer; }
.quote-meta.is-link:hover { background: color-mix(in srgb, var(--cyan) 9%, transparent); }
.quote-context {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--ink-faint);
  letter-spacing: .04em;
  line-height: 1.2;
  display: block;
  white-space: normal;
}

/* ─── About page ─────────────────────────────────────────────────────── */
.about-page { max-width: 900px; margin: 0 auto; padding: 0 4px 60px; }

.ab-hero {
  padding: 32px 24px 28px;
  border: 1px solid var(--rule);
  border-left: 4px solid var(--cyan);
  border-radius: 8px;
  margin-bottom: 40px;
  background: linear-gradient(135deg, var(--surface) 0%, color-mix(in srgb, var(--cyan) 6%, var(--surface)) 100%);
  position: relative;
  overflow: hidden;
}
.ab-hero::before {
  content: 'DevPulse';
  position: absolute; right: 24px; top: 50%; transform: translateY(-50%);
  font-size: 88px; font-family: 'JetBrains Mono', monospace;
  color: var(--cyan); opacity: .04; pointer-events: none;
  letter-spacing: -.04em; line-height: 1;
}
.ab-hero-prompt {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: var(--cyan); opacity: .7;
  letter-spacing: .08em; margin-bottom: 12px;
}
.ab-hero-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 22px; font-weight: 700;
  color: var(--fg); margin: 0 0 10px;
  letter-spacing: -.01em;
}
.ab-hero-sub {
  font-size: 13px; color: var(--ink-soft);
  line-height: 1.6; margin: 0 0 24px;
  max-width: 540px;
}
.ab-stats {
  display: flex; flex-wrap: wrap; gap: 12px;
}
.ab-stat {
  display: flex; flex-direction: column; align-items: center;
  padding: 10px 18px;
  background: var(--bg-deep);
  border: 1px solid var(--rule); border-radius: 6px;
  min-width: 70px;
}
.ab-stat-n {
  font-family: 'JetBrains Mono', monospace;
  font-size: 22px; font-weight: 700; color: var(--cyan);
  text-shadow: var(--glow-c); line-height: 1;
}
.ab-stat-l {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; color: var(--ink-faint); letter-spacing: .06em;
  margin-top: 4px;
}

.ab-section { margin-bottom: 48px; }
.ab-section-hd {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 6px;
}
.ab-section-hd-icon { color: var(--cyan); flex-shrink: 0; }
.ab-section-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; font-weight: 700; letter-spacing: .12em;
  text-transform: uppercase; color: var(--cyan);
  text-shadow: var(--glow-c);
}
.ab-section-rule {
  flex: 1; height: 1px; background: linear-gradient(to right, var(--cyan), transparent);
  opacity: .3;
}

.ab-2col {
  display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
  margin-bottom: 20px;
}
@media (max-width: 640px) { .ab-2col { grid-template-columns: 1fr; } }

.ab-explain-box {
  padding: 16px 18px;
  background: var(--surface);
  border: 1px solid var(--rule); border-radius: 6px;
}
.ab-explain-box h3 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; font-weight: 700; color: var(--fg);
  margin: 0 0 10px; letter-spacing: .04em;
}
.ab-explain-box p {
  font-size: 12px; color: var(--ink-soft); line-height: 1.65;
  margin: 0;
}
.ab-rule-chip {
  display: inline-flex; align-items: center; gap: 5px;
  font-family: 'JetBrains Mono', monospace; font-size: 9.5px;
  padding: 3px 8px; border-radius: 3px;
  border: 1px solid; margin-top: 10px; letter-spacing: .04em;
}
.ab-rule-chip.amber { color: var(--amber); border-color: color-mix(in srgb, var(--amber) 40%, transparent); }
.ab-rule-chip.cyan  { color: var(--cyan);  border-color: color-mix(in srgb, var(--cyan) 40%, transparent); }
.ab-rule-chip.violet{ color: var(--violet);border-color: color-mix(in srgb, var(--violet) 40%, transparent); }

/* category grid */
.ab-cat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
  gap: 10px;
}
.ab-cat-card {
  padding: 14px 14px 12px;
  background: color-mix(in srgb, var(--k, var(--surface)) 8%, var(--surface));
  border: 1px solid color-mix(in srgb, var(--k, var(--rule)) 30%, var(--rule));
  border-radius: 8px;
  cursor: pointer; transition: border-color .15s, background .15s;
  display: flex; flex-direction: column; gap: 6px;
}
.ab-cat-card:hover {
  background: color-mix(in srgb, var(--k, var(--surface)) 16%, var(--surface));
  border-color: color-mix(in srgb, var(--k, var(--rule)) 60%, var(--rule));
}
.ab-cat-icon { color: var(--k, var(--cyan)); }
.ab-cat-name {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px; font-weight: 700; color: var(--fg);
  letter-spacing: .02em;
}
.ab-cat-rule {
  font-size: 9px; color: var(--ink-faint);
  font-family: 'JetBrains Mono', monospace; letter-spacing: .04em;
}

/* tool groups */
.ab-group {
  margin-bottom: 20px;
}
.ab-group-hd {
  display: flex; align-items: center; gap: 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px; font-weight: 700; letter-spacing: .08em;
  text-transform: uppercase; margin-bottom: 8px;
}
.ab-tool-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(78px, 1fr));
  gap: 6px;
}
.ab-tool-tile {
  display: flex; flex-direction: column; align-items: center;
  justify-content: space-between;
  padding: 10px 6px 8px;
  min-height: 80px;
  background: color-mix(in srgb, var(--k, var(--surface)) 12%, var(--surface));
  border: 1px solid color-mix(in srgb, var(--k, var(--rule)) 25%, var(--rule));
  border-radius: 10px;
  cursor: pointer; transition: border-color .15s, background .15s;
}
.ab-tool-tile:hover {

}
.ab-tool-logo { width: 36px; height: 36px; object-fit: contain; }
.ab-tool-name {

/* quote & verse mockups */
.ab-mockup {
  padding: 14px 16px 12px;
  background: var(--bg-deep);
  border: 1px solid var(--rule);
  border-radius: 6px;
  font-size: 11px; color: var(--ink-dim);

  line-height: 1.6;
}
.ab-mockup-ref {

  font-size: 9px; color: var(--cyan); font-style: normal;

}
/* ─── /About page ─────────────────────────────────────────────────────── */

/* theme button discreto no topbar */
.tb-theme {
  background: transparent;
  border: none;
  color: var(--ink-dim);
  cursor: pointer;
  padding: 0 8px;
  display: inline-flex; align-items: center;
  transition: color .15s;
  opacity: .6;
}
.tb-theme:hover { color: var(--amber); opacity: 1; }

/* rail assuntos section */
.rail-tools-sec { margin-top: 4px; }
.rail-tools-title {
  padding: 0 6px 6px;
  font-size: 9.5px;
  letter-spacing: .22em;
  color: var(--ink-dim);
  text-transform: uppercase;
  font-family: 'JetBrains Mono', monospace;
}

/* radar (mantido para não quebrar refs no JS, mas oculto) */
.radar-sec { display: none; }
.radar-bars { display: flex; flex-direction: column; gap: 4px; }
.radar-bars { display: flex; flex-direction: column; gap: 4px; }
.rb {
  display: flex; align-items: center; gap: 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--ink-soft);
}
.rb-name {
  width: 62px;
  text-transform: uppercase;
  letter-spacing: .08em;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  color: var(--rb-color, var(--ink-soft));
}
.rb-track {
  flex: 1; height: 8px;
  background: var(--bg-deep);
  border: 1px solid var(--rule);
  position: relative; overflow: hidden;
  border-radius: 1px;
}
.rb-fill {
  position: absolute; top: 0; left: 0; bottom: 0;
  background: var(--rb-color, var(--green));
  box-shadow: 0 0 4px var(--rb-color, var(--green));
  transition: width .4s ease;
}
.rb.urgent .rb-fill {
  background: var(--red);
  box-shadow: 0 0 6px var(--red);
  animation: critPulse 2s ease-in-out infinite;
}
.rb-val {
  font-size: 10px;
  color: var(--ink-dim);
  width: 42px;
  text-align: right;
}
.rb-val .delta { font-size: 9px; }
.rb-val .delta.up { color: var(--red); }
.rb-val .delta.down { color: var(--green); }


/* ═══ Date picker ═══ */
.dp-panel {
  display: block;
  margin: 12px 10px 4px;
  padding: 12px 10px 10px;
  background: var(--surface);
  border: 1px dashed var(--rule);
  border-radius: 4px;
}
.dp-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
.dp-dow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px;
  color: var(--ink-dim);
  text-align: center;
  padding: 3px;
}
.dp-cell {
  aspect-ratio: 1;
  display: grid; place-items: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  border-radius: 3px;
  color: var(--ink-faint);
  cursor: default;
  background: transparent;
  position: relative;
}
.dp-cell.has-edition { color: var(--ink); background: var(--surface); cursor: pointer; }
.dp-cell.has-edition:hover { background: var(--amber); color: var(--bg-deep); }
.sidebar.ctx-agg .dp-panel,
.sidebar.ctx-agg .dp-panel * { cursor: pointer; }
.sidebar.ctx-agg .dp-cell.has-edition:hover { background: var(--surface); color: var(--ink); }
.sidebar.ctx-agg .dp-cell.current:hover { background: var(--amber); color: var(--bg-deep); }
.sidebar.ctx-agg .dp-cell.dp-today:not(.current):hover { background: transparent; color: var(--cyan); }
.dp-cell.current { background: var(--amber); color: var(--bg-deep); font-weight: 700; }
.dp-cell.dp-today:not(.current) { border: 1px solid var(--cyan); color: var(--cyan); border-radius: 3px; }

/* ═══ Modal (reader + read-later + search) ═══ */
.modal {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.78);
  backdrop-filter: blur(6px);
  z-index: 500;
  display: none;
  align-items: flex-start;
  justify-content: center;
  padding: 6vh 20px 20px;
  overflow-y: auto;
}
.modal.open { display: flex; }
.modal-body {
  width: min(94vw, 820px);
  max-height: calc(100vh - 12vh - 20px);
  background: var(--surface);
  border: 1px solid var(--amber);
  border-radius: 10px;
  overflow: hidden;
  display: flex; flex-direction: column;
  position: relative;
}
.modal-body::before {
  content: "";
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--amber), var(--cyan), var(--magenta));
}
.modal-head {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 20px;
  border-bottom: 1px solid var(--rule);
  font-family: 'JetBrains Mono', monospace;
  flex-shrink: 0;
}
.modal-prompt { color: var(--green); font-weight: 700; font-size: 14px; text-shadow: var(--glow-g); }
.modal-head .modal-title {
  color: var(--ink);
  font-weight: 600;
  font-size: 12px;
  flex: 1;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.modal-close {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; padding: 5px 10px;
  background: var(--bg-deep); border: 1px solid var(--rule);
  border-radius: 3px; cursor: pointer;
  color: var(--ink-soft); text-transform: uppercase;
}
.modal-close:hover { border-color: var(--red); color: var(--red); }
.modal-content {
  overflow-y: auto;
  padding: 20px 26px 26px;
}
.modal-content::-webkit-scrollbar { width: 8px; }
.modal-content::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 4px; }

/* CVE e tag pills (usados inline nos cards) */
.cve-pill {
  padding: 1px 5px;
  background: var(--red);
  color: white;
  border-radius: 2px;
  font-weight: 700;
  text-decoration: none;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px;
}
.cve-pill:hover { background: var(--amber); color: var(--bg-deep); }

/* read-later list modal */
.rl-sub {
  padding: 10px 20px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--ink-dim);
  border-bottom: 1px solid var(--rule-soft);
  background: var(--bg-deep);
  display: flex; justify-content: space-between; align-items: center; gap: 10px;
  flex-wrap: wrap;
}
.rl-sub-actions { display: flex; gap: 6px; }
.rl-sub-actions button, .rl-sub-actions select {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  padding: 4px 8px;
  border: 1px solid var(--rule);
  background: var(--surface);
  color: var(--ink-soft);
  border-radius: 3px;
  cursor: pointer;
}
.rl-sub-actions button:hover { border-color: var(--amber); color: var(--amber); }
.rl-list { padding: 6px 0; }
.rl-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 16px;
  cursor: pointer;
  border-left: 2px solid transparent;
  transition: all .12s;
  text-decoration: none; color: inherit;
  position: relative;
}
.rl-item:hover { background: var(--surface-hi); border-left-color: var(--amber); }
.rl-item + .rl-item { border-top: 1px solid var(--rule-soft); }
.rl-item-thumb {
  width: 52px; height: 36px;
  flex-shrink: 0;
  border-radius: 3px;
  overflow: hidden;
  background: var(--surface);
  border: 1px solid var(--rule-soft);
}
.rl-item-thumb img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}
.rl-item-body { flex: 1; min-width: 0; }
.rl-item-title {
  font-family: 'IBM Plex Sans', sans-serif;
  font-weight: 600;
  font-size: 14px;
  color: var(--ink);
  line-height: 1.3;
  margin-bottom: 4px;
  padding-right: 32px;
  overflow: hidden; text-overflow: ellipsis;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;

.rl-item-meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  color: var(--ink-dim);
  display: flex; gap: 10px; flex-wrap: wrap;
}
.rl-item-meta .c { color: var(--cyan); }
.rl-item-meta .d { color: var(--amber); }
.rl-remove {
  position: absolute; right: 14px; top: 12px;
  width: 28px; height: 28px;
  background: transparent;
  border: 1px solid var(--rule);
  border-radius: 4px;
  cursor: pointer;
  color: var(--ink-dim);
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  display: grid; place-items: center;
}
.rl-remove:hover { border-color: var(--red); color: var(--red); }
.empty-inline {
  padding: 50px 24px;
  text-align: center;
  color: var(--ink-dim);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
}
.empty-inline b { color: var(--amber); }

/* busca removida */

/* toast */
.toast {
  position: fixed;
  bottom: 40px; left: 50%;
  transform: translate(-50%, 20px);
  background: var(--surface);
  border: 1px solid var(--amber);
  border-left-width: 3px;
  padding: 10px 18px;
  border-radius: 4px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--ink);
  z-index: 900;
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s, transform .2s;
  box-shadow: 0 8px 24px rgba(0,0,0,.35);
}
.toast.on {
  opacity: 1;
  pointer-events: auto;
  transform: translate(-50%, 0);
}

/* ═══ Responsive ═══ */
@media (max-width: 1280px) {
  .shell { grid-template-columns: 240px 1fr 264px; }
  .pillars { grid-template-columns: 1fr 1fr; }

}
@media (max-width: 1080px) {

  }

}

  .feed-list { max-width: 100%; }
}

/* ═══ Clock (sidebar base) ═══ */
const _WEEKDAYS = ['Dom.','Seg.','Ter.','Qua.','Qui.','Sex.','Sáb.'];
const _MONTHS   = ['jan.','fev.','mar.','abr.','maio','jun.','jul.','ago.','set.','out.','nov.','dez.'];
function tickClock(){
  const now = new Date();
  const sbx = $('sbx-clock');
  if (!sbx) return;
  const wd  = _WEEKDAYS[now.getDay()];
  const day = now.getDate();
  const mon = _MONTHS[now.getMonth()];
  const hh  = String(now.getHours()).padStart(2,'0');
  const mm  = String(now.getMinutes()).padStart(2,'0');
  const ss  = String(now.getSeconds()).padStart(2,'0');
  sbx.textContent = `${wd} ${day} de ${mon} ${hh}:${mm}:${ss}`;
}
setInterval(tickClock, 1000); tickClock();

function updateLastGenerated(){
  const iso = STATE.editionsIndex?.last_generated;
  if (!iso) return;
  const diff = Date.now() - new Date(iso).getTime();
  const h = Math.floor(diff / 3600000);
  const days = Math.floor(h / 24);
  let txt;
  if (h < 1) txt = 'há <1h';
  else if (h < 24) txt = `há ${h}h`;
  else txt = `há ${days}d`;
  const el = $('sbx-updated');
  if (el) el.textContent = txt;
  const chunk = el?.parentElement;
  if (chunk) chunk.classList.toggle('stale', h > 36);
  // sincroniza LED no início
  document.querySelector('.tb-status .live-dot')?.classList.toggle('stale', h > 36);
}

/* ═══ Boot sequence ═══ */
const BOOT_STEPS = [
  { s: 'OK',   msg: 'mounting /data', v: '' },
  { s: 'OK',   msg: 'fetch editions.json', v: '' },
  { s: 'OK',   msg: 'indexed editions', v: '', dyn: 'indexed' },
  { s: 'OK',   msg: 'load current edition', v: '', dyn: 'edition' },
  { s: 'OK',   msg: 'init ui · theme · quotes', v: '' },
  { s: 'OK',   msg: 'ready · csr news online', v: '' }
];
function bootStep(i, data){
  const log = $('boot-log');
  if (i >= BOOT_STEPS.length) {
    setTimeout(() => {
      $('boot').classList.add('gone');
      setTimeout(() => $('boot').remove(), 600);
      sessionStorage.setItem('dpco-booted', '1');
    }, 280);
    return;
  }
  const step = BOOT_STEPS[i];
  let val = step.v;
  if (step.dyn === 'indexed') val = ((data && data.count) || 0) + ' editions';
  if (step.dyn === 'edition') val = (data && data.date) || '';
  const line = document.createElement('div');
  line.className = 'boot-line';
  line.style.animationDelay = (i * 0.12) + 's';
  line.innerHTML = `<span class="status">[${step.s}]</span><span class="msg">${step.msg}</span>${val ? `<span class="val">→ ${esc(val)}</span>` : ''}`;
  log.appendChild(line);
}
function skipBoot(){
  const log = $('boot-log');
  BOOT_STEPS.forEach(step => {
    const line = document.createElement('div');
    line.className = 'boot-line';
    line.style.animationDelay = '0s';
    line.innerHTML = `<span class="status">[${step.s}]</span><span class="msg">${step.msg}</span>`;
    log.appendChild(line);
  });
  setTimeout(() => {
    $('boot').classList.add('gone');
    setTimeout(() => $('boot').remove(), 300);
  }, 120);
}

/* ═══ Data loading ═══ */
function setLoader(on){ $('loaderBar').classList.toggle('on', on); }

async function loadIndex(){
  try {
    const r = await fetch('data/editions.json');
    STATE.editionsIndex = await r.json();
    return true;
  } catch(e) { return false; }
}
async function loadEdition(date){
  if (STATE.editionsCache[date]) {
    STATE.currentEdition = STATE.editionsCache[date];
    STATE.currentDate = date;
    return true;
  }
  try {
    const r = await fetch('data/' + date + '.json');
    if (!r.ok) throw new Error('404');
    const json = await r.json();
    STATE.editionsCache[date] = json;
    STATE.currentEdition = json;
    STATE.currentDate = date;
    return true;
  } catch(e) { return false; }
}
async function loadDates(dates){
  setLoader(true);
  try {
    await Promise.all(dates.map(async d => {
      if (STATE.editionsCache[d]) return;
      try { const r = await fetch('data/' + d + '.json'); if (r.ok) STATE.editionsCache[d] = await r.json(); }
      catch(er){}
    }));
  } finally { setLoader(false); }
}
async function loadAll(){
  const eds = STATE.editionsIndex?.editions || [];
  await loadDates(eds.map(e => e.date));
}
// Lazy load inteligente: só baixa edições que têm o filtro (usando counts_by_*)
function catWithAliases(key) {
  const revMap = { aws: ['cloud'], data: ['db'], backend: ['lang'], design: ['arqsw'], enterprise: ['arqsol'] };
  return [key, ...(revMap[key] || [])];
}
async function loadForCategory(key){
  const keys = catWithAliases(key);
  const eds = STATE.editionsIndex?.editions || [];
  const dates = eds.filter(e => keys.some(k => e.counts_by_category?.[k] > 0) || !e.counts_by_category).map(e => e.date);
  await loadDates(dates);
}
async function loadForTool(key){
  const eds = STATE.editionsIndex?.editions || [];
  const dates = eds.filter(e => e.counts_by_tool?.[key] > 0 || !e.counts_by_tool).map(e => e.date);
  await loadDates(dates);
}

/* ═══ Aggregate helpers ═══ */
function allItemsAcrossEditions(){
  const out = [];
  Object.keys(STATE.editionsCache).forEach(date => {
    const ed = STATE.editionsCache[date];
    if (!ed) return;
    [...(ed.pillars||ed.top3||[]), ...(ed.news||[])].forEach(it => {
      out.push(Object.assign({}, it, { _date: date, _type: 'news' }));
    });
    (ed.tools||[]).forEach(t => {
      out.push({ _date: date, _type: 'tool', ...t });
    });
  });
  return out;
}
function matchesTool(item, tool){
  const text = ((item.headline||'') + ' ' + (item.summary||'') + ' ' + (item.name||'')).toLowerCase();
  return tool.aliases.some(a => text.indexOf(a.toLowerCase()) !== -1);
}

  const toolTotals = {};
  (STATE.editionsIndex?.editions || []).forEach(e => {
    Object.entries(e.counts_by_category || {}).forEach(([k,v]) => {
      const kk = (k in LEGACY_CAT_MAP) ? LEGACY_CAT_MAP[k] : k;
      if (kk) catTotals[kk] = (catTotals[kk] || 0) + v;
    });
    Object.entries(e.counts_by_tool || {}).forEach(([k,v]) => {
      toolTotals[k] = (toolTotals[k] || 0) + v;
    });
  });

  // Counts do dia atual (apenas em home); legacy keys mapeadas para o novo nome
  const catToday = {};
  if (isHome && ed) {
    [...(ed.pillars||ed.top3||[]), ...(ed.news||[])].forEach(it => {
      let k = it.category;
      if (k in LEGACY_CAT_MAP) k = LEGACY_CAT_MAP[k];
      if (k) catToday[k] = (catToday[k]||0) + 1;
    });
  }

  cats.innerHTML = Object.keys(CAT).map(k => {
    const total = catTotals[k] || 0;
    const tday = catToday[k] || 0;
    const active = STATE.view === 'cat:' + k ? 'active' : '';
    return `<div class="ch-item ${active}" data-filter-type="cat" data-filter-key="${k}" role="button" tabindex="0" style="--k: var(--cat-${k})">` +
           `<span class="ch-emoji">${iconSvg(CAT_ICONS[k] || '', 14)}</span>` +
           `<span class="ch-name">${CAT[k].lf}</span>` +
           `</div>`;
  }).join('');

  // tool counts "do dia": itens de tools[] com tool_key explícito (novo); fallback aliases (legado)
  const toolToday = {};
  if (isHome && ed) {
    const todayTools = ed.tools || [];
    const hasToolKey = todayTools.some(te => te.tool_key);
    if (hasToolKey) {
      todayTools.forEach(te => {
        const k = te.tool_key;
        if (k) toolToday[k] = (toolToday[k]||0) + 1;
      });
    } else {
      // Retrocompat: edições antigas sem tool_key
      const todayNews = [...(ed.pillars||ed.top3||[]), ...(ed.news||[])];
      TOOLS.forEach(t => {
        let n = 0;
        todayNews.forEach(it => { if (matchesTool(it, t)) n++; });
        todayTools.forEach(te => { if (t.aliases.some(a => (te.name||'').toLowerCase().includes(a.toLowerCase()))) n++; });
        toolToday[t.key] = n;
      });
    }
  }

  // Agrupar assuntos por grupo do rail (independente das categorias editoriais)
  const toolsByGroup = {};
  TOOLS.forEach(t => {
    const g = t.group || '_other';
    if (!toolsByGroup[g]) toolsByGroup[g] = [];
    toolsByGroup[g].push(t);
  });
  let toolsHtml = '';
  Object.keys(TOOL_GROUPS).forEach(groupKey => {
    const groupTools = toolsByGroup[groupKey];
    if (!groupTools || groupTools.length === 0) return;
    const gDef = TOOL_GROUPS[groupKey];
    toolsHtml += `<div class="tool-cat-header" style="--k: ${gDef.color}">` +
                 `<span class="tool-cat-icon">${iconSvg(CAT_ICONS[gDef.icon] || '', 13)}</span>` +
                 `<span class="tool-cat-name">${gDef.label}</span>` +
                 `</div>`;
    groupTools.forEach(t => {
      const active = STATE.view === 'tool:' + t.key ? 'active' : '';
      const logoHtml = t.logo
        ? `<img class="ch-tool-logo" src="${escAttr(t.logo)}" alt="${escAttr(t.name)}" loading="lazy" onerror="this.style.display='none'">`
        : `<span style="font-size:11px;opacity:.6">${esc(t.name.slice(0,2))}</span>`;
      toolsHtml += `<div class="ch-item ch-tool ${active}" data-filter-type="tool" data-filter-key="${t.key}" role="button" tabindex="0" title="${escAttr(t.name)}" style="--k: ${gDef.color}">` +
             logoHtml +
             `<span class="ch-name">${t.name}</span>` +
             `</div>`;
    });
  });
  if (toolsByGroup['_other']) {
    toolsByGroup['_other'].forEach(t => {
      const active = STATE.view === 'tool:' + t.key ? 'active' : '';
      toolsHtml += `<div class="ch-item ch-tool ${active}" data-filter-type="tool" data-filter-key="${t.key}" role="button" tabindex="0" style="--k: var(--cyan)">` +
             `<span class="ch-name">${t.name}</span>` +
             `</div>`;
    });
  }
  tools.innerHTML = toolsHtml;


  // sincronizar contextuais
  updateMainPrompt();
  updateSideNavDate();
  updateAggContext();
}

/* ═══ Rail render ═══ */
function renderRail(){
  cycleQuote();

  // Radar: conta categorias da edição atual vs média das últimas 7 edições
  const eds = STATE.editionsIndex?.editions || [];
  let items;
  if (STATE.view === 'home' && STATE.currentEdition) {
    items = [...(STATE.currentEdition.pillars||STATE.currentEdition.top3||[]), ...(STATE.currentEdition.news||[])];
  } else {
    items = allItemsAcrossEditions().filter(x => x._type === 'news');
  }
  const counts = {}, urg = {};
  let max = 0;
  items.forEach(x => {
    counts[x.category] = (counts[x.category]||0) + 1;
    if (x.urgent) urg[x.category] = (urg[x.category]||0) + 1;
    if (counts[x.category] > max) max = counts[x.category];
  });
  // baseline: média das últimas 7 edições por categoria (do índice)
  const baseline = {};
  const recent7 = eds.slice(0, 7);
  if (recent7.length) {
    recent7.forEach(e => {
      Object.entries(e.counts_by_category || {}).forEach(([k,v]) => {
        baseline[k] = (baseline[k] || 0) + v;
      });
    });
    Object.keys(baseline).forEach(k => baseline[k] /= recent7.length);
  }

  $('radar-bars').innerHTML = Object.keys(CAT).map(k => {
    if (!counts[k]) return '';
    const pct = max ? Math.round(counts[k] * 100 / max) : 0;
    const isUrg = urg[k] ? ' urgent' : '';
    // delta vs baseline (só mostra em view home)
    let delta = '';
    if (STATE.view === 'home' && baseline[k]) {
      const diff = counts[k] - baseline[k];
      if (Math.abs(diff) >= 1) {
        const dir = diff > 0 ? 'up' : 'down';
        const sign = diff > 0 ? '+' : '';
        delta = `<span class="delta ${dir}">${sign}${Math.round(diff)}</span>`;
      }
    }
    return `<div class="rb${isUrg}" style="--rb-color: var(--cat-${k})"><span class="rb-name">${CAT[k].l}</span>` +
           `<span class="rb-track"><span class="rb-fill" style="width:${pct}%"></span></span>` +
           `<span class="rb-val">${counts[k]} ${delta}</span></div>`;
  }).join('') || '<div style="color:var(--ink-dim);font-size:10px">sem dados</div>';

}

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

let _quoteDeck = [];
let _deckIdx  = 0;

function currentQuotes(){ return _allQuotes.length ? _allQuotes : STATIC_QUOTES_LEGACY; }

function renderQuote(q){
  const textEl = $('quote-text');
  const authorEl = $('quote-author');
  const ctxEl = $('quote-context');
  const metaEl = $('quote-meta');
  if (!textEl) return;
  textEl.textContent = '\u201c' + q.text + '\u201d';
  authorEl.textContent = '— ' + q.author;
  if (ctxEl) ctxEl.textContent = q.context || '';
  if (metaEl) metaEl.hidden = !q.context && !q.url;
  if (metaEl) {
    if (q.url) {
      metaEl.classList.add('is-link');
      metaEl.onclick = () => window.open(q.url, '_blank', 'noopener noreferrer');
    } else {
      metaEl.classList.remove('is-link');
      metaEl.onclick = null;
    }
  }
}

function cycleQuote(){
  const pool = currentQuotes();
  if (!pool.length) return;
  if (!_quoteDeck.length || _deckIdx >= _quoteDeck.length) {
    _quoteDeck = shuffleArray(pool);
    _deckIdx = 0;
  }
  renderQuote(_quoteDeck[_deckIdx++]);
}
function prevQuote(){
  const pool = currentQuotes();
  if (!pool.length) return;
  if (!_quoteDeck.length) { _quoteDeck = shuffleArray(pool); _deckIdx = _quoteDeck.length; }
  _deckIdx = (_deckIdx - 2 + _quoteDeck.length) % _quoteDeck.length;
  renderQuote(_quoteDeck[_deckIdx++]);
}
function nextQuote(){ cycleQuote(); }

setInterval(() => { if (!document.hidden) cycleQuote(); }, 300000);

function formatGeneratedAt(raw){
  if (!raw) return '';
  // aceita tanto "06:00" legacy quanto ISO 8601 completo
  if (raw.includes('T')) {
    try {
      const d = new Date(raw);
      return d.toLocaleString('pt-BR', { hour: '2-digit', minute: '2-digit', timeZoneName: 'short' });
    } catch(e){ return raw; }
  }
  return raw;
}

function renderCategory(key){
  const cat = CAT[key];
  if (!cat) return renderHome();
  const validKeys = new Set(catWithAliases(key));
  const items = applyFilters(
    allItemsAcrossEditions()
      .filter(x => x._type === 'news' && validKeys.has(x.category))
      .sort((a,b) => (b._date||'').localeCompare(a._date||''))
  );

  let html = `<div class="main-prompt" id="mainPrompt"></div>`;
  html += `<section class="ctx-hero" style="--ctx-color: var(--cat-${key}); margin-top:18px">`;
  html += `<div class="ctx-hero-title"><span class="ctx-kind-label">Categoria</span>${iconSvg(CAT_ICONS[key] || '', 26)} ${esc(cat.lf)}</div>`;
  html += `<p class="ctx-hero-lede">Arquivo histórico de todas as notícias da categoria <b>${esc(cat.lf)}</b> em todas as edições indexadas, agrupadas por data.</p>`;

  html += `<span><span class="mk">edições</span> <span class="mv">${new Set(items.map(i=>i._date)).size}</span></span>`;
  html += `<span><span class="mk">urgentes</span> <span class="mv">${items.filter(i => i.urgent).length}</span></span>`;

  html += buildToolbar();
