<html lang="pt-BR" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="theme-color" content="#060A10" media="(prefers-color-scheme: dark)">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="CsR News">
  <meta property="og:title" content="CsR News · Arquivo diário do arquiteto">
  <meta property="og:description"
    content="Curadoria diária de notícias técnicas para arquitetos de software e solução sênior.">
  <meta property="og:locale" content="pt_BR">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="CsR News">
  <meta name="twitter:description" content="Curadoria diária de notícias técnicas para arquitetos.">

  <link rel="icon" href="assets/csr-news-logo.svg">
  <link rel="alternate" type="application/rss+xml" title="CsR News · Edições" href="feed.xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=VT323&display=swap"
    rel="stylesheet">
  <style>
    /* ═══════════════════════════════════════════════════════
   CSR NEWS CONSOLE OPS — Terminal layout × Mission palette
   ═══════════════════════════════════════════════════════ */
    :root,
    [data-theme="dark"] {
      --bg: #000000;
      --bg-deep: #050a12;
      --surface: #0a1525;
      --surface-hi: #111f35;
      --surface-3: #1a2d45;
      --ink: #ddeeff;
      --ink-soft: #7a9abf;
      --ink-dim: #3a5a7a;
      --ink-faint: #243d5a;
      --rule: #1a2d45;
      --rule-soft: #243d5a;
      --amber: #F59E0B;
      --green: #22C55E;
      --red: #EF4444;
      --cyan: #38BDF8;
      --magenta: #A78BFA;
      --violet: #A78BFA;
      --blue: #60A5FA;
      --pink: #EC4899;
      --selection-bg: rgba(56, 189, 248, .28);
      --glow-g: 0 0 10px rgba(34, 197, 94, .5);
      --glow-a: 0 0 10px rgba(245, 158, 11, .55);
      --glow-r: 0 0 12px rgba(239, 68, 68, .6);
      --glow-c: 0 0 12px rgba(56, 189, 248, .55);
      --glow-v: 0 0 10px rgba(167, 139, 250, .5);
      --grid-line: rgba(56, 189, 248, .035);
      --grid-opacity: .35;
      --panel-bg: linear-gradient(180deg, rgba(13, 20, 32, .75), rgba(6, 10, 16, .85));
      --panel-bg-deep: linear-gradient(180deg, rgba(13, 20, 32, .9), rgba(13, 20, 32, .75));
      --panel-stat: rgba(2, 5, 10, .9);
      --dot-tex: radial-gradient(circle, rgba(148, 185, 220, .13) 1px, transparent 1px) 0 0 / 22px 22px;

      --cat-sec: #EF4444;
      /* vermelho   — perigo/segurança */
      --cat-ai: #A78BFA;
      /* violeta    — AI/neural */
      --cat-aiops: #c026d3;
      /* fúcsia     — AIOps/agents/LLMOps */
      --cat-cloud: #f59e0b;
      /* âmbar      — cloud multi-vendor (AWS/Azure/GCP) */
      --cat-devops: #3b82f6;
      /* azul       — pipelines/confiança */
      --cat-obs: #eab308;
      /* amarelo    — dashboards/alertas */
      --cat-data: #0ea5e9;
      /* azul-claro — fluxos de dados */
      --cat-integ: #14b8a6;
      /* teal       — conexões/APIs */
      --cat-backend: #22C55E;
      /* verde      — código/runtime */
      --cat-frontend: #e11d48;
      /* rose       — frontend/web */
      --cat-testing: #84cc16;
      /* lima       — qualidade/lab */
      --cat-design: #f472b6;
      /* rosa       — design/criatividade */
      --cat-distarch: #6366f1;
      /* índigo     — sistemas distribuídos */
      --cat-enterprise: #94a3b8;
      /* slate      — corporativo/neutro */
      --cat-fundamentals: #a16207;
      /* ocre       — base eterna */
      --cat-fintech: #10b981;
      /* esmeralda  — pagamentos/dinheiro */
      /* rail group headers (direita) */
      --rail-lang: #e879f9;
      /* fúcsia     — linguagens = expressivo */
      --rail-topics: #22d3ee;
      /* ciano      — tópicos = conhecimento */
      --rail-tools: #fb923c;
      /* laranja-suave — ferramentas = ofício */

      --tool-ide: #A78BFA;
      --tool-db: #38BDF8;
      --tool-devops: #F59E0B;
      --tool-api: #22C55E;
      --tool-doc: #EC4899;
      --tool-arch: #2DD4BF;

      --sev-critical: #EF4444;
      --sev-high: #F59E0B;
      --sev-medium: #FACC15;
      --sev-low: #22C55E;

      --focus: #F59E0B;
      --bubble-bg: rgba(10, 21, 37, .82);
      --bubble-mix: #000;

      --bg-grad: radial-gradient(ellipse at 20% 0%, rgba(56, 189, 248, .08), transparent 55%),
        radial-gradient(ellipse at 90% 100%, rgba(167, 139, 250, .06), transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(245, 158, 11, .03), transparent 70%),
        #060A10;
    }

    [data-theme="light"] {
      --bg: #EEF2F7;
      --bg-deep: #E2E8F0;
      --surface: #FFFFFF;
      --surface-hi: #F4F7FB;
      --surface-3: #C9D2DF;
      --ink: #0E1A2C;
      --ink-soft: #3C4E68;
      --ink-dim: #6C7E96;
      --ink-faint: #B1BCCC;
      --rule: #C9D2DF;
      --rule-soft: #B1BCCC;
      --amber: #B0590C;
      --green: #166534;
      --red: #B91C3C;
      --cyan: #0E7490;
      --magenta: #6D28D9;
      --violet: #6D28D9;
      --blue: #1D4ED8;
      --pink: #BE185D;
      --selection-bg: rgba(14, 116, 144, .2);
      --glow-g: 0 0 6px rgba(21, 128, 61, .25);
      --glow-a: 0 0 6px rgba(176, 89, 12, .3);
      --glow-r: 0 0 8px rgba(185, 28, 60, .3);
      --glow-c: 0 0 8px rgba(14, 116, 144, .3);
      --glow-v: 0 0 8px rgba(109, 40, 217, .3);
      --grid-line: rgba(14, 116, 144, .05);
      --grid-opacity: .5;
      --panel-bg: linear-gradient(180deg, rgba(255, 255, 255, .9), rgba(245, 248, 253, .95));
      --panel-bg-deep: linear-gradient(180deg, rgba(255, 255, 255, .95), rgba(255, 255, 255, .85));
      --panel-stat: rgba(255, 255, 255, .95);

      --cat-sec: #B91C3C;
      --cat-ai: #6D28D9;
      --cat-aiops: #a21caf;
      /* fúcsia escuro */
      --cat-cloud: #C46B00;
      --cat-devops: #1d4ed8;
      /* azul escuro */
      --cat-obs: #b45309;
      /* âmbar escuro */
      --cat-data: #0E7490;
      --cat-integ: #0F766E;
      --cat-backend: #166534;
      --cat-frontend: #be123c;
      /* rose escuro */
      --cat-testing: #5a7a09;
      --cat-design: #be185d;
      /* rosa escuro */
      --cat-distarch: #4338ca;
      /* índigo escuro */
      --cat-enterprise: #475569;
      /* slate escuro */
      --cat-fundamentals: #78350f;
      /* ocre escuro */
      --cat-fintech: #065f46;
      /* esmeralda escuro */
      /* rail group headers */
      --rail-lang: #a21caf;
      /* fúcsia escuro */
      --rail-topics: #0e7490;
      /* ciano escuro */
      --rail-tools: #c2410c;
      /* laranja escuro */

      --tool-ide: #6D28D9;
      --tool-db: #0E7490;
      --tool-devops: #B0590C;
      --tool-api: #166534;
      --tool-doc: #BE185D;
      --tool-arch: #0F766E;

      --sev-critical: #B91C3C;
      --sev-high: #B0590C;
      --sev-medium: #854D0E;
      --sev-low: #166534;

      --bg-grad: radial-gradient(ellipse at 20% 0%, rgba(14, 116, 144, .07), transparent 55%),
        radial-gradient(ellipse at 90% 100%, rgba(109, 74, 191, .06), transparent 50%),
        #EDF1F7;
      --dot-tex: radial-gradient(circle, rgba(14, 116, 144, .11) 1px, transparent 1px) 0 0 / 22px 22px;
      --bubble-bg: rgba(255, 255, 255, .95);
      --bubble-mix: #FFFFFF;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Inter Tight', sans-serif;
      font-size: 14.5px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      position: relative;
    }

    #particleBg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 0;
    }

    ::selection {
      background: var(--selection-bg);
      color: var(--ink);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .mono {
      font-family: 'JetBrains Mono', monospace;
    }

    button {
      font-family: inherit;
      color: inherit;
    }

    /* Focus visível */
    :focus-visible {
      outline: 2px solid var(--focus);
      outline-offset: 2px;
      border-radius: 3px;
    }

    /* Reduce motion */
    @media (prefers-reduced-motion: reduce) {

      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }

      body::before,
      body::after {
        display: none;
      }
    }

    /* ═══ Boot overlay ═══ */
    .boot {
      position: fixed;
      inset: 0;
      background: var(--bg-deep);
      z-index: 9999;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 14vh 24px 0;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--green);
      transition: opacity .5s ease;
    }

    .boot.gone {
      opacity: 0;
      pointer-events: none;
    }

    .boot-inner {
      width: min(560px, 92vw);
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .boot-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--rule);
    }

    .boot-logo img {
      width: 34px;
      height: 34px;
    }

    .boot-logo .bt {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: -.02em;
    }

    .boot-logo .bs {
      font-size: 10px;
      color: var(--ink-dim);
      letter-spacing: .15em;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .boot-line {
      display: flex;
      gap: 8px;
      opacity: 0;
      transform: translateY(4px);
      animation: bootIn .25s ease forwards;
    }

    .boot-line .status {
      color: var(--green);
      text-shadow: var(--glow-g);
      flex-shrink: 0;
      width: 56px;
    }

    .boot-line .status.warn {
      color: var(--amber);
      text-shadow: var(--glow-a);
    }

    .boot-line .msg {
      color: var(--ink-soft);
    }

    .boot-line .val {
      color: var(--cyan);
      margin-left: auto;
    }

    @keyframes bootIn {
      to {
        opacity: 1;
        transform: none;
      }
    }

    /* ═══ Shell grid ═══ */
    .shell {
      display: grid;
      grid-template-rows: 1fr;
      grid-template-columns: 262px 1fr 286px;
      grid-template-areas:
        "side main rail";
      height: calc(100vh - 36px);
      padding: 18px;
      position: relative;
      z-index: 2;
    }

    /* quote nav */

    /* verse nav */
    .verse-nav-btn {
      background: none;
      border: none;
      color: var(--ink-faint);
      font-size: 14px;
      line-height: 1;
      padding: 0 4px;
      cursor: pointer;
      flex-shrink: 0;
      transition: color .12s;
    }

    .verse-nav-btn:hover {
      color: var(--cyan);
    }

    /* verse footer */
    .verse-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 36px;
      background: var(--bg-deep);
      border-top: 1px solid var(--rule);
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      padding: 0 10px;
      z-index: 100;
      overflow: hidden;
    }

    .verse-symbol {
      flex-shrink: 0;
      width: 12px;
      height: 17px;
      color: var(--cyan);
      opacity: .8;
    }

    .verse-cross-link {
      display: flex;
      align-items: center;
      flex-shrink: 0;
      opacity: .8;
      transition: opacity .2s;
      color: var(--cyan);
    }

    .verse-cross-link:hover {
      opacity: 1;
    }

    a.verse-text-wrap {
      text-decoration: none;
      color: inherit;
      cursor: pointer;
    }

    a.verse-text-wrap:hover .verse-text {
      color: var(--fg);
    }

    a.verse-text-wrap:hover .verse-ref {
      text-shadow: var(--glow-c), 0 0 12px var(--cyan);
    }

    .verse-text-wrap {
      display: flex;
      align-items: baseline;
      gap: 10px;
      overflow: hidden;
      max-width: 85vw;
    }

    .verse-text {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 12px;
      font-style: italic;
      color: var(--ink-soft);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .verse-ref {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9.5px;
      color: var(--cyan);
      white-space: nowrap;
      flex-shrink: 0;
      letter-spacing: .06em;
      text-shadow: var(--glow-c);
    }

    @keyframes verseOut {
      from {
        transform: translateX(0);
        opacity: 1;
      }

      to {
        transform: translateX(70px);
        opacity: 0;
      }
    }

    @keyframes verseIn {
      from {
        transform: translateX(-70px);
        opacity: 0;
      }

      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    .verse-text-wrap.v-out {
      animation: verseOut .4s ease forwards;
    }

    .verse-text-wrap.v-in {
      animation: verseIn .4s ease forwards;
    }

    /* ═══ CVE View ═══ */
    .cve-hero {
      background: color-mix(in srgb, var(--sev-critical, #ff4444) 8%, var(--surface));
      border: 1px solid color-mix(in srgb, var(--sev-critical, #ff4444) 30%, transparent);
      border-radius: 8px;
      padding: 20px 22px;
      margin: 18px 0 8px;
    }

    .cve-hero-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .cve-hero-icon {
      font-size: 22px;
      line-height: 1;
    }

    .cve-hero-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 15px;
      font-weight: 700;
      color: var(--fg);
    }

    .cve-hero-subtitle {
      font-size: 10px;
      color: var(--ink-soft);
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: .04em;
    }

    .cve-lede {
      font-size: 12.5px;
      color: var(--ink-soft);
      line-height: 1.65;
      margin: 0 0 14px;
    }

    .cve-lede b {
      color: var(--fg);
    }

    .cve-links {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .cve-links a {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      color: var(--cyan);
      text-decoration: none;
      border: 1px solid var(--cyan);
      border-radius: 4px;
      padding: 3px 9px;
      transition: background .15s, color .15s;
    }

    .cve-links a:hover {
      background: var(--cyan);
      color: #000;
    }

    .cve-sev-bar {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .cve-sev-btn {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 4px;
      border: 1px solid var(--rule);
      background: transparent;
      color: var(--ink-soft);
      cursor: pointer;
      transition: all .15s;
    }

    .cve-sev-btn:hover {
      border-color: var(--fg);
      color: var(--fg);
    }

    .cve-sev-btn.active {
      color: #000;
    }

    .cve-sev-btn[data-sev=""] {
      border-color: var(--ink-soft);
    }

    .cve-sev-btn[data-sev=""].active {
      background: var(--ink-soft);
    }

    .cve-sev-btn[data-sev="critical"].active {
      background: #ff4444;
      border-color: #ff4444;
    }

    .cve-sev-btn[data-sev="high"].active {
      background: #ff8c42;
      border-color: #ff8c42;
    }

    .cve-sev-btn[data-sev="medium"].active {
      background: #f0c040;
      border-color: #f0c040;
    }

    .cve-sev-btn[data-sev="low"].active {
      background: #6ed6a0;
      border-color: #6ed6a0;
      color: #000;
    }

    /* ═══ Version Panel (Java · Python · JavaScript) ═══ */
    .vp-section {
      border-radius: 8px;
      padding: 18px 20px 20px;
      margin: 18px 0 8px;
      border: 1px solid transparent;
    }

    .vp-section-head {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 14px;
    }

    .vp-section-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 700;
    }

    .vp-section-sub {
      font-size: 11px;
      color: var(--ink-soft);
    }

    .vp-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 8px;
    }

    .vp-card {
      background: var(--surface);
      border: 1px solid var(--rule);
      border-radius: 6px;
      padding: 12px 14px;
      cursor: pointer;
      transition: border-color .15s, transform .1s, box-shadow .15s;
      display: flex;
      flex-direction: column;
      gap: 4px;
      position: relative;
    }

    .vp-card:hover {
      transform: translateY(-1px);
    }

    .vp-card.vp-active {
      box-shadow: 0 0 0 1px var(--vp-color, var(--cyan));
    }

    .vp-card.vp-active::after {
      content: '▾';
      position: absolute;
      bottom: 6px;
      right: 8px;
      font-size: 11px;
      color: var(--vp-color, var(--cyan));
      opacity: .8;
    }

    .vp-card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .vp-version-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 19px;
      font-weight: 700;
      color: var(--fg);
      line-height: 1.1;
    }

    .vp-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 8px;
      font-weight: 700;
      padding: 2px 5px;
      border-radius: 3px;
      letter-spacing: .05em;
      white-space: nowrap;
    }

    .vp-badge-lts {
      background: #1a3a1a;
      color: #6ed6a0;
      border: 1px solid #6ed6a0;
    }

    .vp-badge-sts {
      background: var(--surface);
      color: var(--ink-soft);
      border: 1px solid var(--rule);
    }

    .vp-badge-act {
      background: #1a2e1a;
      color: #6ed6a0;
      border: 1px solid #6ed6a0;
    }

    .vp-badge-sec {
      background: #2e2a1a;
      color: #f0c040;
      border: 1px solid #f0c040;
    }

    .vp-badge-eol {
      background: var(--surface);
      color: var(--ink-soft);
      border: 1px solid var(--rule);
    }

    .vp-badge-std {
      background: var(--surface);
      color: var(--ink-soft);
      border: 1px solid var(--rule);
    }

    .vp-card-date {
      font-size: 10px;
      color: var(--ink-soft);
    }

    .vp-card-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
    }

    .vp-card-sub {
      font-size: 9px;
      color: var(--ink-soft);
      margin-top: 2px;
    }

    /* Inline expand panel */
    .vp-detail {
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      margin-top: 0;
      transition: max-height .45s cubic-bezier(0.4, 0, 0.2, 1),
        opacity .3s ease,
        margin-top .3s ease;
    }

    .vp-detail.vp-open {
      max-height: 5000px;
      opacity: 1;
      margin-top: 14px;
    }

    .vp-detail-inner {
      border: 1px solid var(--rule);
      border-radius: 8px;
      padding: 18px 20px;
      background: var(--bg-deep);
      position: relative;
    }

    .vp-detail-inner::before {
      content: '';
      position: absolute;
      top: 0;
      left: 20px;
      right: 20px;
      height: 2px;
      background: var(--vp-color, var(--cyan));
      border-radius: 0 0 2px 2px;
      opacity: .7;
    }

    .vp-detail-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .vp-detail-ver {
      font-family: 'JetBrains Mono', monospace;
      font-size: 24px;
      font-weight: 700;
    }

    .vp-detail-meta {
      font-size: 11px;
      color: var(--ink-soft);
      margin-bottom: 12px;
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    .vp-detail-meta b {
      color: var(--fg);
    }

    .vp-detail-summary {
      font-size: 13px;
      color: var(--ink-soft);
      line-height: 1.65;
      margin-bottom: 14px;
    }

    .vp-detail-links {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .vp-detail-links a {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      text-decoration: none;
      border-radius: 4px;
      padding: 3px 9px;
      border: 1px solid var(--vp-color, var(--cyan));
      color: var(--vp-color, var(--cyan));
      transition: background .15s, color .15s;
    }

    .vp-detail-links a:hover {
      background: var(--vp-color, var(--cyan));
      color: #000;
    }

    .vp-feat-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .vp-feat {
      background: var(--surface);
      border: 1px solid var(--rule);
      border-radius: 6px;
      padding: 10px 13px;
    }

    .vp-feat-top {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
      flex-wrap: wrap;
    }

    .vp-feat-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      min-width: 52px;
    }

    .vp-feat-status {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 3px;
      background: var(--surface);
      border: 1px solid var(--rule);
      color: var(--ink-soft);
    }

    .vp-feat-status.std {
      border-color: #6ed6a0;
      color: #6ed6a0;
    }

    .vp-feat-status.prev {
      border-color: #f0c040;
      color: #f0c040;
    }

    .vp-feat-status.incub {
      border-color: var(--cyan);
      color: var(--cyan);
    }

    .vp-feat-status.rem {
      border-color: var(--red);
      color: var(--red);
    }

    .vp-feat-title {
      font-size: 12.5px;
      font-weight: 600;
      color: var(--fg);
    }

    .vp-feat-desc {
      font-size: 11.5px;
      color: var(--ink-soft);
      line-height: 1.6;
    }

    .vp-feat-link {
      display: inline-block;
      margin-top: 5px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9.5px;
      color: var(--cyan);
      text-decoration: none;
    }

    .vp-feat-link:hover {
      text-decoration: underline;
    }

    .vp-loading {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--ink-soft);
      padding: 16px 0;
      text-align: center;
    }

    .vp-close-row {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 14px;
    }

    .vp-close-btn {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--ink-soft);
      background: transparent;
      border: 1px solid var(--rule);
      border-radius: 4px;
      padding: 3px 10px;
      cursor: pointer;
      transition: border-color .15s, color .15s;
    }

    .vp-close-btn:hover {
      border-color: var(--red);
      color: var(--red);
    }

    @keyframes blink {
      50% {
        opacity: 0;
      }
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .4
      }
    }

    /* ═══ Sidebar brand (logo + ações no topo da sidebar) ═══ */
    .side-brand {
      display: flex;
      align-items: center;
      gap: 0;
      padding: 8px 12px 6px;
      border-bottom: none;
      flex-shrink: 0;
      z-index: 10;
      background: transparent;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
    }

    .brand-home {
      all: unset;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      min-width: 0;
      padding-right: 6px;
    }

    .brand-home img {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      filter: drop-shadow(0 0 4px rgba(255, 176, 32, .3));
    }

    .brand-name {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .brand-home:hover .brand-name {
      color: var(--amber);
    }

    .brand-actions {
      display: flex;
      align-items: center;
      gap: 2px;
      flex-shrink: 0;
    }

    .side-icon {
      background: transparent;
      border: none;
      color: var(--ink-dim);
      cursor: pointer;
      width: 26px;
      height: 26px;
      border-radius: 4px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: color .15s, background .15s;
      opacity: .7;
    }

    .side-icon:hover {
      color: var(--amber);
      background: color-mix(in srgb, var(--amber) 10%, transparent);
      opacity: 1;
    }

    .hamburger {
      display: none;
    }

    /* ═══ Main top quote (variante Terminal output) ═══ */
    /* ═══ Main top quote — seamless terminal pane ═══ */
    .main-top-quote {
      background: var(--bg-deep);
      padding: 16px 34px 18px;
      margin: 0 -34px;
      border-bottom: 1px solid var(--rule);
    }

    .mtq-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      color: var(--ink-dim);
      letter-spacing: .05em;
      margin-bottom: 14px;
    }

    .mtq-dim {
      color: var(--ink-faint);
    }

    .mtq-cmd {
      color: var(--cyan);
      text-shadow: var(--glow-c);
    }

    .mtq-nav {
      display: flex;
      gap: 3px;
    }

    .mtq-nav button {
      background: none;
      border: 1px solid var(--rule);
      color: var(--ink-faint);
      font-size: 13px;
      line-height: 1;
      width: 20px;
      height: 20px;
      border-radius: 2px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color .12s, border-color .12s;
    }

    .mtq-nav button:hover {
      color: var(--cyan);
      border-color: var(--cyan);
    }

    .mtq-body {
      padding-left: 16px;
      border-left: 2px solid var(--cyan);
      box-shadow: -4px 0 12px color-mix(in srgb, var(--cyan) 18%, transparent);
    }

    .mtq-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13.5px;
      font-style: italic;
      color: var(--ink);
      line-height: 1.7;
      margin: 0 0 10px;
    }

    .mtq-meta {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .mtq-author {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      color: var(--cyan);
      text-shadow: var(--glow-c);
      letter-spacing: .05em;
    }

    .mtq-ctx {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--ink-dim);
    }

    .mtq-ctx:empty {
      display: none;
    }

    .mtq-src {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--amber);
      text-decoration: none;
      opacity: .65;
      transition: opacity .15s;
      width: fit-content;
    }

    .mtq-src:hover {
      opacity: 1;
    }

    /* ═══ Quote bar acima do título ═══ */
    .quote-bar {
      position: relative;
      height: 76px;
      width: 100%;
      margin: 28px 0 18px;
      overflow: visible;
      z-index: 150;
      display: flex;
      align-items: center;
      padding: 0 18px 0 140px;
      gap: 16px;
      background: var(--surface);
      border-top: 1px solid var(--rule);
      box-shadow: 0 -4px 24px rgba(42, 184, 232, .06);
      transition: height .28s cubic-bezier(.4, 0, .2, 1), opacity .28s, margin .28s, padding .28s, border-color .28s;
    }

    [data-theme="light"] .quote-bar {
      background: var(--surface);
      box-shadow: 0 -4px 20px rgba(0, 0, 0, .08);
    }

    .quote-bar--collapsed {
      height: 0;
      margin: 0;
      padding-top: 0;
      padding-bottom: 0;
      border-top-color: transparent;
      opacity: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .qb-mascot {
      position: absolute;
      left: 10px;
      bottom: 0;
      width: 118px;
      pointer-events: none;
      z-index: 1;
    }

    .qb-mascot img {
      width: 100%;
      display: block;
      clip-path: polygon(0 0, 100% 0, 100% 91%, 73% 91%, 73% 100%, 0 100%);
    }

    .qb-divider {
      width: 1px;
      height: 38px;
      background: var(--rule);
      flex-shrink: 0;
    }

    .qb-body {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 3px;
    }

    .qb-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: .18em;
      color: var(--ink-faint);
      text-transform: uppercase;
      margin-bottom: 1px;
    }

    .qb-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13.5px;
      font-style: italic;
      color: var(--ink);
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      line-height: 1.45;
      margin: 0;
    }

    .qb-meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--cyan);
      opacity: .85;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .qb-ctx {
      color: var(--ink-dim);
      font-size: 10.5px;
    }

    .qb-ctx::before {
      content: ' · ';
    }

    .qb-ctx:empty {
      display: none;
    }

    .qb-nav {
      display: flex;
      flex-direction: column;
      gap: 5px;
      flex-shrink: 0;
      align-items: center;
    }

    .qb-nav-arrows {
      display: flex;
      gap: 4px;
    }

    .qb-nav button {
      background: none;
      border: 1px solid var(--rule);
      color: var(--ink-faint);
      font-size: 13px;
      line-height: 1;
      width: 22px;
      height: 22px;
      border-radius: 2px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color .12s, border-color .12s;
    }

    .qb-nav button:hover {
      color: var(--cyan);
      border-color: var(--cyan);
    }

    .qb-close {
      background: none;
      border: 1px solid var(--rule);
      color: var(--ink-faint);
      font-size: 14px;
      line-height: 1;
      width: 48px;
      height: 20px;
      border-radius: 2px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color .12s, border-color .12s;
    }

    .qb-close:hover {
      color: var(--ink-dim);
      border-color: var(--ink-dim);
    }

    /* restore pill */
    .qb-restore {
      position: fixed;
      bottom: 44px;
      left: 270px;
      z-index: 149;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px 5px 9px;
      background: var(--surface);
      border: 1px solid var(--rule);
      border-radius: 20px;
      color: var(--ink-faint);
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: .08em;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transform: translateY(6px);
      transition: opacity .22s, transform .22s, color .12s, border-color .12s;
      box-shadow: 0 2px 12px rgba(0, 0, 0, .18);
    }

    .qb-restore--visible {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    .qb-restore:hover {
      color: var(--cyan);
      border-color: var(--cyan);
    }

    .qb-restore svg {
      flex-shrink: 0;
    }

    /* ═══ Main prompt bar (contexto fixo/sticky no topo do main) ═══ */
    .main-prompt {
      position: sticky;
      top: 0;
      z-index: 20;
      background: color-mix(in srgb, var(--bg-deep) 85%, transparent);
      border-bottom: 1px solid var(--rule);
      padding: 14px 34px;
      margin: 0 -34px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      color: var(--ink-soft);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .main-prompt::after {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      bottom: -1px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--mp-color, var(--amber)) 40%, var(--mp-color, var(--amber)) 60%, transparent);
      opacity: .7;
      pointer-events: none;
    }

    .main-prompt .leader {
      color: var(--green);
      font-weight: 700;
      text-shadow: var(--glow-g);
      margin-right: 2px;
      font-size: 16px;
    }

    .main-prompt .u {
      color: var(--green);
      font-weight: 700;
      text-shadow: var(--glow-g);
    }

    .main-prompt .h {
      color: var(--cyan);
      text-shadow: var(--glow-c);
    }

    .main-prompt .p {
      color: var(--mp-color, var(--amber));
      text-shadow: 0 0 6px var(--mp-color, rgba(245, 158, 11, .45));
    }

    .main-prompt .d {
      color: var(--magenta);
      font-weight: 700;
      margin-right: 4px;
      text-shadow: var(--glow-v);
    }

    .main-prompt .cmd {
      color: var(--ink);
      font-weight: 600;
    }

    .main-prompt .cursor-i {
      display: inline-block;
      width: 10px;
      height: 17px;
      background: var(--mp-color, var(--amber));
      box-shadow: 0 0 8px var(--mp-color, rgba(245, 158, 11, .6));
      margin-left: 2px;
      vertical-align: middle;
      animation: blink 1s step-end infinite;
    }

    .main-prompt .mp-today {
      color: var(--green);
      font-weight: 700;
      font-size: 12px;
      letter-spacing: .14em;
      margin-left: 10px;
      text-shadow: var(--glow-g);
      animation: pulse 2s ease-in-out infinite;
    }

    /* ═══ Sidebar ═══ */
    .sidebar {
      grid-area: side;
      background: var(--panel-bg);
      border: 1px solid var(--rule);
      border-radius: 22px;
      box-shadow: var(--apple-shadow-sm);
      overflow: hidden;
      padding: 0;
      font-family: 'Inter Tight', sans-serif;
      display: flex;
      flex-direction: column;
      isolation: isolate;
    }

    .sidebar-inner {
      height: 100%;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-gutter: stable;
      display: flex;
      flex-direction: column;
    }

    .sidebar-inner::-webkit-scrollbar {
      width: 6px;
    }

    .sidebar-inner::-webkit-scrollbar-thumb {
      background: var(--rule);
      border-radius: 3px;
    }

    /* sidebar controles (topo) */

    /* rl-menu: "ler depois" como card discreto antes das categorias */
    .rl-menu-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 9px 12px;
      margin: 6px 10px 10px;
      cursor: pointer;
      font-size: 11.5px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--ink-soft);
      background: var(--surface);
      border: 1px solid var(--rule);
      border-left: 3px solid color-mix(in srgb, var(--amber) 35%, transparent);
      border-radius: 6px;
      transition: all .15s ease;
      user-select: none;
    }

    .rl-menu-item:hover,
    .rl-menu-item.rl-active {
      color: var(--amber);
      border-left-color: var(--amber);
      background: color-mix(in srgb, var(--amber) 7%, var(--surface));
    }

    .rl-menu-item svg {
      flex-shrink: 0;
      color: color-mix(in srgb, var(--amber) 50%, var(--ink-dim));
    }

    .rl-menu-item:hover svg,
    .rl-menu-item.rl-active svg {
      color: var(--amber);
    }

    .rl-menu-name {
      flex: 1;
    }

    /* rl view no main */
    .rl-view-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 0 14px;
      border-bottom: 1px solid var(--rule-soft);
      margin-bottom: 4px;
    }

    .rl-view-bar select {
      background: var(--surface);
      border: 1px solid var(--rule);
      color: var(--ink-soft);
      border-radius: 4px;
      padding: 4px 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      cursor: pointer;
    }

    .rl-view-btn {
      padding: 4px 10px;
      background: var(--surface);
      border: 1px solid var(--rule);
      border-radius: 4px;
      color: var(--ink-soft);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      cursor: pointer;
      transition: all .12s;
    }

    .rl-view-btn:hover {
      border-color: var(--amber);
      color: var(--amber);
    }

    .rl-badge {
      min-width: 16px;
      padding: 0 4px;
      border-radius: 8px;
      background: var(--amber);
      color: var(--bg-deep);
      font-weight: 700;
      font-size: 9px;
      text-align: center;
    }

    .rl-badge:empty {
      display: none;
    }

    .side-section {
      margin-top: 14px;
      flex-shrink: 0;
      padding-bottom: 6px;
    }

    /* side-base removido — infos migraram para tb-status no topbar */

    .side-label {
      padding: 4px 8px 10px;
      font-family: 'Inter Tight', sans-serif;
      font-size: 20px;
      font-weight: 800;
      color: var(--ink);
      margin-bottom: 4px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .side-label .count {
      background: var(--surface);
      color: var(--ink-soft);
      padding: 1px 6px;
      border-radius: 3px;
      font-size: 9px;
      letter-spacing: .08em;
      border: 1px solid var(--rule);
    }

    .ch-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      margin: 2px 10px;
      cursor: pointer;
      font-size: 13px;
      font-family: 'Inter Tight', sans-serif;
      font-weight: 500;
      color: var(--ink);
      border-left: 3px solid color-mix(in srgb, var(--k, var(--ink-faint)) 30%, transparent);
      border-radius: 6px;
      transition: all .12s ease;
      user-select: none;
      position: relative;
    }

    .ch-item:hover {
      background: var(--surface);
      color: var(--k, var(--ink));
      border-left-color: color-mix(in srgb, var(--k, var(--ink-faint)) 65%, transparent);
    }

    .ch-item.active {
      background: color-mix(in srgb, var(--k, var(--amber)) 10%, transparent);
      color: var(--k, var(--ink));
      font-weight: 700;
      border-left-color: var(--k, var(--amber));
    }

    .ch-emoji {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ch-emoji svg {
      stroke: var(--k, var(--cyan));
      opacity: 0.9;
    }

    .ch-item.active .ch-emoji svg {
      opacity: 1;
    }

    .ch-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--k, var(--ink-faint));
      flex-shrink: 0;
    }

    .ch-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* all (home) */
    .ch-item.all-item {
      font-weight: 700;
      color: var(--ink);
    }

    .ch-item.all-item .ch-dot {
      background: var(--ink);
    }

    .ch-item.all-item.active .ch-dot {
      background: var(--amber);
    }

    /* calendário dimmed em view cat/tool */
    .sidebar.ctx-agg .dp-panel {
      opacity: 0.28;
      cursor: pointer;
      transition: opacity .2s;
      pointer-events: auto;
    }

    .sidebar.ctx-agg .dp-panel:hover {
      opacity: 0.55;
    }

    .tool-cat-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 18px 2px 10px;
      pointer-events: none;
      user-select: none;
      grid-column: 1 / -1;
      justify-self: stretch;
    }

    .tool-cat-header:first-child {
      padding-top: 4px;
    }

    .tool-cat-icon {
      display: inline-flex;
      align-items: center;
      flex-shrink: 0;
      color: var(--cyan);
    }

    .tool-cat-icon svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
    }

    .ch-tool-logo {
      width: 14px;
      height: 14px;
      border-radius: 2px;
      flex-shrink: 0;
      object-fit: contain;
      opacity: 0.85;
    }

    .tool-cat-name {
      font-family: 'Inter Tight', sans-serif;
      font-size: 20px;
      font-weight: 800;
      color: var(--ink);
      line-height: 1.2;
    }

    #tools-side {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 2px 0;
      padding: 0 0 6px;
      place-items: center;
    }

    .ch-item.ch-tool {
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      padding: 0;
      margin: 2px auto;
      border-left: none;
      border-radius: 50%;
      border: 1.5px solid color-mix(in srgb, var(--k, var(--blue)) 55%, transparent);
      background: color-mix(in srgb, var(--k, var(--blue)) 7%, var(--bubble-mix));
      box-shadow: 0 0 8px color-mix(in srgb, var(--k, var(--blue)) 15%, transparent);
      transition: border-color .2s, box-shadow .2s, transform .18s ease;
    }

    .ch-item.ch-tool:hover {
      transform: scale(1.15);
      box-shadow: 0 0 18px color-mix(in srgb, var(--k, var(--blue)) 45%, transparent);
      border-color: var(--k, var(--blue));
      background: color-mix(in srgb, var(--k, var(--blue)) 7%, var(--bubble-mix));
    }

    .ch-item.ch-tool.active {
      border-color: var(--k, var(--blue));
      box-shadow: 0 0 22px color-mix(in srgb, var(--k, var(--blue)) 60%, transparent);
      background: color-mix(in srgb, var(--k, var(--blue)) 12%, var(--bubble-mix));
    }

    .ch-item.ch-tool .ch-tool-logo {
      width: 58%;
      height: 58%;
      object-fit: contain;
    }

    .ch-item.ch-tool .ch-name {
      display: none;
    }

    .ch-item.ch-tool.active .ch-name {
      display: none;
    }

    .ch-lang-row {
      grid-column: 1 / -1;
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 4px 0 6px;
    }

    .ch-tool-lang {
      width: 70px !important;
      height: 70px !important;
      margin: 0 !important;
    }

    /* ═══ Main ═══ */
    .main {
      grid-area: main;
      overflow-y: auto;
      background: transparent;
      scroll-behavior: smooth;
      position: relative;
    }

    .main::-webkit-scrollbar {
      width: 8px;
    }

    .main::-webkit-scrollbar-thumb {
      background: var(--rule);
      border-radius: 4px;
    }

    .main-inner {
      padding: 0 34px 120px;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* loader overlay */
    .loader-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--amber), transparent);
      background-size: 200% 100%;
      animation: loaderSlide 1.1s linear infinite;
      display: none;
      z-index: 5;
    }

    .loader-bar.on {
      display: block;
    }

    @keyframes loaderSlide {
      0% {
        background-position: 100% 0;
      }

      100% {
        background-position: -100% 0;
      }
    }

    /* context hero (cat/tool only — home não tem hero) */
    .ctx-hero {
      padding: 18px 22px 16px;
      border-left: 4px solid var(--ctx-color, var(--cyan));
      background: var(--surface);
      border-radius: 0 6px 6px 0;
      margin-bottom: 22px;
    }

    .ctx-hero-title {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: clamp(22px, 2.6vw, 30px);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.15;
      margin-bottom: 8px;
      color: var(--ctx-color, var(--ink));
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .ctx-hero-title .ctx-kind-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      padding: 3px 8px;
      border: 1px solid var(--ctx-color, var(--cyan));
      color: var(--ctx-color, var(--cyan));
      border-radius: 3px;
      background: transparent;
    }

    .ctx-hero-lede {
      font-size: 14px;
      color: var(--ink-soft);
      line-height: 1.55;
      max-width: 68ch;
      margin-bottom: 10px;
    }

    .ctx-hero-meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      color: var(--ink-dim);
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .ctx-hero-meta .mk {
      color: var(--ink-dim);
    }

    .ctx-hero-meta .mv {
      color: var(--ink);
      font-weight: 600;
    }

    /* section header */
    .section {
      margin-top: 30px;
    }

    .sec-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--rule);
      gap: 14px;
    }

    .sec-head h2 {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.01em;
      display: flex;
      align-items: baseline;
      gap: 8px;
      color: var(--ink);
    }

    .sec-head h2 .tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9.5px;
      padding: 2px 6px;
      background: var(--surface);
      color: var(--ink-dim);
      border-radius: 3px;
      text-transform: uppercase;
      letter-spacing: .08em;
      border: 1px solid var(--rule);
      font-weight: 500;
    }

    .sec-meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      color: var(--ink-dim);
    }

    /* pillars */
    .pillars {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .pillar-card {
      background: var(--surface);
      border: 1px solid var(--rule);
      border-radius: 6px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      cursor: pointer;
      transition: all .15s;
      position: relative;
      color: inherit;
      text-decoration: none;
    }

    .pillar-card:hover {
      border-color: color-mix(in srgb, var(--pillar-color, var(--amber)) 55%, transparent);
      border-top-color: var(--pillar-color, var(--amber));
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(0, 0, 0, .18);
    }

    .pillar-card .strip {
      height: 4px;
      background: var(--pillar-color, var(--amber));
    }

    .pillar-card.urgent .strip {
      background: var(--red);
      animation: critPulse 2s ease-in-out infinite;
    }

    .pillar-label {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .10em;
      color: var(--pillar-color, var(--amber));
      padding: 2px 7px;
      border: 1px solid currentColor;
      border-radius: 3px;
      background: transparent;
    }

    /* top-card alias for backward compat (cat/tool views) */
    .top-card {
      background: var(--surface);
      border: 1px solid var(--rule);
      border-radius: 6px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      cursor: pointer;
      transition: all .15s;
      position: relative;
      color: inherit;
      text-decoration: none;
    }

    .top-card:hover {
      border-color: color-mix(in srgb, var(--cat, var(--amber)) 55%, transparent);
      border-left-color: var(--cat, var(--amber));
      transform: translateY(-1px);
    }

    .top-card .strip {
      height: 3px;
      background: var(--cat, var(--amber));
    }

    .top-card.urgent .strip {
      background: var(--red);
      animation: critPulse 2s ease-in-out infinite;
    }

    @keyframes critPulse {

      0%,
      100% {
        box-shadow: 0 0 0 rgba(255, 78, 100, 0);
      }

      50% {
        box-shadow: 0 0 10px rgba(255, 78, 100, .45);
      }
    }

    .top-thumb {
      width: 100%;
      aspect-ratio: 16/9;
      border-bottom: 1px solid var(--rule);
      position: relative;
      overflow: hidden;
      background: var(--bg-deep);
    }

    .top-thumb img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      padding: 6px;
      box-sizing: border-box;
      display: block;
    }

    .top-thumb::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 40%, rgba(0, 0, 0, 0.35));
      pointer-events: none;
    }

    [data-theme="light"] .top-thumb::after {
      background: linear-gradient(180deg, transparent 55%, rgba(0, 0, 0, 0.08));
    }

    [data-theme="light"] .sidebar {
      box-shadow: 4px 0 32px rgba(0, 0, 0, 0.10);
    }

    [data-theme="light"] .rail {
      box-shadow: -4px 0 32px rgba(0, 0, 0, 0.10);
    }

    /* logos branco puro ficam invisíveis no light mode — invertemos para preto */
    [data-theme="light"] img[src*="github/ffffff"],
    [data-theme="light"] img[src*="anthropic/ffffff"],
    [data-theme="light"] img[src*="apachekafka/ffffff"],
    [data-theme="light"] img[src*="githubactions/ffffff"] {
      filter: invert(1);
    }

    /* bolinha do GitHub: borda visível no light mode (--k #ffffff seria invisível) */
    [data-theme="light"] .ch-item.ch-tool[data-filter-key="github"] {
      border-color: rgba(36, 41, 47, .4);
      box-shadow: 0 0 8px rgba(36, 41, 47, .15);
    }

    /* devicons com cores escuras: reforçamos brilho/saturação no dark mode */
    :root:not([data-theme="light"]) img[src*="gradle"],
    :root:not([data-theme="light"]) img[src*="maven"] {
      filter: brightness(1.8) saturate(1.3);
    }

    .top-body {
      padding: 14px 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      align-items: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9.5px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .rank {
      color: var(--ink-faint);
      letter-spacing: .04em;
    }

    .badge {
      padding: 2px 6px;
      border-radius: 3px;
      background: var(--surface-hi);
      color: var(--ink-soft);
      border: 1px solid var(--rule);
    }

    .badge.cat {
      color: var(--cat, var(--ink-soft));
      border-color: currentColor;
      background: transparent;
    }

    .badge.u {
      background: var(--red);
      color: white;
      border-color: var(--red);
    }

    .badge.brk {
      background: var(--magenta);
      color: var(--bg-deep);
      border-color: var(--magenta);
    }

    .badge.sev-critical {
      background: var(--sev-critical);
      color: white;
      border-color: var(--sev-critical);
    }

    .badge.sev-high {
      background: var(--sev-high);
      color: var(--bg-deep);
      border-color: var(--sev-high);
    }

    .badge.sev-medium {
      background: var(--sev-medium);
      color: var(--bg-deep);
      border-color: var(--sev-medium);
    }

    .badge.sev-low {
      background: var(--sev-low);
      color: var(--bg-deep);
      border-color: var(--sev-low);
    }

    .top-head {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 16px;
      font-weight: 600;
      line-height: 1.25;
      letter-spacing: -0.01em;
      color: var(--ink);
    }

    .top-sum {
      font-size: 12.5px;
      line-height: 1.5;
      color: var(--ink-soft);
      flex: 1;
    }

    .top-foot,
    .card-foot {
      display: flex;
      gap: 8px;
      align-items: center;
      padding-top: 10px;
      border-top: 1px solid var(--rule);
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--ink-dim);
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .top-foot .src,
    .card-foot .src {
      color: var(--cyan);
      text-transform: none;
      letter-spacing: 0;
    }

    .top-foot .time,
    .card-foot .time {
      color: var(--amber);
    }

    .row-right {
      margin-left: auto;
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .mini-btn {
      background: transparent;
      border: 1px solid var(--rule);
      border-radius: 3px;
      padding: 3px 7px;
      color: var(--ink-dim);
      cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      transition: all .12s;
      letter-spacing: .04em;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .mini-btn:hover {
      color: var(--amber);
      border-color: var(--amber);
    }

    .mini-btn.bm.active {
      color: var(--amber);
      border-color: var(--amber);
      background: rgba(255, 176, 32, .14);
    }

    .mini-btn svg {
      width: 10px;
      height: 10px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
    }

    .mini-btn.bm.active svg {
      fill: currentColor;
    }

    /* toolbar (mode group + filter pills) */
    .toolbar {
      background: var(--bg-deep);
      border: 1px solid var(--rule);
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
    }

    .toolbar-left {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--ink-soft);
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .toolbar-left .prompt {
      color: var(--green);
      text-shadow: var(--glow-g);
      font-weight: 700;
      margin-right: 6px;
    }

    .toolbar-left .filter-name {
      color: var(--amber);
      font-weight: 700;
    }

    .toolbar-left .hint {
      color: var(--ink-dim);
      margin-left: 6px;
    }

    .toolbar-right {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .filter-chips {
      display: inline-flex;
      gap: 4px;
    }

    .filter-chip {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      padding: 4px 8px;
      border: 1px solid var(--rule);
      border-radius: 3px;
      background: var(--surface);
      color: var(--ink-dim);
      cursor: pointer;
      transition: all .12s;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .filter-chip:hover {
      color: var(--amber);
      border-color: var(--amber);
    }

    .filter-chip.active {
      background: var(--amber);
      color: var(--bg-deep);
      border-color: var(--amber);
    }

    .filter-chip.urgent.active {
      background: var(--red);
      border-color: var(--red);
      color: white;
    }

    .mode-group {
      display: inline-flex;
      border: 1px solid var(--rule);
      border-radius: 4px;
      overflow: hidden;
    }

    .mode-btn {
      background: var(--surface);
      border: none;
      padding: 6px 9px;
      cursor: pointer;
      color: var(--ink-dim);
      border-right: 1px solid var(--rule);
      transition: color .1s;
    }

    .mode-btn:last-child {
      border-right: none;
    }

    .mode-btn.active {
      background: var(--amber);
      color: var(--bg-deep);
    }

    .mode-btn:hover:not(.active) {
      color: var(--amber);
    }

    .mode-btn svg {
      width: 13px;
      height: 13px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      display: block;
    }

    /* feed - cards mode: mínimo 3 colunas em telas normais */
    .feed-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(292px, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--rule);
      border-radius: 5px;
      padding: 12px 14px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: all .15s;
      border-left: 2px solid var(--cat, var(--ink-dim));
      position: relative;
      color: inherit;
      text-decoration: none;
      overflow: hidden;
    }

    .card:hover {
      background: var(--surface-hi);
      border-color: color-mix(in srgb, var(--cat, var(--amber)) 55%, transparent);
      border-left-color: var(--cat, var(--amber));
    }

    .card-thumb {
      width: calc(100% + 28px);
      margin: -12px -14px 0;
      aspect-ratio: 16/9;
      border-bottom: 1px solid var(--rule);
      flex-shrink: 0;
      overflow: hidden;
      background: var(--bg-deep);
    }

    .card-thumb img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      padding: 6px;
      box-sizing: border-box;
      display: block;
    }

    .feed-list .card {
      flex-direction: row;
      align-items: flex-start;
      gap: 12px;
    }

    .feed-list .card-thumb {
      width: 72px;
      height: 50px;
      flex-shrink: 0;
      border-radius: 3px;
      overflow: hidden;
      background: var(--bg-deep);
      border: 1px solid var(--rule-soft);
      margin: 0;
      aspect-ratio: unset;
    }

    .feed-list .card-thumb img {
      padding: 0;
      object-fit: cover;
      object-position: center;
    }

    .feed-list .card-body {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .card.urgent {
      border-left-color: var(--red);
    }

    .card.urgent::before {
      content: 'CRIT';
      position: absolute;
      top: 8px;
      right: 10px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      font-weight: 700;
      padding: 1px 5px;
      background: var(--red);
      color: white;
      border-radius: 2px;
      letter-spacing: .08em;
    }

    .card-head {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      align-items: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9.5px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    .cat-tag {
      padding: 2px 6px;
      border-radius: 3px;
      background: transparent;
      color: var(--cat, var(--ink-soft));
      border: 1px solid var(--cat, var(--rule));
    }

    .date-tag {
      padding: 2px 6px;
      border-radius: 3px;
      background: var(--bg-deep);
      color: var(--ink-dim);
      border: 1px solid var(--rule);
    }

    .dot-brk {
      color: var(--magenta);
      font-weight: 700;
    }

    /* unread-pill removido: sem tracking de lida/não-lida */
    .card-title {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      line-height: 1.3;
      letter-spacing: -0.01em;
      color: var(--ink);
    }

    .card-sum {
      font-size: 13px;
      line-height: 1.55;
      color: var(--ink-soft);
      flex: 1;
    }

    /* .card.is-read removido: sem tracking de lida/não-lida */
    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
    }

    .tag-pill {
      padding: 1px 5px;
      background: var(--bg-deep);
      color: var(--ink-dim);
      border: 1px solid var(--rule-soft);
      border-radius: 2px;
      letter-spacing: .02em;
    }

    /* feed - list mode (1 coluna larga, formato feed/newsletter) */
    .feed-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-width: 860px;
      margin: 0 auto;
    }

    .feed-list .card {
      padding: 16px 20px;
      border-radius: 5px;
      gap: 10px;
    }

    .feed-list .card-title {
      font-size: 17px;
      line-height: 1.3;
    }

    .feed-list .card-sum {
      font-size: 14px;
      line-height: 1.6;
    }

    /* date group divider (in aggregate feed) */
    .date-group {
      margin: 24px 0 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--amber);
      text-shadow: var(--glow-a);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .date-group::before {
      content: '──';
      color: var(--ink-faint);
      text-shadow: none;
    }

    .date-group::after {
      content: '';
      flex: 1;
      border-bottom: 1px dashed var(--rule);
      margin-left: 4px;
    }

    .date-group .dg-label {
      text-transform: uppercase;
      letter-spacing: .12em;
    }

    .date-group .dg-count {
      color: var(--ink-dim);
      font-size: 10px;
    }

    .cat-group-head {
      margin: 22px 0 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .20em;
      color: var(--ink-dim);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .cat-group-head::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid color-mix(in srgb, var(--k, var(--rule)) 28%, transparent);
    }

    .cat-group-head .cgh-icon {
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }

    .cat-group-head .cgh-icon svg {
      stroke: var(--k, currentColor);
    }

    .cat-group-head .cgh-count {
      color: var(--ink-dim);
      font-size: 9px;
      font-weight: 400;
      letter-spacing: .04em;
    }

    /* tools */
    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 8px;
    }

    .tool-card {
      background: var(--surface);
      border: 1px solid var(--rule);
      border-radius: 5px;
      padding: 12px 14px;
      display: grid;
      grid-template-columns: 32px 1fr auto;
      gap: 10px;
      align-items: start;
      cursor: pointer;
      transition: all .15s;
      text-decoration: none;
      color: inherit;
      border-left: 2px solid var(--tool-kind, var(--cyan));
    }

    .tool-card.has-thumb {
      grid-template-columns: 48px 1fr auto;
    }

    .tool-card:hover {
      background: var(--surface-hi);
      border-color: var(--tool-kind, var(--cyan));
    }

    .tool-card.tk-release {
      border-left-color: var(--green);
    }

    .tool-card.tk-news {
      border-left-color: var(--cyan);
    }

    .tool-card.tk-tip {
      border-left-color: var(--amber);
    }

    .tool-card.tk-tutorial {
      border-left-color: #9b7bff;
    }

    .tool-card.tk-curiosity {
      border-left-color: #ff6aa0;
    }

    .tool-icon {
      width: 32px;
      height: 32px;
      background: var(--bg-deep);
      border-radius: 4px;
      display: grid;
      place-items: center;
      font-size: 15px;
      border: 1px solid var(--rule);
    }

    .tool-card.has-thumb .tool-icon {
      width: 48px;
      height: 48px;
      background: var(--bg-deep) center/contain no-repeat;
      border: 1px solid var(--rule);
      border-radius: 4px;
      font-size: 0;
    }

    .tool-body {
      min-width: 0;
    }

    .tool-head {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 2px;
    }

    .tool-kind-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 8px;
      letter-spacing: .08em;
      font-weight: 700;
      padding: 2px 5px;
      border-radius: 2px;
      color: var(--bg-deep);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .tool-name {
      font-family: 'IBM Plex Sans', sans-serif;
      font-weight: 600;
      font-size: 13px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tool-note {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9.5px;
      color: var(--ink-dim);
      line-height: 1.4;
      margin-top: 2px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .tool-ver {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9.5px;
      padding: 2px 6px;
      background: var(--green);
      color: var(--bg-deep);
      border-radius: 3px;
      font-weight: 700;
      white-space: nowrap;
      align-self: start;
    }

    /* empty states */
    .empty-state,
    .no-items {
      padding: 56px 24px;
      text-align: center;
      color: var(--ink-dim);
      font-family: 'JetBrains Mono', monospace;
    }

    .empty-state h2 {
      font-size: 18px;
      color: var(--amber);
      margin-bottom: 10px;
    }

    .empty-state p {
      font-size: 12px;
    }

    .empty-state a {
      color: var(--amber);
      text-decoration: underline;
    }

    .no-items {
      padding: 40px 20px;
      font-size: 12px;
      border: 1px dashed var(--rule);
      border-radius: 5px;
      background: var(--surface);
      margin-top: 10px;
    }

    /* ═══ Telemetry rail ═══ */
    .rail {
      grid-area: rail;
      background: var(--panel-bg);
      border: 1px solid var(--rule);
      border-radius: 22px;
      box-shadow: var(--apple-shadow-sm);
      overflow: hidden;
      padding: 0;
      isolation: isolate;
    }

    .rail-inner {
      height: 100%;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-gutter: stable;
      display: flex;
      flex-direction: column;
    }

    .rail-inner::-webkit-scrollbar {
      width: 6px;
    }

    .rail-inner::-webkit-scrollbar-thumb {
      background: var(--rule);
      border-radius: 3px;
    }

    #tip {
      position: fixed;
      background: var(--surface);
      border: 1px solid var(--rule-soft);
      backdrop-filter: blur(8px);
      color: var(--ink);
      box-shadow: 0 4px 16px rgba(0, 0, 0, .35);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
      padding: 6px 12px;
      border-radius: 6px;
      pointer-events: none;
      opacity: 0;
      transition: opacity .12s;
      z-index: 9999;
    }

    .rail-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: .20em;
      color: var(--ink-dim);
      margin-bottom: 10px;
      text-transform: uppercase;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--rule);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .rail-title .pulse-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: var(--glow-g);
      animation: pulse 1.6s ease-in-out infinite;
    }

    /* quote do dia */

    /* ─── About page ─────────────────────────────────────────────────────── */
    .about-page {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 4px 60px;
    }

    .ab-hero {
      padding: 32px 24px 28px;
      border: 1px solid var(--rule);
      border-left: 4px solid var(--cyan);
      border-radius: 8px;
      margin-bottom: 40px;
      background: linear-gradient(135deg, var(--surface) 0%, color-mix(in srgb, var(--cyan) 6%, var(--surface)) 100%);
      position: relative;
      overflow: hidden;
    }

    .ab-hero::before {
      content: 'CsR News';
      position: absolute;
      right: 24px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 88px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--cyan);
      opacity: .04;
      pointer-events: none;
      letter-spacing: -.04em;
      line-height: 1;
    }

    .ab-hero-prompt {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--cyan);
      opacity: .7;
      letter-spacing: .08em;
      margin-bottom: 12px;
    }

    .ab-hero-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 22px;
      font-weight: 700;
      color: var(--fg);
      margin: 0 0 10px;
      letter-spacing: -.01em;
    }

    .ab-hero-sub {
      font-size: 13px;
      color: var(--ink-soft);
      line-height: 1.6;
      margin: 0 0 24px;
      max-width: 540px;
    }

    .ab-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .ab-stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 18px;
      background: var(--bg-deep);
      border: 1px solid var(--rule);
      border-radius: 6px;
      min-width: 70px;
    }

    .ab-stat-n {
      font-family: 'JetBrains Mono', monospace;
      font-size: 22px;
      font-weight: 700;
      color: var(--cyan);
      text-shadow: var(--glow-c);
      line-height: 1;
    }

    .ab-stat-l {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: var(--ink-faint);
      letter-spacing: .06em;
      margin-top: 4px;
    }

    .ab-section {
      margin-bottom: 48px;
    }

    .ab-section-hd {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }

    .ab-section-hd-icon {
      color: var(--cyan);
      flex-shrink: 0;
    }

    .ab-section-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--cyan);
      text-shadow: var(--glow-c);
    }

    .ab-section-rule {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, var(--cyan), transparent);
      opacity: .3;
    }

    .ab-2col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 20px;
    }

    @media (max-width: 640px) {
      .ab-2col {
        grid-template-columns: 1fr;
      }
    }

    .ab-explain-box {
      padding: 16px 18px;
      background: var(--surface);
      border: 1px solid var(--rule);
      border-radius: 6px;
    }

    .ab-explain-box h3 {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      color: var(--fg);
      margin: 0 0 10px;
      letter-spacing: .04em;
    }

    .ab-explain-box p {
      font-size: 12px;
      color: var(--ink-soft);
      line-height: 1.65;
      margin: 0;
    }

    .ab-rule-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9.5px;
      padding: 3px 8px;
      border-radius: 3px;
      border: 1px solid;
      margin-top: 10px;
      letter-spacing: .04em;
    }

    .ab-rule-chip.amber {
      color: var(--amber);
      border-color: color-mix(in srgb, var(--amber) 40%, transparent);
    }

    .ab-rule-chip.cyan {
      color: var(--cyan);
      border-color: color-mix(in srgb, var(--cyan) 40%, transparent);
    }

    .ab-rule-chip.violet {
      color: var(--violet);
      border-color: color-mix(in srgb, var(--violet) 40%, transparent);
    }

    /* category grid */
    .ab-cat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
      gap: 10px;
    }

    .ab-cat-card {
      padding: 14px 14px 12px;
      background: color-mix(in srgb, var(--k, var(--surface)) 8%, var(--surface));
      border: 1px solid color-mix(in srgb, var(--k, var(--rule)) 30%, var(--rule));
      border-radius: 8px;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .ab-cat-card:hover {
      background: color-mix(in srgb, var(--k, var(--surface)) 16%, var(--surface));
      border-color: color-mix(in srgb, var(--k, var(--rule)) 60%, var(--rule));
    }

    .ab-cat-icon {
      color: var(--k, var(--cyan));
    }

    .ab-cat-name {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      font-weight: 700;
      color: var(--fg);
      letter-spacing: .02em;
    }

    .ab-cat-rule {
      font-size: 9px;
      color: var(--ink-faint);
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: .04em;
    }

    /* tool groups */
    .ab-group {
      margin-bottom: 20px;
    }

    .ab-group-hd {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .ab-tool-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(78px, 1fr));
      gap: 6px;
    }

    .ab-tool-tile {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 10px 6px 8px;
      min-height: 80px;
      background: color-mix(in srgb, var(--k, var(--surface)) 12%, var(--surface));
      border: 1px solid color-mix(in srgb, var(--k, var(--rule)) 25%, var(--rule));
      border-radius: 10px;
      cursor: pointer;
      transition: border-color .15s, background .15s;
    }

    .ab-tool-tile:hover {
      background: color-mix(in srgb, var(--k, var(--surface)) 22%, var(--surface));
      border-color: color-mix(in srgb, var(--k, var(--rule)) 55%, var(--rule));
    }

    .ab-tool-logo {
      width: 36px;
      height: 36px;
      object-fit: contain;
    }

    .ab-tool-name {
      font-family: 'JetBrains Mono', monospace;
      font-size: 8.5px;
      text-align: center;
      color: var(--ink-soft);
      letter-spacing: .02em;
      line-height: 1.2;
    }

    /* quote & verse mockups */
    .ab-mockup {
      padding: 14px 16px 12px;
      background: var(--bg-deep);
      border: 1px solid var(--rule);
      border-radius: 6px;
      font-size: 11px;
      color: var(--ink-dim);
      font-family: 'IBM Plex Sans', sans-serif;
      font-style: italic;
      line-height: 1.6;
    }

    .ab-mockup-ref {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: var(--cyan);
      font-style: normal;
      letter-spacing: .06em;
      margin-top: 8px;
    }

    /* ─── /About page ─────────────────────────────────────────────────────── */

    /* rail assuntos section */
    .rail-tools-sec {
      margin-top: 4px;
    }

    .rail-tools-title {
      padding: 0 6px 6px;
      font-size: 9.5px;
      letter-spacing: .22em;
      color: var(--ink-dim);
      text-transform: uppercase;
      font-family: 'JetBrains Mono', monospace;
    }

    .tool-subgroup-header {
      padding: 7px 2px 2px;
      font-size: 11px;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--ink-soft);
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      grid-column: 1 / -1;
      justify-self: stretch;
      pointer-events: none;
      user-select: none;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .tool-subgroup-header svg {
      opacity: .7;
    }

    .side-label-inner {
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    /* radar (mantido para não quebrar refs no JS, mas oculto) */
    .radar-sec {
      display: none;
    }

    .radar-bars {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .radar-bars {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .rb {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--ink-soft);
    }

    .rb-name {
      width: 62px;
      text-transform: uppercase;
      letter-spacing: .08em;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--rb-color, var(--ink-soft));
    }

    .rb-track {
      flex: 1;
      height: 8px;
      background: var(--bg-deep);
      border: 1px solid var(--rule);
      position: relative;
      overflow: hidden;
      border-radius: 1px;
    }

    .rb-fill {
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      background: var(--rb-color, var(--green));
      box-shadow: 0 0 4px var(--rb-color, var(--green));
      transition: width .4s ease;
    }

    .rb.urgent .rb-fill {
      background: var(--red);
      box-shadow: 0 0 6px var(--red);
      animation: critPulse 2s ease-in-out infinite;
    }

    .rb-val {
      font-size: 10px;
      color: var(--ink-dim);
      width: 42px;
      text-align: right;
    }

    .rb-val .delta {
      font-size: 9px;
    }

    .rb-val .delta.up {
      color: var(--red);
    }

    .rb-val .delta.down {
      color: var(--green);
    }


    /* ═══ Date picker ═══ */
    .dp-panel {
      display: block;
      margin: 12px 10px 4px;
      padding: 12px 10px 10px;
      background: var(--surface);
      border: 1px dashed var(--rule);
      border-radius: 4px;
    }

    .dp-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
    }

    .dp-dow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9.5px;
      color: var(--ink-dim);
      text-align: center;
      padding: 3px;
    }

    .dp-cell {
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      border-radius: 3px;
      color: var(--ink-faint);
      cursor: default;
      background: transparent;
      position: relative;
    }

    .dp-cell.has-edition {
      color: var(--ink);
      background: var(--surface);
      cursor: pointer;
    }

    .dp-cell.has-edition:hover {
      background: var(--amber);
      color: var(--bg-deep);
    }

    .sidebar.ctx-agg .dp-panel,
    .sidebar.ctx-agg .dp-panel * {
      cursor: pointer;
    }

    .sidebar.ctx-agg .dp-cell.has-edition:hover {
      background: var(--surface);
      color: var(--ink);
    }

    .sidebar.ctx-agg .dp-cell.current:hover {
      background: var(--amber);
      color: var(--bg-deep);
    }

    .sidebar.ctx-agg .dp-cell.dp-today:not(.current):hover {
      background: transparent;
      color: var(--cyan);
    }

    .dp-cell.current {
      background: var(--amber);
      color: var(--bg-deep);
      font-weight: 700;
    }

    .dp-cell.dp-today:not(.current) {
      border: 1px solid var(--cyan);
      color: var(--cyan);
      border-radius: 3px;
    }

    /* ═══ Modal (reader + read-later + search) ═══ */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.78);
      backdrop-filter: blur(6px);
      z-index: 500;
      display: none;
      align-items: flex-start;
      justify-content: center;
      padding: 6vh 20px 20px;
      overflow-y: auto;
    }

    .modal.open {
      display: flex;
    }

    .modal-body {
      width: min(94vw, 820px);
      max-height: calc(100vh - 12vh - 20px);
      background: var(--surface);
      border: 1px solid var(--amber);
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .modal-body::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--amber), var(--cyan), var(--magenta));
    }

    .modal-head {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--rule);
      font-family: 'JetBrains Mono', monospace;
      flex-shrink: 0;
    }

    .modal-prompt {
      color: var(--green);
      font-weight: 700;
      font-size: 14px;
      text-shadow: var(--glow-g);
    }

    .modal-head .modal-title {
      color: var(--ink);
      font-weight: 600;
      font-size: 12px;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .modal-close {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      padding: 5px 10px;
      background: var(--bg-deep);
