      border: 1px solid var(--rule);
      border-radius: 3px;
      cursor: pointer;
      color: var(--ink-soft);
      text-transform: uppercase;
    }

    .modal-close:hover {
      border-color: var(--red);
      color: var(--red);
    }

    .modal-content {
      overflow-y: auto;
      padding: 20px 26px 26px;
    }

    .modal-content::-webkit-scrollbar {
      width: 8px;
    }

    .modal-content::-webkit-scrollbar-thumb {
      background: var(--rule);
      border-radius: 4px;
    }

    /* CVE e tag pills (usados inline nos cards) */
    .cve-pill {
      padding: 1px 5px;
      background: var(--red);
      color: white;
      border-radius: 2px;
      font-weight: 700;
      text-decoration: none;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9.5px;
    }

    .cve-pill:hover {
      background: var(--amber);
      color: var(--bg-deep);
    }

    /* read-later list modal */
    .rl-sub {
      padding: 10px 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--ink-dim);
      border-bottom: 1px solid var(--rule-soft);
      background: var(--bg-deep);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .rl-sub-actions {
      display: flex;
      gap: 6px;
    }

    .rl-sub-actions button,
    .rl-sub-actions select {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      padding: 4px 8px;
      border: 1px solid var(--rule);
      background: var(--surface);
      color: var(--ink-soft);
      border-radius: 3px;
      cursor: pointer;
    }

    .rl-sub-actions button:hover {
      border-color: var(--amber);
      color: var(--amber);
    }

    .rl-list {
      padding: 6px 0;
    }

    .rl-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: all .12s;
      text-decoration: none;
      color: inherit;
      position: relative;
    }

    .rl-item:hover {
      background: var(--surface-hi);
      border-left-color: var(--amber);
    }

    .rl-item+.rl-item {
      border-top: 1px solid var(--rule-soft);
    }

    .rl-item-thumb {
      width: 52px;
      height: 36px;
      flex-shrink: 0;
      border-radius: 3px;
      overflow: hidden;
      background: var(--surface);
      border: 1px solid var(--rule-soft);
    }

    .rl-item-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .rl-item-body {
      flex: 1;
      min-width: 0;
    }

    .rl-item-title {
      font-family: 'IBM Plex Sans', sans-serif;
      font-weight: 600;
      font-size: 14px;
      color: var(--ink);
      line-height: 1.3;
      margin-bottom: 4px;
      padding-right: 32px;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .rl-item-meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      color: var(--ink-dim);
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .rl-item-meta .c {
      color: var(--cyan);
    }

    .rl-item-meta .d {
      color: var(--amber);
    }

    .rl-remove {
      position: absolute;
      right: 14px;
      top: 12px;
      width: 28px;
      height: 28px;
      background: transparent;
      border: 1px solid var(--rule);
      border-radius: 4px;
      cursor: pointer;
      color: var(--ink-dim);
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      display: grid;
      place-items: center;
    }

    .rl-remove:hover {
      border-color: var(--red);
      color: var(--red);
    }

    .empty-inline {
      padding: 50px 24px;
      text-align: center;
      color: var(--ink-dim);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
    }

    .empty-inline b {
      color: var(--amber);
    }

    /* busca removida */

    /* toast */
    .toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translate(-50%, 20px);
      background: var(--surface);
      border: 1px solid var(--amber);
      border-left-width: 3px;
      padding: 10px 18px;
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--ink);
      z-index: 900;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s, transform .2s;
      box-shadow: 0 8px 24px rgba(0, 0, 0, .35);
    }

    .toast.on {
      opacity: 1;
      pointer-events: auto;
      transform: translate(-50%, 0);
    }

    /* ═══ Responsive ═══ */
    @media (max-width: 1280px) {
      .shell {
        grid-template-columns: 240px 1fr 264px;
      }

      .pillars {
        grid-template-columns: 1fr 1fr;
      }

      .pillars .pillar-card:nth-child(3) {
        grid-column: 1 / -1;
      }

      .quote-bar {
        left: auto;
        right: auto;
      }
    }

    @media (max-width: 1080px) {
      .shell {
        grid-template-rows: 1fr;
        grid-template-columns: 240px 1fr;
        grid-template-areas: "side main";
      }

      .rail {
        display: none;
      }

      .pillars {
        grid-template-columns: 1fr;
      }

      .pillars .pillar-card:nth-child(3) {
        grid-column: auto;
      }

      .quote-bar {
        left: auto;
        right: auto;
      }
    }

    @media (max-width: 720px) {
      .shell {
        grid-template-columns: 1fr;
        grid-template-areas: "main";
      }

      .sidebar {
        position: fixed;
        top: 0;
        bottom: 0;
        left: 0;
        width: 82vw;
        max-width: 320px;
        z-index: 400;
        border-right: 1px solid var(--amber);
        transform: translateX(-100%);
        transition: transform .2s ease;
        box-shadow: 0 0 32px rgba(0, 0, 0, 0.5);
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .hamburger {
        display: inline-flex;
      }

      .ctx-pill {
        font-size: 10px;
        padding: 3px 7px;
      }

      .main-inner {
        padding: 20px 18px 40px;
      }

      .toolbar {
        flex-direction: column;
        align-items: stretch;
        gap: 10px;
      }

      .toolbar-right {
        justify-content: space-between;
      }

      .feed-list {
        max-width: 100%;
      }

      .main-top-quote {
        padding: 14px 18px 16px;
        margin: 0 -18px;
      }

      .mtq-text {
        font-size: 13px;
      }

      .quote-bar {
        padding-left: 130px;
      }

      .qb-restore {
        left: 12px;
      }
    }
  </style>
</head>

      const TOOL_KIND_BADGE = {
        release: { label: 'RELEASE', color: 'var(--green)' },
        news: { label: 'NEWS', color: 'var(--cyan)' },
        tip: { label: 'TIP', color: 'var(--amber)' },
        tutorial: { label: 'TUTORIAL', color: '#9b7bff' },
        curiosity: { label: 'CURIOSITY', color: '#ff6aa0' }
      };

      const STATE = {
        editionsIndex: null,
        editionsCache: {},         // date -> edition json
        currentDate: null,
        currentEdition: null,
        view: 'home',
        mode: localStorage.getItem('csrn-mode') || 'cards',
        filter: { urgent: false },
        cveFilter: null,  // 'critical'|'high'|'medium'|'low'|null
        readLater: JSON.parse(localStorage.getItem('csrn-read-later') || '[]'),
        readLaterSort: localStorage.getItem('csrn-rl-sort') || 'saved',
        startedAt: Date.now()
      };

      /* ═══ Utilidades ═══ */
      const $ = id => document.getElementById(id);
      const esc = s => String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const escAttr = s => esc(s).replace(/"/g, '&quot;');
      const isInReadLater = url => STATE.readLater.some(x => x.url === url);
      function toggleReadLater(item) {
        const i = STATE.readLater.findIndex(x => x.url === item.url);
        if (i === -1) {
          STATE.readLater.push({
            url: item.url,
            headline: item.headline,
            summary: item.summary,
            source: item.source,
            category: item.category,
            read_time: item.read_time,
            image: item.image,
            urgent: !!item.urgent,
            breaking: !!item.breaking,
            severity: item.severity,
            _date: item._date || STATE.currentDate,
            _savedAt: Date.now()
          });
          toast('✓ salvo em "ler depois"');
        } else {
          STATE.readLater.splice(i, 1);
          toast('✗ removido de "ler depois"');
        }
        localStorage.setItem('csrn-read-later', JSON.stringify(STATE.readLater));
        updateRlBadge();
      }
      function updateRlBadge() {
        const n = STATE.readLater.length;
        $('rlBadge').textContent = n || '';
        const sbxSaved = $('sbx-saved'); if (sbxSaved) sbxSaved.textContent = n;
      }

      /* data local (timezone-aware) em YYYY-MM-DD */
      function todayISO() { return new Date().toLocaleDateString('sv-SE'); }
      function isToday(date) { return date === todayISO(); }

      function toast(msg, ms) {
        const t = $('toast');
        t.textContent = msg;
        t.classList.add('on');
        clearTimeout(toast._t);
        toast._t = setTimeout(() => t.classList.remove('on'), ms || 1800);
      }

      /* ═══ Theme ═══ */
      function initTheme() {
        const saved = localStorage.getItem('csrn-theme') || 'dark';
        document.documentElement.setAttribute('data-theme', saved);
        updateThemeIcon(saved);
        $('themeBtn').onclick = toggleTheme;
      }
      function toggleTheme() {
        const cur = document.documentElement.getAttribute('data-theme');
        const next = cur === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('csrn-theme', next);
        updateThemeIcon(next);
      }
      function updateThemeIcon(theme) {
        const ico = $('themeIco');
        if (ico) ico.innerHTML = theme === 'dark'
          ? '<path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>'
          : '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M2 12h2M20 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/>';
        const lbl = $('themeLabel');
        if (lbl) lbl.textContent = theme === 'dark' ? 'light' : 'dark';
      }


      /* ═══ Main prompt-bar (sticky no topo do main) ═══ */
      function updateMainPrompt() {
        const el = $('mainPrompt');
        if (!el) return;
        const v = STATE.view;
        let color = '', path = '', cmd = '', today = '';
        if (v === 'home') {
          const d = STATE.currentDate || '—';
          color = 'var(--amber)';
          path = `~/editions/${d}`;
          cmd = `cat ${d}.json`;
          today = STATE.currentDate && isToday(STATE.currentDate) ? '1' : '';
        } else if (v === 'rl') {
          color = 'var(--amber)';
          path = `~/editions/read-later`;
          cmd = `cat ler_depois.log`;
        } else if (v.startsWith('cat:')) {
          const k = v.slice(4);
          const catDef = CAT[k];
          const fullName = catDef ? catDef.lf : k;
          color = `var(--cat-${k})`;
          path = `~/editions/categories/${k}`;
          cmd = `grep --category="${fullName}"`;
        } else if (v.startsWith('tool:')) {
          const k = v.slice(5);
          const t = TOOLS.find(x => x.key === k);
          const fullName = t ? t.name : k;
          color = TOOL_KIND[t?.kind] || 'var(--cyan)';
          path = `~/editions/tools/${k}`;
          cmd = `grep --tool="${fullName}"`;
        }
        el.style.setProperty('--mp-color', color);
        el.innerHTML =
          `<span class="leader">❯</span> ` +
          `<span class="u">csr.news</span>@<span class="h">archive</span> <span class="p">${esc(path)}</span> ` +
          `<span class="d">%</span><span class="cmd">${esc(cmd)}</span><span class="cursor-i"></span>` +
          (today ? ` <span class="mp-today">[HOJE]</span>` : '');
      }

      /* ═══ Botão data (sidebar nav-row) ═══ */
      function updateSideNavDate() {
        const label = $('dpLabel');
        const badge = $('snTodayBadge');
        const goToday = $('goTodayBtn');
        if (!label) return;
        label.textContent = STATE.currentDate || '—';
        const today = STATE.currentDate && isToday(STATE.currentDate);
        if (badge) badge.hidden = !today;
        if (goToday) goToday.hidden = !STATE.currentDate || today || STATE.view !== 'home';
      }

      /* ═══ Aggregate context (cat/tool): escurece a nav-row ═══ */
      function updateAggContext() {
        const sb = $('sidebar');
        if (!sb) return;
        sb.classList.toggle('ctx-agg', STATE.view !== 'home' && STATE.view !== 'about');
        const rlBtn = $('readLaterBtn');
        if (rlBtn) rlBtn.classList.toggle('rl-active', STATE.view === 'rl');
      }

      /* ═══ Boot sequence ═══ */
      const BOOT_STEPS = [
        { s: 'OK', msg: 'mounting /data', v: '' },
        { s: 'OK', msg: 'fetch editions.json', v: '' },
        { s: 'OK', msg: 'indexed editions', v: '', dyn: 'indexed' },
        { s: 'OK', msg: 'load current edition', v: '', dyn: 'edition' },
        { s: 'OK', msg: 'init ui · theme · quotes', v: '' },
        { s: 'OK', msg: 'ready · csr news online', v: '' }
      ];
      function bootStep(i, data) {
        const log = $('boot-log');
        if (i >= BOOT_STEPS.length) {
          setTimeout(() => {
            $('boot').classList.add('gone');
            setTimeout(() => $('boot').remove(), 600);
            sessionStorage.setItem('csrn-booted', '1');
          }, 280);
          return;
        }
        const step = BOOT_STEPS[i];
        let val = step.v;
        if (step.dyn === 'indexed') val = ((data && data.count) || 0) + ' editions';
        if (step.dyn === 'edition') val = (data && data.date) || '';
        const line = document.createElement('div');
        line.className = 'boot-line';
        line.style.animationDelay = (i * 0.12) + 's';
        line.innerHTML = `<span class="status">[${step.s}]</span><span class="msg">${step.msg}</span>${val ? `<span class="val">→ ${esc(val)}</span>` : ''}`;
        log.appendChild(line);
      }
      function skipBoot() {
        const log = $('boot-log');
        BOOT_STEPS.forEach(step => {
          const line = document.createElement('div');
          line.className = 'boot-line';
          line.style.animationDelay = '0s';
          line.innerHTML = `<span class="status">[${step.s}]</span><span class="msg">${step.msg}</span>`;
          log.appendChild(line);
        });
        setTimeout(() => {
          $('boot').classList.add('gone');
          setTimeout(() => $('boot').remove(), 300);
        }, 120);
      }

      /* ═══ Data loading ═══ */
      function setLoader(on) { $('loaderBar').classList.toggle('on', on); }

      async function loadIndex() {
        try {
          const r = await fetch('data/editions.json');
          STATE.editionsIndex = await r.json();
          return true;
        } catch (e) { return false; }
      }
      async function loadEdition(date) {
        if (STATE.editionsCache[date]) {
          STATE.currentEdition = STATE.editionsCache[date];
          STATE.currentDate = date;
          return true;
        }
        try {
          const r = await fetch('data/' + date + '.json');
          if (!r.ok) throw new Error('404');
          const json = await r.json();
          STATE.editionsCache[date] = json;
          STATE.currentEdition = json;
          STATE.currentDate = date;
          return true;
        } catch (e) { return false; }
      }
      async function loadDates(dates) {
        setLoader(true);
        try {
          await Promise.all(dates.map(async d => {
            if (STATE.editionsCache[d]) return;
            try { const r = await fetch('data/' + d + '.json'); if (r.ok) STATE.editionsCache[d] = await r.json(); }
            catch (er) { }
          }));
        } finally { setLoader(false); }
      }
      async function loadAll() {
        const eds = STATE.editionsIndex?.editions || [];
        await loadDates(eds.map(e => e.date));
      }
      // Lazy load inteligente: só baixa edições que têm o filtro (usando counts_by_*)
      function catWithAliases(key) {
        return [key];
      }
      async function loadForCategory(key) {
        const eds = STATE.editionsIndex?.editions || [];
        const dates = eds.filter(e => e.counts_by_category?.[key] > 0 || !e.counts_by_category).map(e => e.date);
        await loadDates(dates);
      }
      async function loadForTool(key) {
        const eds = STATE.editionsIndex?.editions || [];
        const dates = eds.filter(e => e.counts_by_tool?.[key] > 0 || !e.counts_by_tool).map(e => e.date);
        await loadDates(dates);
      }

      /* ═══ Aggregate helpers ═══ */
      function allItemsAcrossEditions() {
        const out = [];
        Object.keys(STATE.editionsCache).forEach(date => {
          const ed = STATE.editionsCache[date];
          if (!ed) return;
          [...(ed.highlights || []), ...(ed.news || [])].forEach(it => {
            out.push(Object.assign({}, it, { _date: date, _type: 'news' }));
          });
          (ed.tools || []).forEach(t => {
            out.push({ _date: date, _type: 'tool', ...t });
          });
        });
        return out;
      }
      function matchesTool(item, tool) {
        const text = ((item.headline || '') + ' ' + (item.summary || '') + ' ' + (item.name || '')).toLowerCase();
        return tool.aliases.some(a => text.indexOf(a.toLowerCase()) !== -1);
      }

      /* ═══ Sidebar render ═══ */
      function renderSidebar() {
        const cats = $('channels');
        const tools = $('tools-side');
        const catsLabel = $('cats-label');
        if (catsLabel) catsLabel.innerHTML = `<span style="color:var(--cyan);display:inline-flex">${iconSvg(HEADER_ICONS['cats'] || '', 20)}</span><span>Categorias</span>`;
        const isHome = STATE.view === 'home';
        const ed = STATE.currentEdition;

        // Totals (todas edições do índice)
        const catTotals = {};
        const toolTotals = {};
        (STATE.editionsIndex?.editions || []).forEach(e => {
          Object.entries(e.counts_by_category || {}).forEach(([k, v]) => {
            catTotals[k] = (catTotals[k] || 0) + v;
          });
          Object.entries(e.counts_by_tool || {}).forEach(([k, v]) => {
            toolTotals[k] = (toolTotals[k] || 0) + v;
          });
        });

        // Counts do dia atual (apenas em home)
        const catToday = {};
        if (isHome && ed) {
          [...(ed.highlights || []), ...(ed.news || [])].forEach(it => {
            const k = it.category;
            if (k) catToday[k] = (catToday[k] || 0) + 1;
          });
        }

        cats.innerHTML = Object.keys(CAT).sort((a, b) => CAT[a].lf.localeCompare(CAT[b].lf, 'pt-BR')).map(k => {
          const total = catTotals[k] || 0;
          const tday = catToday[k] || 0;
          const active = STATE.view === 'cat:' + k ? 'active' : '';
          return `<div class="ch-item ${active}" data-filter-type="cat" data-filter-key="${k}" role="button" tabindex="0" style="--k: var(--cat-${k})">` +
            `<span class="ch-emoji">${iconSvg(CAT_ICONS[k] || '', 14)}</span>` +
            `<span class="ch-name">${CAT[k].lf}</span>` +
            `</div>`;
        }).join('');

        // tool counts "do dia": itens de tools[] com tool_key explícito (novo); fallback aliases (legado)
        const toolToday = {};
        if (isHome && ed) {
          const todayTools = ed.tools || [];
          const hasToolKey = todayTools.some(te => te.tool_key);
          if (hasToolKey) {
            todayTools.forEach(te => {
              const k = te.tool_key;
              if (k) toolToday[k] = (toolToday[k] || 0) + 1;
            });
          } else {
            // Retrocompat: edições antigas sem tool_key
            const todayNews = [...(ed.highlights || []), ...(ed.news || [])];
            TOOLS.forEach(t => {
              let n = 0;
              todayNews.forEach(it => { if (matchesTool(it, t)) n++; });
              todayTools.forEach(te => { if (t.aliases.some(a => (te.name || '').toLowerCase().includes(a.toLowerCase()))) n++; });
              toolToday[t.key] = n;
            });
          }
        }

        // Agrupar tópicos por grupo do rail (independente das categorias editoriais)
        const toolsByGroup = {};
        TOOLS.forEach(t => {
          const g = t.group || '_other';
          if (!toolsByGroup[g]) toolsByGroup[g] = [];
          toolsByGroup[g].push(t);
        });
        const subgroupOrder = ['dados', 'diagrams', 'gitci', 'ai-ide', 'jvm', 'obs-iam', 'platform'];
        let toolsHtml = '';
        Object.keys(TOOL_GROUPS).forEach(groupKey => {
          const groupTools = toolsByGroup[groupKey];
          if (!groupTools || groupTools.length === 0) return;
          const gDef = TOOL_GROUPS[groupKey];
          const groupHasActive = groupTools.some(t => STATE.view === 'tool:' + t.key);
          toolsHtml += `<div class="tool-cat-header${groupHasActive ? ' has-active' : ''}" style="--k: ${gDef.color}">` +
            `<span class="tool-cat-icon">${iconSvg(CAT_ICONS[gDef.icon] || '', 13)}</span>` +
            `<span class="tool-cat-name">${gDef.label}</span>` +
            `</div>`;
          const sortedTools = groupTools.slice().sort((a, b) => a.name.localeCompare(b.name, 'pt-BR'));
          if (groupKey === 'tools') {
            // Renderiza sub-grupos de ferramentas com separador discreto
            const bySubgroup = {};
            sortedTools.forEach(t => {
              const sg = t.subgroup || '_other';
              if (!bySubgroup[sg]) bySubgroup[sg] = [];
              bySubgroup[sg].push(t);
            });
            const renderTool = (t) => {
              const active = STATE.view === 'tool:' + t.key ? 'active' : '';
              const logoHtml = t.logo
                ? `<img class="ch-tool-logo" src="${escAttr(t.logo)}" alt="${escAttr(t.name)}" loading="lazy" onerror="this.style.display='none'">`
                : `<span style="font-size:11px;opacity:.6">${esc(t.name.slice(0, 2))}</span>`;
              toolsHtml += `<div class="ch-item ch-tool ${active}" data-filter-type="tool" data-filter-key="${t.key}" role="button" tabindex="0" data-tip="${escAttr(t.name)}" style="--k: ${t.color || gDef.color}">` +
                logoHtml + `<span class="ch-name">${t.name}</span></div>`;
            };
            subgroupOrder.forEach(sgKey => {
              const sgTools = bySubgroup[sgKey];
              if (!sgTools || sgTools.length === 0) return;
              toolsHtml += `<div class="tool-subgroup-header">${iconSvg(HEADER_ICONS[sgKey] || '', 11)}<span>${TOOL_SUBGROUPS[sgKey]}</span></div>`;
              sgTools.forEach(renderTool);
            });
            if (bySubgroup['_other']) bySubgroup['_other'].forEach(renderTool);
          } else {
            toolsHtml += `<div class="ch-lang-row">`;
            sortedTools.forEach(t => {
              const active = STATE.view === 'tool:' + t.key ? 'active' : '';
              const logoHtml = t.logo

                `</div>`;

            toolsHtml += `</div>`;
          }
        });
        if (toolsByGroup['_other']) {

              `</div>`;

      }

      /* ═══ Rail render ═══ */
      function renderRail() {
        if (_currentQuote) renderQuote(_currentQuote);

        // Radar: conta categorias da edição atual vs média das últimas 7 edições
        const eds = STATE.editionsIndex?.editions || [];
        let items;
        if (STATE.view === 'home' && STATE.currentEdition) {
          items = [...(STATE.currentEdition.highlights || []), ...(STATE.currentEdition.news || [])];
        } else {
          items = allItemsAcrossEditions().filter(x => x._type === 'news');
        }
        const counts = {}, urg = {};
        let max = 0;
        items.forEach(x => {
          counts[x.category] = (counts[x.category] || 0) + 1;
          if (x.urgent) urg[x.category] = (urg[x.category] || 0) + 1;
          if (counts[x.category] > max) max = counts[x.category];
        });
        // baseline: média das últimas 7 edições por categoria (do índice)
        const baseline = {};
        const recent7 = eds.slice(0, 7);
        if (recent7.length) {
          recent7.forEach(e => {
            Object.entries(e.counts_by_category || {}).forEach(([k, v]) => {
              baseline[k] = (baseline[k] || 0) + v;
            });
          });
          Object.keys(baseline).forEach(k => baseline[k] /= recent7.length);
        }

        $('radar-bars').innerHTML = Object.keys(CAT).map(k => {
          if (!counts[k]) return '';
          const pct = max ? Math.round(counts[k] * 100 / max) : 0;
          const isUrg = urg[k] ? ' urgent' : '';
          // delta vs baseline (só mostra em view home)
          let delta = '';
          if (STATE.view === 'home' && baseline[k]) {
            const diff = counts[k] - baseline[k];
            if (Math.abs(diff) >= 1) {
              const dir = diff > 0 ? 'up' : 'down';
              const sign = diff > 0 ? '+' : '';
              delta = `<span class="delta ${dir}">${sign}${Math.round(diff)}</span>`;
            }
          }
          return `<div class="rb${isUrg}" style="--rb-color: var(--cat-${k})"><span class="rb-name">${CAT[k].l}</span>` +
            `<span class="rb-track"><span class="rb-fill" style="width:${pct}%"></span></span>` +
            `<span class="rb-val">${counts[k]} ${delta}</span></div>`;
        }).join('') || '<div style="color:var(--ink-dim);font-size:10px">sem dados</div>';

      }

        { text: 'A otimização prematura é a raiz de todo mal — não porque performance não importa, mas porque otimizar antes de medir é adivinhar.', author: 'Donald Knuth', context: 'Computer Programming as an Art — foque na corretude antes da performance', related_to: 'general', url: 'https://dl.acm.org/doi/10.1145/361604.361612' },
        { text: 'Simplicidade é pré-requisito para confiabilidade. Um sistema que ninguém entende completamente é um sistema que ninguém controla completamente.', author: 'Edsger W. Dijkstra', context: 'EWD notes — princípio de design de sistemas confiáveis', related_to: 'general', url: 'https://www.cs.utexas.edu/~EWD/' },
        { text: 'Funcionar é a entrada mínima. Funcionar corretamente, ser legível e ser alterável com segurança — isso é o que importa no longo prazo.', author: 'Kent Beck', context: 'TDD e qualidade de software além da funcionalidade imediata', related_to: 'cat:design', url: 'https://www.oreilly.com/library/view/test-driven-development/0321146530/' },

      ];

      function shuffleArray(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
      }

      function renderQuote(q) {
        _currentQuote = q;
        const textEl = $('quote-text');
        const authorEl = $('quote-author');
        const ctxEl = $('quote-ctx');
        const srcEl = $('quote-src');
        if (!textEl) return;
        textEl.textContent = '\u201c' + q.text + '\u201d';
        authorEl.textContent = '─ ' + q.author;
        if (ctxEl) ctxEl.textContent = q.context || '';
        if (srcEl) {
          if (q.url) { srcEl.href = q.url; srcEl.hidden = false; }
          else { srcEl.hidden = true; }
        }
      }

      function cycleQuote() {
        const pool = currentQuotes();
        if (!pool.length) return;
        if (!_quoteDeck.length || _deckIdx >= _quoteDeck.length) {
          _quoteDeck = shuffleArray(pool);
          _deckIdx = 0;
        }
        renderQuote(_quoteDeck[_deckIdx++]);
      }
      function prevQuote() {
        const pool = currentQuotes();
        if (!pool.length) return;
        if (!_quoteDeck.length) { _quoteDeck = shuffleArray(pool); _deckIdx = _quoteDeck.length; }
        _deckIdx = (_deckIdx - 2 + _quoteDeck.length) % _quoteDeck.length;
        renderQuote(_quoteDeck[_deckIdx++]);
      }
      function nextQuote() { cycleQuote(); }

      window.restoreQuoteBar = function () {
        const bar = document.getElementById('quoteBar');
        const btn = document.getElementById('qbRestore');
        if (bar) bar.classList.remove('quote-bar--collapsed');
        if (btn) btn.classList.remove('qb-restore--visible');
        localStorage.removeItem('csrn-quote-collapsed');
      };

      setInterval(() => { if (!document.hidden) cycleQuote(); }, 300000);

      function formatGeneratedAt(raw) {
        if (!raw) return '';
        // aceita tanto "06:00" legacy quanto ISO 8601 completo
        if (raw.includes('T')) {
          try {
            const d = new Date(raw);
            return d.toLocaleString('pt-BR', { hour: '2-digit', minute: '2-digit', timeZoneName: 'short' });
          } catch (e) { return raw; }
        }
        return raw;
      }

          badgeText: v => 'Standard',
          badgeCls: v => 'std',
          cardCount: v => `${v.feature_count || 0} features`,
          cardSub: v => v.year ? `${v.year}` : '',
          detailVer: d => d.version || `ES${d.year}`,

          sortVersions: vs => vs.slice().sort((a, b) => {

          cardSub: v => v.eol_date ? `EOL ${v.eol_date}` : '',
          detailVer: d => `Python ${d.version}`,

            d.eol_date && `<b>EOL:</b> ${esc(d.eol_date)}`,
            `<b>PEPs:</b> ${(d.features || d.peps || []).length}`,
          ].filter(Boolean),
          getFeatures: d => d.features || d.peps || [],
          featNum: f => f.number ? `${esc(String(f.number))}` : '',
        },
      };

      let _verIndexCache = {};   // dir -> index.json
      let _verDetailCache = {};  // `${dir}:${id}` -> detail.json

      async function loadVerIndex(toolKey) {
        const cfg = VER_CFG[toolKey];
        if (!cfg) return null;
        if (_verIndexCache[cfg.dir]) return _verIndexCache[cfg.dir];
        try {
          const r = await fetch(`data/${cfg.dir}/index.json`);
          if (!r.ok) return null;
          _verIndexCache[cfg.dir] = await r.json();
          return _verIndexCache[cfg.dir];
        } catch (e) { return null; }
      }

      async function loadVerDetail(toolKey, versionId) {
        const cfg = VER_CFG[toolKey];
        if (!cfg) return null;
        const ckey = `${cfg.dir}:${versionId}`;
        if (_verDetailCache[ckey]) return _verDetailCache[ckey];
        try {
          const r = await fetch(`data/${cfg.dir}/${cfg.prefix}${versionId}.json`);
          if (!r.ok) return null;
          _verDetailCache[ckey] = await r.json();
          return _verDetailCache[ckey];
        } catch (e) { return null; }
      }

      function buildVerDetailHtml(cfg, data) {
        const feats = cfg.getFeatures(data);
        let html = `<div class="vp-detail-inner" style="--vp-color:${cfg.color}">`;
        html += `<div class="vp-close-row"><button class="vp-close-btn" data-vp-close>✕ fechar</button></div>`;
        html += `<div class="vp-detail-header">`;
        html += `<span class="vp-detail-ver" style="color:${cfg.color}">${esc(cfg.detailVer(data))}</span>`;
        const bc = cfg.badgeCls(data);
        html += `<span class="vp-badge vp-badge-${bc}">${esc(cfg.badgeText(data))}</span>`;
        html += `</div>`;
        const metas = cfg.detailMeta(data);
        if (metas.length) html += `<div class="vp-detail-meta"><span>${metas.join('</span><span>')}</span></div>`;
        if (data.summary) html += `<p class="vp-detail-summary">${esc(data.summary)}</p>`;
        if ((data.links || []).length) {
          html += `<div class="vp-detail-links">`;
          data.links.forEach(l => { html += `<a href="${escAttr(l.url)}" target="_blank" rel="noopener">${esc(l.label)}</a>`; });
          html += `</div>`;
        }
        if (feats.length) {
          html += `<div class="vp-feat-list">`;
          feats.forEach(f => {
            const stLow = (f.status || 'Standard').toLowerCase();
            const stCls = stLow.startsWith('standard') ? 'std' : stLow.startsWith('preview') ? 'prev' : stLow.startsWith('incubat') ? 'incub' : stLow.startsWith('remov') ? 'rem' : '';
            const numStr = cfg.featNum(f);
            html += `<div class="vp-feat">`;
            html += `<div class="vp-feat-top">`;
            if (numStr) html += `<span class="vp-feat-num" style="color:${cfg.color}">${numStr}</span>`;
            html += `<span class="vp-feat-status ${stCls}">${esc(f.status || 'Standard')}</span>`;
            html += `<span class="vp-feat-title">${esc(f.title)}</span>`;
            html += `</div>`;
            if (f.description) html += `<div class="vp-feat-desc">${esc(f.description)}</div>`;
            if (f.url) html += `<a class="vp-feat-link" href="${escAttr(f.url)}" target="_blank" rel="noopener">→ ${esc(f.url.replace(/^https?:\/\//, '').split('/').slice(0, 2).join('/'))}</a>`;
            html += `</div>`;
          });
          html += `</div>`;
        } else {
          html += `<p class="vp-loading">Nenhuma feature registrada.</p>`;
        }
        html += `</div>`;
        return html;
      }

      async function renderVersionSection(container, toolKey) {
        const cfg = VER_CFG[toolKey];
        if (!cfg) return;
        const idx = await loadVerIndex(toolKey);
        if (!idx || !idx.versions || !idx.versions.length) return;
        const versions = cfg.sortVersions(idx.versions);

        const sectionEl = document.createElement('div');
        sectionEl.className = 'vp-section';
        sectionEl.style.cssText = `background:color-mix(in srgb,${cfg.color} 5%,var(--surface));border-color:color-mix(in srgb,${cfg.color} 20%,transparent);--vp-color:${cfg.color}`;

        let html = `<div class="vp-section-head">`;
        html += `<span class="vp-section-title" style="color:${cfg.color}">${cfg.icon} ${cfg.title}</span>`;
        html += `<span class="vp-section-sub">${versions.length} versões · clique para expandir</span>`;
        html += `</div>`;
        html += `<div class="vp-grid">`;
        versions.forEach(v => {
          const vid = String(v.version || v.year);
          const bc = cfg.badgeCls(v);
          html += `<div class="vp-card" data-ver="${escAttr(vid)}" style="--vp-color:${cfg.color}">`;
          html += `<div class="vp-card-top"><span class="vp-version-num">${esc(cfg.cardNum(v))}</span>`;
          html += `<span class="vp-badge vp-badge-${bc}">${esc(cfg.badgeText(v))}</span></div>`;
          html += `<div class="vp-card-date">${esc(v.release_date || '')}</div>`;
          html += `<div class="vp-card-count" style="color:${cfg.color}">${esc(cfg.cardCount(v))}</div>`;
          const sub = cfg.cardSub(v);
          if (sub) html += `<div class="vp-card-sub">${esc(sub)}</div>`;
          html += `</div>`;
        });
        html += `</div>`;
        // Painel de detalhe inline (começa fechado)
        html += `<div class="vp-detail" id="vp-detail-${toolKey}"></div>`;
        sectionEl.innerHTML = html;
        container.prepend(sectionEl);

        let activeVer = null;
        const detailEl = sectionEl.querySelector(`#vp-detail-${toolKey}`);

        sectionEl.querySelectorAll('.vp-card').forEach(card => {
          card.addEventListener('click', async () => {
            const vid = card.dataset.ver;
            if (activeVer === vid) {
              // Toggle off
              detailEl.classList.remove('vp-open');
              card.classList.remove('vp-active');
              activeVer = null;
              return;
            }
            // Deactivate previous
            sectionEl.querySelectorAll('.vp-card.vp-active').forEach(c => c.classList.remove('vp-active'));
            card.classList.add('vp-active');
            activeVer = vid;
            // Show loading state
            detailEl.innerHTML = `<div class="vp-detail-inner" style="--vp-color:${cfg.color}"><p class="vp-loading">⟳ Carregando ${esc(cfg.cardNum({ version: vid, year: vid }))}…</p></div>`;
            detailEl.classList.add('vp-open');
            detailEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            const data = await loadVerDetail(toolKey, vid);
            if (activeVer !== vid) return; // user clicked away
            if (!data) {
              detailEl.innerHTML = `<div class="vp-detail-inner" style="--vp-color:${cfg.color}"><p class="vp-loading">Arquivo não encontrado — será gerado na próxima execução da skill.</p></div>`;
            } else {
              detailEl.innerHTML = buildVerDetailHtml(cfg, data);
            }
            detailEl.querySelector('[data-vp-close]')?.addEventListener('click', () => {
              detailEl.classList.remove('vp-open');
              card.classList.remove('vp-active');
              activeVer = null;
            });
          });
        });
      }

      function renderTool(key) {
        if (key === 'cve') return renderCVEView();
        const tool = TOOLS.find(t => t.key === key);
        if (!tool) { STATE.view = 'home'; setDeepLink('home', STATE.currentDate); return renderHome(); }
        const all = allItemsAcrossEditions();

        const toolItems = applyFilters(
          all.filter(x => {
            if (x._type !== 'tool') return false;
            if (x.tool_key) return x.tool_key === key;
            return tool.aliases.some(a => (x.name || '').toLowerCase().includes(a.toLowerCase()));
          }).sort((a, b) => (b._date || '').localeCompare(a._date || ''))
        );

        const releases = toolItems.filter(x => x.kind === 'release');
        const others = toolItems.filter(x => x.kind !== 'release');

        const tcolor = TOOL_KIND[tool.kind] || 'var(--cyan)';
        const totalDates = new Set(toolItems.map(i => i._date)).size;
        let html = `<div class="main-prompt" id="mainPrompt"></div>`;
        html += `<section class="ctx-hero" style="--ctx-color: ${tcolor}; margin-top:18px">`;
        const isNewsTopic = tool.kind === 'news';
        const lede = isNewsTopic
          ? `Feed completo de <b>${esc(tool.name)}</b>: notícias, dicas, tutoriais e curiosidades de todas as edições.`
          : `Feed completo de <b>${esc(tool.name)}</b>: quando há release, aparece primeiro; senão, notícias, dicas e tutoriais do ecossistema.`;
        const heroLogoHtml = tool.logo
          ? `<img src="${escAttr(tool.logo)}" alt="" style="width:26px;height:26px;border-radius:4px;object-fit:contain;flex-shrink:0" onerror="this.style.display='none'">`
          : iconSvg(CAT_ICONS[tool.category] || '', 26);
        html += `<div class="ctx-hero-title"><span class="ctx-kind-label">Assunto Fixo</span>${heroLogoHtml} ${esc(tool.name)}</div>`;
        html += `<p class="ctx-hero-lede">${lede}</p>`;
        html += `<div class="ctx-hero-meta">`;
        html += `<span><span class="mk">total</span> <span class="mv">${toolItems.length} itens</span></span>`;
        if (!isNewsTopic) html += `<span><span class="mk">releases</span> <span class="mv">${releases.length}</span></span>`;
        html += `<span><span class="mk">notícias/tips</span> <span class="mv">${others.length}</span></span>`;
        html += `<span><span class="mk">edições</span> <span class="mv">${totalDates}</span></span>`;
        html += `</div></section>`;

        if (!toolItems.length) {
          html += `<div class="no-items">→ nenhum item para este assunto ainda</div>`;
          $('main-inner').innerHTML = html;
          updateMainPrompt();
          return;
        }

        if (releases.length) {
          html += `<section class="section" style="margin-top:0"><div class="sec-head"><h2>Releases oficiais <span class="tag">release</span></h2><div class="sec-meta">${releases.length}</div></div>`;
          html += `<div class="tools-grid">${releases.map(buildToolCard).join('')}</div></section>`;
        }

        if (others.length) {
          html += `<section class="section"><div class="sec-head"><h2>Notícias, dicas e tutoriais <span class="tag">curadoria</span></h2><div class="sec-meta">${others.length}</div></div>`;
          html += `<div class="tools-grid">${others.map(buildToolCard).join('')}</div></section>`;
        }

        $('main-inner').innerHTML = html;
        updateMainPrompt();
        // Seção de versões inline (assíncrona, inserida no topo)
        if (VER_CFG[key]) renderVersionSection($('main-inner'), key);
      }

      function renderCVEView() {
        const all = allItemsAcrossEditions();
        // Agrega tool_key:cve + qualquer news/pillar com cves[]
        const f = STATE.cveFilter;
        const allCve = all.filter(x => {
          const isCveTool = x._type === 'tool' && (x.tool_key === 'cve' || x.cves?.length);
          const isCveNews = (x._type === 'news' || x._type === 'pillar') && x.cves?.length;
          return isCveTool || isCveNews;
        }).sort((a, b) => {
          const sord = { critical: 0, high: 1, medium: 2, low: 3 };
          const sa = sord[a.severity] ?? 4, sb = sord[b.severity] ?? 4;
          if (sa !== sb) return sa - sb;
          return (b._date || '').localeCompare(a._date || '');
        });
        const filtered = f ? allCve.filter(x => x.severity === f) : allCve;

        const counts = { critical: 0, high: 0, medium: 0, low: 0, total: allCve.length };
        allCve.forEach(x => { if (counts[x.severity] !== undefined) counts[x.severity]++; });

        let html = `<div class="main-prompt" id="mainPrompt"></div>`;

        // Header educativo
        html += `<div class="cve-hero">`;
        html += `<div class="cve-hero-top">`;
        html += `<span class="cve-hero-icon">🚨</span>`;
        html += `<div><div class="cve-hero-title">CVEs & Vulnerabilidades</div>`;
        html += `<div class="cve-hero-subtitle">Common Vulnerabilities and Exposures</div></div>`;
        html += `</div>`;
        html += `<p class="cve-lede">Um <b>CVE</b> é um identificador único e público para uma vulnerabilidade de segurança conhecida em software, hardware ou firmware. O programa é mantido pelo <b>MITRE</b> e os dados são enriquecidos pelo <b>NVD</b> (National Vulnerability Database) do <b>NIST</b>, que adiciona pontuação <b>CVSS</b> (0–10), impacto, vetor de ataque e status de patch. O catálogo <b>CISA KEV</b> lista as vulnerabilidades que já estão sendo exploradas ativamente — essas exigem atenção imediata de qualquer arquiteto responsável por sistemas em produção.</p>`;
        html += `<div class="cve-links">`;
        html += `<a href="https://nvd.nist.gov/" target="_blank" rel="noopener">📊 NVD — NIST</a>`;
        html += `<a href="https://cve.mitre.org/" target="_blank" rel="noopener">🏛 CVE — MITRE</a>`;
        html += `<a href="https://www.cisa.gov/known-exploited-vulnerabilities-catalog" target="_blank" rel="noopener">🛡 CISA KEV</a>`;
        html += `<a href="https://www.first.org/cvss/" target="_blank" rel="noopener">📐 CVSS Calculator</a>`;
        html += `</div>`;
        html += `<div class="cve-sev-bar">`;
        html += `<button class="cve-sev-btn${!f ? ' active' : ''}" data-sev="">Todos <span style="opacity:.7">${counts.total}</span></button>`;
        html += `<button class="cve-sev-btn${f === 'critical' ? ' active' : ''}" data-sev="critical">Critical <span style="opacity:.7">${counts.critical}</span></button>`;
        html += `<button class="cve-sev-btn${f === 'high' ? ' active' : ''}" data-sev="high">High <span style="opacity:.7">${counts.high}</span></button>`;
        html += `<button class="cve-sev-btn${f === 'medium' ? ' active' : ''}" data-sev="medium">Medium <span style="opacity:.7">${counts.medium}</span></button>`;
        html += `<button class="cve-sev-btn${f === 'low' ? ' active' : ''}" data-sev="low">Low <span style="opacity:.7">${counts.low}</span></button>`;
        html += `</div>`;
        html += `</div>`;

        if (!filtered.length) {
          html += `<div class="no-items">→ nenhum CVE registrado${f ? ' com severidade ' + f : ''} ainda</div>`;
        } else {
          html += `<section class="section" style="margin-top:0">`;
          html += `<div class="sec-head"><h2>Vulnerabilidades <span class="tag">CVE</span></h2><div class="sec-meta">${filtered.length} itens${f ? ' · ' + f : ''}</div></div>`;
          html += `<div class="${STATE.mode === 'list' ? 'news-list' : 'news-grid'}">`;
          filtered.forEach(item => {
            html += item._type === 'tool' ? buildToolCard(item) : buildCard(item);
          });
          html += `</div></section>`;
        }

        $('main-inner').innerHTML = html;
        updateMainPrompt();
        document.querySelectorAll('.cve-sev-btn').forEach(btn => {
          btn.addEventListener('click', () => { STATE.cveFilter = btn.dataset.sev || null; renderCVEView(); });
        });
      }

      function buildToolbar() {
        const urgentActive = STATE.filter.urgent ? 'active' : '';
        return `<div class="toolbar">` +
          `<div class="toolbar-left">` +
          `<span class="prompt">$</span>` +
          `<span>view: <span class="filter-name">${currentViewLabel()}</span></span>` +
          `<span class="hint">— modo ${STATE.mode}</span>` +
          `</div>` +
          `<div class="toolbar-right">` +
          `<div class="filter-chips">` +
          `<button class="filter-chip urgent ${urgentActive}" data-filter="urgent" title="Só urgentes (U)"><span aria-hidden="true">!</span> urgent</button>` +
          `</div>` +
          `<div class="mode-group" id="modeGroup" role="tablist" aria-label="Modo de visualização">` +
          `<button class="mode-btn ${STATE.mode === 'cards' ? 'active' : ''}" data-mode="cards" title="Cards (1)" aria-label="Modo cards"><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></button>` +
          `<button class="mode-btn ${STATE.mode === 'list' ? 'active' : ''}" data-mode="list" title="Lista (2)" aria-label="Modo lista"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg></button>` +
          `</div>` +
          `</div>` +
          `</div>`;
      }
      function currentViewLabel() {
        if (STATE.view === 'home') return 'edição de hoje';
        if (STATE.view.startsWith('cat:')) { const k = STATE.view.slice(4); return 'categoria · ' + (CAT[k]?.lf || k); }
        if (STATE.view === 'tool:cve') return 'CVEs & Vulnerabilidades';
        if (STATE.view.startsWith('tool:')) { const k = STATE.view.slice(5); const t = TOOLS.find(x => x.key === k); return 'assunto · ' + (t ? t.name : k); }
        return STATE.view;
      }

      /* ═══ Card builders ═══ */
      function sevClass(sev) { return sev ? 'sev-' + sev : ''; }

      /* Resolve imagem do item: usa item.image se existe, senão favicon do Google via URL */
      function resolveImage(item) {
        if (item && item.image) return item.image;
        if (!item || !item.url) return '';
        try {
          const u = new URL(item.url);
          return `https://www.google.com/s2/favicons?domain=${u.hostname}&sz=128`;
        } catch (_) {
          return '';
        }
      }

      function buildActionButtons(url) {
        const inRL = isInReadLater(url);
        return (
          `<button class="mini-btn bm ${inRL ? 'active' : ''}" data-act="rl" data-url="${escAttr(url)}" title="${inRL ? 'Remover de ' : 'Salvar em '}ler depois" aria-label="Ler depois"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg></button>` +
          `<button class="mini-btn" data-act="copy" data-url="${escAttr(url)}" title="Copiar link" aria-label="Copiar link"><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>`
        );
      }

      function buildCveTags(item) {
        const parts = [];
        if (item.cves?.length) {
          item.cves.slice(0, 3).forEach(cve => {
            const nvd = 'https://nvd.nist.gov/vuln/detail/' + encodeURIComponent(cve);
            parts.push(`<a class="cve-pill" href="${nvd}" target="_blank" rel="noopener" data-act="cve">${esc(cve)}</a>`);
          });
        }
        if (item.tags?.length) {
          item.tags.slice(0, 4).forEach(t => {
            parts.push(`<span class="tag-pill">${esc(t)}</span>`);
          });
        }
        return parts.length ? `<div class="card-tags">${parts.join('')}</div>` : '';
      }

      function buildHighlightCard(item, idx, date) {
        const c = item.category || 'backend';
        const cat = CAT[c];
        const highlightColor = `var(--cat-${c})`;
        const url = item.url;
        const topImg = resolveImage(item);
        const thumb = topImg ? `<div class="top-thumb" role="img" aria-label="${escAttr(item.headline)}"><img src="${escAttr(topImg)}" alt="" loading="lazy" onerror="this.parentElement.style.display='none'"></div>` : '';
        let html = `<div class="pillar-card ${item.urgent ? 'urgent' : ''}" data-url="${escAttr(url)}" data-date="${escAttr(date)}" role="link" tabindex="0" style="--pillar-color:${highlightColor}; --cat:var(--cat-${c});">`;
        html += `<div class="strip" aria-hidden="true"></div>`;
        html += thumb;
        html += `<div class="top-body">`;
        html += `<div class="badges">`;
        html += `<span class="pillar-label">#${idx + 1} · ${esc((cat && cat.lf) || c)}</span>`;
        if (item.severity) html += `<span class="badge ${sevClass(item.severity)}">${esc(item.severity)}</span>`;
        if (item.urgent && !item.severity) html += `<span class="badge u">CRIT</span>`;
        if (item.breaking) html += `<span class="badge brk">BRK</span>`;
        html += `</div>`;
        html += `<h3 class="top-head">${esc(item.headline)}</h3>`;
        if (item.summary) html += `<p class="top-sum">${esc(item.summary)}</p>`;
        html += buildCveTags(item);
        html += `<div class="top-foot">`;
        html += `<span class="src">${esc(item.source || '—')}</span>`;
        if (item.read_time) html += `<span class="time">~${esc(item.read_time)}min</span>`;
        html += `<div class="row-right">${buildActionButtons(url)}</div>`;
        html += `</div></div></div>`;
        return html;
      }

      function buildCard(item) {
        const c = item.category;
        const cat = CAT[c] || { l: c };
        const url = item.url;
        const date = item._date || STATE.currentDate;
        const isList = STATE.mode === 'list';
        const cardImg = resolveImage(item);
        const thumbHtml = cardImg
          ? `<div class="card-thumb" role="img" aria-label="${escAttr(item.headline)}"><img src="${escAttr(cardImg)}" alt="" loading="lazy" onerror="this.parentElement.style.display='none'"></div>`
          : '';
        let html = `<div class="card ${item.urgent ? 'urgent' : ''}" data-url="${escAttr(url)}" data-date="${escAttr(date)}" data-cat="${c}" role="link" tabindex="0" style="--cat: var(--cat-${c});">`;
        html += thumbHtml;
        if (isList) html += `<div class="card-body">`;
        html += `<div class="card-head">`;
        html += `<span class="cat-tag">${cat.lf || cat.l}</span>`;
        if (date) html += `<span class="date-tag">${esc(date)}</span>`;
        if (item.severity) html += `<span class="badge ${sevClass(item.severity)}">${esc(item.severity)}</span>`;
        if (item.breaking) html += `<span class="dot-brk">▲ BRK</span>`;
        html += `</div>`;
        html += `<h3 class="card-title">${esc(item.headline)}</h3>`;
        if (item.summary) html += `<p class="card-sum">${esc(item.summary)}</p>`;
        html += buildCveTags(item);
        html += `<div class="card-foot">`;
        html += `<span class="src">${esc(item.source || '—')}</span>`;
        if (item.read_time) html += `<span class="time">~${esc(item.read_time)}min</span>`;
        html += `<div class="row-right">${buildActionButtons(url)}</div>`;
        html += `</div>`;
        if (isList) html += `</div>`;
        html += `</div>`;
        return html;
      }

      function buildToolCard(t) {
        const toolDef = TOOLS.find(x => x.key === t.tool_key) ||
          TOOLS.find(x => x.aliases.some(a => (t.name || '').toLowerCase().includes(a)));
        const k = t.kind || 'news';
        const bk = TOOL_KIND_BADGE[k] || TOOL_KIND_BADGE.news;
        const logoUrl = (STATE.mode === 'cards') ? (t.image || toolDef?.logo) : null;
        const hasThumb = !!logoUrl;
        const kindClass = 'tk-' + k;
        const thumbClass = hasThumb ? ' has-thumb' : '';

        let iconHtml;
        if (hasThumb) {
          iconHtml = `<div class="tool-icon" style="background-image:url('${escAttr(logoUrl)}');font-size:0;" aria-hidden="true"></div>`;
        } else {
          iconHtml = `<div class="tool-icon" aria-hidden="true">${esc(t.icon || toolDef?.icon || '🛠')}</div>`;
        }

        const badge = `<span class="tool-kind-badge" style="background:${bk.color}">${bk.label}</span>`;
        const nameHtml = `<div class="tool-name">${esc(t.name || toolDef?.name || '—')}</div>`;
        const noteHtml = `<div class="tool-note">${esc(t.headline || t.description || t.note || t.summary || '')}</div>`;
        const verHtml = (t.version && k === 'release') ? `<span class="tool-ver">${esc(t.version)}</span>` : '';

        return `<a class="tool-card ${kindClass}${thumbClass}" href="${escAttr(t.url || '#')}" target="_blank" rel="noopener" style="--tool-kind:${TOOL_KIND[toolDef?.kind] || 'var(--cyan)'}">` +
          iconHtml +
          `<div class="tool-body">` +
          `<div class="tool-head">${badge}${nameHtml}</div>` +
          noteHtml +
          `</div>` +
          verHtml +
          `</a>`;
      }

      /* ═══ Feed render ═══ */
      function renderFeed(items, opts) {
        opts = opts || {};
        const feed = $('feed');
        if (!feed) return;
        feed.className = 'feed-' + STATE.mode;

        if (!items.length) {
          feed.innerHTML = '<div class="no-items">→ nenhum item para esta view</div>';
          return;
        }

        let html = '';
        if (opts.groupByDate) {
          const groups = {};
          items.forEach(it => { (groups[it._date] = groups[it._date] || []).push(it); });
          const dates = Object.keys(groups).sort().reverse();
          dates.forEach(d => {
            html += `<div class="date-group"><span class="dg-label">${d}</span><span class="dg-count">${groups[d].length} itens</span></div>`;
            html += `<div class="feed-${STATE.mode}">${groups[d].map(buildCard).join('')}</div>`;
          });
          feed.classList.remove('feed-cards', 'feed-list');
        } else if (opts.groupByCat) {
          const catOrder = Object.keys(CAT).sort((a, b) => CAT[a].lf.localeCompare(CAT[b].lf, 'pt-BR'));
          const byCategory = {};
          items.forEach(it => {
            const k = it.category || 'backend';
            (byCategory[k] = byCategory[k] || []).push(it);
          });
          catOrder.forEach(k => {
            const catItems = byCategory[k];
            if (!catItems || !catItems.length) return;
            const catDef = CAT[k] || { lf: k, i: '' };
            html += `<div class="cat-group-head" style="--k:var(--cat-${k})">` +
              `<span class="cgh-icon">${iconSvg(CAT_ICONS[k] || '', 13)}</span>` +
              `<span>${catDef.lf}</span>` +
              `<span class="cgh-count">${catItems.length}</span>` +
              `</div>`;
            html += `<div class="feed-${STATE.mode}">${catItems.map(buildCard).join('')}</div>`;
          });
          feed.classList.remove('feed-cards', 'feed-list');
        } else {
          html = items.map(buildCard).join('');
        }
        feed.innerHTML = html;
      }

      /* ═══ Event delegation global ═══ */
      document.addEventListener('click', (e) => {
        // mini-btn read-later on cards
        const rlBtn = e.target.closest('.mini-btn[data-act="rl"]');
        if (rlBtn) {
          e.stopPropagation(); e.preventDefault();
          const url = rlBtn.dataset.url;
          const item = findItem(url);
          if (item) {
            toggleReadLater(item);
            rlBtn.classList.toggle('active', isInReadLater(url));
          }
          return;
        }

        // mini-btn copy link
        const copyBtn = e.target.closest('.mini-btn[data-act="copy"]');
        if (copyBtn) {
          e.stopPropagation(); e.preventDefault();
          navigator.clipboard?.writeText(copyBtn.dataset.url);
          toast('✓ link copiado');
          return;
        }

        // CVE pill clicado dentro de card: abre NVD (default <a>)
        if (e.target.closest('.cve-pill')) {
          e.stopPropagation();
          return;
        }

        // card/top-card/pillar-card click: abre URL em nova aba
        const card = e.target.closest('.top-card, .card, .pillar-card');
        if (card && !e.target.closest('[data-filter-type], [data-act], .mini-btn')) {
          const url = card.dataset.url;
          if (url) window.open(url, '_blank', 'noopener');
          return;
        }

        // sidebar filter items
        const filterEl = e.target.closest('[data-filter-type]');
        if (filterEl) {
          const type = filterEl.dataset.filterType;
          const key = filterEl.dataset.filterKey;
          setView(type === 'home' ? 'home' : type + ':' + key);
          if (window.matchMedia('(max-width: 720px)').matches) closeSidebar();
          return;
        }

        // timeline goto
        const tlItem = e.target.closest('[data-goto]');
        if (tlItem) { goToEdition(tlItem.dataset.goto); return; }

        // toolbar mode
        const modeBtn = e.target.closest('.mode-btn');
        if (modeBtn) {
          STATE.mode = modeBtn.dataset.mode;
          localStorage.setItem('csrn-mode', STATE.mode);
          renderMain();
          return;
        }

        // toolbar filter chips
        const chip = e.target.closest('.filter-chip');
        if (chip) {
          const f = chip.dataset.filter;
          STATE.filter[f] = !STATE.filter[f];
          renderMain();
          return;
        }

      });

      // Sidebar filter items: aceita Enter/Space via teclado
      document.addEventListener('keydown', (e) => {
        if ((e.key === 'Enter' || e.key === ' ') && e.target.matches('[data-filter-type]')) {
          e.preventDefault();
          const type = e.target.dataset.filterType;
          const key = e.target.dataset.filterKey;
          setView(type === 'home' ? 'home' : type + ':' + key);
        }
        if ((e.key === 'Enter' || e.key === ' ') && e.target.matches('[data-goto]')) {
          e.preventDefault();
          goToEdition(e.target.dataset.goto);
        }
        if ((e.key === 'Enter' || e.key === ' ') && e.target.matches('.top-card, .card, .pillar-card')) {
          e.preventDefault();
          window.open(e.target.dataset.url, '_blank', 'noopener');
        }
      });

      function findItem(url) {
        for (const d in STATE.editionsCache) {
          const ed = STATE.editionsCache[d];
          const all = [...(ed.highlights || []), ...(ed.news || [])];
          const hit = all.find(x => x.url === url);
          if (hit) return Object.assign({}, hit, { _date: d });
        }
        const rl = STATE.readLater.find(x => x.url === url);
        if (rl) return rl;
        return null;
      }


      /* ═══ Reader modal ═══ */
      function closeModal() {
        $('modal').classList.remove('open');
      }
      $('modal').addEventListener('click', (e) => { if (e.target.id === 'modal') closeModal(); });

      /* ═══ Read-later ═══ */
      function sortReadLater(items) {
        const sort = STATE.readLaterSort;
        const arr = items.slice();
        if (sort === 'category') arr.sort((a, b) => (a.category || '').localeCompare(b.category || ''));
        else if (sort === 'urgent') arr.sort((a, b) => (b.urgent ? 1 : 0) - (a.urgent ? 1 : 0));
        else if (sort === 'date') arr.sort((a, b) => (b._date || '').localeCompare(a._date || ''));
        else arr.sort((a, b) => (b._savedAt || 0) - (a._savedAt || 0));
        return arr;
      }
      function exportReadLater() {
        const blob = new Blob([JSON.stringify(STATE.readLater, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `csr-news-ler-depois-${new Date().toISOString().slice(0, 10)}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 1000);
        toast('✓ exportado');
      }

      /* ═══ Calendário permanente na sidebar ═══ */
      let dpYear, dpMonth;

      function syncCalToDate(dateStr) {
        const d = dateStr ? new Date(dateStr + 'T12:00') : new Date();
        dpYear = d.getFullYear();
        dpMonth = d.getMonth();
        renderDp();
      }

      function renderDp() {
        const panel = $('dpPanel');
        if (!panel) return;
        const first = new Date(dpYear, dpMonth, 1);
        const lastDay = new Date(dpYear, dpMonth + 1, 0).getDate();
        const startDow = first.getDay();
        const monthLabel = first.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });
        const editionsSet = {};
        (STATE.editionsIndex?.editions || []).forEach(e => editionsSet[e.date] = true);
        const todayIso = new Date().toISOString().slice(0, 10);

        let html = `<div class="dp-grid">`;
        ['D', 'S', 'T', 'Q', 'Q', 'S', 'S'].forEach(d => html += `<div class="dp-dow">${d}</div>`);
        for (let i = 0; i < startDow; i++) html += `<div class="dp-cell"></div>`;
        for (let day = 1; day <= lastDay; day++) {
          const iso = dpYear + '-' + String(dpMonth + 1).padStart(2, '0') + '-' + String(day).padStart(2, '0');
          const hasEd = editionsSet[iso];
          const curr = iso === STATE.currentDate && STATE.view === 'home' ? ' current' : '';
          const isToday_ = iso === todayIso ? ' dp-today' : '';
          html += `<div class="dp-cell ${hasEd ? 'has-edition' : ''}${curr}${isToday_}" data-date="${iso}">${day}</div>`;
        }
        html += `</div>`;
        panel.innerHTML = html;

        if (STATE.view !== 'home') {
          // Em cat/tool: clique em qualquer lugar do calendário volta pro dia que estava
          panel.onclick = (e) => {
            e.stopPropagation();
            const target = STATE.currentDate || todayISO();
            goToEdition(target);
          };
        } else {
          panel.onclick = null;
          panel.querySelectorAll('.dp-cell.has-edition').forEach(c => {
            c.onclick = () => goToEdition(c.dataset.date);
          });
        }
      }

      /* ═══ Navigation ═══ */
      async function goToEdition(date) {
        setLoader(true);
        await loadEdition(date);
        setLoader(false);
        STATE.view = 'home';
        renderSidebar();
        renderMain();
        renderRail();
        renderDp();
        setDeepLink('home', date);
      }
      async function setView(view) {
        setLoader(true);
        if (view.startsWith('cat:')) await loadForCategory(view.slice(4));
        else if (view.startsWith('tool:')) await loadForTool(view.slice(5));
        setLoader(false);
        STATE.view = view;
        setDeepLink(view, STATE.currentDate);
        renderSidebar();
        renderMain();
        renderRail();
        renderDp();
        const main = document.querySelector('.main');
        if (main) main.scrollTop = 0;
      }

      function prevEdition() {
        const eds = STATE.editionsIndex?.editions || [];
        const idx = eds.findIndex(e => e.date === STATE.currentDate);
        if (idx < 0 || idx >= eds.length - 1) return;
        goToEdition(eds[idx + 1].date);
      }
      function nextEdition() {
        const eds = STATE.editionsIndex?.editions || [];
        const idx = eds.findIndex(e => e.date === STATE.currentDate);
        if (idx <= 0) return;
        goToEdition(eds[idx - 1].date);
      }

      function goToday() {
        const eds = STATE.editionsIndex?.editions || [];
        const today = todayISO();
        const match = eds.find(e => e.date === today);
        const target = match ? match.date : (eds[0]?.date);
        if (target) goToEdition(target);
      }


      /* ═══ Deep link (data + view) ═══ */
      function setDeepLink(view, date) {
        const p = new URLSearchParams();
        if (!view || view === 'about') {
          // about = URL limpa sem parâmetros
        } else if (view === 'home') {
          if (date) p.set('d', date);
        } else {
          p.set('v', view);
        }
        const qs = p.toString();
        history.replaceState(null, '', qs ? '?' + qs : location.pathname);
      }
      async function applyInitialDeepLink() {
        const params = new URLSearchParams(location.search);
        const d = params.get('d');
        const v = params.get('v');
        const cat = params.get('cat');
        const tool = params.get('tool');
        if (d) {
          const eds = STATE.editionsIndex?.editions || [];
          if (eds.some(e => e.date === d)) { await goToEdition(d); return; }
          goToday(); return; // data inválida → hoje
        }
        if (v) { await setView(v); return; }
        if (cat) { await setView('cat:' + cat); return; }
        if (tool) { await setView('tool:' + tool); return; }
        // sem parâmetros: já está na view home com a edição mais recente
      }

      /* ═══ Mobile sidebar ═══ */
      function toggleSidebar() {
        $('sidebar').classList.toggle('open');
      }
      function closeSidebar() {
        $('sidebar').classList.remove('open');
      }

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') { closeModal(); closeSidebar(); }
      });

      /* ═══ Init ═══ */
      async function init() {
        const alreadyBooted = sessionStorage.getItem('csrn-booted') === '1';
        if (alreadyBooted) {
          skipBoot();
        } else {
          bootStep(0);
        }
        initTheme();
        updateRlBadge();

        if (!alreadyBooted) bootStep(1);
        const ok = await loadIndex();
        if (!ok) {
          $('boot-log').innerHTML += '<div class="boot-line"><span class="status warn">[FAIL]</span><span class="msg">data/editions.json not reachable</span></div>';
          return;
        }
        const editions = (STATE.editionsIndex && STATE.editionsIndex.editions) || [];
        if (!alreadyBooted) bootStep(2, { count: editions.length });

        const firstDate = editions[0]?.date;
        if (firstDate) await loadEdition(firstDate);
        if (!alreadyBooted) bootStep(3, { date: firstDate });

        if (!alreadyBooted) bootStep(4);
        renderSidebar();
        renderMain();
        renderRail();
        syncCalToDate(STATE.currentDate);
        if (!alreadyBooted) {
          bootStep(5);
          setTimeout(() => bootStep(BOOT_STEPS.length), 420);
        }

        // events
        $('readLaterBtn').onclick = () => setView('rl');
        $('hamburgerBtn').onclick = toggleSidebar;
        $('brandHome').onclick = () => window.location.href = 'index.html';
        $('ghRepoBtn').onclick = () => window.open('https://github.com/cesarschutz/noticias-dev-arq', '_blank', 'noopener');

        // pre-warm all editions in background (para agregados cat/tool)
        loadAll().then(() => {
          renderSidebar();
          renderRail();
          renderDp();
          // re-renderiza main se estiver em view de agregado (cat/tool) para mostrar dados completos
          const v = STATE.view;
          if (v.startsWith('cat:') || v.startsWith('tool:')) renderMain();
        });

        // aplica deep link se presente
        await applyInitialDeepLink();
      }
      /* ═══ Verse footer ═══ */
      let _verses = [];
      let _verseDeck = [];
      let _verseIdx = 0;

      function initVerses() {
        fetch('data/verses.json')
          .then(r => r.json())
          .then(data => {
            _verses = data;
            _verseDeck = shuffleArray(_verses);
            _verseIdx = 0;
            showVerse();
            setInterval(() => { if (!document.hidden) cycleVerse(); }, 300000);
          })
          .catch(() => { });
      }

      function verseRefToUrl(ref) {
        const BK = { 'Mateus': 'MAT', 'Marcos': 'MRK', 'Lucas': 'LUK', 'João': 'JHN' };
        const m = ref.match(/^([^\d]+?)\s+(\d+):(\d+)/);
        if (!m) return null;
        const book = BK[m[1].trim()];
        if (!book) return null;
        return `https://www.bible.com/pt/bible/129/${book}.${m[2]}.${m[3]}.NVI`;
      }

      function showVerse() {
        if (!_verseDeck.length) return;
        const v = _verseDeck[_verseIdx];
        const wrap = $('verse-wrap');
        const textEl = $('verse-text');
        const refEl = $('verse-ref');
        const crossLink = $('verse-cross-link');
        if (!wrap) return;
        wrap.classList.remove('v-in');
        wrap.classList.add('v-out');
        setTimeout(() => {
          textEl.textContent = '\u201c' + v.text + '\u201d';
          refEl.textContent = v.ref;
          const url = verseRefToUrl(v.ref);
          if (url) {
            wrap.href = url;
            if (crossLink) crossLink.href = url;
          } else {
            wrap.removeAttribute('href');
            if (crossLink) crossLink.removeAttribute('href');
          }
          wrap.classList.remove('v-out');
          wrap.classList.add('v-in');
        }, 420);
      }

      function cycleVerse() {
        _verseIdx++;
        if (_verseIdx >= _verseDeck.length) { _verseDeck = shuffleArray(_verses); _verseIdx = 0; }
        showVerse();
      }
      function prevVerse() {
        _verseIdx = (_verseIdx - 2 + _verseDeck.length) % _verseDeck.length;
        showVerse();
      }
      function nextVerse() { cycleVerse(); }

      function initQuotes() {
        fetch('data/quotes.json')
          .then(r => r.json())
          .then(data => {
            if (Array.isArray(data) && data.length) {
              _allQuotes = data;
              _quoteDeck = [];
              _deckIdx = 0;
              cycleQuote();
            }
          })
          .catch(() => { });
      }

      init();
      initVerses();
      initQuotes();

      // Expõe ao window as funções chamadas via onclick inline no HTML
      window.prevQuote = prevQuote;
      window.nextQuote = nextQuote;
      window.prevVerse = prevVerse;
      window.nextVerse = nextVerse;

      /* ════════ PARTICLE NETWORK BACKGROUND ════════ */
      (function particleNetwork() {
        const canvas = document.getElementById('particleBg');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        let W = 0, H = 0, dpr = 1;
        let particles = [];
        let NUM = 90;
        const MAX_DIST = 150;
        const MAX_DIST_SQ = MAX_DIST * MAX_DIST;

        function resize() {
          dpr = Math.min(window.devicePixelRatio || 1, 2);
          // Viewport inteira (canvas é fixed)
          W = window.innerWidth;
          H = window.innerHeight;
          canvas.width = Math.round(W * dpr);
          canvas.height = Math.round(H * dpr);
          canvas.style.width = W + 'px';
          canvas.style.height = H + 'px';
          ctx.setTransform(1, 0, 0, 1, 0, 0);
          ctx.scale(dpr, dpr);
          // Mais partículas em telas grandes, menos em mobile
          NUM = Math.max(35, Math.min(110, Math.round((W * H) / 16000)));
          init();
        }
        function init() {
          particles = [];
          for (let i = 0; i < NUM; i++) {
            particles.push({
              x: Math.random() * W,
              y: Math.random() * H,
              vx: (Math.random() - 0.5) * 0.28,
              vy: (Math.random() - 0.5) * 0.28,
            });
          }
        }
        function getConfig() {
          const isLight = document.documentElement.getAttribute('data-theme') === 'light';
          return isLight
            ? { dotColor: 'rgba(10,100,160,', lineColor: 'rgba(10,100,160,', lineMax: 0.75, dotAlpha: 0.9 }
            : { dotColor: 'rgba(135,210,255,', lineColor: 'rgba(42,184,232,', lineMax: 0.55, dotAlpha: 0.8 };
        }
        function tick() {
          ctx.clearRect(0, 0, W, H);
          const cfg = getConfig();

          // move
          for (const p of particles) {
            p.x += p.vx;
            p.y += p.vy;
            if (p.x < 0 || p.x > W) p.vx = -p.vx;
            if (p.y < 0 || p.y > H) p.vy = -p.vy;
          }

          // linhas entre pontos próximos
          ctx.lineWidth = 1;
          for (let i = 0; i < particles.length; i++) {
            for (let j = i + 1; j < particles.length; j++) {
              const dx = particles[i].x - particles[j].x;
              const dy = particles[i].y - particles[j].y;
              const d2 = dx * dx + dy * dy;
              if (d2 < MAX_DIST_SQ) {
                const alpha = (1 - Math.sqrt(d2) / MAX_DIST) * cfg.lineMax;
                ctx.strokeStyle = cfg.lineColor + alpha.toFixed(3) + ')';
                ctx.beginPath();
                ctx.moveTo(particles[i].x, particles[i].y);
                ctx.lineTo(particles[j].x, particles[j].y);
                ctx.stroke();
              }
            }
          }
          // pontos
          ctx.fillStyle = cfg.dotColor + cfg.dotAlpha + ')';
          for (const p of particles) {
            ctx.beginPath();
            ctx.arc(p.x, p.y, 1.5, 0, Math.PI * 2);
            ctx.fill();
          }

          requestAnimationFrame(tick);
        }

        resize();
        tick();
        let rzt;
        window.addEventListener('resize', () => {
          clearTimeout(rzt);
          rzt = setTimeout(resize, 120);
        });
      })();

    })();

    /* ════ TOOLTIP ════ */
    document.addEventListener('DOMContentLoaded', () => {
      if (localStorage.getItem('csrn-quote-collapsed')) collapseQuoteBar();

      const tip = document.getElementById('tip');
      if (!tip) return;
      document.addEventListener('mouseover', e => {
        const el = e.target.closest('[data-tip]');
        if (!el) return;
        tip.textContent = el.dataset.tip;
        const color = getComputedStyle(el).getPropertyValue('--k').trim();
        const isDark = document.documentElement.getAttribute('data-theme') !== 'light';
        const c = color.replace(/\s/g, '').toLowerCase();
        const lightColors = ['#ffffff', '#f7df1e'];
        const safeColor = (!isDark && c === '#ffffff') ? '#24292e' : color;
        const textColor = lightColors.includes(c) ? '#1a1a1a' : safeColor;
        tip.style.borderColor = safeColor || '';
        tip.style.color = textColor || '';
        tip.style.boxShadow = safeColor ? `0 0 12px ${safeColor}55, 0 4px 16px rgba(0,0,0,.35)` : '0 4px 16px rgba(0,0,0,.35)';
        tip.style.opacity = '1';
      });
      document.addEventListener('mousemove', e => {
        if (tip.style.opacity !== '1') return;
        tip.style.left = Math.min(e.clientX + 15, window.innerWidth - tip.offsetWidth - 10) + 'px';
        tip.style.top = (e.clientY + 15) + 'px';
      });
      document.addEventListener('mouseout', e => {
        if (e.target.closest('[data-tip]')) tip.style.opacity = '0';
      });
    });
  </script>

  <!-- VERSE FOOTER -->
  <div id="tip"></div>

  <button class="qb-restore" id="qbRestore" onclick="restoreQuoteBar()" aria-label="Mostrar frase do dia">
    <svg width="13" height="13" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 2h12a1 1 0 0 1 1 1v7a1 1 0 0 1-1 1H9l-3 3v-3H2a1 1 0 0 1-1-1V3a1 1 0 0 1 1-1z" stroke="currentColor"
        stroke-width="1.4" fill="none" />
    </svg>
    quote
  </button>

  <footer class="verse-bar" id="verse-bar" aria-live="polite">
    <button class="verse-nav-btn" onclick="prevVerse()" title="Versículo anterior">‹</button>
    <a class="verse-text-wrap" id="verse-wrap" target="_blank" rel="noopener noreferrer"
      title="Abrir versículo na Bíblia">
      <span class="verse-text" id="verse-text">—</span>
      <span class="verse-ref" id="verse-ref"></span>
    </a>
    <button class="verse-nav-btn" onclick="nextVerse()" title="Próximo versículo">›</button>
    <!-- Cruz latina — símbolo cristão / Igreja Metodista -->
    <a id="verse-cross-link" class="verse-cross-link" target="_blank" rel="noopener noreferrer"
      title="Abrir versículo na Bíblia">
      <svg class="verse-symbol" viewBox="0 0 16 22" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect x="6.5" y="0" width="3" height="22" rx="1" fill="currentColor" />
        <rect x="0" y="6" width="16" height="3" rx="1" fill="currentColor" />
      </svg>
    </a>
  </footer>
</body>
