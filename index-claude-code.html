<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CsR News — Arquivo Diário para Arquitetos</title>
<style>
/* ═══════════════════════════════════════════
   CSS VARS — DARK (default)
═══════════════════════════════════════════ */
:root {
  --bg: #0f172a;
  --surface: #1e293b;
  --surface2: #293548;
  --surface3: #334155;
  --border: rgba(148,163,184,.15);
  --border2: rgba(148,163,184,.25);
  --text: #e2e8f0;
  --text2: #94a3b8;
  --text3: #64748b;
  --accent: #3b82f6;
  --accent-h: #60a5fa;
  --success: #22c55e;
  --warn: #f59e0b;
  --danger: #ef4444;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 4px 24px rgba(0,0,0,.4);
  --shadow-sm: 0 2px 8px rgba(0,0,0,.3);

  /* Category colors */
  --cat-ai: #a855f7;
  --cat-sec: #ef4444;
  --cat-aws: #f97316;
  --cat-devops: #22c55e;
  --cat-obs: #06b6d4;
  --cat-backend: #3b82f6;
  --cat-data: #8b5cf6;
  --cat-integ: #ec4899;
  --cat-testing: #84cc16;
  --cat-design: #f59e0b;
  --cat-distarch: #818cf8;
  --cat-enterprise: #94a3b8;
  --cat-fintech: #14b8a6;

  /* Pillar colors */
  --pillar-java: #f89820;
  --pillar-aws: #FF9900;
  --pillar-distarch: #818cf8;

  /* Sidebar width */
  --sidebar-w: 240px;
  --rail-w: 280px;
  --topbar-h: 52px;
}

[data-theme="light"] {
  --bg: #f1f5f9;
  --surface: #ffffff;
  --surface2: #f8fafc;
  --surface3: #e2e8f0;
  --border: rgba(15,23,42,.1);
  --border2: rgba(15,23,42,.2);
  --text: #0f172a;
  --text2: #475569;
  --text3: #94a3b8;
  --accent: #2563eb;
  --accent-h: #1d4ed8;
  --shadow: 0 4px 24px rgba(0,0,0,.08);
  --shadow-sm: 0 2px 8px rgba(0,0,0,.06);
}

/* ═══════════════════════════════════════════
   RESET
═══════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px;scroll-behavior:smooth}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
a{color:inherit;text-decoration:none}
button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit}
img{display:block}
ul{list-style:none}

/* ═══════════════════════════════════════════
   UTILITIES
═══════════════════════════════════════════ */
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
.flex{display:flex}.flex-col{flex-direction:column}.items-center{align-items:center}.gap-1{gap:4px}.gap-2{gap:8px}.gap-3{gap:12px}.gap-4{gap:16px}
.truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mt-1{margin-top:4px}.mt-2{margin-top:8px}.mt-3{margin-top:12px}.mt-4{margin-top:16px}
.mb-2{margin-bottom:8px}.mb-3{margin-bottom:12px}.mb-4{margin-bottom:16px}
.text-sm{font-size:.8rem}.text-xs{font-size:.72rem}.text-lg{font-size:1.1rem}.text-xl{font-size:1.3rem}.text-2xl{font-size:1.6rem}.text-3xl{font-size:2rem}
.font-semibold{font-weight:600}.font-bold{font-weight:700}.font-mono{font-family:'JetBrains Mono',monospace}
.text-muted{color:var(--text2)}.text-dim{color:var(--text3)}
.rounded{border-radius:var(--radius)}.rounded-sm{border-radius:var(--radius-sm)}.rounded-full{border-radius:9999px}
.border{border:1px solid var(--border)}.border2{border:1px solid var(--border2)}
.surface{background:var(--surface)}.surface2{background:var(--surface2)}
.p-2{padding:8px}.p-3{padding:12px}.p-4{padding:16px}
.w-full{width:100%}
.spin{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .25s ease}

/* ═══════════════════════════════════════════
   MASCOT PLACEHOLDER
═══════════════════════════════════════════ */
.mascot-slot{display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(148,163,184,.1);border:2px dashed rgba(148,163,184,.3);border-radius:16px;color:var(--text3);font-weight:600;letter-spacing:.1em;text-transform:uppercase;gap:4px;flex-shrink:0}
.mascot-slot[data-size="xl"]{width:240px;height:240px;font-size:1.2rem;border-radius:24px}
.mascot-slot[data-size="md"]{width:96px;height:96px;font-size:.8rem}
.mascot-slot[data-size="sm"]{width:56px;height:56px;font-size:.55rem;border-radius:10px}
.mascot-slot__dims{font-size:.65em;opacity:.5;font-weight:400;letter-spacing:0}

/* ═══════════════════════════════════════════
   TOPBAR
═══════════════════════════════════════════ */
.topbar{position:fixed;top:0;left:0;right:0;height:var(--topbar-h);background:var(--surface);border-bottom:1px solid var(--border);z-index:100;display:flex;align-items:center;padding:0 16px;gap:8px}
.topbar__logo{font-weight:700;font-size:1rem;color:var(--text);letter-spacing:-.02em}
.topbar__logo span{color:var(--accent)}
.topbar__spacer{flex:1}
.topbar__actions{display:flex;align-items:center;gap:6px}
.topbar-btn{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:var(--radius-sm);font-size:.78rem;font-weight:500;color:var(--text2);background:var(--surface2);border:1px solid var(--border);transition:all .15s;white-space:nowrap}
.topbar-btn:hover{color:var(--text);background:var(--surface3)}
.topbar-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.topbar-btn.primary:hover{background:var(--accent-h);border-color:var(--accent-h)}
.saved-badge{background:var(--accent);color:#fff;font-size:.65rem;padding:1px 5px;border-radius:9999px;font-weight:700;min-width:18px;text-align:center}
.hamburger{display:none;flex-direction:column;gap:4px;padding:6px;border-radius:6px}
.hamburger span{display:block;width:20px;height:2px;background:var(--text);border-radius:2px;transition:.2s}

/* ═══════════════════════════════════════════
   SYSTEM SHELL
═══════════════════════════════════════════ */
.system-shell{display:grid;grid-template-columns:var(--sidebar-w) 1fr var(--rail-w);grid-template-rows:auto;min-height:100vh;padding-top:var(--topbar-h)}
.sidebar{position:sticky;top:var(--topbar-h);height:calc(100vh - var(--topbar-h));overflow-y:auto;border-right:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;gap:0;padding-bottom:16px}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:2px}
.main-content{min-width:0;padding:24px;max-width:860px;margin:0 auto;width:100%}
.rail{position:sticky;top:var(--topbar-h);height:calc(100vh - var(--topbar-h));overflow-y:auto;border-left:1px solid var(--border);background:var(--surface);padding:16px;display:flex;flex-direction:column;gap:20px}
.rail::-webkit-scrollbar{width:4px}
.rail::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:2px}

/* Sidebar sections */
.sidebar-mascot{display:flex;align-items:center;gap:10px;padding:14px 14px 10px;border-bottom:1px solid var(--border)}
.sidebar-mascot__name{font-size:.8rem;font-weight:700;line-height:1.2}
.sidebar-mascot__sub{font-size:.68rem;color:var(--text3)}
.sidebar-section{padding:10px 14px 4px}
.sidebar-section__title{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:6px}
.sidebar-cal-header{display:flex;align-items:center;justify-content:space-between;padding:8px 14px 4px}
.sidebar-cal-header__label{font-size:.78rem;font-weight:600;cursor:pointer;color:var(--text)}
.sidebar-cal-header__label:hover{color:var(--accent)}
.cal-nav-btn{font-size:.9rem;color:var(--text3);padding:2px 6px;border-radius:4px;transition:.15s}
.cal-nav-btn:hover{background:var(--surface3);color:var(--text)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:2px 10px 8px}
.cal-dow{text-align:center;font-size:.58rem;font-weight:600;color:var(--text3);padding:3px 0}
.cal-day{text-align:center;font-size:.72rem;padding:4px 2px;border-radius:6px;cursor:pointer;transition:.15s;position:relative;line-height:1}
.cal-day:empty{pointer-events:none}
.cal-day.has-edition{font-weight:600;color:var(--text)}
.cal-day.has-edition::after{content:'';position:absolute;bottom:1px;left:50%;transform:translateX(-50%);width:4px;height:4px;background:var(--warn);border-radius:50%}
.cal-day:not(.has-edition):not(:empty){color:var(--text3)}
.cal-day.selected{background:var(--accent);color:#fff;font-weight:700}
.cal-day.selected::after{display:none}
.cal-day.today:not(.selected){outline:2px solid var(--accent);outline-offset:-2px}
.cal-day:hover:not(.selected):not(:empty){background:var(--surface3)}
.cal-disabled .cal-day{pointer-events:none;opacity:.4}
.sidebar-cat-list{padding:0 8px}
.sidebar-cat-item{display:flex;align-items:center;gap:8px;padding:6px 6px;border-radius:var(--radius-sm);cursor:pointer;transition:.15s;font-size:.78rem;color:var(--text2)}
.sidebar-cat-item:hover{background:var(--surface2);color:var(--text)}
.sidebar-cat-item.active{background:var(--surface3);color:var(--text);font-weight:600}
.sidebar-cat-icon{width:20px;text-align:center;font-size:.9rem;flex-shrink:0}
.sidebar-topic-list{padding:0 8px}
.sidebar-topic-item{display:flex;align-items:center;gap:8px;padding:5px 6px;border-radius:var(--radius-sm);cursor:pointer;transition:.15s;font-size:.75rem;color:var(--text2)}
.sidebar-topic-item:hover{background:var(--surface2);color:var(--text)}
.sidebar-topic-item.active{background:var(--surface3);color:var(--text);font-weight:600}
.sidebar-topic-icon{width:18px;height:18px;object-fit:contain;flex-shrink:0;border-radius:3px}
.today-btn{margin:4px 14px;padding:6px 10px;background:var(--accent);color:#fff;border-radius:var(--radius-sm);font-size:.72rem;font-weight:600;text-align:center;cursor:pointer;display:none;transition:.15s}
.today-btn:hover{background:var(--accent-h)}
.today-btn.visible{display:block}

/* ═══════════════════════════════════════════
   MAIN CONTENT — HEADERS
═══════════════════════════════════════════ */
.view-header{margin-bottom:24px}
.view-title{font-size:1.5rem;font-weight:700;line-height:1.2}
.view-subtitle{color:var(--text2);font-size:.9rem;margin-top:6px;max-width:600px}
.view-meta{display:flex;align-items:center;gap:12px;margin-top:8px;font-size:.78rem;color:var(--text3)}
.cat-banner{display:flex;align-items:flex-start;gap:16px;padding:20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:24px}
.cat-banner__icon{font-size:2.5rem;flex-shrink:0;line-height:1}
.cat-banner__sites{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.site-pill{padding:3px 8px;background:var(--surface2);border:1px solid var(--border);border-radius:9999px;font-size:.7rem;color:var(--text2);white-space:nowrap}

/* hero */
.day-hero{padding:20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:24px}
.day-hero__date{font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:6px}
.day-hero__title{font-size:1.3rem;font-weight:700;line-height:1.3;margin-bottom:10px}
.day-hero__desc{font-size:.85rem;color:var(--text2);line-height:1.7}

/* toolbar */
.feed-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.feed-toolbar__spacer{flex:1}
.mode-btn{padding:5px 10px;border-radius:var(--radius-sm);font-size:.75rem;font-weight:500;color:var(--text3);border:1px solid var(--border);transition:.15s}
.mode-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.urgent-chip{display:flex;align-items:center;gap:4px;padding:5px 10px;border-radius:var(--radius-sm);font-size:.75rem;font-weight:600;border:1px solid var(--danger);color:var(--danger);cursor:pointer;transition:.15s}
.urgent-chip.active{background:var(--danger);color:#fff}

/* section headings */
.section-heading{display:flex;align-items:center;gap:8px;margin:24px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.section-heading__icon{font-size:1rem}
.section-heading__label{font-size:.82rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text2)}
.section-heading__count{font-size:.7rem;color:var(--text3);background:var(--surface2);padding:2px 6px;border-radius:9999px}

/* ═══════════════════════════════════════════
   CARDS — PILLARS
═══════════════════════════════════════════ */
.pillars-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px}
.pillar-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.pillar-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.pillar-card[data-pillar="java"]::before{background:var(--pillar-java)}
.pillar-card[data-pillar="aws"]::before{background:var(--pillar-aws)}
.pillar-card[data-pillar="distarch"]::before{background:var(--pillar-distarch)}
.pillar-card:hover{box-shadow:var(--shadow);transform:translateY(-2px)}
.pillar-badge{display:inline-flex;align-items:center;gap:4px;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:3px 8px;border-radius:9999px;margin-bottom:10px}
.pillar-card[data-pillar="java"] .pillar-badge{background:rgba(248,152,32,.15);color:var(--pillar-java)}
.pillar-card[data-pillar="aws"] .pillar-badge{background:rgba(255,153,0,.15);color:var(--pillar-aws)}
.pillar-card[data-pillar="distarch"] .pillar-badge{background:rgba(129,140,248,.15);color:var(--pillar-distarch)}
.pillar-card__img{width:40px;height:40px;border-radius:8px;object-fit:cover;float:right;margin-left:10px;margin-bottom:6px;background:var(--surface2)}
.pillar-card__headline{font-size:.88rem;font-weight:700;line-height:1.4;margin-bottom:8px}
.pillar-card__summary{font-size:.78rem;color:var(--text2);line-height:1.65}
.pillar-card__foot{display:flex;align-items:center;justify-content:space-between;margin-top:12px;font-size:.7rem;color:var(--text3)}
.pillar-card__tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}

/* ═══════════════════════════════════════════
   CARDS — NEWS (cards & list mode)
═══════════════════════════════════════════ */
.news-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.news-list{display:flex;flex-direction:column;gap:10px}

.news-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;cursor:pointer;transition:all .2s;position:relative;display:flex;flex-direction:column;gap:8px}
.news-card:hover{box-shadow:var(--shadow);border-color:var(--border2);transform:translateY(-1px)}
.news-card.urgent-item{border-left:3px solid var(--danger)}
.news-card--list{flex-direction:row;align-items:flex-start;gap:14px}
.news-card--list .news-card__body{flex:1;min-width:0}

.news-card__top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.news-card__img{width:48px;height:48px;border-radius:8px;object-fit:cover;flex-shrink:0;background:var(--surface2)}
.news-card__badges{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.cat-badge{display:inline-flex;align-items:center;gap:3px;font-size:.65rem;font-weight:700;padding:2px 7px;border-radius:9999px;text-transform:uppercase;letter-spacing:.04em}
.badge-urgent{background:rgba(239,68,68,.15);color:var(--danger);font-size:.62rem;font-weight:700;padding:2px 6px;border-radius:9999px}
.badge-breaking{background:rgba(245,158,11,.15);color:var(--warn);font-size:.62rem;font-weight:700;padding:2px 6px;border-radius:9999px}
.badge-severity-critical{background:var(--danger);color:#fff;font-size:.62rem;font-weight:700;padding:2px 6px;border-radius:9999px}
.badge-severity-high{background:rgba(239,68,68,.2);color:var(--danger);font-size:.62rem;font-weight:700;padding:2px 6px;border-radius:9999px}
.badge-severity-medium{background:rgba(245,158,11,.2);color:var(--warn);font-size:.62rem;font-weight:700;padding:2px 6px;border-radius:9999px}
.badge-severity-low{background:rgba(34,197,94,.15);color:var(--success);font-size:.62rem;font-weight:700;padding:2px 6px;border-radius:9999px}
.badge-release{background:rgba(59,130,246,.15);color:var(--accent);font-size:.62rem;font-weight:700;padding:2px 6px;border-radius:9999px}
.badge-kind{font-size:.62rem;font-weight:600;padding:2px 6px;border-radius:9999px;background:var(--surface3);color:var(--text2)}

.news-card__headline{font-size:.88rem;font-weight:700;line-height:1.4}
.news-card__summary{font-size:.78rem;color:var(--text2);line-height:1.65;margin-top:4px}
.news-card__foot{display:flex;align-items:center;gap:8px;margin-top:8px;font-size:.7rem;color:var(--text3);flex-wrap:wrap}
.news-card__foot-sep{color:var(--text3)}

.tags-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.tag-pill{font-size:.63rem;padding:2px 6px;background:var(--surface2);border:1px solid var(--border);border-radius:9999px;color:var(--text3)}
.cve-pill{font-size:.63rem;padding:2px 7px;background:rgba(239,68,68,.15);color:var(--danger);border-radius:9999px;font-weight:600;cursor:pointer;text-decoration:none}
.cve-pill:hover{background:var(--danger);color:#fff}

.save-btn{margin-left:auto;padding:4px 8px;border-radius:6px;font-size:.68rem;font-weight:600;border:1px solid var(--border);color:var(--text3);transition:.15s;flex-shrink:0;white-space:nowrap}
.save-btn:hover{border-color:var(--accent);color:var(--accent)}
.save-btn.saved{background:rgba(59,130,246,.15);color:var(--accent);border-color:var(--accent)}

/* ═══════════════════════════════════════════
   TOOL CARDS
═══════════════════════════════════════════ */
.tools-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.tool-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;gap:6px}
.tool-card:hover{box-shadow:var(--shadow-sm);border-color:var(--border2)}
.tool-card__top{display:flex;align-items:flex-start;gap:10px}
.tool-card__icon{font-size:1.4rem;flex-shrink:0;width:28px;text-align:center}
.tool-card__info{flex:1;min-width:0}
.tool-card__name{font-size:.72rem;font-weight:600;color:var(--text2)}
.tool-card__headline{font-size:.82rem;font-weight:700;line-height:1.4}
.tool-card__desc{font-size:.76rem;color:var(--text2);line-height:1.6}
.tool-card__foot{display:flex;align-items:center;gap:6px;font-size:.68rem;color:var(--text3);flex-wrap:wrap}
.version-badge{padding:3px 8px;background:rgba(59,130,246,.15);color:var(--accent);border-radius:9999px;font-weight:700;font-size:.7rem}

/* ═══════════════════════════════════════════
   RAIL
═══════════════════════════════════════════ */
.rail-section{background:var(--surface2);border-radius:var(--radius);padding:14px}
.rail-section__title{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:12px}
.quote-box{display:flex;flex-direction:column;gap:10px}
.quote-text{font-size:.82rem;line-height:1.7;color:var(--text);font-style:italic}
.quote-author{font-size:.72rem;font-weight:600;color:var(--accent)}
.quote-context{font-size:.68rem;color:var(--text3);line-height:1.5}
.quote-nav{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.quote-nav-btn{font-size:.75rem;padding:4px 8px;border-radius:6px;color:var(--text3);border:1px solid var(--border);transition:.15s}
.quote-nav-btn:hover{color:var(--text);background:var(--surface3)}
.quote-counter{font-size:.68rem;color:var(--text3)}
.verse-box{display:flex;flex-direction:column;gap:8px}
.verse-text{font-size:.82rem;line-height:1.7;color:var(--text);cursor:pointer}
.verse-text:hover{color:var(--accent)}
.verse-ref{font-size:.7rem;font-weight:600;color:var(--text3)}
.recent-list{display:flex;flex-direction:column;gap:6px}
.recent-item{padding:8px;border-radius:var(--radius-sm);cursor:pointer;transition:.15s;border:1px solid var(--border)}
.recent-item:hover{background:var(--surface3)}
.recent-item__date{font-size:.65rem;font-weight:600;color:var(--text3);text-transform:uppercase;margin-bottom:3px}
.recent-item__summary{font-size:.72rem;color:var(--text2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

function fmtDateShort(d) {
  const [y,m,day] = d.split('-');
  const months = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  return `${parseInt(day)} ${months[parseInt(m)-1]} ${y}`;
}
function fmtDateFull(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'});
}
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function getCatColor(key) {
  return `var(--cat-${key}, var(--text2))`;
}
function getSaved() {
  try { return JSON.parse(localStorage.getItem('csrn-read-later') || '[]'); } catch { return []; }
}
function setSaved(arr) {
  localStorage.setItem('csrn-read-later', JSON.stringify(arr));
}
function isSaved(url) {
  return getSaved().some(s => s.url === url);
}
function toggleSave(item) {
  const saved = getSaved();
  const idx = saved.findIndex(s => s.url === item.url);
  if (idx >= 0) { saved.splice(idx, 1); }
  else { saved.unshift({url:item.url, headline:item.headline||item.name, source:item.source, category:item.category||item.tool_key, savedAt:new Date().toISOString()}); }
  setSaved(saved);
  document.querySelectorAll(`[data-save-url="${CSS.escape(item.url)}"]`).forEach(btn => {
    btn.textContent = isSaved(item.url) ? '🔖 Salvo' : '🔖 Salvar';
    btn.classList.toggle('saved', isSaved(item.url));
  });
  updateSavedBadge();
}
function updateSavedBadge() {
  const n = getSaved().length;
  document.querySelectorAll('.saved-badge').forEach(el => { el.textContent = n; el.style.display = n ? 'inline-flex' : 'none'; });
}
function getTheme() {
  return localStorage.getItem('csrn-theme') || 'dark';
}
function setTheme(t) {
  localStorage.setItem('csrn-theme', t);
  document.documentElement.setAttribute('data-theme', t);
  document.querySelectorAll('.theme-btn').forEach(b => b.textContent = t === 'dark' ? '☀️' : '🌙');
}
function navigate(view, key) {
  state.view = view;
  state.viewKey = key || null;
  let qs = '';
  if (view === 'landing') qs = '';
  else if (view === 'day') qs = key ? `?d=${key}` : '?app=1';
  else if (view === 'cat') qs = `?v=cat:${key}`;
  else if (view === 'tool') qs = `?v=tool:${key}`;
  else if (view === 'lang') qs = `?v=lang:${key}`;
  else if (view === 'saved') qs = `?v=saved`;
  history.pushState({view, key}, '', qs || (window.location.pathname));
  renderApp();
}
function parseRoute() {
  const qs = new URLSearchParams(location.search);
  const d = qs.get('d');
  const v = qs.get('v');
  if (d) { state.view = 'day'; state.viewKey = d; return; }
  if (v === 'saved') { state.view = 'saved'; state.viewKey = null; return; }
  if (v && v.startsWith('cat:')) { state.view = 'cat'; state.viewKey = v.slice(4); return; }
  if (v && v.startsWith('tool:')) { state.view = 'tool'; state.viewKey = v.slice(5); return; }
  if (v && v.startsWith('lang:')) { state.view = 'lang'; state.viewKey = v.slice(5); return; }
  if (qs.has('app') || location.search) { state.view = 'day'; state.viewKey = null; return; }
  state.view = 'landing';
  state.viewKey = null;
}

/* ╔════════════════════════════════════════════╗
   ║  BOOT                                      ║
   ╚════════════════════════════════════════════╝ */
async function boot() {
  document.documentElement.setAttribute('data-theme', getTheme());
  parseRoute();
  try {
    const [idx, quotes, verses] = await Promise.all([
      fetch('data/editions.json').then(r => r.json()),
      fetch('data/quotes.json').then(r => r.json()),
      fetch('data/verses.json').then(r => r.json())
    ]);
    state.editionsIndex = idx;
    state.quotesBank = quotes;
    state.versesBank = verses;
    state.verseIdx = Math.floor(Math.random() * verses.length);
    if (state.view === 'day' && !state.viewKey) {
      const latest = idx.editions[idx.editions.length - 1];
      if (latest) state.viewKey = latest.date;
    }
  } catch(e) {
    document.getElementById('app').innerHTML = `<div class="loading" style="justify-content:center;height:100vh;color:var(--danger)">Erro ao carregar dados: ${e.message}</div>`;
    return;
  }
  renderApp();
  // warm up recent editions
  if (state.editionsIndex) {
    const recent = state.editionsIndex.editions.slice(-7);
    recent.forEach(ed => loadEdition(ed.date).catch(()=>{}));
  }
}

async function loadEdition(date) {
  if (state.editionsByDate[date]) return state.editionsByDate[date];
  const ed = await fetch(`data/${date}.json`).then(r => { if(!r.ok) throw new Error('404'); return r.json(); });
  state.editionsByDate[date] = ed;
  return ed;
}

/* ╔════════════════════════════════════════════╗
   ║  CARD BUILDERS                             ║
   ╚════════════════════════════════════════════╝ */
function buildBadges(item) {
  const parts = [];
  if (item.category) {
    const c = CAT[item.category] || {};
    const col = getCatColor(item.category);
    parts.push(`<span class="cat-badge" style="background:color-mix(in srgb,${col} 15%,transparent);color:${col}">${esc(c.icon||'')} ${esc(c.label||item.category)}</span>`);
  }
  if (item.urgent) parts.push(`<span class="badge-urgent">⚡ URGENTE</span>`);
  if (item.breaking) parts.push(`<span class="badge-breaking">🔴 BREAKING</span>`);
  if (item.severity) parts.push(`<span class="badge-severity-${esc(item.severity)}">${item.severity.toUpperCase()}</span>`);
  if (item.kind === 'release') parts.push(`<span class="badge-release">🚀 RELEASE${item.version ? ' '+esc(item.version) : ''}</span>`);
  return parts.join('');
}

function buildCVEs(cves) {
  if (!cves || !cves.length) return '';
  return `<div class="tags-row">${cves.map(c=>`<a class="cve-pill" href="https://nvd.nist.gov/vuln/detail/${esc(c)}" target="_blank" rel="noopener">${esc(c)}</a>`).join('')}</div>`;
}

function buildTags(tags) {
  if (!tags || !tags.length) return '';
  return `<div class="tags-row">${tags.slice(0,6).map(t=>`<span class="tag-pill">${esc(t)}</span>`).join('')}</div>`;
}

function buildSaveBtn(url, headline, source, category) {
  const saved = isSaved(url);
  return `<button class="save-btn${saved?' saved':''}" data-save-url="${esc(url)}" onclick="event.stopPropagation();toggleSave({url:'${esc(url.replace(/'/g,"\\\'"))}',headline:'${esc((headline||'').replace(/'/g,"\\\'"))}',source:'${esc((source||'').replace(/'/g,"\\\'"))}',category:'${esc(category||'')}'})">${saved?'🔖 Salvo':'🔖 Salvar'}</button>`;
}

function buildNewsCard(item, listMode) {
  const cls = listMode ? 'news-card news-card--list' : `news-card${item.urgent?' urgent-item':''}`;
  const img = item.image ? `<img class="news-card__img" src="${esc(item.image)}" alt="" loading="lazy" onerror="this.style.display='none'">` : '';

/* ╔════════════════════════════════════════════╗
   ║  CALENDAR                                  ║
   ╚════════════════════════════════════════════╝ */
function renderCalendar(disabled) {
  const year = state.calYear, month = state.calMonth;
  const today = new Date();
  const editionDates = new Set((state.editionsIndex?.editions||[]).map(e=>e.date));
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const monthNames = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const dow = ['D','S','T','Q','Q','S','S'];
  let grid = dow.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  for (let i = 0; i < firstDay; i++) grid += '<div class="cal-day"></div>';
  for (let d = 1; d <= daysInMonth; d++) {
    const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = today.getFullYear()===year && today.getMonth()===month && today.getDate()===d;
    const isSelected = state.view==='day' && state.viewKey===ds;
    const hasEd = editionDates.has(ds);
    let cls = 'cal-day';
    if (hasEd) cls += ' has-edition';
    if (isToday) cls += ' today';
    if (isSelected) cls += ' selected';
    const onclick = hasEd ? `navigate('day','${ds}')` : '';
    grid += `<div class="${cls}"${onclick?` onclick="${onclick}"`:''} style="${!hasEd?'cursor:default':''}">  ${d}</div>`;
  }
  const todayDate = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  const showToday = state.view==='day' && state.viewKey && state.viewKey !== todayDate && editionDates.has(todayDate);
  return `
    <div class="sidebar-cal-header">
      <button class="cal-nav-btn" onclick="prevMonth()">‹</button>
      <span class="sidebar-cal-header__label" onclick="navigate('day',null)">${monthNames[month].slice(0,3)} ${year}</span>
      <button class="cal-nav-btn" onclick="nextMonth()">›</button>
    </div>
    <div class="cal-grid${disabled?' cal-disabled':''}">${grid}</div>
    <button class="today-btn${showToday?' visible':''}" onclick="gotoToday()">→ hoje</button>
  `;
}
function prevMonth() { state.calMonth--; if(state.calMonth<0){state.calMonth=11;state.calYear--;} renderSidebar(); }
function nextMonth() { state.calMonth++; if(state.calMonth>11){state.calMonth=0;state.calYear++;} renderSidebar(); }
function gotoToday() {
  const today = new Date();
  const ds = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  navigate('day', ds);
}

function renderSidebar() {

  let cats = CAT_ORDER.map(k => {
    const c = CAT[k];
    const active = state.view==='cat' && state.viewKey===k;
    return `<div class="sidebar-cat-item${active?' active':''}" onclick="navigate('cat','${k}')">
      <span class="sidebar-cat-icon">${c.icon}</span>
      <span>${c.label}</span>

  let topics = Object.entries(TOPIC_ORDER).map(([grp, keys]) => {

      if (!t) return '';

  }).join('');

  const savedActive = state.view === 'saved';

}

/* ╔════════════════════════════════════════════╗
   ║  RAIL                                      ║
   ╚════════════════════════════════════════════╝ */
function renderRail(edition) {
  const railEl = document.getElementById('rail');
  if (!railEl) return;
  // quotes
  const quotes = edition ? edition.quotes : state.quotesBank.slice(0,5);
  let quoteHtml = '<div class="empty-state" style="padding:12px">—</div>';
  if (quotes && quotes.length) {
    const q = quotes[state.quoteIdx % quotes.length];
    quoteHtml = `<div class="quote-box">
      <div class="quote-text">"${esc(q.text)}"</div>
      <div class="quote-author">— ${esc(q.author)}</div>
      ${q.context ? `<div class="quote-context">${esc(q.context)}</div>` : ''}
      <div class="quote-nav">
        <button class="quote-nav-btn" onclick="prevQuote()" ${quotes.length<2?'disabled':''}>‹</button>
        <span class="quote-counter">${(state.quoteIdx%quotes.length)+1} / ${quotes.length}</span>
        <button class="quote-nav-btn" onclick="nextQuote()" ${quotes.length<2?'disabled':''}>›</button>
      </div>
    </div>`;
  }
  // verse
  const verse = state.versesBank[state.verseIdx % (state.versesBank.length||1)];
  const verseRef = verse ? verse.ref.replace(/\s+/g,'+') : '';
  const verseHtml = verse ? `<div class="verse-box">
    <div class="verse-text" onclick="window.open('https://www.bible.com/pt/search/bible?q=${encodeURIComponent(verse.ref)}','_blank')">"${esc(verse.text)}"</div>
    <div class="verse-ref">${esc(verse.ref)}</div>
    <div class="quote-nav">
      <button class="quote-nav-btn" onclick="prevVerse()">‹</button>
      <span class="quote-counter">${state.verseIdx+1} / ${state.versesBank.length}</span>
      <button class="quote-nav-btn" onclick="nextVerse()">›</button>
    </div>
  </div>` : '';
  // recent editions
  const editions = (state.editionsIndex?.editions || []).slice(-6).reverse();
  const recentHtml = editions.length ? editions.map(ed => `<div class="recent-item" onclick="navigate('day','${ed.date}')">
    <div class="recent-item__date">${fmtDateShort(ed.date)}</div>
    <div class="recent-item__summary">${esc(ed.summary)}</div>
  </div>`).join('') : '<div class="empty-state" style="padding:8px">Nenhuma edição</div>';

  railEl.innerHTML = `
    <div class="rail-section"><div class="rail-section__title">💬 Citações do Dia</div>${quoteHtml}</div>
    <div class="rail-section"><div class="rail-section__title">✝️ Palavra</div>${verseHtml}</div>
    <div class="rail-section"><div class="rail-section__title">📅 Edições Recentes</div><div class="recent-list">${recentHtml}</div></div>
  `;
}
function prevQuote() { state.quoteIdx = Math.max(0, state.quoteIdx-1); renderRail(getCurrentEdition()); }
function nextQuote() { state.quoteIdx++; renderRail(getCurrentEdition()); }
function prevVerse() { state.verseIdx = (state.verseIdx - 1 + state.versesBank.length) % state.versesBank.length; renderRail(getCurrentEdition()); }
function nextVerse() { state.verseIdx = (state.verseIdx + 1) % state.versesBank.length; renderRail(getCurrentEdition()); }
function getCurrentEdition() { return state.view==='day' && state.viewKey ? state.editionsByDate[state.viewKey] : null; }

/* ╔════════════════════════════════════════════╗
   ║  VIEW: DAY                                 ║
   ╚════════════════════════════════════════════╝ */
async function renderDayView() {
  const main = document.getElementById('main-content');
  if (!main) return;
  main.innerHTML = `<div class="loading"><div class="spinner"></div> Carregando edição…</div>`;
  let ed;
  try { ed = await loadEdition(state.viewKey); } catch(e) {
    main.innerHTML = `<div class="empty-state">Edição ${state.viewKey} não encontrada.</div>`;
    return;
  }
  state.quoteIdx = 0;
  renderRail(ed);
  const mode = state.displayMode;
  const urgent = state.filterUrgent;

  // Pillars
  const pillarsHtml = (ed.pillars||[]).map(p => buildPillarCard(p)).join('');

  // News grouped by category order
  const newsMap = {};
  (ed.news||[]).forEach(n => { (newsMap[n.category]||(newsMap[n.category]=[])).push(n); });
  let newsHtml = '';
  CAT_ORDER.forEach(k => {
    let items = newsMap[k]||[];
    if (urgent) items = items.filter(i=>i.urgent);
    if (!items.length) return;
    const c = CAT[k]||{};
    const col = getCatColor(k);
    const cards = mode==='cards'
      ? `<div class="news-grid">${items.map(i=>buildNewsCard(i,false)).join('')}</div>`
      : `<div class="news-list">${items.map(i=>buildNewsCard(i,true)).join('')}</div>`;
    newsHtml += `<div class="section-heading">
      <span class="section-heading__icon">${c.icon||''}</span>
      <span class="section-heading__label" style="color:${col}">${c.label||k}</span>
      <span class="section-heading__count">${items.length}</span>
    </div>${cards}`;
  });
  if (!newsHtml && urgent) newsHtml = '<div class="empty-state">Nenhuma notícia urgente nesta edição.</div>';

  // Tools grouped by rail groups
  const toolsMap = {};
  (ed.tools||[]).forEach(t => { (toolsMap[t.tool_key]||(toolsMap[t.tool_key]=[])).push(t); });
  const allGroups = ['subjects','ai-prod','devops','dados','obs','backend','langs'];
  const grpLabels = {subjects:'Tópicos',['ai-prod']:'AI & IDEs',devops:'DevOps & Infra',dados:'Dados & Integração',obs:'Obs & Segurança',backend:'Backend & Design',langs:'Linguagens'};
  let toolsHtml = '';
  allGroups.forEach(grp => {
    const keys = TOPIC_ORDER[grp]||[];
    const items = keys.flatMap(k => toolsMap[k]||[]);
    if (!items.length) return;
    toolsHtml += `<div class="section-heading"><span class="section-heading__label">${grpLabels[grp]||grp}</span><span class="section-heading__count">${items.length}</span></div>
    <div class="tools-grid">${items.map(i=>buildToolCard(i)).join('')}</div>`;
  });

  main.innerHTML = `<div class="fade-in">
    <div class="day-hero">
      <div class="day-hero__date">${esc(ed.formatted_date||ed.date)}</div>
      <div class="day-hero__title">${esc(ed.hero_title||'')}</div>
      <div class="day-hero__desc">${esc(ed.hero_description||'')}</div>
    </div>

    <div class="section-heading"><span class="section-heading__icon">⭐</span><span class="section-heading__label">Destaques do Dia</span><span class="section-heading__count">3</span></div>
    <div class="pillars-grid">${pillarsHtml}</div>

    <div class="feed-toolbar">
      <span style="font-size:.82rem;font-weight:600;color:var(--text2)">Notícias</span>
      <button class="urgent-chip${urgent?' active':''}" onclick="toggleUrgent()" title="Filtrar urgentes">⚡ Urgentes</button>
      <div class="feed-toolbar__spacer"></div>
      <button class="mode-btn${mode==='cards'?' active':''}" onclick="setMode('cards')" title="Cards (1)">▦</button>
      <button class="mode-btn${mode==='list'?' active':''}" onclick="setMode('list')" title="Lista (2)">☰</button>
    </div>
    ${newsHtml}

    <div class="section-heading" style="margin-top:32px"><span class="section-heading__icon">🔧</span><span class="section-heading__label">Cobertura de Tópicos & Ferramentas</span></div>
    ${toolsHtml}
  </div>`;
}

function setMode(m) { state.displayMode = m; renderDayView(); }
function toggleUrgent() { state.filterUrgent = !state.filterUrgent; renderDayView(); }

/* ╔════════════════════════════════════════════╗
   ║  VIEW: CAT                                 ║
   ╚════════════════════════════════════════════╝ */
async function renderCatView() {
  const main = document.getElementById('main-content');
  const key = state.viewKey;
  const cat = CAT[key];
  if (!cat || !main) return;
  main.innerHTML = `
    <div class="cat-banner">
      <div class="cat-banner__icon">${cat.icon}</div>
      <div>
        <div class="view-title" style="color:var(--cat-${key},var(--text))">${cat.label}</div>
        <div class="view-subtitle">${esc(cat.desc)}</div>
        <div class="cat-banner__sites">${cat.sites.map(s=>`<span class="site-pill">${s}</span>`).join('')}</div>
      </div>
    </div>
    <div class="loading"><div class="spinner"></div> Carregando notícias…</div>`;

  const toFetch = (state.editionsIndex?.editions||[]).filter(e => (e.counts_by_category||{})[key] > 0);
  if (!toFetch.length) { main.querySelector('.loading').outerHTML = '<div class="empty-state">Nenhuma notícia nesta categoria ainda.</div>'; return; }

  await Promise.all(toFetch.map(e => loadEdition(e.date).catch(()=>{})));

  let allItems = [];
  toFetch.forEach(e => {
    const ed = state.editionsByDate[e.date];
    if (!ed) return;
    const items = [...(ed.pillars||[]).filter(p=>p.category===key), ...(ed.news||[]).filter(n=>n.category===key)];
    items.forEach(i => { i._editionDate = e.date; });
    allItems.push(...items);
  });
  allItems.sort((a,b) => (b.published_at||b._editionDate).localeCompare(a.published_at||a._editionDate));

  const grouped = {};
  allItems.forEach(i => { const d = i._editionDate; (grouped[d]||(grouped[d]=[])).push(i); });

  let html = '';
  Object.keys(grouped).sort().reverse().forEach(date => {
    html += `<div class="section-heading"><span class="section-heading__label">${fmtDateShort(date)}</span><span class="section-heading__count">${grouped[date].length}</span></div>
    <div class="news-grid">${grouped[date].map(i=>buildNewsCard(i,false)).join('')}</div>`;
  });
  main.querySelector('.loading').outerHTML = html || '<div class="empty-state">Sem itens.</div>';
}

/* ╔════════════════════════════════════════════╗
   ║  VIEW: TOOL                                ║
   ╚════════════════════════════════════════════╝ */
async function renderToolView() {
  const main = document.getElementById('main-content');
  const key = state.viewKey;
  const topic = TOPICS[key];
  if (!main) return;
  const col = topic?.category ? `var(--cat-${topic.category},var(--text))` : 'var(--text)';
  main.innerHTML = `
    <div class="cat-banner">
      <div class="cat-banner__icon" style="font-size:2rem">${esc(topic?.icon||'📦')}</div>
      <div>
        <div class="view-title">${esc(topic?.name||key)}</div>
        ${topic?.desc ? `<div class="view-subtitle">${esc(topic.desc)}</div>` : ''}
      </div>
    </div>
    <div class="loading"><div class="spinner"></div> Carregando…</div>`;

  const toFetch = (state.editionsIndex?.editions||[]).filter(e => (e.counts_by_tool||{})[key] > 0);
  await Promise.all(toFetch.map(e => loadEdition(e.date).catch(()=>{})));

  let allItems = [];
  toFetch.forEach(e => {
    const ed = state.editionsByDate[e.date];
    if (!ed) return;
    (ed.tools||[]).filter(t=>t.tool_key===key).forEach(t => { t._editionDate=e.date; allItems.push(t); });
  });

  const kindOrder = ['release','news','tip','tutorial','curiosity'];
  const kindLabel = {release:'🚀 Releases',news:'📰 Notícias',tip:'💡 Dicas',tutorial:'📖 Tutoriais',curiosity:'✨ Curiosidades'};
  const grouped = {};
  allItems.forEach(i => { (grouped[i.kind]||(grouped[i.kind]=[])).push(i); });

  let html = '';
  kindOrder.forEach(k => {
    const items = grouped[k];
    if (!items?.length) return;
    html += `<div class="section-heading"><span class="section-heading__label">${kindLabel[k]}</span><span class="section-heading__count">${items.length}</span></div>
    <div class="tools-grid">${items.map(i=>buildToolCard(i)).join('')}</div>`;
  });
  main.querySelector('.loading').outerHTML = html || '<div class="empty-state">Nenhum item ainda.</div>';
}

/* ╔════════════════════════════════════════════╗
   ║  VIEW: LANG                                ║
   ╚════════════════════════════════════════════╝ */
async function renderLangView() {
  const main = document.getElementById('main-content');
  const key = state.viewKey;
  const topic = TOPICS[key];
  if (!main) return;

  const langFilenames = {java:'java-versions',javascript:'js-versions',python:'python-versions'};
  const langDir = langFilenames[key];

  main.innerHTML = `
    <div class="cat-banner">
      <div class="cat-banner__icon" style="font-size:2rem">${esc(topic?.icon||'📦')}</div>
      <div>
        <div class="view-title">${esc(topic?.name||key)}</div>
        ${topic?.desc ? `<div class="view-subtitle">${esc(topic.desc)}</div>` : ''}
      </div>
    </div>
    <div id="versions-section"><div class="loading"><div class="spinner"></div> Verificando versões…</div></div>
    <div id="tools-section"><div class="loading"><div class="spinner"></div> Carregando cobertura…</div></div>`;

  // Load versions index
  const versionsEl = document.getElementById('versions-section');
  if (langDir) {
    try {
      const idx = await fetch(`data/${langDir}/index.json`).then(r => { if(!r.ok) throw new Error('no-versions'); return r.json(); });
      const versions = (idx.versions||[]);
      const currentVersion = idx.latest_ga;
      const vCards = versions.map(v => {
        const isCurrent = String(v.version) === String(currentVersion);
        return `<div class="version-card${isCurrent?' current':''}">
          <div class="version-card__top">
            <span class="version-number">${esc(v.version)}</span>
            <div class="version-badges">
              ${isCurrent ? '<span class="badge-current">Atual</span>' : ''}
              ${v.lts ? '<span class="badge-lts">LTS</span>' : ''}
            </div>
          </div>
          <div class="version-date">📅 ${v.release_date||'—'}</div>
          ${v.jep_count ? `<div class="version-jeps">${v.jep_count} JEPs</div>` : ''}
          ${v.oracle_support_until ? `<div class="version-jeps" style="color:var(--text3)">Suporte até ${v.oracle_support_until}</div>` : ''}
        </div>`;
      }).join('');
      versionsEl.innerHTML = `<div class="version-section">
        <div class="version-section__header">
          <span class="version-section__title">Linha do Tempo de Versões</span>
          ${idx.latest_ga ? `<span class="badge-current">Atual: ${esc(idx.latest_ga)}</span>` : ''}
        </div>
        <div class="versions-grid">${vCards||'<div class="empty-state">Sem versões registradas.</div>'}</div>
      </div>`;
    } catch(e) {
      versionsEl.innerHTML = ''; // hide silently
    }
  } else {
    versionsEl.innerHTML = '';
  }

  // Load tool coverage
  const toolsEl = document.getElementById('tools-section');
  const toFetch = (state.editionsIndex?.editions||[]).filter(e => (e.counts_by_tool||{})[key] > 0);
  await Promise.all(toFetch.map(e => loadEdition(e.date).catch(()=>{})));
  let allItems = [];
  toFetch.forEach(e => {
    const ed = state.editionsByDate[e.date];
    if (!ed) return;
    (ed.tools||[]).filter(t=>t.tool_key===key).forEach(t => { t._editionDate=e.date; allItems.push(t); });
  });
  const kindOrder = ['release','news','tip','tutorial','curiosity'];
  const kindLabel = {release:'🚀 Releases',news:'📰 Notícias',tip:'💡 Dicas',tutorial:'📖 Tutoriais',curiosity:'✨ Curiosidades'};
  const grouped = {};
  allItems.forEach(i => { (grouped[i.kind]||(grouped[i.kind]=[])).push(i); });
  let html = '';
  kindOrder.forEach(k => {
    const items = grouped[k];
    if (!items?.length) return;
    html += `<div class="section-heading"><span class="section-heading__label">${kindLabel[k]}</span><span class="section-heading__count">${items.length}</span></div>
    <div class="tools-grid">${items.map(i=>buildToolCard(i)).join('')}</div>`;
  });
  toolsEl.innerHTML = html || '<div class="empty-state">Nenhuma cobertura ainda.</div>';
}

/* ╔════════════════════════════════════════════╗
   ║  VIEW: SAVED                               ║
   ╚════════════════════════════════════════════╝ */
function renderSavedView() {
  const main = document.getElementById('main-content');
  if (!main) return;
  const saved = getSaved();
  if (!saved.length) {
    main.innerHTML = `<div class="view-header"><div class="view-title">🔖 Ler Depois</div></div>
    <div class="saved-empty"><div class="saved-empty__icon">🔖</div><div>Nenhum item salvo ainda.</div><div style="font-size:.78rem;margin-top:6px;color:var(--text3)">Clique em "Salvar" em qualquer card para adicioná-lo aqui.</div></div>`;
    return;
  }
  const items = saved.map(s => `<div class="saved-item">
    <div class="saved-item__info">
      <div class="saved-item__headline" onclick="window.open('${esc(s.url.replace(/'/g,"\\'"))}','_blank')">${esc(s.headline)}</div>
      <div class="saved-item__meta">${esc(s.source)} • Salvo em ${fmtDateFull(s.savedAt)}</div>
    </div>
    <button class="remove-btn" onclick="removeSaved('${esc(s.url.replace(/'/g,"\\'"))}')">✕ Remover</button>
  </div>`).join('');
  main.innerHTML = `<div class="view-header">
    <div class="view-title">🔖 Ler Depois <span style="font-size:1rem;font-weight:400;color:var(--text3)">(${saved.length})</span></div>
    <div style="margin-top:8px"><button class="topbar-btn" onclick="clearAllSaved()" style="color:var(--danger)">✕ Limpar tudo</button></div>
  </div>
  <div class="saved-list">${items}</div>`;
}

function removeSaved(url) {
  const saved = getSaved().filter(s => s.url !== url);
  setSaved(saved);
  updateSavedBadge();
  renderSavedView();
  renderSidebar();
}
function clearAllSaved() {
  if (!confirm('Remover todos os itens salvos?')) return;
  setSaved([]);
  updateSavedBadge();
  renderSavedView();
  renderSidebar();
}

/* ╔════════════════════════════════════════════╗
   ║  MAIN RENDER                               ║
   ╚════════════════════════════════════════════╝ */
function renderApp() {
  const app = document.getElementById('app');
  const view = state.view;
  const n = getSaved().length;

  if (view === 'landing') {
    app.innerHTML = `
      <nav class="topbar">
        <span class="topbar__logo">CsR <span>News</span></span>
        <div class="topbar__spacer"></div>
        <div class="topbar__actions">
          <button class="topbar-btn theme-btn" onclick="setTheme(getTheme()==='dark'?'light':'dark')">${getTheme()==='dark'?'☀️':'🌙'}</button>
          <button class="topbar-btn primary" onclick="navigate('day',null)">▶ Entrar</button>
        </div>
      </nav>
      <div style="padding-top:var(--topbar-h)">${renderLanding()}</div>`;
    return;
  }

  // System shell
  app.innerHTML = `
    <nav class="topbar">
      <button class="hamburger" onclick="toggleSidebar()" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
      <span class="topbar__logo" style="cursor:pointer" onclick="navigate('landing',null)">CsR <span>News</span></span>
      <div class="topbar__spacer"></div>
      <div class="topbar__actions">
        <button class="topbar-btn" onclick="navigate('saved',null)">🔖 <span class="saved-badge" style="${n?'':'display:none'}">${n}</span></button>
        <button class="topbar-btn theme-btn" onclick="setTheme(getTheme()==='dark'?'light':'dark')">${getTheme()==='dark'?'☀️':'🌙'}</button>
      </div>
    </nav>
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
    <div class="system-shell">
      <aside class="sidebar" id="sidebar"></aside>
      <main class="main-content" id="main-content"></main>
      <aside class="rail" id="rail"></aside>
    </div>`;

  renderSidebar();

  if (view === 'day') {
    const edDate = state.viewKey;
    if (edDate) {
      state.calYear = parseInt(edDate.split('-')[0]);
      state.calMonth = parseInt(edDate.split('-')[1]) - 1;
    }
    renderDayView();
  } else if (view === 'cat') renderCatView();
  else if (view === 'tool') renderToolView();
  else if (view === 'lang') renderLangView();
  else if (view === 'saved') {
    renderRail(null);
    renderSavedView();
  }
}

function toggleSidebar() {
  state.sidebarOpen = !state.sidebarOpen;
  document.getElementById('sidebar')?.classList.toggle('open', state.sidebarOpen);
  document.getElementById('sidebar-overlay')?.classList.toggle('open', state.sidebarOpen);
}
function closeSidebar() {
  state.sidebarOpen = false;
  document.getElementById('sidebar')?.classList.remove('open');
  document.getElementById('sidebar-overlay')?.classList.remove('open');
}

/* ╔════════════════════════════════════════════╗
   ║  KEYBOARD SHORTCUTS                        ║
   ╚════════════════════════════════════════════╝ */
document.addEventListener('keydown', e => {
  if (e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
  if (e.key==='t'||e.key==='T') setTheme(getTheme()==='dark'?'light':'dark');
  if (e.key==='1') { state.displayMode='cards'; if(state.view==='day') renderDayView(); }
  if (e.key==='2') { state.displayMode='list'; if(state.view==='day') renderDayView(); }
  if (e.key==='u'||e.key==='U') { state.filterUrgent=!state.filterUrgent; if(state.view==='day') renderDayView(); }
  if ((e.key==='p'||e.key==='P') && state.view==='day') {
    const eds = state.editionsIndex?.editions||[];
    const idx = eds.findIndex(e=>e.date===state.viewKey);
    if (idx>0) navigate('day', eds[idx-1].date);
  }
  if ((e.key==='n'||e.key==='N') && state.view==='day') {
    const eds = state.editionsIndex?.editions||[];
    const idx = eds.findIndex(e=>e.date===state.viewKey);
    if (idx>=0 && idx<eds.length-1) navigate('day', eds[idx+1].date);
  }
});

/* ╔════════════════════════════════════════════╗
   ║  POPSTATE                                  ║
   ╚════════════════════════════════════════════╝ */
window.addEventListener('popstate', () => { parseRoute(); renderApp(); });

/* ╔════════════════════════════════════════════╗
   ║  INIT                                      ║
   ╚════════════════════════════════════════════╝ */
boot();
</script>
</body>
</html>
